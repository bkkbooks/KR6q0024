body:
  text: 六祖下三十五世臨濟宗潭州溈山五峰如學禪師關中臨潼任氏子參密雲悟和尚一夕茶話次悟驀伸腳曰你作麼生師以腳踢之悟笑曰未在未在師曰和尚道看悟倒臥師曰也只是困悟曰你又與麼去也師乃禮拜天敬丙寅冬金粟衆盈五百悟乃舉師為西堂林皋豫見師於西堂寮問漢首座何如師云我也不知豫云宗師家具擇龍蛇眼為甚麼道不知師云兄眼何在豫便喝師默然豫又喝師云何不再喝豫云好不知痛癢師便休一日師辭行悟握拂曰喚作拂子則觸不喚作拂子則背不得拈起不得放下不得下語不得無語不得錯舉若不錯舉則分付汝師則連跳兩跳曰不要不要悟曰猶是亂叫亂跳更試舉看師轉身曰某甲去也悟乃付源流拂子崇禎庚午悟住黃槩師在西堂寮僧隱元琦參向師豎拳曰識得這箇天下太平識得這箇天下爭競如何決斷師便打僧再喝師又打僧連喝兩喝師又兩打僧遂呈所得師云此子徹也乃呼進寮云汝有悟處試道看僧云道即不難只恐驚羣動衆師云但說何妨僧打斤斗而出師云真獅子兒善能哮吼癸酉出溈山之金陵祇陀林忽示寂龕歸建塔所著五宗派敘示衡州僧谷應後黃龍牧夫付梓行世天童悟嗣蘇州三峰漢月法藏禪師無錫蘇氏子年七歲就鄉孰值湖水暴漲家人遍尋不獲即乘一大龜衝濤而來里人神之十五出家十九剃染究心教典精析儒術嘗語人曰十河九洛象教總持須從無文字處求之乃著四書五經參同一日憮然曰宗乘中事自問理會也理會得說也說得只一事未在敵他生死不得遂決志行腳參萬法歸一話遍扣名宿皆不當意遂隱虞山三峰草屋蘿牆不設榻座會窗外二僧夾籬拗折大竹聲若迅雷乃大悟因閉關次忽推窗見黃梅墮地始得徹證乃握一竹篦亡曉夜開發學者一時稱三峰罏鞴名重叢林天啓甲子秋禮悟和尚於金粟悟上堂舉黃檗參百丈丈舉再參因緣黃檗不覺吐舌丈曰子以後莫承嗣馬祖去麼檗曰不然因師舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫丈曰如是如是見與師齊減師半德見過於師方堪傳受子甚有超師之見故臨濟三度問佛法大意三度被打濟後出世惟以棒喝接人不得如何若何祇貴單刀直入師出衆便喝悟曰好喝師又喝悟曰汝試更喝一喝看師禮拜歸位悟復舉僧問古德朗月當空時如何德曰猶是階下漢僧曰請師接上階德曰月落後相見且道月落後又如何相見師便出堂即日請師居第一座次日悟上堂師問海衆雲從慈霖普霔現躍飛騰即不問如何是驅雷掣電底句悟便喝師曰恁麼則金粟花開寶林果熟去也悟又喝師禮拜歸位未幾欲辭行悟手書臨濟源流并信拂授之杭州安隱請師上堂上首白椎未竟師以拄杖橫截曰千佛下口不得列祖一場敗闕今日直下拈來依然是赤骨律此事如干將莫邪雙腕並運如冰花若火𦦨向報化舌根下一截正好銷兵鑄钁樂過平生只今有恁麼漢子麼不妨與安隱相見初安隱請雲門澄禪師澄云吾年邁矣汝若請三峰為首座老僧即來衆詣三峰白其事師欣然許之及至澄先一日化去遺語曰漢首座當世宗匠佛法學識較我十倍即請主之衆遵遺命請師開法上堂若論此事如迅雷貫頂掩耳不及吐出清風一條鑌鎚向須彌頂上一鎚金剛山下透脫倒卷虗空萬仞壁立若是臨濟嫡骨兒孫便解向獅子口裏敲牙驪龍脊上揣骨主賓互換通身縱奪末後句裏出身威音王前過活還有如是操路者麼出來與老僧相見安隱示衆機先一句是汝諸人安身處先機一著是汝諸人立命處其間左之右之或伸或縮是汝諸人踏腳處末後一句是汝諸人出頭處此則法語諸方爭相傳誦稱為三峰五決旨碓庵青頌云展開兩手任君看鑒徹機先也大難情與無情俱斷送收來一併葬桐官七百年來老作家撒開揑聚驗龍蛇饒君膽略能籠世到此如何敢劈牙上堂頭上蔚藍天欲滴腳底白雲千萬尺手中拄杖腰下瓢去去來來無順逆好消息踏破草鞋雙腳赤三頭八臂腦後睛日日相逢不相識上堂攀躋不住忽然翻打破吾宗向上關剩得一雙窮相手始知無法向人間法座成上堂巖巖獅座涌堂中老衲披衣坐法空跨下狻猊忽翻擲一聲哮吼見威雄喝一喝曰獅子踞地吼佛祖倒身走出頭天外看只有萬峰叟喝一喝室中嘗垂三問勘驗衲子一曰宅破家亡阿誰是主二曰縱開楔棒是何意旨三曰卷席挂拂因甚不住鮮有契其機者西蜀劉道貞入山問道既有省答師三問頌一宅破家亡云無錐真勝去年貧剝盡皮毛見赤身夢到千嵒霜雪後梅花隴外一枝春二縱開楔棒云莫將言語溷綱宗劍在眉間覿露鋒領取機先第一句虎頭虎尾絶狐蹤三卷席挂拂云獅兒不戀舊時窩躑過翻來雷影過惟有蓮峰知此意橫肩楖栗入煙蘿師首肯之師嘗曰黃龍有言學者欺詐之弊不以如來知見之慧密而煆之何由能盡且古人建立宗旨千牢百固尚有承虗接響者混我真宗若師家大法未明無從辨驗則胡喝亂棒羣然而起吾宗掃地矣鐵壑溥頌云商周彝鼎存家貝俎豆斯文起草萊破竹聲中玄會得真宗繼響復誰來師初開三峰法席歷主淨慈北禪龍山錦樹真如聖壽復重興鄧尉聖恩祖席一日上堂辭衆曰心休不說法骨瘦上堂艱分明都說盡湖水洗山顛崇禎乙亥七月二十二日將入寂侍者問如何是身後事師曰牀頭老鼠偷殘藥壁上孤燈照舊衣侍者擬再問師舉手曰放下幔子著至中夜索浴更衣泊然而逝門人奉全身建塔於聖恩寺之右曰天山塔院著有八會廣録智證傳提語行世天童悟嗣四川夔州破山海明禪師蜀之蹇氏子年十九出家姜家菴聽講主說楞嚴至一切衆生皆由不知常住真心詣主請益未決遂出蜀遍參憨山清博山來雲門澄諸老不契乃住破頭山猛力參究一日到萬丈懸崖上立足自誓曰悟不悟性命在今日了辰時立起立到未時眼前惟有一平世界更無坑坎堆阜舉意欲經行不覺墮崖損足至夜翻身忽痛有省天明叫曰屈屈一居士曰師父腳痛麼師劈面一掌曰非公境界參悟和尚於金粟值猛雨轟雷悟謂衆曰假饒雷來打我汝等如何支遣師曰用遣作麼乃呈頌曰㘞地雷聲意自悠幾人歡喜幾人愁吾師縱有分身法血濺黃沙倒逆流一日悟落堂惟默然師問正恁麼時如何悟云你可到恁麼地否師震威一喝悟便打師復兩喝悟云你再喝兩喝看師掀倒禪牀拂袖便行悟追上驀頭一棒師曰恁麼為人瞎却天下人眼在師入座悟問內不放出外不放入正恁麼時以何為界師曰竿頭絲線從君弄不犯清波意自殊悟頷之出住禾之東塔上堂東風解凍百草萌芽行腳衲子似粟如麻拖泥帶水兮草鞋獰似虎混俗和光兮拄杖活如蛇向有佛處不可住無佛處急走過方稱英俊作家切不可向萬里無寸草處坐虗度生涯大衆且如山僧這裏九旬禁足三月調心今日解制臨行一句作麼生道摘楊花摘楊花上堂金鋤削盡千峰雪露出天涯星月孤照得世間人廓徹都來依樣畫葫蘆大衆未審還有依樣畫得者麼有則不妨好手手中呈好手紅心心裏射紅心其或未然且待山僧自畫去也以拄杖打圓相於中擲地曰層落落影團團千古萬古與人看上堂福城東際煙水漲大塔廟前樓閣開千手大悲捫不住無端放出善財來大衆且道善財來作甚麼隨行踏斷流水聲縱觀瀉出飛禽跡卓拄杖下座上堂解開布袋口放出一羣牛繞砌尋芳草芒繩貫鼻頭放去也東觸西觸收來也山悠水悠正恁麼時不收不放一句作麼生道拏雲自可容收放喝月誰能使去留上堂昨夜梅花香宇宙今朝雪塊打長空就中一點真消息拈向諸人鼻孔中驀呈拄杖云未證據者向此嗅嗅看是甚麼意旨時一僧𨁝跳作舞而出師以拄杖擲地云穿過髑髏朱婆子問一切時參究念佛底是誰師云你這一問從甚處來婆云朝夕不離師云不離箇甚麼婆轉身繞一匝云不離者箇師云也是赤土塗牛奶婆子又問弟子現是女身父母未生前還是男是女師卓拄杖云還識者箇麼婆云無去無來師云是甚麼所在說來說去婆云即今如何抵敵師云好與三十棒師住東塔三載旋應銅梁之請歷主岊嶽大峩萬峰中慶鳳山棲靈祥符無際蟠龍佛恩雙桂十剎宗風遐播後當蜀變師以化導不辭腥穢羣魔救免僇殺者億萬萬計師無疾坐逝於康熙丙午三月十六日是夕夔太守夢師授一扇守展讀其偈曰屣聲滑滑響蒼苔老去尋山一快哉回首五雲堪一笑淡然瀟灑出塵埃覺即遣候而師已化去矣郡守驚異刊布行世天童悟嗣寧波天童費隱通容禪師閩福清何氏子年十四依三寶殿出家一日聞指南墮指參禪發心參壽昌經示狗子無佛性話因經上堂與僧問答次師在傍不覺身心奮發話頭脫落乃問經曰今日看破和尚家風了也經曰汝有甚麼見處師便喝經便休聞天童悟和尚寓吼山師冒雨往謁便問覿面相提事若何悟以番菩提大素珠照頭便打師曰錯悟又打師又喝悟祇管打師祇管喝至第七打所有伎倆知見一時冰釋悟問薰風自南來殿角生微涼汝作麼會師曰水向石邊流出冷風從花裏過來香曰離了此又作麼生師曰放和尚三十棒曰除却棒又作麼生師便喝曰喝後聻師曰更要重說偈言悟休去後悟住黃檗上堂曰還是衝浪金鱗麼出衆相見師以坐具覆頂出曰和尚還會麼悟打曰一釣便上師喝一喝歸衆悟然之崇禎癸酉師充黃檗西堂隱元琦問大制從來無解結如何特地起風波師曰被闍黎帶纍曰恁麼則翻騰去也師便打琦喝師曰亂作曰打著昔年舊痛處於今猶恨棒頭輕請師末後一頓師打曰舊瘡瘢上著艾曰恁麼則徹骨徹髓去也師曰如何是徹底意琦一喝師曰喝後聻曰時清休唱太平歌師曰祇引一半上堂今朝初一好箇消息若還不會又是明日所以道舉一不得舉二放過一著落在第二山僧舉一了也是汝諸人如何委悉便下座住金粟上堂全身擔荷赤體提持要是夙有器骨英靈漢子於尋常日用活卓卓地不將奇特言句貼於額上玄妙理致蘊於底裏專用格外鉗錘獨距宗門牙爪生擒猛虎活捉獰龍縱有言超佛祖行過舍那入此閫域未免橫身拶出其餘之輩觀心作念著意思惟塵寂光生而有神穎妙慧自作去就畢竟搆他語脈不上要有者等丁卓始可別行教外單傳主持棒喝全行正令而與從上瞎驢蹄角相肖且正當恁麼時回機就位一句作麼生道本來不借修因得那管心明與法通住徑山上堂舉臨濟祖師云若第一句薦得堪與佛祖為師若第二句薦得堪與人天為師若第三句薦得自救不了徑山者裏不然若向第三句薦得石筍抽條第二句薦得種麻得豆若向第一句薦得漆桶不快笑看臨濟強分節目將刀割水無事望江亭上立山河盡在座中圓上堂良久云聲前一句子欲要大家知便下座天章解制上堂起期結制依門傍戶升堂說法起模畫樣胡言漢語攪亂衲僧東扯西拽轉不相應山僧今日徹困為汝諸人去也遂拈拄杖一時打散田頭栽菜次師云菜栽完麼田云栽完了師云無根菜又作麼栽田無語而笑師云開花了也僧問如何是一喝如探竿影草師云要汝入門便道又問如何是一喝如踞地獅子師云百獸林中獨步又問如何是一喝如金剛王寶劍師云早已分身兩段又問如何是一喝不作一喝用師云汝自理會師示寂於順治辛丑三月二十九日門人茶毗獲舍利如豆大五色燦然分建舍利塔於閩之黃檗郢州之興陽諸處晦山顯著有舍利記天童悟嗣嘉興金粟石車通乘禪師金華朱氏子偶閲龐居士問石頭不與萬法為侶因緣有疑在家打七參究至第四日聞夜半風聲覺有入處二十六歲棄室出家完具聞僧舉六祖曰不思善不思惡正與麼時那箇是明上座本來面目忽然有省述偈曰正與恁麼時面目未嘗迷善惡都不到獨露兩莖眉參天童悟和尚於金粟悟問那裏來師曰雲門悟曰幾時起身師打一圓相悟曰莫亂統師曰千里同風今日特來親領痛棒悟曰既是千里同風又來作麼師翹左足悟曰者還不是師翹右足悟曰錯也師曰又被風吹別調中悟休去入室次悟舉世尊拈花迦葉微笑意作麼生師曰白日穿針悟連棒打出師豁然懷香禮謝悟遂舉手曰我手何似佛手師拂袖便出復呈偈曰我手何似佛手赤腳蓬頭便走直得透上玄關管取合著狗口悟問曰內不放出外不放入正恁麼時以何為界師曰家貧未是貧路貧愁殺人悟拈拄杖曰早箇是出是入師一掌悟亦打一日悟舉薰風自南來問你意作麼生師曰白雲彌宇宙薰風自南來即呈偈曰拂袖薰風宇宙清園林殿角解翻身相逢且說三分話未可全拋一片心悟云那幾分怎麼不說師云留與和尚悟云不疑言句是為大病進云天晴日頭出有眼瞞不得悟云紅爐煆過始得師侍悟七載不惜勞苦後悟赴黃檗命師領衆師一日問悟設有人問和尚如何是禪如何對他悟打云一棒打透髑髏穿更有問又如何悟打云足方頭頂圓更有問又如何悟打云口裏舌頭尖更有問又如何悟打云若喚作禪入地獄如箭射住童光上堂喝一喝曰大衆還知落處麼三世諸佛於此轉大法輪真風不墜歷代祖師於此廣度羣迷正脈流通山僧於此為衆提持只要眉橫鼻直汝等諸人赤肉團上有箇圓明妙體徹頭徹底佛眼覷不見聖智難量十方容不得真機獨露直得縱踪絶跡塞却諸人咽喉無處出氣雖然如是事無一向更與諸人當場顯示遂拈拄杖作釣勢曰大衆還見麼識取鉤頭意莫認定盤星住金粟上堂諸佛出世為一大事因緣達磨西來指人見性成佛金粟不諳老婆禪祇要諸人棒下見血若也恁麼會得觸處逢渠纖塵不立垂手人間和光化物既然觸處逢渠且道渠是阿誰毫𨤲有差天地懸隔喝一喝下座司理黃元公參府吳升初請上堂公禮起曰謝和尚說法師曰那一句是法速道看曰人前不可吐露師曰也不可埋沒曰請升公道師曰各與一頓乃曰一句截流全心即佛萬機不到全佛即心到者裏心佛俱忘復是何物喝一喝曰甜瓜徹蒂甜苦瓠連根苦上堂少室真機人天普育直指父母未生面目大衆有眼曰見有耳曰聞且道作麼生是父母未生面目良久曰牆外鳥啼聲已碎盡在搖頭不語中喝一喝僧問和尚今日升座說甚麼法師曰松枝挑夜月照盡世間人孝廉唐祈遠問經云一切惡鬼尚不能以惡眼視之況復加害憑箇甚得恁有力師曰天魔膽喪曰恁麼則家家觀世音師曰還見觀音麼曰雖然未見却也叫得應師曰現三十二相看曰今日親為學人升座說法了也師曰且莫錯認崇禎十一年二月十二日將示寂僧問此後向甚處與和尚相見師曰遍界不曾藏僧作禮曰恁麼則向者裏與和尚相見去也師曰且莫錯認泊然而逝天童悟嗣贛州寶華朝宗通忍禪師常州陳氏子年少披剃遇異人授以仙術至二十二歲聞無生之說往參天童悟於金粟悟問那裏人師云常州人悟云是我鄉里也曾帶鄉里物事來麼師不能答悟亦笑而已次日入方丈拜問云弟子要了生死特來請問不但無處下口且無處著想悟云無處著想便是好消息師云莫便是麼悟拈棒連打云未是在師禮拜而出胸中疑悶每日入室不下四五次常至普茶時亂問亂說閧堂大笑毫無慚色悟亦笑云你却有得說說得好道理只如大慧杲參諸佛出身處話後聞薰風自南來殿閣生微涼方得瞥地你作麼生會師茫然參有月餘忽有會處述偈云二十餘年染世塵於今家業一朝傾雙拳握著無他物兩眼睜開沒半人言路窮時無可說義途絶處句難成從此十年埋影後如雲如雨遍乾坤悟閲之對衆稱賞後入堂打七力參三日遂入方丈呈偈曰翰林學士渾身濕兵部尚書徹骨寒晤對不須頻叫屈一人有慶萬民安孝廉黃居士問師云設使如今去見老和尚再索鄉里物事時如何師兩手捧起士無語便走師急叫云若是鄉里便拿了去次日至復敘前話士又問云如今再索鄉里物事時如何師云君子愛財取之有道一日悟問山中猛虎以肉為命何故不食其子師被一拶通身汗下越兩日偶從外寮進推入寮門驀然除去礙膺之物遂入方丈通所得悟舉前問師曰惟人自肯乃方親悟曰與麼下語亦未在師笑曰和尚只做得大千兒孫便出三日後聞悟自答曰自食肉不盡更猛省得下語亦未之旨翌日悟上堂師出問直下知歸即不問如何是大用現前一句悟擬拈棒師指曰者老漢伎倆不忘一釣便上拂袖而出即蒙印可初住靈祐屢遷名剎崇禎辛巳住曹溪上堂諸佛諸祖唯以一大事因緣故出現於世據實論此一大事因緣不用開口不用動念直下一一天真一一明妙祇貴直截契證超越死生不離見聞緣超然登佛地所以世尊於明星祇得一覩六祖於金剛經直用一聞諸公若也得恁麼一回去便堪傳佛心印方為佛祖嫡骨兒孫試問諸人既是現成舊公案又用舉作甚麼回機同本得一舉一回新小參僧問明歷歷路堂堂更有甚麼師曰猶是鬼窟裏活計僧打一圓相曰脫體無依去也師曰依舊跳不出僧一喝師曰三喝四喝後如何僧又喝師曰野狐精僧問倩女離魂那箇是真底師便打僧無語師曰會麼僧擬議師又打曰切忌私奔晚參師云庭前草欲丈扶疏樹亦濃明年作境會誰契古人宗良久震威一喝順治戊子春寶華兵警師應慶雲之請十月朔陡示微疾初八日上堂舉洞山問雲巖云百年後忽有人問還貌得師真否如何祇對巖良久云祇者是復舉洞山因供雲巖真次僧問先師道祇者是莫便是否山曰是僧曰意旨如何山曰當年幾錯會先師意僧云未審先師還知有也無山曰若不知有爭解恁麼道若知有爭肯恁麼道師云汝等諸人若透得者兩則話即無關不透矣衆下語不契遂索水盥浴更衣復索滾水飲畢端坐而逝數日顏色如生入龕時紅光燭天衆疑庵中失火趨救寂然莫不驚異頂禮闍維後頂骨牙齒衣環鮮好不壞建塔於西堂藏師昭穴語録三十卷并迅雷指迷等集行世天童悟嗣宜興龍池萬如通微禪師嘉興秀水張氏子年十九出家受具謁聞谷大師開發無字話歷扣名宿偶閲楞嚴至諸可還者自然非汝不汝還者非汝而誰恍有所得往參悟和尚於金粟棒下汗流遍體打失從前伎倆一日入城聞路旁人家毆叱小廝云看你藏在那裏去師不覺躍然口占一偈云沒處藏沒處藏全身獨露在街坊堪笑華亭擺渡漢葛藤打得太郎當悟七十誕辰師懷香拜祝入門便喝悟云胡喝亂喝師又喝悟又云胡喝亂喝師遂禮拜悟打云你再喝喝看師云蒼天蒼天便行悟呼曰萬如我直下疑你者兩喝道道看師云歇歇與和尚道遂出一日悟在方丈經行師見僧問悟佛法的的大意悟云近前來僧近前悟便打僧云上根大器直下承當中下人來如何悟云老僧從來不曾眼花僧罔措師聞豁然遂蒙記莂五更遣行住莆之曹山上堂前三三後三三箇中消息誰許諳春風處處花成錦秋水澄澄月一灣喚作真如不壞法此人曾未踏鄉關喚作無常生死法管教纍劫受餘殃敢問諸人畢竟作麼生即是以拂子打圓相曰生佛未形消息在不知幾箇肯擔當擲拂下座住龍池上堂有一人在孤峰頂上目視雲漢把三世諸佛一口吞盡不見有衆生可度好與三十拄杖何故事上不足有一人在十字街頭三頭六臂合水和泥隨機接引亦好與三十拄杖何故理上不足有一人不離高峰頂上目視雲漢嘗在十字街頭和泥合水有一人不離十字街頭和泥合水嘗在孤峰頂上目視雲漢二人到龍池門下正未有語話分在且道龍池為人在甚麼處還委悉麼時𢹂楖栗當門據獅象狐狼一併敲僧問如何是結制底意師曰㵎深流水聚曰學人則把住牢關去也師曰山峻鳥飛遲問如何是破砂盆師曰風不來樹不動問樹雕葉落時如何師曰過蟻難尋穴歸禽易見巢問日落西山去林中事若何師曰虎行樵子徑鳥宿故枝頭順治丁酉十月二十九日示寂龍池門人奉全身龕於寺陽立塔天童悟嗣寧波天童山翁木陳道忞禪師之潮州荼陽林氏子幼有宿慧因讀大慧杲録忽憶前身雲水參方歷歷如見即日走匡廬開先投明法師剃染明以師志慕禪宗為舉臺山婆子話遂於言下薦得趙州意旨自驗生死關頭未破遍參憨山清黃檗有諸尊宿終不自肯後參悟和尚於金粟機緣不契直趨雙徑謁語風信信問曾到金粟否師曰曾到曰曾問話否師曰不曾曰你怕打那師曰某甲一向不曾置得問頭請師處借轉問頭信乃開示師不肯復回金粟舉前話悟曰你喫飯還問人借口麼師擬議悟便打後因參殃崛産難因緣打破疑團始明得從上古人關鍵凡居侍司掌記室親炙悟者一十四秋日臻玄奧繼席天童上堂目擊道存鋒鋩不犯頭頭顯露物物全彰猶是因高就下曲為今時況復言中取則句裏呈機舉古明今拈三播兩大似鄭州出曹門何異南轅而北轍殊不知當人腳跟下立地一著如天普蓋如地普擎抽一機則千機頓赴展一目則萬目畢張透聲色絶遮攔亘古亘今無處所還生死得伊麼還汙染得伊麼還榮枯得伊麼還推遷得伊麼縱有德山棒如雨點也則打他不著臨濟喝似雷奔也只無伊下口處更說甚麼百問雲興千酬瓶瀉一毫端際出現無盡身雲一舉步間遊歷無邊國土正是泥裏洗土塊蝦跳不出斗諸仁者從上既有如此廣大門風穩密田地何不推他阿爺向後放出渠儂一頭與麼直截承當去正恁麼時接續流通一句作麼生道卓拄杖曰天高羣象正海闊百川潮上堂昨晚南嶽與匡廬兩山爭論佛法一山道南嶽讓和尚乃曹溪嫡子一山道青原思大師實寶林正宗一山道廬陵米價傳千古一山道磚鏡磨穿古佛心互相競爭不已羅浮山聞得出來約住曰莫爭莫爭饒你青原思大師南嶽讓和尚少不得從我嶺南者裏去山僧驀頭與羅浮山一棒天台合掌道善哉和尚打者一棒不妨透頂透底暢快殺人山僧遂與震威一喝咄縮頭去於是四山各各懡㦬而退拈起袈裟角曰還見麼自從盧老收歸後須信人人總有之上堂靈雲見底大家同二月桃花在處紅健羡不須從外覓故園大有好芳叢卓杖云看看擲杖云擬著眼落千差一片何人得流經十萬家順治己亥師奉詔賜號弘覺禪師馳驛至京萬善愍忠廣濟三處結冬召對法語別見三世奏對集示衆真如凡聖皆是夢言佛及涅槃並為增語山僧一冬萬善殿又且舉揚箇甚麼只有清風來席上更無閒語落人間掃笑巖祖塔黃金骨鎖玉玲瓏鐵棘門栽不計重佛眼難窺五祖意兒孫若敢妄流通拈香云即此用離此用蟭螟眼裏繡鴛鴦烈𦦨爐中飛彩鳳師晚號夢隱道人乞歸金粟投老於會稽化鹿山之陽明洞天乃自相山擇吉兆塔於黃龍峰下康熙甲寅六月二十七日示寂世壽七十九著有九會百城北遊等録行世天童悟嗣寧波雪竇石奇通雲禪師俗姓徐家貧就南廣寺脫白見中峰垂訓有蹭蹬不隨愚伴侶蹉跎又恐落風塵句乃往虞山住靜刺血書經後參金粟悟和尚一夜黑地走出因僧劈面撲破鼻子有省呈偈曰某甲今年三十二向來鬼窟作活計忽然撞破鼻頭時但見鮮血流滿地悟未首肯後於棒下頓脫疑滯時隨悟赴育王天童一十三年值牧雲門同辭出山得付衣拂囑云折箸無一雙狗子無一隻是你住處住靈鷲上堂爐鞴宏開烹佛祖聖凡齊煅辣鉗錘者回莫作尋常看大衆應須高剔眉當爐莫避見義勇為分明覷破真奇特脫體風流更是誰驀豎拄杖曰還見麼直得萬象光輝乾坤獨露縱橫殺活總不由人把住放行全歸自己如或不然山僧不免重重指點去也還委悉麼杖頭有眼明如日要識真金火裏看擲拄杖下座上堂春山疊亂青春水漾虗碧寥寥天地間獨立望何極古德恁麼說話大似在孤峰頂上等箇人來大衆且道他要等箇甚麼人以拄杖擊香几曰還委悉麼定光金地遙招手智者江陵暗點頭住雪竇上堂當陽一著獨露無遮八面玲瓏十方軒豁明眼作證豈敢囊藏直得瓊樓玉殿百草頭上全彰千丈報身瓦礫堆邊頓現塵塵爾剎剎爾突出無位真人發明現成公案直饒三世諸佛歷代老古錐到來箇箇退身有分正當恁麼時如何水歸大海波濤靜雲到蒼梧氣象間上堂淡蕩春風二月天山花似錦碧巖前深深古寺今來到端的無如鼻祖禪前是山門佛殿後是臥室法堂當陽坐斷一句且置驀豎杖云這箇喚作什麼擊禪牀云但見皇風成一片不知何處有封疆僧問一念無思時如何師云死水裏作麼僧喝師云喝那箇僧云明月無私師打云猶在死水僧問如何是安居樂業一句師云今日天寒云向上還有事也無師云來日向汝道順治辛丑師返南廣曰我老矣當不忘本也逮癸卯正月示寂仍迎龕建塔雪竇天童悟嗣嘉興古南牧雲通門禪師蘇州常熟張氏子二十歲投破山洞聞乘和尚出家原名契門力事參究便有省入後參天童悟和尚於金粟以偈呈方丈悟略閲兩行問即今事作麼生師擬議悟以番菩提數珠便打師禮拜悟又向背築一拳曰你若作打會入地獄如箭射異日悟舉薰風自南來殿角生微涼驗衆師呈三頌悟看至末首曰不親切師曰前二首聻悟曰此不親切和前都不親切師便問如何是親切處悟便掌師即豎一指曰某甲也悟曰你未知落處在師隱隱疑後上天童題萬松關偈曰古路松陰草里長過時誰覺骨清涼悟曰何不道過時誰不骨清涼師於言下有省又作活眼泉偈寮中思索偶然停筆右手將左臂一觸忽然觸發直下湛然前所疑一掌落處不言而喻一時呈行由曰詣實供通悟曰者些都不是實消息你再供通實消息看師進前展兩手悟曰不是不是師曰和尚如今瞞某甲不得悟曰瞞即瞞不得且惑亂你一上後乃付囑住古南因華嚴會上堂華嚴法界理事無礙懺罪消災一彩兩賽驀拈拄杖曰大衆杜順和尚來也在拄杖頭上口喃喃道懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上諸人還見麼若也見未免頭上安頭若不見日日堂堂無蓋覆本來同是遮那身上堂拋下拄杖曰撲落非他物復擎起作舞曰縱橫不是塵汝諸人還見山河及大地全露法王身麼復擊香几曰一片榆楠木敲來響殺人上堂靈樞密運四序推移天地之間其猶橐籥看看冬到來即便春風至長連牀上學得底是第二機若是第一機天下老和尚未曾提著山僧又如何折合舉拂子云看看五彩畫頭黃金點額復擊一下云好好一隻春牛被山僧一鞭粉碎了也聞一知十從他遍界分身認影迷頭一任眼𥉌𭿇地上堂向虗空中畫青畫黃本無甚事對無位真人說生說死笑殺傍觀卓拄杖下座夜參次一僧禮拜起拍手師云作甚麼僧云擦去地上塵師遂對衆拍手云我手中無塵且道擦箇甚麼衆無對師云者一隊漢如生盲人相似到此間來只管相我口皮動殊不知我與者僧已作一場佛事了也時有僧出擬問師云山僧手癢試與一抓僧便抓師云是甚麼衆擬議師便打夜參次師問一童子如何是祖師西來意童俯首師云汝諸人反不如者童子遂歸方丈師一晚入堂云還有撞著壁底麼衆無對住天童未幾退隱京口之鶴林久不升座檀護哀請說法乃為說偈云山僧一向說禪而今口似木橛為問以何因緣年往精神銷歇齒落髮白血枯豈可不知時節因而謝事天童來到鶴林守拙日用無別修行一句阿彌陀佛上堂說法領衆讓與諸方賢哲宗門日見滔滔變態不堪言說若是真正高流目擊自當改轍先佛河沙法門進修無甚優劣廬山蓮社清風緇素不妨同結今日檀護臨筵大家飽餐禪悅若論大事因緣不怕甕中走鱉夜來衲被蒙頭一任梅梢掛月此後絶不執拂上堂往來無定即問道者罕能一見矣示誡法嗣條約十章其首章以饑荒薦臻人情蕭索稱和尚者盈衢塞路苟求糊口人皆生厭所施何來此亦甚不知時節者凡我會下人寧去徒衆煨鐺過日如其違背非我弟子等語切中時病康熙辛亥預定逝期於十一月望日付最後弟子天樹植公囑以大事怡然坐脫於吳門之觀瀆恤廬中弟子輩奉全身塔於京口黃鶴山未幾而塔示斜側門人啓壙茶毗獲五色舍利無算有七會語録懶齊別集行世天童悟嗣蘇州遁村報恩浮石通賢禪師嘉興平湖趙氏子年十九父母欲為娶室將親迎師乃潛芟染於普陀返雲棲圓戒看父母未生前話初參雲門澄於東塔尋上鷹窠頂參七女遊尸陀因緣有省偈曰一池蛙鼓夜喧喧歷歷明明到口邊通報五湖林下客從今不必更加參往謁金粟悟和尚問如何是即此用悟打一拂子問如何是離此用悟亦打一拂子師云恁麼則儱侗不少悟云難道有兩箇師禮拜出一日悟問薰風自南來殿角生微涼汝作麼生會師不能答連呈數偈悟俱曰未在一日入室曰某甲會也悟曰如何是你會處師曰子過新羅悟曰未在師呈偈曰薰風自南來殿角生微涼我今看破處也只是尋常悟曰不是不是師曰和尚自不是禮拜而出遁村報恩寺迎師開法寺額預有古佛重光之讖且石佛浮海亦符師號乃留意卓錫焉上堂烏飛兔走急如梭明暗何曾昧得他箇裏本來無可說謂言無說已成多豎拂云大衆且道是有說是無說下座上堂心無自性假境而彰舉拂子云喚作拂子則觸物無自體因心而現不喚作拂子則背心境俱泯性體亦忘畢竟喚作甚麼若不會更通一線良久云明月堂前垂玉露水晶宮裏撒珍珠上堂假使頂戴經塵劫身為牀座遍三千若不傳法度衆生畢竟無能報恩者擲下拂曰新報恩今日傳法了也大衆一時擔荷天童上堂本是沒量人一切難描摹從出母胎來將錯而認錯合掌云大衆會麼我不敢輕於汝等汝等皆當作佛僧問不是一番寒徹骨怎得梅花撲鼻香師曰猶為貪餌客未是絶求人曰如何是絶求的人師曰衲被蒙頭睡正濃此時山僧多不會問如何是密移一步看飛龍師曰過得荊棘林方名是好手問三世諸佛被我一口吞盡何處更有衆生自代曰平地上死人多少師居常以馬祖一喝百丈三日耳聾公案勘學人復垂語云報恩水鄉非舟莫至還有不假舟楫而到者麼脫有當者卒無可否人莫涯其旨趣康熙丁未七月十九日示微疾力拒醫藥默然危坐至二十四日中夜門人請偈師曰吾無一字可說乃怡然而寂塔全身於徑山之臥石天童悟嗣台州通玄林野通奇禪師蜀之合州蔡氏子依黔之蓮峰出家未幾出蜀寓當湖掩關偶檢天童悟和尚參禪偈曰一念未生前試看底模樣疑情猛發偶因失足墮樓口占一偈曰一念未生前六戶絶消息瞥爾揚雙眉大似眼無力即破關參悟於蘇之清涼便問學人絶跡而來特為親近和尚悟曰莫妄想師曰未審還有堂頭也無悟曰看腳下師曰不因漁父引爭得見波濤悟曰莫錯會好一日茶話舉洞山與泰首座喫果子因緣命衆下語師曰食到口邊被伊奪却悟即首肯後隨悟住育王悟上堂舉世尊初生下地便解指天指地汝等諸人猶向老僧擬討甚麼碗拽拄杖下座一時打散師自此全身脫落結制日師問今日四海衲僧雲集各各壁立千仞還許他諸人悟麼悟曰你還夢見麼師曰悟尚不悟夢箇甚麼悟打曰你即今是迷是悟師曰學人不在迷悟裏悟曰且道打你在甚麼處師便禮拜悟為首肯通玄上堂鼓已擊座已登爭奈無禪可說無理可伸幸喜時逢結夏緑樹垂陰水流碧㵎鳥囀幽林歷歷無回互分明沒兩人所以昔日韶國師道通玄峰頂不是人間心外無法滿目青山先師亦道通玄峰頂別是人間只緣不薦錯認青山此二老宿與麼吐露山僧與麼舉揚大似熟處難忘汝等諸人還薦麼若然薦得方知不費纖毫力便登解脫場脫或未然山僧不免再為顯示玉竹高高揮驟雨楊柳紛紛舞翠煙喝一喝卓拄杖下座上堂歷祖出興各有施陳拈拄杖曰怎如山僧拄杖敲几曰信手擊開不二門復舉召衆曰者是山僧拄杖且道不二門在甚麼處若向者裏辨得出不妨緊帩草鞋如辨不出莫道通玄山勢險前頭尤有最高峰上堂第一義諦迥絶安排才擬分疏便成窒礙所以道心若不異萬法一如眼若不寐諸寐自除若是英靈漢聞山僧恁麼道向文彩未彰以前直截擔荷却較些子苟若涉於塵思未免困於途轍祇如不歷程途一句作麼生道一氣不言含有象萬靈何處謝無私上堂山僧二十年前偶一日冷地裏將三千大千世界所有衆生性命攝在一微塵裏並無一人得知所謂藏山於海藏舟於壑夜半有力者負去寐者不覺耳今日山僧普告大衆還信得及麼如信得及見得徹便好休去歇去如信不及見不徹不妨朝參夕參一朝參到無參處遂顧左右云始知無處不家山師示微疾遂掩死關入室弟子俱不易見臨終別衆衆請偈師瞋目曰要去便去害甚熱大旁有赤冶禪人求更名師援筆書行果二字乃曰行果圓成遂擲筆端坐而逝塔全身於寺西山翁忞為之銘塔師於示寂前囑上首二隱謐自間覺集諸法嗣逐一勘驗然後許令開法故通玄門下得人為盛云天童悟嗣共十二人京口夾山林皋本豫禪師晚號晦夫崑山陳氏子十九脫白於姑蘇之堯峰誦金剛經因無所住而生其心句有省初參博山來來曰未入金籠貯誰家野鳥兒師曰鶴有九皋翀碧漢馬無千里謾追風來曰運斤非郢未免傷痕師曰祇如諸方豎拂揚眉又得甚麼邊事來曰片雲橫海嶽樵子盡思歸師曰怪來巖下虎特地暗驚人次參密雲悟和尚其日已晚便問夜宿投人時如何悟云者裏歇不得師云豈無方便悟拈拄杖師接住一送云看破也便出後參磬山修和尚修問那裏來師云武林修云怎知我者裏師云臭名難瞞修云汙汝耳師便喝修云喝後如何師云猶是不知修云老僧不知汝知箇甚麼師擬掌修云猶弄虗在師禮拜一日修云今時學人不肯著實用心所以法門寥落師云雖然如是大約過在知識如黃龍南公不得慈明和尚痛折云何得知道出常情修云豈口傳耳授之所得耶師吐舌又一日入室修云我疑你不會廓侍者與華嚴相會因緣師云不但和尚疑某甲盡大地人疑某甲修曰盡大地人疑你則可莫使老僧疑你師曰恁麼則某甲罪過修曰只如興化與旻德賓主四喝化曰適才若是別人三十棒一棒也饒不得何故為他會一喝不作一喝用那裏是他會一喝不作一喝用處師曰放某甲別通箇消息修曰不要下語師遂頌曰賓主相逢縱奪家喝下從雲見活蛇棒頭突出通無犯豈作親承解撒沙修然之師開法中山石湫乃過報恩謝法修將如意付曰此是老僧四十年用不盡底將去揩磨不得有忘師秉如意入堂曰者箇是堂上老人為豫上座作用不盡底公案敢問有同相證用者麼良久擊板頭一下便出上堂諸佛心印祖祖相傳直指人心見性成佛大衆還信得及麼若信得及便可作一無事道人水邊林下渴飲㵎泉飢餐松柏逍遙放曠任運騰騰逆順卷舒縱橫自在待因緣時至坐曲彔牀提持向上宗乘乃喝一喝云還會向上宗乘麼若也會得堪紹吾宗其或未然不見臨濟大師道有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用復喝一喝云且道是金剛王寶劍耶踞地獅子耶探竿影草耶一喝不作一喝用耶這裏明得即會得雲門大師函蓋乾坤句截斷衆流句隨波逐浪句扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似傾盆且道這是函蓋乾坤耶截斷衆流耶隨波逐浪耶洞達此三句便明得洞上宗旨五位君臣正偏回互昔日洞山問曹山云汝向甚麼處去曹云向不變異處去洞云不變異處豈有去耶曹云去亦不變異恁麼酬答且道者是偏中正耶正中偏耶正中來偏中正兼中到耶夜半烏雞停雪上天明石女鏡中分透得麼若透得這箇便知得溈仰父子大用大機不見仰山問溈山大用現前請師辨白溈山便下座歸方丈仰山隨後入溈山問子適來問甚麼話仰山再舉前語溈曰還記得我答汝否仰曰記得溈曰你試舉看仰便珍重出去溈曰錯仰回首云間師弟來莫道某甲無語好你看他投機暗合子孝父慈識得麼若識得這箇便識得法眼大師道三界惟心萬法惟識不見僧問法眼如何是曹源一滴水眼云是曹源一滴水韶國師在旁聞之忽然大悟後住通玄峰有偈曰通玄峰頂不是人間心外無法滿目青山眼聞云只此一偈可起吾宗故悟心之士在於明眼人前一點也掩渠不得所以從上五宗機緣聯綴料揀正邪總不出一心之用亦不別當處之旨若定當得便與三世諸佛歷代祖師把手同行安定國坐斷春風唱無為大化啓妙用真機不是目前法亦非目前事無向無背無回無互輝古騰今光天徹地森羅萬象法法全該大地山河頭頭俱現不在思量豈煩卜度廓徹靈明直超情謂會即便會設或未然山僧拄杖子更為諸人通箇消息以拄杖卓一下云謹白參玄人光陰莫虗度下座上堂若論此事心不可求智不可學揑斷百匝千重於中下機一時揚却突出孤危方教峻峭都盧收拾將來非心非色非如非異要用即用要舍即舍要行即行要藏即藏擬思一毫地便落生死關頭到者裏作麼生相救得復曰五蘊山頭自在身了然物物應天真頓教直下無思議玄要全分見本人卓拄杖一喝上堂般若無知假黃鳥而有聲法身無相應翠竹以彰形爾時金焦二山忍俊不禁將海門一口吸盡直教水泄不通山僧拄杖子款款向道儘你神力喫怒還知法身無為不墮諸數麼由是金焦二山只得懡㦬而退依舊山是山水是水驀拈拄杖曰你看山僧拄杖子得恁麼奇特千峰頂上挑明月萬壑溪頭探水瀾復卓拄杖下座示衆十五日以前汝諸人放出山水十五日以後汝諸人坐斷柴頭正當十五日山僧看破汝諸人一著要出出不得要入入不得出不得入不得火裏眉毛烏歷歷自家鼻孔急須參碧眼胡僧恆面壁師一日開山次握枯藤於手謂僧云此是曹家女僧云却少箇謝家郎在師云但得有女何愁沒郎僧云也要完全始得師度藤與僧僧擬接師即擲下云却不相當僧問三更月落後古殿燈殘有一箇沒面目人來如何相見師云笑殺人笑殺人進云和尚笑箇什麼師咄云你問頭也不識僧問如何是諸佛出身處師云須彌倒卓半虗空進云如何是透法身事師云猢猻吞大象僧問如何是虗空師曰你亦在裏許僧曰某甲不見虗空師云者瞎漢好與三十棒師歷主武林寶巖姑蘇堯峰京口竹林雖日雜傭作不間操匕箸不倚重外護舉足為匡徒者法順治丙戌冬預計逝日說偈辭衆窆全身於山門之右天童忞禪師銘其塔著有宗門誠範四卷并語録行世天隱修嗣杭州南㵎理安箬庵通問禪師吳江俞氏子參磬山修和尚得法其自述云父羡長先生晚憂無子建鷲峰寺無遮大會百日應禱而生幼失恃病甚飲酒不自好年十六始自驚曰奈何使身心無措足之地哉奮志讀書一日偶過山寺見楞嚴經云此身及心外洎虗空山河大地咸是妙明真心中物有疑特走謁磬山本師教看父母未生前本來面目話一日本師與客立㵎邊提金剛經山僧多口本師驀劄云如何是其心當時不覺自失二十四歲姻事苦逼竟宵遁至武林脫白嘗夜跪佛燈下單提父母未生前本來面目話不契決計參方聞金粟悟和尚在北禪腰包趕入吳中得蒙痛棒垂示復上磬山又遇山茨際兄同在山中五更聞得一陳風聲疑情頓釋目前淨裸裸地了無一法當情直是通身慶快作偈云千玄萬妙隔重重箇裏無私總不容一種沒絃琴上曲寒崖吹落五更風呈似本師師云玄妙即不問如何隔底句擬對被棒這裏却又去不得本師見我疑滯示一頌云千波萬浪隔重重識得源源處處通根境脫然全體用拈來物物始從容看頌亦自了了却是臨機不得活脫自由一日頌百丈併却咽喉唇吻云併却咽喉唇吻三人口闊一尺夜半露柱相逢橫吹無孔鐵笛呈似本師師云露柱還有口麼山僧云熾然說師云道得一半進云和尚又如何師云此問復何來當時被這一撥直下如團熱鐵火相似次日呈似本師師云不得燒却眉毛山僧便喝師云燒却了也山僧轉身云看這老漢一場敗闕方才不受人瞞上堂望剎竿便橫趨而過猶是不唧𠺕漢電影裏穿針弓弦上走馬也須是箇衲僧始得匙挑不上底如稻麻竹葦千劄不回底亦如稻麻竹葦截斷天下人舌頭即不問如何是汝諸人全身獨脫句舉拂子云漫天網子百千重上堂我者裏禪無你諸人歇足處無你諸人依傍處無你諸人計較搏量處直下團熱鐵火𦦨相似你才擬歇足燒起腳跟了也才擬依傍燎却眉毛了也才擬計較摶量自己早打失眼睛鼻孔了也你若一總不恁麼又有什麼氣息湊泊也湊泊他不得躲避也躲避他不得除是你猛烈提取始得道箇猛烈提取已是蹉過多時也到這裏你諸人作麼生顧左右云石火莫及電光罔通擲杖歸方丈據室天台來也從者裏過南嶽來也從者裏過四大部洲盈衢塞路無不從者裏驗行放開也由我揑聚也由我卓拄杖云今日不可戲論雪嶠信和尚至問你是那邊為甚麼又在者邊師曰一點水墨兩處成龍信曰不會興雲作舞在師曰今日放大師過茶次信曰我平日只教人誦金剛經師曰多少人錯會大師意信曰直饒不錯會大遠在師曰大師莫瞞人好山門前行次見狗子吠信曰者無佛性底東西師曰却搔著大師癢處信呵呵大笑大衆作禮次信左右顧視衆佇立師曰都是老實頭信曰獅子窟中無異獸為甚麼却是老實頭師曰大師面前誰敢出手山茨禪師問釋迦掩室淨名默然盡屬化門邊事不落今時請師道一句師曰未問以前答了也曰阿誰證明師曰十字街頭廖胡子又問先師不了事你我共知作麼生與先師了却師曰蒼天中更添冤苦曰非兄不委師曰逢人切莫錯舉又問十年同學唱拍板不相離此去理安兄還見我否師曰無人處斫額相望曰渠無面目望箇甚麼師曰草賊大敗問拈椎豎拂即且置斬新條句道將來師曰一掌一握血曰須老兄始得師曰是我罪過又問談玄說妙先哲所訶瞬目揚眉今時禪弊去此二途如何是兄的的為人處師曰我不教壞人家男女曰忒煞婆心師曰龍蛇易辨衲子難瞞順治乙未夏磬山解制後師將方丈所有器皿各具手書分送諸方為遺念乃杖錫出遊至武康報恩掃塔晤琇禪師備托法門細大預定遊期於九月二十七日行至吳江寓應天寺如期坐逝弘覺忞為之銘塔天隱修嗣湖州報恩玉林通琇禪師蓉城楊氏子童子時一長者令諸晚學各閉目一回反觀念起衆童子各言起念畢師良久云某甲反觀無念可得參天隱修和尚於磬山命充侍司隨堂坐香一夕未開靜即進方丈修見云今日香完何早師云自是我不去坐也修云見甚道理不去坐師云即今亦無不坐修驀拈案上石屋録問云者箇是甚麼師云卻請和尚道修云你不道教老僧道師云情知和尚不敢道修云石屋録我為甚不敢道師云隨他去也修云贓誣老僧師者裏透不過直得大淚如雨一晚目不交睫立修單側意忘入寮至五鼓修呼云不用急我為你舉則古話當初有箇龐居士初見人時也似你一般孤孤迥迥開口便問人不與萬法為侶者是誰馬祖當時為甚踏向前一步云待汝一口吸盡西江水即與汝道師云某有一頌修云汝頌云何師呈頌云不侶萬法的為誰誰亦不立始親渠有意馳求轉睽隔無心識得不相違修云不問你不侶萬法要你會一口吸盡西江水師於言下大悟乃拂袖而出自後凡有徵詰皆當機不讓修深肯之師掩關蓉城江干修遷武康報恩連書促師云老僧在報恩精神日不如前當知我必不久人世得書即來有最要語分付師得書破關詣修不作禮近前叉手云狂兒國土父不容過者箇峰頭還是老漢住處麼修云你且站下腳與你道師驀掀倒香案而出修高聲云將拄杖來師遙應云劍去久矣次日修上堂維那擬白椎師喝住云待我問了話白椎便問云昔日大唐國裏無禪師而今國裏還有麼修拈拄杖作打勢云看棒師便喝修亦喝師復喝一喝轉身云不是狂兒多意氣祇因曾透上頭關便出修喝一喝師亦喝遙聞維那重白椎師乃高聲云歎死氣住報恩上堂拈拄杖曰奇特因緣須奇特人拈出驚羣句子於驚羣處舉揚今日既遇奇特人有奇特緣真是驚羣處且道驚羣句作麼生舉驀召大衆曰吳中石佛大示衆舉道吾每執木劍因緣云吠虗逐塊韓盧咬著半醒半醉漢子終不免大家草裏輥道吾若於者僧才欲取劍便一腳踢翻儻其知非不惟令彼頓易皮毛自亦頭正尾正那堪不示本分草料木劍竟成戲具示衆透脫末後牢關雲庵正罵洞達歷祖綱宗妙喜猶呵汝等諸人趣向者箇法門大須仔細前溪水急魚行澀後嶺風高鳥泊難示衆舉殃崛摩羅産難因緣云且道世尊者兩語是箇什麼道理得恁麼靈驗救得人家産難驀喝一喝云莫做夢山僧為汝諸人說箇譬喻恰似人來買生薑世尊乃與他一大把人參其時將去竟作生薑受用帶纍人亂咬嚼吞了吐不得吐了吞不得如今者裏有不亂咬嚼的出來山僧與汝三十拄杖何故世尊當年折本山僧今日與他上利示衆舉唐州大乘遵禪師上堂云上來又不問下去又不疑不知是不是是即也大奇師云其時無量大衆一時成道僧問九峰看首座話師云富嫌千口少貧恨一身多僧叩門呈頌師云你門也入不得如何呈頌進云早已呈頌了也師不開門僧久立懡㦬而退僧問某甲生死不明師云莫亂話進云求和尚開示師云莫妄想僧問如何是奪人不奪境師云洪武門前紅檔中進云如何是奪境不奪人師云踢破鴻門樊噲怒進云如何是人境兩俱奪師云推倒須彌山揑殺恆沙佛進云如何是人境俱不奪師云一華一國土一葉一釋迦進云四句已蒙師指示末後一句事如何師便喝僧問如何是有拄杖子與拄杖子師云長安風月貫今昔那箇兒童摸壁行進云如何是無拄杖子奪却拄杖子師云多少人飯籮邊餓死問如何是有拄杖子與拄杖子師云世尊拈花迦葉微笑進云如何是無拄杖子奪却拄杖子師云百萬人天悉皆罔措師問僧正睡著無夢無想無見無聞時主人公在甚處僧喝師作驚勢云嚇壞我師問行堂云飯桶裏多少達磨眼睛堂罔措問火頭三世諸佛向火𦦨裏說法還端的也未頭亦罔措師指旁立一僧云惟有者箇師僧解答話便歸方丈師問僧樹雕葉落時如何進云不隔一絲毫師云機不離位墮在毒海僧喝師便打師放生僧問如何是西來意師云獵人捕我林中鹿賴有檀那贖得歸居士問明知日用不離者箇為甚麼道不得師云知之一字衆禍之門元昭居士述前生是芙蓉悅山長老并述山之行繇師云賈島有詩贈你士云其詩云何師云客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉雪山成道頌云家在深山別覓山眼開何處著慚顏殷勤為惜王孫醉月滿荷衣霜滿鬟婆子燒庵頌云溪頭逐日飯王孫臨岐咄咄好生驚白眼阿婆能將將夾路桃花風雨聲順治庚子師奉詔入都說法內廷有客問一冊世祖章皇帝敕大學士金之俊評注刊行機緣另見奏對集未幾回山再詔入都路次槩辭參叩過高郵孫孝則居士奉母姚宜人求見師特泊舟禮拜次師問姚云平日做甚工夫姚曰誦持師曰正誦持時念頭淨盡無餘否曰不能師曰為何不能曰心中有兒孫事師曰兒孫要世世相見好姚遽禮拜師謂士曰這裏還有做者事的麼士又問師入京幾時回師曰兩三月士曰何速師曰止許一箇道場士曰恐和尚作不得主師曰作得主師到京聞森首座為上淨髮即命衆集薪燒森上聞遽許蓄髮乃止師奉命結制畢即辭還山上賜大覺普濟禪師金印師雖受歸並未一經展視龍池傳祖剃度師樂和尚塔在宜興善權傾毀日久師往葺治乃命豐首座督修土人搆禍寺豐罹回祿師聞盡屏參侍不食粒米自荷衣單出遊渡江而北至孫居士家改號無住命士作偈送隱東海先是師初住報恩嘗作潛子傳以自讖其略曰潛子不知何如人自得法磬山人不知而不慍其志潛值世危亂其時潛布袋和尚贈以偈曰一鉢千家飯孤身萬里遊青目睹人少問路白雲頭其行潛遂稱潛子土乃拈師自傳系以偈曰至清江浦慈雲庵示微疾室中不留一物撤去牀褥止留一竹椅危坐惟飲冷水日與南谷說梵網經每至夜半轍笑曰也大奇我被孫居士算定了也至第七日索筆作霞表子第一書云本是無生今亦無死此是正說餘為魔說擲筆而逝時康熙乙卯七月初十日也先是師過江都以後事囑黃于升居士士以問疾至值師已寂急為治龕送天目建塔天隱修嗣南嶽緑蘿山茨通際禪師邗之通州李氏子兒時父遇相師云爾子骨格太清年未必永乃捨之出家初侍東隱若昧法師聽講有會禮辭參方謁金粟悟和尚一見便問客散堂空時如何悟曰是甚麼時節師便喝悟便打師又喝悟又打師禮拜云今日起動和尚上磬山參修和尚問昔日聞風今朝覿面覿面一句請師分付修云你試道看師便禮拜修云也當不得師轉身便出一日修問只如百丈於馬祖喝下得箇甚麼師云若有得即鈍置馬祖也修云他道三日耳聾聻師云某不可更作野狐精見解修乃休去一日修問古人道有句無句子如何會師云石長無根草山藏不動雲修云如藤倚樹聻師云吾常於此切修云樹倒藤枯又作麼生師低頭出方丈一日修舉四藏鋒句問云如何是就裏藏鋒師云梁皇殿上道不識如何是就事藏鋒師云今朝雨落階前濕如何是理事俱藏鋒師云行不出戶坐不當堂如何是俱不涉理事藏鋒師云八角磨盤空裏走修云此四轉語可紹先覺雖然也是搕七搭八黃端伯司理請住東明祖庭師云聞居士開先有省推倒廬山是否士云還見廬山麼師云待你扶起士云乍喚東明師云作家作家士休去少頃士問大師一向在甚麼處住師云居士道山僧即今在甚麼處住士云出此門不得師云居士還出得此門麼士擬議師云却是居士出此門不得上堂舉翠巖真點胸常罵雲居舜老夫說無字禪舜因而有頌曰雲居不會禪洗腳上牀眠冬瓜直儱侗瓠子曲彎彎師云山僧亦有一頌東明不會禪窮山住有年朝來炊白粥柴生滿竈煙且道與古人是同是別住緑蘿上堂山僧這裏也不論玄也不論妙也不論禪也不論道只要你們生死心破生死心若不破便是閻老子面前喫鐵棒的公招所以云參須實參悟須實悟閻羅大王不怕多語不勞久立珍重住南源示衆諸方有玄妙禪有性理禪有細膩禪有逐日常進禪有休去歇去禪有大法小法禪與人理會與人咬嚼山僧此間且無如許多禪只有遠祖百丈大智禪師留得一把鈍鐵鋤頭逐日要諸人使用使用得純熟若到力忘於己手忘於心目前不見有可開之田腳下不見有可立之地忽然鋤轉山河大地百雜碎露出當人雙眼睛大衆即今把柄在阿誰手裏驀擲拄杖云當陽拈出大家看僧問大死的人却活時如何師云喚來與山僧洗腳如何是學人轉身處師云速禮三拜如何是學人親切句師云分明記取僧問古人云三千里外逢人不審逢甚麼人師云不是別人崇禎戊寅師登南嶽愛祝融之勝止擲鉢峰下結茅而居蓋虎穴也了不為意桂林王聞而異之親至問道遣內臣侍候不絶於路願迎入宮堅却之不得輒密跡去王不懌而焚其庵祝庵前石榴樹曰南來僧果有道耶樹即冬實未幾開花且結實王乃益加敬信訪師卓錫處折節步行三百里就見之復為建庵供養甲申春流賊蹂躪三楚山中日食不繼採薇救飢誤食野芹同食二人皆覓療解師曰何必爾遂逝天隱修嗣陽山松際印中通授禪師烏程嚴氏子年十七投道場山脫白修和尚示狗子話力參久之一旦聞畫眉聲大悟遂得法繼席磬山上堂門對千峰碧溪沿一徑幽更求玄妙旨撥火覓浮漚遂下座師性恬退以應對繁未幾辭去深隱於蘇之陽山僧問如何是和尚悟處師曰瞞人不得又問如何是諸佛出身處師曰殿角鵓鳩啼僧問雪峰升座輥出木毬玄沙捉來安在舊處因緣師云陽山不妨再輥便入方丈拈趙州狗子還有佛性也無州云無公案師云趙州這箇無字十人五雙疑著可憐自家性命且無知猶向狗邊討非是頌三玄三要云第一玄泥牛踏潑水中天千星萬宿一時亂明眼何能別正偏第二玄暘𦦨橫溪白似泉笑看緣木求魚者不顧忙忙去下筌第三玄坐看虗空駕鐵船南北東西津莫問送風還把藕絲牽第一要夜半月輪照石女面私情不比尋常貌第二要龍吟并虎嘯驚起夢中兒頻把親娘叫第三要一曲無生調不是箇知音那識其中妙總頌云三玄三要祖師關無限禪人到此難畢竟問余玄要旨清溪流出水潺潺師山居深僻問道者罕得一見自澤侍者領去衣拂並不再記一人海內高之天隱修嗣已上五人福建建寧雲峰衡石鈞禪師錢塘潘氏子遍歷諸方每有夙契終不自諾復謁佛日方深得洞上微指方與鴛湖用友善用晚年多疾以不得其嗣為己憂方效道吾與夾山故事遂指師參用於普明洞徹圓常一日用曰化人問幻士谷響答泉聲欲識吾宗旨泥牛水上行意旨如何師曰夢見空花用曰臨濟有一句子你又作麼生師便喝用便打師又喝用又打師禮拜用曰元來是瞎驢師拂袖便出上堂雲生寶樹風敲翠竹勘破雞鳴遍地塗毒這是無趣老人的落處即今還有知落處的麼有即出來通箇消息順治丙戌四月初六日示寂鴛湖用嗣
