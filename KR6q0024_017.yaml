body:
  text: 六祖下三十三世臨濟宗宜興龍池幻有正傳禪師初號一心溧陽李氏子師自述云兒時體肥性好捕魚羅靡所不為八歲就鄉孰十二三肌膄骨立遂廢業偶為母看誦香山卷偈語乃知發念持齊十六歲父母強與婚合未幾琴瑟不調發心出家又二年病不戢出家意始決黎明起焚香默對觀音像前誓曰某若再近女身此身當若何若何其夜即遁去後婦將産父命使遍覓終弗獲一日值父於途次強歸不就仍以母疾篤候侍歸又一年既歿喪殯乃辭父長往入荊溪顯親寺禮樂庵師剃染示看父母未生前話密自矢志曰若不見性明心決不將身倒睡一夕聞琉璃燈華熚𪹼聲有省舉似庵庵頷之後庵遷化師直造神京謁笑巖寶和尚於觀音庵寶問上座何來師曰南方寶曰來此擬需何事師曰但乞和尚印證心地工夫寶曰若果識得心地那更有工夫印證耶師曰雖然不得不舉似過寶曰參堂去師珍重便出至晚入室方具述所以寶驀踢出隻履曰向者裏道一句看遂把話頭一時打斷懡㦬而出通夕不寐翌旦寶出方丈見師猶佇立簷下驀喚上座師回顧寶翹一足作修羅障日月勢師不覺脫然悟旨牧雲門頌云兩片唇皮正合開死蛇忽地觸人來天明毒氣方蘇醒翹作修羅也怪哉箬菴問頌云夜靜燈花㖃一聲琉璃殿上露全身巨靈分破華山色赤腳波斯絶路行晦山顯頌云閃電為人機自別晴空霹靂太孤危回頭擉瞎頂門眼金鎖玄關當下灰師後辭行寶乃書曹溪正派源流付之復贈一笠曰覆之毋露圭角師受囑出住臺山祕魔巖寺居十有三載入京師寓普照後住龍池上堂無上法王有大陀羅尼門名為圓覺驀豎拂子曰會麼子已飛天外去呆翁猶向月邊尋上堂一切法不有一切法不無若能如是會水上按葫蘆佛誕上堂今晨四月八日是我釋迦如來示生降誕之時山僧忽然思量起來二千五百餘年已來不知有多少路見不平之輩務要別尋一箇人來與我釋迦老子比勝負較優劣殊不知我釋迦如來是何等一箇面孔汝諸人還知得我釋迦如來腳跟立地處麼還曾夢見我釋迦如來頂相麼良久曰舉手拔南斗回身倚北辰出頭天外看誰是箇般人驀豎拂子曰雲門大師來也擲拂子便下座上堂老僧者裏不問你久參晚進貴要正知見知見若正了生死如反掌大抵不落斷常有無二乘偏見更有甚麼商量若有僧問作麼生是正知見但向他道老僧在你腳下良久喝一喝下座萬歷甲申師講演法華於祕魔巖寺時有萬融首座病目初愈仍來座下展本聽經師方升座見之言曰且喜萬融首座病眼重開幻人有賴彼悚身起立云不敢師曰且問汝即今目前所覩境界與向未病眼時同耶異耶對曰無異師曰然正古人所謂三十年前見山是山見水是水及乎中間有箇入處則見山不是山見水不是水老僧今日休歇得見山依舊是山見水依舊是水是也師乃說經上堂師云鄙人將謂今時佛法門頭沒有可商量人仔細檢點也有一箇半箇有僧出問誰是一箇師曰即今如閙市街頭十字路邊盤膝坐地哇哇叫化錢者是又問誰是半箇曰即今認住客塵煩惱確定以為主宰者是或曰若說佛法原不曾許汝有商量處烏用汝顛言倒語有許多饒舌師曰我不怪你雖然說得儘是你儘做得箇膾子手何也任他佛頭來魔頭來獅子頭象頭來牛頭馬頭人頭狗頭羊魚頭鵝頭鴨頭既到汝案頭上一一儘汝破除打發一邊去只恐汝把箇死猫兒頭便不能破除得打發不開去於此打發得開去才是好膾子手也或曰將那死猫兒頭來著師乃笑曰果然不識有人於斯一似箇無尾巴底大蟲且道順毛還勒得伊麼有人於斯一似箇生鐵掆子有力者還拗得折伊麼果乃順勒伊不得拗折伊不得只是有一人搖頭不肯何也第恐將箇臭鶻突布衫做了貼體衣至死不肯脫總有青州布衫堆滿世界也沒用處況今時善知識都只要抱不哭底孩兒不敢觸著伊動著伊只怕退了伊底道心又恐斷絶往來了不唯不我供養反被伊生謗毀作禍害便不奈何若是𢬵捨性命善知識則不然饒他是生鐵掆子須要誘引伊一舉舉到那半天裏沒割殺處了始撒手待伊自放下來務要跌折了他底又饒他是箇無尾巴大蟲先須掘箇坑子隱覆却候待伊來陷入內務要使伊跳不出去直待伊計窮力盡時且問他你還要活麼待伊頷首時更曰且緩緩直須教伊命根斷如死灰了這臭鶻突布衫方得卸下始可謂我救得這死漢了也不然這畜生還𨁝跳在雖然說得也好只可惜今時末法世中無這等一箇知識正所謂賢聖隱伏遇而不遇也怪伊說不得呵呵李孟曰大夫問老師修行多少年方才得悟師云貧道修行未久亦無悟處雖然貧道自持齊出家學道以來不過四十餘年前二十年止入得箇信位於晝夜十二時中猶不知其飢飽雖寒暑亦莫辨後二十年但醒得一一病痛不從外入俱是自己心中所發近日又僧得箇歡喜處始知得人人肚飢都只是要飯喫然又恰如人從半夜睡醒了只顧東摸西摸信手摸著了自己底鼻孔不覺失聲呵呵一笑有客問某等修行當何用工師提數珠曰會麼客曰會得師反詰曰汝作麼生會客曰若恁掐著數珠念佛有什麼不會師曰未也客云若更有別說某便不會矣師舉數珠掐曰但恁麼一粒一粒撥過去又有客如前問師反詰曰汝擬修行圖箇什麼客云冀會道耳師曰果欲會道直須放下只要會道底念頭便是真用工處若此用工自當會道客云奈要會道這一念放不下何師曰去汝正閙在屢有客問道於師師或答或不答問嘗聞有如來禪有祖師禪作麼生甄別師舒手班指數曰余今年五十六歲矣客曰老師耳背那傍有僧走過師驀扯住問今日是八月十五否僧答云今日是十四明日是也師撒手對客云唯這僧記得端的又有問祖意教意是同是別師忽云好打好打客作色曰何只言好打耶師豎起拳云不是拳頭定是巴掌客揖之而去客有再扣之畢竟何以為道也師乃從容諭之曰道無方所無有形名指點伊不得取舍伊不得是非伊不得向背伊不得有無伊不得增減伊不得揀擇伊不得動靜伊不得好惡伊不得逆順伊不得可否伊不得進退伊不得語默伊不得思議伊不得垢淨伊不得依倚伊不得營為伊不得對待伊不得偏黨伊不得閒忙伊不得前後伊不得難易伊不得始終伊不得人我伊不得親疏伊不得損益伊不得寤寐伊不得異同伊不得男女伊不得老少伊不得得失伊不得新故伊不得迷悟伊不得固必伊不得高低伊不得貴賤伊不得果如是信得會得則無往而非道也客又曰然則某意念不動時還是道否師驀以手插向腰間摸得箇蝨子擲向地云阿啞阿啞跌殺我耶跌殺我耶更休有客問西來大意師指古鏡云是這箇客曰奈某不會何師云為汝未曾用工磨得客曰某作麼生用工即得師云即目前古鏡聻復急索曰還我西來大意來客省曰我會也我會也師云會即不無試說來客乃指古鏡曰某既會矣奚又止在是師頷之僧問九峰不肯首座因緣師舉拳示之曰為伊不識這箇僧云識得後如何師云石霜住持有分僧又曰聞毗陵孫太史亦曾問此未知如何答伊師曰山僧但答為伊道眼未明耳僧云即如道眼明後又作麼生師云則不見有休去歇去在僧再擬開口師叱曰去汝不會我語李長庚居士敘師語録後略云余一日別師師問余云有何疑否余舉九峯不肯首座因緣問畢竟明何事師豎起拳頭余擬議師曰公不要開口且細參去越數年傳歸荊溪余再請益師曰向年舉的公案記得否余曰和尚今日拳頭在那裏師厲聲曰沒有余曰和尚拳頭失卻鼻孔原止半邊師遂變色轉向面壁余即出至階下聞師厲聲曰這箇人放鬆了不奈他何且拿住索套兒不由他三年五年不來尋我余曰和尚大機大用只怕我承受不來無何余轉外籓迄今為後序已越三十年矣當日三年五年之語大負我師不覺泣下云云僧問如何是祖師西來意師曰屋北鹿獨宿僧曰不會師曰溪西雞齊啼夾山豫云師翁答話雖則一椎兩當未免令者僧分西著北不肖孫則不然今日或有問如何是祖師西來意但向道面臨江水闊早晚看行舟更曰不會向道兩岸蘆花裏清風引白鷗僧問如何是奇特事師曰蝦蟆捕大蟲僧曰恁麼則不奇特也師曰猫兒捉老鼠僧禮拜師便喝僧曰老和尚為甚麼放某甲不過師厲聲曰老僧有事你且去石車乘拈云龍池大開慈門手遣者僧爭奈者僧不諳來機龍頭蛇尾若當時待他道老僧有事你且去也與震威一喝可謂知恩有地何故只因漁父引始見浪頭高天笠珍頌云萬仞龍門透者難金鱗擬躍點波瀾電雷相送重燒尾腥血空流石上斑居士訪師次舉僧問雲門如何是諸佛出身處門曰東山水上行問師意作麼生師曰無孔笛幾人解吹士曰弟子試問和尚得否師曰得士曰如何是諸佛出身處師曰西河火裏坐士大夫從師遊師每舉門前冷落車馬稀老大嫁作商人婦二語罕有契者有山居偈曰五峰雲頂古文殊盡日跏趺總笑余半點苦寒禁不得躊躇未了又躊躇萬歷甲寅二月十二日示寂先一日有僧自臺山來師與劇談宿昔抵暮索浴衆察師意懇請遺訓師舉所帶帽者三衆無語師撫膝奄然而逝建塔於本山之麓笑巖寶嗣南陽靈谷曇芝禪師參笑巖寶問古人道打破鏡來相見既打破鏡擬向甚麼處相見寶曰慚愧殺人師忽有省頓領厥旨遂忘禮拜舞蹈而出服勤數載寶付以偈曰微笑拈花第一機相傳八八未知非今將從上非非法分付賢英力荷歸笑巖寶嗣五臺瑞峰三際廣通禪師久侍笑巖室中機契付以偈曰一念不生諸數滅萬機休罷十方空界空數滅漚澄海諸佛衆生影現中後居臺山僧無明經參問曰某於古德機緣尚有疑處乞師指示師曰試舉看經曰臨濟大師道佛法無多子畢竟是箇什麼師曰向道無多子又是箇甚麼又問玄沙謂靈雲敢保老兄未徹在何處是他未徹處師曰大似玄沙未徹又問趙州云臺山婆子我為汝勘破了也勘破在甚麼處師曰却是婆子勘破趙州經復請師頌之師曰知是般事便休老僧不解恁麼因即命經呈頌經各具頌呈答其頌臨濟曰醍醐上味出放乳滴水攙中便不成三十棒頭開正眼何曾傳得祖師心頌靈雲曰見色明心附物顯理具眼宗師許而不許敢保老兄未徹一隊間神野鬼不是焦面王來受陷遭坑幾許頌趙州曰暗藏春色明露秋光有眼莫鑒縱智難量到家不上常安路一任風花雪月揚師然之笑巖寶嗣鳳陽正宗悟上座久侍笑巖室中機契付以偈曰此宗須信有真悟莫學諸方平實禪異日寒灰親𪹼出紅爐又放一枝蓮笑巖寶嗣京兆高菴傑上座久侍笑巖室中機契付法偈曰世出世間不二法都盧祇在一塵中俄然信手輕敲破三世如來立下風笑巖寶嗣天台天常經上座久侍笑巖室中機契付法偈曰剝盡乾坤無實法搜窮心佛有虗名驀然黑白都翻轉掌上新籌獨汝羸笑巖寶嗣武林素菴智上座久侍笑巖室中機契付法偈曰青蓮目瞬應時節七七雄談非犯舌識得文言義路空何妨塵說熾然說笑巖寶嗣嘉興天寧幻也佛慧禪師別號懶石會稽人南宋史相之後也母戴夢天台僧抵舍孕師及娠鄰人共驚異相見紅光蓋室如火六歲入童子學授經知大意十四慕空宗走天台見松谷法師於華頂之勝峰寺求度不允乃泛海求潮音僧度復不允遂發憤葬身魚腹中且死得救免舟人愍之為剪髮詣谷谷始納為命今名留習台教五載一日晨課中間豁然不覺心吻俱開告谷谷奮挺逐之不得住聞嘉禾有濟法舟者走見之會濟方屬纊於是一鉢煙村孤笻天外南詢北訪參笑巖寶和尚得受記莂出住天寧之優曇苑疾當世學者走聲勢輀暖一徵之以枯淡數十年門無宿客嘗示衆曰四大之軀孰不有五味之食孰能無白玉體箇箇分明紫金身人人可得爭奈食之不常而食衣之不常而衣八萬種魔寧教易曉四百四病以何遣除諸仁者不是祝髮了叫做出家披金襴叫做出家識文達理叫做出家能行苦行叫做出家避喧求靜叫做出家有人緣叫做出家感天供叫做出家緊要在著草鞋入釋迦腹裏屙屎放尿跨大步穿達摩心中戴角披毛枯草拈來直得百花相鬬鼓動含靈喚起維摩寂默十方如來密付汝印一切天魔自然傾膽咦鳥啼春晝閒彌勒華發東風見故人又曰一番相見一番新好看鉢盂添柄幾處行來幾處險猶奇艇內藏輪海不顧山頭月白一任浮沈空無奈雨腳風清大家和會參方衲子講席高流居士宰官天仙魔梵有情無情生一乾坤死一乾坤聖一法界凡一法界何曾謾得諸人若也謾得諸人那討說箇是非好惡賢善才能尊卑異類焯然些子謾不得缺不得你道是什麼境界會麼滿目塵埃千聖眼半身落魄五宗心晚退多寶菴足不越閫者復十餘載老且耄矣忽思天台舊隱即日抴杖還南嘉禾緇素遮止天寧崇禎戊辰八月師示微疾簡歷示小師曰後二日可小師涕泣固留師笑諾為更留三日仍涕泣固留不可俗弟子聞之趣置龕室初五日工適報竣師即以是日午跏趺榻上而逝僧臘七十八世壽九十一語音如鐘足有輪紋龜畫番番黃髮齒落更生皆其異相之著者至若五臺睹文殊真境司㸑感天台聖僧靈異可徵茲不具述云笑巖寶嗣已上八人嘉興南明慧廣禪師鹽官韓氏子出家興善寺謁無幻冲禪師示趙州無字話一日遊徑山就地拈得片紙有觀方知彼去去者不至方之句釋然有省乃往見沖遂蒙許可住徑山上堂五峰頭卓朔雙徑尾顛先喝石巖一任𨁝跳明月池覆地傾天此四句中有一句有殺人刀無活人劍有一句有活人劍無殺人刀有一句殺人刀活人劍俱有有一句殺人刀活人劍俱無伶俐衲僧簡點得倜儻分明許你一生參學事畢除夕示衆云前年年鼻孔無半邊去年年兩眼不完全今年年精骨獻青天顧左右曰廣上座禪已說了汝等作麼生會良久曰參一日茶次有僧持餅趨過師前師問云這箇餅那裏買來的僧回身云莫道無語好師便舉手中半箇云這半箇那裏買來的僧云這却道不出師云情知汝道不出師在皋亭進關時有僧問云師今進關必待徹悟而後出關師云恁麼盡未來際出此關不得一夕下雪次有僧推窗云滿山都是雪師云隨聲逐色漢僧云乞師離聲色道一句師云滿山都是雪泰昌改元仲冬二十七日奄然坐逝於祇陀庵車溪沖嗣曹洞宗北京宗鏡小山宗書禪師號大章順德南和李氏子其在童幼異於常倫與羣兒戲效作佛事十歲學儒已通大義即掩卷嘆曰此皆世法非出世法也遂往郡之開元剃落聞月舟禪師法席之盛入室請益密踐八載蒙付正宗後少室疏請師嘆曰先師化後三十餘年曹洞宗風逮乎湮沒前輩有言禪林下衰弘法者多假我偷安不急撐拄之其崩隤跬可須也某甲雖慚付囑其奈付囑何遂主之時值亢旱河井乾枯既法席敷開泉源復漲南庵依頌云地缺東南水自寬波濤萬頃碧漫漫賺他無限癡男女按著泥坑砌䃙磚位中符頌云種就無根樹影長大鵬肯逐枋榆忙養堅九萬摶風翅一旦飛鳴天下揚嘉靖丙寅師主宗鏡庵遊履西山至谷集山三學洞美其幽寂遂結夏焉至冬忽染病臘月十六日索筆書偈曰宗鏡宗鏡心法成行即日圓覺鏡破宗正偈畢儼然坐脫世壽六十八僧臘三十六茶毗身骨分為三分一分留宗鏡起塔一分送順德祖塋一分至少室起塔其少室謝事之日法堂中法鼓無故墮地得疾之初秦封槐摧一大枝入寂之後其樹無故崩倒月舟載嗣順德內丘金山德寶禪師山東陽津人姓劉氏禮北京海眼寺惟安老宿出家遍參天下叢林至無念禪師會下發明大事後依侍月舟載和尚久之付以衣拂出住燕南說法二十餘年後休老於表善觀音院僧問如何是如來禪師曰師子吼時芳草緑如何是祖師禪師曰象王回顧落花紅隆慶庚午師年八十五忽誡諭法嗣祖通云為法求人寧勞毋逸日盈月昃吾將示寂乃趺坐而逝塔全身於舊隱之南岡月舟載嗣已上二人
