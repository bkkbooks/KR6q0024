body:
  text: 六祖下二十七世臨濟宗杭州東明虗白慧旵禪師族王氏祖貫湖廣父為丹陽稅課副使遂家焉幼頴悟不類常兒年十四往從妙覺湛然受業一日作務次然問汝在此作什麼師曰切蘿蔔然曰你只會切蘿蔔師曰也會殺人然引頸師曰降將不斬然異之會然遷撫之疏山師聞唯菴唱道松隱將往叩其心印至一小菴自誓曰我今若不徹證決不復回遂禪定六日方出定舉首睹松豁然有省自此晝夜危坐端如鐵幢故諸方號之為旵鐵脊後抵姑蘇鄧尉謁果林首座座指令參寶藏持和尚發憤咨參寢食俱廢一夕驀然徹證述偈曰一拳打破大虗空百億須彌不露踪借問箇中誰是主扶桑涌出一輪紅持笑曰然雖如是也須善自護持時節若至其理自彰師受囑辭去於天目之平山堂結侶坐千日長期期滿至昭慶受具一日至安溪古道山見峯巒秀拔遂有終焉之志一住三十載影不出山道風遠播宿衲爭趨座下拓基營繕成大精藍宣德乙卯賜額東明禪寺復命度僧以奉香火檀施委積師復損餘資往修淨慈大殿正統六年辛酉六月二十七日忽集衆敘謝訣別衆請偈師曰一大藏教無人看著爭用得者幾句閒言語至二十九日辰時跏趺而逝茶毗舍利無數塔於東塢寶藏持嗣建寧天界雪骨會中禪師僧參次師問從何處來僧曰逼塞虗空都無來去師曰既無來去阿誰拖皮袋到者裏僧曰內外俱空皮袋何有師曰如何是祖師西來意曰西來豈有意耶師曰臘月三十日到來向何處安身立命曰信腳踏翻乾坤獨露師乃示以偈曰的是金毛親出窟法輪掉轉入廛來一聲驀地遙空吼野犴聞之腦裂開福田來嗣金陵大岡月溪澄禪師參東普無際悟和尚有省悟臨寂有付法偈曰我無法可付汝無心可受無付無受心何人不成就師繼席東普有僧本善向師求證師曰佛法不是鮮魚怕爛却那日惟東敲西擊暗垂勘驗而已善一日侍師園中坐次師曰你向來看甚麼話頭善曰無字師曰如何是無字善曰如今看來恰似口金剛王寶劍師曰如何是金剛王寶劍善曰寒光𦦨𦦨耀古騰今師曰還我劍來善曰擬動則犯他鋒鋩師曰橫按當軒時如何善曰佛來也殺祖來也殺師曰老僧來聻善曰亦不相饒師曰殺後如何善曰且喜天下太平師曰畢竟如何是無字意善曰贓賊分明師曰賊即且置還我贓來善曰六六三十六師曰未在更道善曰夜短睡不足日長飢有餘師曰牛過窗櫺頭角四蹄都過了因甚尾巴過不得善曰了無一法當情瞥爾通身露地師曰你即今向甚麼處安身立命善曰何處不稱尊無際悟嗣舒州投子楚山幻叟荊璧紹琦禪師蜀之唐安雷氏子年九歲從玄極通受業首參無際一日聞板聲有省復遍叩月溪海舟諸老咸稱賞之正統六年再參無際際問數年以來在什麼處住師曰廓然無定際曰有何所得師曰本自無失何得之有際曰者是學得來底師曰一法不有學自何來際曰莫落空耶師曰我尚非我誰落誰空際曰畢竟是作麼生師曰水落石出雨霽雲收際曰莫亂道只如佛祖來也不許縱爾橫吞藏海現百千神通到者裏更是不許師曰和尚雖則把住要津其奈勞神不少際拍膝一下師便喝際曰克家須是破家兒恁麼幹蠱也省力師掩耳而出至晚復召師詰曰汝將平昔次第發明處說來看師從實具對際曰還我無字義來師呈偈曰者僧問處偏多事趙老何曾涉所思信口一言都吐露翻成特地使人疑際曰如何是汝不疑處師曰青山緑水燕語鶯啼歷歷分明更疑何事際曰未在更道師曰頭頂虗空腳踏實地際乃鳴鐘集衆𢌿以袈裟拂子後出世天柱僧問如何是天柱境師曰㵎濶雲歸晚山高日出遲曰如何是境中人師曰額下眉遮眼腮邊耳搭肩曰如何是天柱家風師曰雲甑炊松粉冰鐺煮月團曰如何是祖師西來意師曰海神撒出夜明珠曰學人不會師曰文殊失却玻瓈盞問如何是佛師曰生鐵稱鎚曰如何是法師曰石頭土塊曰如何是僧師曰黑漆拄杖景泰五年遷投子上堂僧問遠離皖山來據投子海衆臨筵請師祝聖師曰鼎內長生篆峯頭不老松曰祝聖已蒙師的旨投子家風事若何師曰提瓶穿市過不過賣油翁曰只如祖師道不許夜行投明須到還端的也無師曰雖然眼裏有筋爭奈舌頭無骨曰趙州道我早猴白渠更猴黑意作麼生師曰不因弓矢盡未肯豎降旗問和尚今日升座說法未審有何祥瑞師曰麒麟步驟丹青外優鉢華開烈𦦨中曰如何是祖師西來意師曰雪消山頂露風過樹頭搖問寶劍未出匣時如何師曰神號鬼哭曰出匣後如何師曰佛祖吞聲曰出與未出時如何師曰無𩯭鎖子兩頭搖僧提起坐具師便喝僧擬議師便打乃曰毒蛇頭上揩癢猛虎口裏橫身也須是恁般人始得適來者僧大似一員戰將敢來者裏奪鼓攙旗惜乎龍頭蛇尾死在棒下若解轉身活路自然不犯鋒鋩所以道弄蛇須是弄蛇手不會弄蛇蛇咬殺舉法燈示衆山僧本欲深藏岩穴隱遁過時蓋為清涼老人有未了公案不免出來為渠了却時有僧問未審清涼老人有甚不了公案燈拈拄杖便打曰祖禰不及殃及兒孫僧曰過在甚麼處燈曰過在我殃及你師曰大凡宗師出世先要拈出己見然後方可定斷古今看他法燈如此作略美則美矣了則未了幻叟今日亦為蠶骨老人有未了公案出來為渠了却若有問蠶骨老人有甚不了公案應聲便喝眼目定動連棒打出大衆山僧恁麼提持且道與法燈用處還有優劣也無若緇素得出許他是箇同參上堂衆集師斂衣就座良久曰大衆分明記取便下座師到菜園見冬瓜問園頭者箇無口因甚長得如許大頭曰某甲不曾怠惰一時師曰主人公還替你出些力氣也無頭曰全承渠力師曰請來與老僧相見頭便禮拜師曰者猶是奴兒婢子在頭轉身拈篾縛架師乃呵呵大笑回顧侍者曰菜園裏有蟲天順間由匡廬歸蜀韓都候於方山迎師住持成化九年三月望將示寂衆請末後句師展兩手曰會麼復曰今年今日推車撞壁撞破虗空青天霹靂阿呵呵泥牛吞却老龍珠澄澄性海漚華息泊然而逝無際悟嗣雲南古庭善堅禪師本郡昆明人首參無際悟和尚示萬法歸一一歸何處話苦心窮究十載方得透脫後於隆恩求悟印證悟曰子見處如何與老僧不同師展兩手曰者箇非別悟頷之一日辭悟悟曰甚處去師曰十字街頭訶佛罵祖去悟曰子還來否師曰不違和尚尊顏禮拜便行初遊金臺止大容山復南還住金陵天界遷皖桐浮山示衆舉汾陽無業禪師曰古德道人得意後茅茨石室向折腳鐺煮飯喫過二三十年名利不干懷財寶不為念大忘人世隱跡岩叢君王召而不來諸侯請而不赴豈同吾輩貪利愛名泊沒世途如短販之有少希求而忘大果師曰誠哉是言我等惟掠虗頭妄自尊大無明三毒潛結於心逆惡境緣知無解脫據實而論且莫管你是知識非知識除却一切施為動靜語默文字生死到來畢竟作麼生脫去不得認著箇死搭搭向良久處妄想不得執著箇轉轆轆向活脫處狂蕩但有絲毫差別見覺直饒脊梁生鐵鑄就機辨懸河瀉水未免閻老子打入阿波波阿吒吒八寒八熱萬死萬生灼然灼然擊拂子昨夜蟭螟吞六合虗空撲碎落岩前復召大衆珍重示衆若論向上一著了無別說惟當人本自具足文字經論且無放處近來諸方學者盡被古人舌根埋沒不能決志透脫開口處情塵知見學解聰明於自受用中確無的實似者等豈非自喪己靈爾若不信有日病來將所學所抱抵將不去那時方悔錯用心力學者既是實為生死行腳豈可高心執見聞恁麼說便憤志決透去乃思前算後便拌此生大捨身命做大休歇工夫當知此非小因緣必猛利方能入劄且諸方諸宿說做工夫於自究竟處或一年半月一月或三年五載有些見解所聞師家舉似或看冊子便認著業識做模樣生大我慢便效古人行棒下喝瞬目揚眉學者不知被他惑了此箇樣子正是生死無明若或真參實證却不恁麼要向本分中綿綿密密下死志做將去莫論年久歲深一念子撥之不開蕩之不散時節到來豆𪹼冷灰天翻地轉打破疑團虗空粉碎方是自己大光明寶藏大受用處自然頭頭無礙物物全彰了無一法可當情說者邊那畔通明透徹凡情聖解宛爾一如盡十方世界森羅萬象總諸佛清淨無礙三昧到恁麼田地說甚麼文字情解根根塵塵悉是大光明寶所有時攝十方諸佛光明入一微塵光明一微塵光明現十方世界諸佛諸佛非來我亦非動寂寂如如無彼無此諸佛具大清淨無礙三昧大解空寂滅三昧大不思議海種種三昧乃至不可說微塵剎數剎塵塵剎一一具足十方諸佛定慧三昧於一毫不從外來嗟夫學者於初立志處擔肯一擔經書字句口耳傳習為其己見認為古人用處古人却不如此語默動用別有生機豈等間共與卜度須是具大根器者聞必敬信生難遭想其或我慢矜高退之遠之珍重師既老乃歸昆明之古庭示寂一時古庭與盤龍南北並峙至今二大士之肉身存焉門人一貫編師語録并山雲水石集行世無際悟嗣已上三人佛跡頤庵真禪師遊歷諸方多所契入後參揚州田素庵居士為入室上首得獲付囑住後示衆青山疊疊緑水滔滔於斯會得獨步高超雖然也是尋常茶飯古人道欲窮千里目更上一層樓機不離位墮在毒海語不驚羣陷於流俗若向擊石火裏辨緇素掣電光中明殺活可以坐斷千差壁立萬仞諸兄弟還知有恁麼時節也無今時諸方說禪浩浩盡謂腳跟點地鼻孔撩天究竟具正眼者落落罕聞所以偏正不一各立異端堅執己解弗通實理所謂正法難扶邪說競興古人道信有十分則疑有十分疑有十分則悟有十分可將盡平生眼裏所見耳裏所聞惡知惡解奇言妙句禪道佛法貢高我慢等心徹底傾瀉莫存毫末只就未明未了公案上距定腳跟豎起脊梁無分晝夜無參處參無疑處疑直得東西不辨南北不分呆樁樁地却如箇有氣底死人相似心隨境化觸著還知打破髑髏不從他得豈不慶快平生者哉田素庵居士嗣伏牛物外無念圓信禪師金臺高氏子九歲出家長而受具首見無際悟於隆恩有省歸而牛山結茅復詣繁昌參月幻幻問何處來師曰牛山幻曰人在者裏牛聻師曰覿面不相識全體露堂堂幻曰雖然如是頭角不全在師曰某甲今日山行困幻復拈起竹篦曰喚作竹篦則觸不喚作竹篦則背上座作麼生師曰有勞神用幻曰未在更道師便進前奪竹篦擲於地幻軒渠大笑師曰某甲罪過便作禮幻乃撫而印之師菴居三十載開法伏牛僧問龐居士道一種沒絃琴惟師彈得妙某甲今日請和尚彈看師咳嗽一聲僧曰不會師曰鐘作鐘鳴鼓作鼓響僧曰意旨如何師曰馬大師去世久矣問如何是即心即佛師曰富兒易驕曰非心非佛又作麼生師曰窮坑難滿曰某甲不會師曰若道即心即佛大似好肉剜瘡若言非心非佛何異灸瘡加艾直饒道不是心不是佛不是物也是平地喫交且道畢竟如何坐來拭几添香火粥罷呼童洗盂月幻法嗣曹洞宗鄧州香巖淳拙文才禪師平陽臨汾姚氏子生有異質見僧則合掌作禮不類常童長依絳明福巖普公出家嘗讀證道歌至幻化空身即法身之句欣然契悟愚菴盂云若向者裏悟去披毛戴角有日在龍唐柱云不離花下路便見洞中春會麼山僧借手行拳去也乃舉長蘆上堂云幻化空身即法身遂作舞云見麼見麼恁麼見得過橋村酒美又作舞云見麼見麼恁麼不見隔岸野花香且道香巖悟底與長蘆道底還有差別也無乃謁還源呈所解源曰祇如道君不見是指阿誰師曰覿面親呈更無回互源曰墮坑落塹漢作恁麼語師曰和尚作麼生源曰汝口聻師曰勘破了也源可之泰定甲子主祖庭尋隱香巖詮釋般若心經并華嚴法界觀僧問如何是理法界師曰虗空撲落地粉碎不成文曰如何是事法界師曰到來家蕩盡免作屋中愚曰如何是理事無礙法界師曰三冬枯木秀九夏雪花飛曰如何是事事無礙法界師曰清風伴明月野老笑相親崇先奇云香巖老人只知指疆畫界不覺通身水泥者僧會即會也是紙上富貴若是四法界未夢見在白巖符云盡謂香巖老漢被者僧扯入葛藤窠裏東兜西搭殊不知善言言者言滿天下無口過還知者老漢舌根不動處麼良久云切忌道山僧饒舌至正壬辰師年八十一夕沐浴更衣呼門徙申誡教且曰吾死火之灰揚可也翼旦吉祥而逝葬全身於雪庭塔右少室遇嗣熊耳空相圭禪師上堂我若喝汝便作喝會到處信口胡喝亂喝我若棒汝便作棒會到處胡棒亂棒我若除却棒喝教他向本分中道一句子他便作女子拜不是捏兩句鬼話出來便如啞羊相似如此等輩皆是狂狗逐塊何曾夢見有獅子奮迅的牙爪驀喚云者裏還有獅子麼試弄弄爪牙看一僧出師便打曰逐塊尋香未為好狗僧擬對師又打曰棒折也未放你在曰恁麼則雲巖路絶也師曰是你上天無計怎怪我雲巖路絶乃連棒打逐出曰寄與天下亂統漢少室遇嗣嵩山龍潭深禪師上堂山僧當年於般若經顛倒夢想處得箇究竟涅槃然後知一切聖賢皆以究竟涅槃成了箇顛倒夢想及乎見我遇老和尚問他古冢不為家如何是禪老和尚曰此是死語山僧道如何是活語被老漢劈面一掌曰得恁麼死郎當山僧擬對又被老漢一掌山僧當時不覺如暗得燈乃大宣曰此回不是夢真箇是廬山今日山僧不敢昧却本源特為諸人也須恁麼親見一回始得乃拍案一下云噫山僧今日太殺逗漏少室遇嗣嵩山龍潭端禪師僧問如何是少林宗師曰九重淵底起神龍曰如何是曹洞宗師曰百劫冤家狹路逢曰如何是臨濟宗師曰無口人吞栗棘蓬曰如何是雲門宗師曰手提寸鐵走西東曰如何是溈仰宗師曰龜毛慣縛樹頭風曰如何是法眼宗師曰喜把金樽勸醉翁曰如何是千聖不傳宗師曰現鐘不打何處鍊銅少室遇嗣洛陽天慶江禪師僧問古鏡未磨時如何師曰鬼神茶飯曰古鏡已磨時如何師曰魔外冤仇曰銀碗盛雪時如何師曰眼見即瞎曰明月藏鷺時如何師曰動即禍胎曰不見不動時如何師曰推出者死漢曰乞師更垂方便如何轉身師曰路逢死蛇莫打殺無底籃兒盛將歸少室遇嗣嵩山永泰祥禪師堅上座典客師曰今日有甚客來堅曰憧憧不絶不過是胡張李黑師曰你還揀擇得出麼堅曰一味教他喫茶去師曰儱侗漢奴郎不辨怎消得常住物曰惟和尚命師曰吞鐵丸去堅笑曰和尚亦恁麼師打曰你亦恁麼那少室遇嗣已上六人盤山遇禪師上堂諸方尊宿皆好舉話接待衲僧山僧今日效顰也舉一則供養大衆良久云莫怪空疏便下座復顧謂侍僧云拄杖在侍曰在者裏師曰各各自領取一頓寶應達嗣太原斌禪師上堂以手屈指數之曰西天四七東土二三算到一千七百總出我者指頭不得噫罷罷得歸去時且歸去莫落他人指數中寶應達嗣已上二人金陵天界雪軒道成禪師雲州趙王之遠孫也父徒居保定遂家焉年十五出家受具已結三人為侶在青州土窟中密究單傳之旨忽有老人貌甚奇古謂曰汝三人忘苦辛甘淡泊究明向上大事他日必作法門棟梁師叱之曰既作棟梁乃居士窟耶老人曰未有常行而不住未有常住而不行言訖而隱師益自勵聞秋江潔公大弘曹洞宗旨於齊之靈巖遂往禮謁潔問師何處來師曰青州來潔曰帶得青州布衫來麼師曰呈似和尚了也潔即肯之俾參堂久之疑情冰釋徑造丈室潔曰金鎖玄關打開了也未師曰千年桃核裏覓甚舊時仁潔頷之囑曰是汝本有之事善自護持他日能弘吾道者必汝也洪武十五年天下郡縣開立僧司統領釋教師應選道契親王睿眷尤篤三十年秋八月召師至殿命住天界師奏不會佛法上製詩一首鐫於金榜懸諸法堂曰不答來辭許默然西歸隻履舊單傳鼓鐘朔望空王殿示座從前數歲年上堂白雲萬頃卷舒露劫外真機紅葉千峯燦爛顯箇中妙旨亘古今而不昧經塵劫以常存鳥道虗通運步玄關綿密獅絃錯落接指古韻鏗鏘直得石女點頭木人拍手拈起金針玉線穿過機先截來兔角龜毛發明向上正偏獨露隱顯全該所以物物頭頭塵塵剎剎未有一絲毫缺少大衆還會麼夜來木馬雪中過驚起南辰北斗藏上堂陰極陽回化日長梅花處處噴清香箇中消息無多子遍界何曾有覆藏如是則明明兼帶百草頭上相逢密密宣揚萬象光中獨露利名場上薦取無位真人人我山中顯示本來面目影含宗鑑心生則種種法生身是道場心滅則種種法滅石女高提寶印文彩全影木人暗度金梭絲毫不昧牽動劫外機輪烜赫寰中歲月潛通遐邇直得枯木生花該括古今解使寒冰發𦦨雲籠古路依依野色還迷月滿寒巖皎皎神光遍照六門機息何須宛轉旁參一色功圓切忌當頭印破白牛運步已蒙建化之緣玉馬嘶風總是利生邊事且道如何是向上事咄兔角杖挑潭底月龜毛拂拄嶺頭雲元旦上堂三陽交泰萬物咸新顯一真之妙用總造化之淵源塵塵合道處處通津法筵大啓覺苑弘開國運與佛運齊興皇風共宗風并扇祇如道舊歲已去新年到來未審去從何去來從何來如斯評論轉見誵訛敢問大衆衲衣下一著子還有增添去來也無於斯會得便見臘盡陽和無影樹春回花發不萌枝上堂五月榴花照眼明薰風啼鳥遍巖扃機先一著無玄妙切忌當人認色聲記得夾山會禪師示衆曰目前無法意在目前不是目前法非耳目之所到天童覺曰夾山老子解開布袋將差珍異實撒向諸人面前了也正當恁麼時又作麼生路不拾遺君子稱美大衆且道夾山天童二老見處一一揀點將來總成漏短鳳山分上則不然若是色見聲求即非家珍了知目前無一法頭頭物物總相應其或未然更聽末後一句道泰不傳天子令時清休唱太平歌三十五年七月太宗嗣位奉使日本命師往宣聖化至永樂二年回與同使官僚備奏皇情大悅恩寵有加四年以僚佐譖繫囹圄百餘日師坦然無慮上知其非罪宥之六年春奉旨就鍾山建普度大齊命師說法聽者數萬人十一年赴北京朝賀奉旨於慶壽建齊賜賚尤沃宣德三年師年七十六表辭歸山宣宗憫其誠遣內臣護送南還天界西庵養老七年臘月八日示微疾辭衆說偈趺坐而逝上製文遣官致祭闍維之日煙𦦨五色仙鶴翔空異香滿道彩雲縹眇四衆萬餘人咸嘆希有火後收舍利圓紅者無算塔於南畿安德門外敕賜塔所為鷲峯禪寺靈巖潔嗣西京天慶息庵義讓禪師真定李氏子丱歲剃落遍參宗匠後往封龍扣古巖就公嘗作達磨得皮得肉等頌就稱賞之曰達磨皮內骨髓皆被諸子得去不如隻履西歸者是甚麼消息師曰且喜和尚猶記得就曰是則是我終有些疑你師曰恁麼則老胡賴也就顧侍者曰我眼何如出住天慶次遷熊耳之空相泰山之靈巖雒之嵩少僧問無功之功還有偏正否師曰偏正歷然曰如何是無功底偏正師曰石牛吐出三春霧靈鳥不棲無影林問如何是直指人心師曰舌在口裏曰如何是見性成佛師曰金屑雖貴落眼成塵曰如何是莫向言中取則師曰道火何曾燒著口曰如何是句外明宗師便打曰因甚便打某甲師曰你要我句內明宗麼庚辰夏遘疾乃命門人曰斯疾不可起也吾往必矣至五月十二日囑後事書偈曰來時本淨去亦圓周虗空作舞任意優游右脅而逝封龍就嗣泰山靈巖容禪師初參萬法歸一一歸何處有理會但於青州布衫與師子一吼祖父俱盡語未透偶與同參上泰山日觀峯忽憶登東山而小魯登泰山小天下話驀地失足跌得悶絶同參扶起良久乃蘇大叫曰此是師子一吼祖父俱盡時也孔孟未必到恁麼田地因謁封龍就和尚呈所見就曰更須知有向上關棙子始得師喝一喝而出就大喜呼而印之封龍就嗣晉寧心菴主常舉拳頭曰天下衲僧只用者箇殺活他凡有僧來便打出無能搆者因是人稱為鐵拳頭菴主封龍就嗣白茅春菴主常與心鐵拳往來僧問和尚用何法接人師曰但將冷眼觀螃蟹看彼橫行到幾時曰恁麼則冷眼鐵拳相結恨於天下也師曰衲子多好嚼屎蛆封龍就嗣已上四人
