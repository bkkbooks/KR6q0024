body:
  text: 六祖下二十世臨濟宗臨安徑山無準師範禪師生於蜀之梓潼雍氏九歲出家長遊成都坐夏請益坐禪之法於老宿堯首座座曰禪是何物坐底是誰師晝夜體究一日如廁提前話有省明年往謁佛照光於育王光問曰何處人師曰劍州光曰帶得劍來麼師隨聲便喝光笑曰者烏頭子也亂做貧甚無資剃髮人皆以烏頭子呼之久之復至靈隱時破庵居第一座同游石筍庵庵之道者請益曰胡孫子捉不住願垂開示先曰用捉他作甚麼如風吹水自然成紋師侍傍有省牧雲門頌云城門失火臭煙熏殃及池魚尾盡焚無處更求三尺水直看振鬣上青雲箬庵問頌云氣飲長虹已食牛血漫漫地照人愁因風吹火無多力春滿皇都四百州破庵先和尚過天童掃塔師偕往至瑞巖雲巢留師分座夜夢偉衣冠者持把茅見受翌日明州清涼專使至師受請入院見所謂伽藍神姓茅衣冠狀貌與疇昔所夢無異升堂開法大闡宗風繼遷焦山雪竇被勑移育王又三年嵩少林散席以朝命主徑山有旨召入內庭師奏對詳明上為色動賜金襴僧伽黎復宣詣慈明殿升座說法理宗垂簾而聽賜佛鑑禪師號師居徑山二十年海衆雲騰信施豐積雖寺兩遭火厄乃旋復旋興為東南法席第一師於寺前四十里築室百楹接待雲水額曰萬年正續正續西數百步結庵一區為歸藏建閣以藏後先所賜御翰東西供奉祖師與先世香火遇始生日為飯僧佛事以贊冥福蓋蜀亂師之先祀遂絶祠奉以旌孝慕上聞嘉歎上堂靈山指月曹溪話月遞代相傳證龜成鱉範上座尋常一張口挂在壁上今日無端入者行戶未免拈出多年歷日說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋熱上堂若論箇事直是省要奈何諸人自作艱難自作障礙所以尋常西廊東廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人氏若也識得便與諸人打些鄉談說些鄉話如今且未說你識得長老且各自知得自家鄉貫也得還知麼淳祐戊申秋師築室明月池上榜曰退耕三月旦日升堂示衆曰山僧既老且病無力得與諸人東語西話今日勉強出來將從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣曰是多少便歸方丈十五日集兩序區畫後事親書遺表言笑如平時其徒以遺偈為請乃執筆疾書曰來時空索索去也赤條條更要問端的天台有石橋移傾而逝停龕二七日上遣中使降香賜幣奉全身葬於正續之側塔曰圓照臥龍先嗣江州雲居即庵慈覺禪師蜀人也上堂舉雪峰因閩王問擬欲蓋一所佛殿去時如何峰曰大王何不蓋取一所空王殿王曰請師樣子峰展兩手雲門曰一舉四十九師頌曰空王殿樣子雪峰展兩手添得老韶陽一舉四十九總是面南看北斗讚船子和尚偈曰三十餘年在藥山鬼家活計豈能傳當時不得夾山老你且奈煩撑破船師始登雲居先一夕宿瑤田莊夢伽藍安樂神告曰師於此山只有一粥之緣明日午後到山晚參罷值堂中二僧相歐以新到例遭擯逐師竊訝之後數年雲居虗席請師補處師欣然承命且徵前夢至瑤田莊而寂臥龍先嗣慶元大慈獨庵道儔禪師贈製鞋匠偈曰透底工夫做已圓須知密處自心傳腳跟著地隨他轉踏到驢年也未穿臥龍先嗣臨安靈隱石田法薰禪師眉山彭氏子初游石霜禮雷遷塔述偈曰一念慈容元不隔何須特地肆乖張平高就下婆心切惱得雷公一夜忙師名由是大著聞穹窿先道望遂往叩先一見知為法器室中舉世尊拈華迦葉微笑話師曰焦磚打著連底凍赤眼撞著火柴頭先異之每於日用語默不少假借師於是決志依棲與無準範日相激礪久乃辭去復遍遊諸老門庭咸稱賞之後出世蘇之高峰次遷寒山鍾山虗席廟堂奏師補處寶慶初遷淨慈端平二年復遷靈隱上堂一徑直二周遍衲僧會得萬別千差庭前閒縱目春盡尚餘華老胡不合過流沙拍膝一下便下座淳祐甲辰三月望示衆曰但得本莫愁末喚什麼作本喚什麼作末松柏千年青不入時人意牡丹一日紅滿城公子醉山僧恁麼道若有不肯底是我同參弟子師俊繪師像求贊有曰末後一句分付廚山衆訝之明日忽示疾退歸寶壽訣衆而逝窆全身於院後臥龍先嗣已上二人慶元天童滅翁天目文禮禪師杭之臨安人姓阮氏六歲攜籃隨母採桑俄念攜之者誰邪遂有出家志年十六剃落謁育王佛照光和尚問恁麼來者那箇是汝主人公師豁然領肯一日光問是風動是幡動者僧如何師曰物見主眼卓豎光曰不是風動不是幡動甚處見祖師師曰揭却腦蓋光喜其俊邁命典書記久之返浙西聽一心三觀於上天竺時松源嶽唱道饒之薦福室中問僧不是風動不是幡動擬議即棒出師聞之頓忘知解遂往見之蒙印可得盡其旨辭去遍禮江淮間祖塔時浙翁𤥎主蔣山挽師分座嘉定五年約齊張公鎡請師開法臨安慧雲節齊趙公慕師高行微服過訪師亦不問其姓名與語終日而去翌日奏請師住持淨慈室中每舉南山筀筍東海烏鱡話學者擬議師便打莫有湊泊之者僧問和尚見佛照時如何師曰石中有玉曰見松源後如何師曰沙裏無油有來上座入方丈曰某甲有狀投和尚師曰對頭在那裏來曰和尚便是師曰老僧與汝有甚麼冤讐來無語師捉住曰冤家冤家新到僧至師問汝名甚麼僧曰智虎師退身作怕勢僧擬議師便歸方丈石杖鞏頌云白浪堆中下一鉤錦鱗紅尾尚悠悠漁翁不計竿頭事笑入蘆花萬傾秋師尤邃於易諸儒大闡道學師與之遊直示心法朱晦庵問毋不敬師義手示之楊慈湖問不欺之力師答以偈曰此力分明在不欺不欺能有幾人知要明象兔全提句看取升階正笏時師將入寂謂侍者曰誰與我造箇無縫塔者曰請師塔樣師良久曰盡力畫不出遂怡然而去闍維弟子收舍利并遺骨袝葬於應庵塔左壽八十四靈隱嶽嗣溫州江心石巖希璉禪師潮陽馬氏子僧問昔日佛照光禪師因宋孝宗宣問釋迦佛入山六年所成何事光曰將謂陛下忘却此意如何師答以頌曰大根大器大熏修瞥轉機輪向上頭萬億斯年惟一佛雪山元不隔龍樓靈隱嶽嗣台州瑞巖佛日雲巢巖禪師作經題八字偈曰以字不成八字非當陽拈起大家知釋迦老子舌無骨黃葉將來嚇小兒頌靈雲見桃華話曰三月桃華爛熳紅靈雲打失主人翁隨邪逐惡玄沙老半是真情半脫空靈隱嶽嗣華藏無礙覺通禪師青苗會上堂破一微塵出大經鳶飛魚躍更分明不將眼看將心看已是重敲火裏冰淹黑豆昧平生直須劫外話豐登繅成白雪桑重緑割盡黃雲稻正青靈隱嶽嗣臨安淨慈谷源道禪師舉丹霞然初參石頭剗佛殿前草公案頌曰石頭剗草驗英豪懵懂丹霞眼不高若解轉身行活路至今應不纍兒曹靈隱嶽嗣湖州道場北海悟心禪師舉黃檗在鹽官殿上禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求檗曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為檗便掌彌曰太粗生檗曰者裏是什麼所在說粗說細隨後又掌頌曰曾施三掌觸君王佛法何曾有寸長粗行沙門封斷際至今無地著慚惶舉唐文宗蛤蜊因緣頌曰合水和泥底事忙被渠點破大乖張雖然契得君王意爭奈全身入鑊湯靈隱嶽嗣慶元雪竇大歇仲謙禪師義烏應氏子幼見傅大士心王銘矢志出家初參息庵庵器而抑之曰汝儒者習氣不除焉能學道要到大休大歇田地如木偶人去師蒙激發益自奮勵朝夕不解一日忽然有省遂以大歇自名後參松源嶽一日室中舉祕魔擎義話師豁然大悟上堂舉應庵華和尚問密庵傑如何是正法眼傑曰破沙盆華頷之頌曰白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今纍子孫靈隱嶽嗣諾庵肇禪師華亭懷古偈曰活計都盧一釣舟錦鱗入手便抽頭我來不覩師親訓柳岸依依蘸碧流靈隱嶽嗣湖州道場運庵普巖禪師題趙州像贊曰無端提起七斤衫多少禪人著意參盡向青州做窠窟不知春色在江南靈隱嶽嗣蘇州虎丘蒺藜曇禪師初住四明延慶遷蘇之穹窿後至虎丘上堂舉僧問香林如何是衲衣下事林曰臘月火燒山師曰兔子何曾離得窟若有人問延慶如何是衲衣下事只對他道就船買得魚偏美踏雪沽來酒倍香上堂念念釋迦出世時時彌勒下生頓超天地未分之前不歷階梯掀翻寶所便恁麼去可以開無量法門可以演百千妙義驀拈拄杖卓一下曰無量法門百千妙義盡向者裏百雜碎了也還知虎丘落處麼靠拄杖祖禰不了殃及子孫靈隱嶽嗣台州瑞巖少室光睦禪師上堂舉曹山霞禪師因僧侍立次山曰道者可煞熱曰是山曰祇如熱向甚麼處回避曰向鑊湯爐炭裏回避山曰祇如鑊湯爐炭裏又作麼生回避曰衆苦不能到師頌曰瞎却頂門三隻眼鑊湯爐炭裏優遊若言衆苦不能到端的何曾有地頭靈隱嶽嗣鎮江金山掩室善開禪師上堂舉密庵破沙盆話頌曰法眼拈來早自謾無端錯對破沙盆而今遍界難遮掩殃害叢林及子孫靈隱嶽嗣明州雪竇無相範禪師上堂舉趙州和尚曰才有是非紛然失心還有答話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似趙州州曰南方大有人喪身失命僧曰請和尚舉趙州方舉前話僧指旁僧曰者箇師僧喫却飯了作恁麼語話師頌曰坐底見立底立底見坐底咄哉老趙州白日眼見鬼靈隱嶽嗣祕監陸游居士字務觀號放翁山陰人常謁松源嶽和尚於靈隱從容問曰心傳之學可得聞乎嶽曰既是心傳豈從聞得士點首默契遂呈偈曰幾度驅車入帝京逢僧一例眼雙青今朝始見宗門別說有無言要眼聽靈隱嶽嗣共十四人臨安徑山癡絶道冲禪師武信長江荀氏子母郭生而豐上短下資性絶人稍長以進士業應詔不第遂出家遊歷講肆習經論紹熙壬子出峽回翔荊楚間時曹源生出世妙果師造見耹入門語有省參堂俾侍香朝夕老拳痛棒不少貸平生知見至是多無影響生徙龜峰師侍行又三年以偈辭游浙有尚餘窮相一雙手西向諸方癢處爬之句初應嘉禾光孝道聞於朝忠獻衛王以堂帖除蔣山蔣山諸莊皆瀕江易潦下田多無收師忍飢鳴道行乞養士居十有三載無倦色嘉熙己亥侍郎東畎曹公豳帥閩聞師道望以鼓山來聘未行雪峰牒至領事半年而天童詔下衆集如海育王虗席攝住持事往來兩山上堂天童用底來育王用不著育王用底歸天童用不著雖然如是用不著不著處用有餘一箭雙鵰隨手落結夏上堂圓覺伽藍塵塵有路坐斷去來頓空今古那裏十三者邊十五後先不差毫髮許堪笑黃面瞿曇至今不知落處遷徑山一日忽升座辭衆舉世尊臨入涅槃告衆曰汝等善觀吾紫磨金色之身瞻仰取足毋令後悔今日即有明日即無師曰世尊四十九年作盡伎倆及至臨行之際求生不得求死不得山僧今日要行便行要去便去八臂那吒攔不住至夜分起坐移傾而逝壽八十二茶毗舍利五色無數遵遺命奉骨歸葬金陵玉山庵學者分其半塔於菖蒲田薦福生嗣臨安淨慈清溪沅禪師上堂達磨西來一坐具地被他神光禮了三拜一時占了致令後代兒孫各自分疆列界衲僧家撥草瞻風朝吳暮越南天台北五臺拄杖頭草鞋底還曾踏著也未良久曰切忌踏著天童鏡嗣荊州公安虎溪錫禪師上堂心心淺處實甚深道道幽遠無人到急行踏不著緩行成錯過少林幾坐華木春卻憶西來胡達磨天童鏡嗣福州西禪月潭圓禪師開爐上堂人人盡守甕中天地覆天翻我不然直下一槌星火迸螺江燒卻謝郎船讚豬頭和尚曰血淋淋古佛心幾回提起誰是知音天童鏡嗣慶元育王寂窗有照禪師福之閩縣鄧氏子時枯禪鏡唱道怡山師往見之一日鏡問曰自從一見桃華後直至如今更不疑那裏是他不疑處師大笑趨出鏡深肯之鏡遷靈隱師掌內記以老母歸省閩帥趙公汝愚請師開法東山大乘移福之黃檗朝命補江心後遷玉几適災變竭力興建聞奏朝廷降金帛鼎建舍利寶塔上堂六塵不惡還同正覺鴉鳴鴉鴉鵲噪鵲鵲江北江南潮生潮落春風三月華草香善財何處尋樓閣喝天童鏡嗣泉州法石愚谷元智禪師長溪薛氏子參天童有省呈山居偈曰栗色伽黎千百結倚松捫腹看雲飛有人問我居山趣向道春深筍蕨肥咸淳丙寅正月趺坐書偈而逝塔全身於鼓山南院天童鏡嗣報恩太古先禪師上堂若論此事不涉心思意想非干默照忘懷要得洞然明白須是汗下一回且道汗下後如何驀喚侍者將扇子來上堂衲僧家游方行腳撥草瞻風第一須識路徑始得路徑不錯東西南北到處為家稍涉迂回五里單牌十里雙堠那裏更在那裏擲下拄杖云看腳下天童鏡嗣岊翁淳禪師久參鏡和尚得契佛誕日偈曰毗嵐毒種毒華開添得雲門醉後杯今日河風橋色惡淡煙疏雨洗黃梅雜毒海載此偈是西嵒作未知何據天童鏡嗣已上七人平江虎丘雙杉元禪師舉宋太宗夢神人勸發菩提心次日問廷臣菩提心作麼生發羣臣無對雪竇代曰實為今古罕聞別峰印代曰王言如絲其出如綸師頌曰萬里謳歌聖化成條風塊雨樂樵耕不因嵩嶽三呼後無象誰知真太平冷泉兩廊畫壁頌曰一一塵中堅密身改頭換面轉精神誰知東壁打西壁總是靈山會上人隱靜柔嗣臨安徑山元叟行端禪師臨海之何氏子世業儒母陳師生而秀拔幼不茹葷十二出家十八受具一切文字不由師授初參藏叟珍於徑山珍問甚處人師曰台州珍便喝師展坐具珍又喝師收坐具珍曰放汝三十棒參堂去師於言下豁然頓悟一日侍立次珍曰吾泉南無僧師曰和尚聻珍便棒師接住曰莫道無僧好珍頷之命入侍司洎珍告寂師至淨慈嘗自稱寒拾里人徑山請居第一座大德庚子特旨賜號慧文正辨禪師皇慶壬子遷靈隱有旨設水陸大會於金山命師升座說法事竣入覲加賜佛日普照陛辭南歸養靜於梁渚之西丘至治壬戌徑山虗席請師補處師三被金襴之賜二十年來足不越閫而慕其道者鱗集至無所容師嘗勘一新到曰何方聖者甚處靈祇僧曰臨朕砧師曰杜撰禪和如麻似粟參堂去又勘一僧曰棋盤石研破你腦門盂池浸爛你腳板僧擬答師便喝又勘一僧曰擘開華嶽連天秀放出黃河徹底清即且置平實地上道將一句來僧擬開口師便打師以呵叱怒罵為慈誘之誨以不近人情行大公之道師之利他皆陰為之沒齒不言至正辛巳八月四日示微疾問侍者曰呼之曾已休吸之尚未捨寄語諸苦源來者不來者如何是來者不來者侍無語師良久曰後五日看至期沐浴更衣書偈訣衆曰本無生滅焉有去來冰河發𦦨鐵樹華開投筆垂一足而化留龕七日顏色如生全身葬於寂照塔院徑山珍嗣溫州江心一山了萬禪師族臨川金氏貌瘠而弱年十五業文有聲祝髮日芝産戶樞及游方值東叟領南屏命師掌記偶經神祠見紙灰旋起脫然忘所證亟以白叟叟詰之遂蒙印可遊天台衆請開法寒巖瓣香嗣東叟踰三年遷仙居紫籜又十年遷疏山又十年住江心少不適意輒棄去寺衆數百懇留涕泣而莫之留會廬山月㵎明公遣舟迎師歸東溪明公示寂開先之衆復以請師力却之上堂拈拄杖此拄杖子西天四七東土二三天下老和尚拈弄不出今日落在開先手裏無頭無尾能放能收離相離名能縱能奪雖然如是也只為中下之機忽遇上上人來時如何以拄杖畫一畫放過一著皇慶元年遘疾危坐不近醫藥閲七日命具浴更衣書訣衆語泊然而逝闍維收五色舍利如菽目睛不燼鎔以烈𦦨益晶瑩齒牙頂骨錚然有聲時改作豫章烏遮塔江西行省丞相幹赤命以舊藏世尊舍利奉於中而遣使分師之目睛舍利貯之銀盒陪葬焉餘骼舍利分葬東溪淨慈頴嗣慶元奉化嶽林栯堂益禪師溫州人上堂古者道我者裏無法與人只是據款結案彰聖者裏亦無法與人亦不據款結案拈拄杖如何是佛赤腳踏蓮華如何是佛向上事雕梁畫棟擲下拄杖便歸方丈上堂五千四十八卷只作一句道卻遂起身曰立地待諸人搆取便下座臨終偈曰八十三年什麼巴鼻柏樹成佛虗空落地茶毗舍利瑩然齒牙數珠不壞淨慈頴嗣婺州雙林雲屋自閒禪師括蒼葉氏子烏巨行禪師之九世孫也初參荊叟珏於靈隱次謁東叟穎於淨慈掌記室一日因撰佛成道疏曰發見精於午夜叟曰何不道泯見精於午夜師不覺股栗汗下如發蒙蔀徹見叟垂手為人處後出世雙林遷智者皇慶壬子十月二十五日與客語笑次忽命侍僧取筆書偈而逝淨慈頴嗣已上三人枯木榮禪師讚三祖偈曰夙恙纏身世莫醫家貧遭劫更堪悲誰知覓罪了無處正是賊歸空屋時無方安嗣臨安徑山佛智晦機元熙禪師豫章唐氏子師與兄元齡俱習進士業元齡既登第師從西山明公祝髮將遊方其母具白金為裝師謂財足喪志即善言辭之聞物初觀闡化玉几往依之觀與語驚異留侍左右至元間總統楊璉真如奉旨取育王舍利躬詣師求記述舍利始末因招與俱師曰我有老母兵後存亡不可知遂辭歸江西元齡先以臨江通判從文丞相起兵死難獨母在堂師奉之以孝聞元貞二年出主百丈居十有二載至大初應淨慈請入院日行中書省行宣政院官屬悉迎請發揚宗旨四方英衲一時輻輳上堂獨坐大雄峰寒灰撥不紅一星螢火出孤鶴過遼東結制上堂以手作結布袋勢曰南山今日結卻布袋口了也汝等諸人各各於其中身心安居平等性智忽有箇衝開碧落撞倒須彌底莫道結子不堅密良久曰漫天網子百千重居七載復遷徑山已而䇿杖歸南屏山下百丈大仰之徒聞師退閒爭來迎請師不獲已遂返仰山居三年將示寂手書辭所與遊者復書偈訣衆擲筆而化世壽八十二奉全身瘞於金雞石下弟子在杭者分爪髮塔於淨慈西隱育王觀嗣慶元徑山雲峰妙高禪師福之長溪人世業儒母阮夢池上嬰兒合爪坐蓮華中手捧得之覺而生師因名夢池神彩秀徹嗜書力學尤耽釋典固請學出世法剃染受具上育王見偃溪聞禪師機鋒相契命掌藏鑰一日聞舉譬如牛過窗櫺頭角四蹄都過了因甚尾巴過不得師劃然大省乃曰鯨吞海水盡露出珊瑚枝聞遂許可蔣山虗席奉朝命居歷十有三載衆踰五千指德祐乙亥寺被兵軍士以刃擬師師延頸曰欲殺即殺吾頭非汝礪刃石辭色了無怖畏軍士感化棄刀而去至元十七年遷徑山寺罹回祿師住後頓還舊觀示衆前念是凡後念是聖一刀兩段更莫遲疑是以涅槃會上廣額屠兒放下屠刀便言我是千佛一數然雖如是若無舉鼎拔山力千里烏騅不易騎京師有譖毀禪宗者師曰此法門大事吾當忍死爭之遂詣闕被旨集諸宗徒廷辨元世祖問禪以何為宗師奏淨智妙圓體本空寂非見聞覺知思慮分別所能到宣問再三師歷舉西天東土諸祖以至德山臨濟棒喝因緣餘二千言又宣進榻前與譖者反復論難譖者辭屈世祖大悅師陛辭南歸示衆曰我本深藏巖竇隱遁過時不謂日照天臨難逃至化又曰衲被蒙頭萬事休此時山僧都不會徑山復災師謂衆曰吾宿負此山債耳復竭力營建匯殿坡為池他屋以次落成至元三十年六月十七日書偈而逝後建塔於寺之西麓淨慈聞嗣湖州何山鐵鏡至明禪師福唐長溪王氏子見偃溪聞於淨慈朝參暮叩久之始獲印證至元辛巳出世何山移大梅元大德庚子復請歸何山上堂今朝八月二十五記得洞山離杳渡落在雲門網子中有屈至今無處訴豎起拂子曰看雲門大師來也合喫何山手中棒且道過在什麼處不合鼓弄人家男女延祐乙卯十一月初五日呼其徒囑後事索紙大書曰絶羅籠沒回互大海波澄虗空獨露擲筆翛然而逝淨慈聞嗣慶元天童止泓鑒禪師初住慶元真如移天童上堂諸佛不真實說法度群生菩薩有智慧見性不分明白雲無心意灑為世間雨大地不含情能長諸草木古德與麼提唱於四諦法中開鑿人天不妨善巧若據衲僧分上何啻白雲萬里上堂拈拄杖一有多種二無兩般枯桑知天風海水知天寒拄杖子聞與麼道不覺欣欣笑曰出身猶可易脫體道應難擲下拄杖下座淨慈聞嗣已上三人慶元天童石門來禪師嘗作翦刀頌曰渾鋼打就冷光浮兩刃交鋒未肯休直截當機為人處何曾動著一絲頭大川濟嗣慶元雪竇野翁炳同禪師新昌張氏子參大川濟一日入室次濟舉臘月火燒山話師擬開口濟遽枯竹篦拄之師豁然省旨後縛茅仗錫峰日扃戶書法華嘗有老來非厭客靜裏欲書經之句大川濟嗣已上二人臨安靈隱悅堂祖誾禪師南康周氏子年十三告辭父母剃髮出家一日閲華嚴經至惟一堅密身一切塵中現忽有省即往見別山智於蔣山問近離何處師曰江西智曰馬大師安樂否師叉手進前曰起居和尚智俾入侍司未幾至杭見斷橋倫於淨慈問臨濟三遭黃檗痛棒是否師曰是倫曰因甚大愚肋下築三拳師曰得人一牛還人一馬倫頷之倫逝而介石朋補處一日朋室中舉庭前柏樹子話師擬議朋抗聲曰何不道黃鶴樓前鸚鵡洲師言下頓悟即命侍香元貞初奉詔赴闕入對稱旨賜璽書通慧禪師號并金襴法衣大德九年住靈隱一僧新到師問何處來僧曰閩中師曰彼處如何住持僧曰飢即喫飯困即打眠師曰錯僧曰未審和尚此間如何住持師拂袖歸方丈居四載示疾訣衆偈曰緣會而來緣散而去撞倒須彌虗空獨露偈畢乃跏趺而化雙林朋嗣盧山圓通雪溪逸禪師讚興化和尚偈曰中原一寶有來由得拶君王引幞頭到此若無青白眼當機誰敢謾輕酬辨山阡嗣嶽州灌溪昌禪師山居偈曰閒來石上玩長松百衲禪衣破又縫今日不憂明日事生涯只在盂中無鏡徹嗣支提愚叟澄鑒禪師寧德張氏子參無文於薦福遂許入室至元二十年世祖勑住支提賜號通悟明印大師後將示寂沐浴更衣書偈曰八十二年落賺世緣躍翻筋斗應跡西乾擲筆危坐而逝薦福燦嗣紹興大慶尼了庵智悟禪師福州王氏女幼孤年十一白母願出家因誦維摩經至諸佛國土亦復皆空豁然頓悟往參雲峰信信問曰上座什麼處住師曰不住南臺江邊信曰畢竟住在什麼處師不審便行信叱曰走作什麼合喫山僧手中棒師面熱汗下次日復往請益曰某甲昨日祇對和尚有什麼過信厲聲曰更來者裏覓過在師釋然曰月明照見夜行人信顧旁僧曰看渠根器不凡遂印以偈有相逢若問其中事風攪螺江浪拍天之句上堂拈拄杖天垂十二闌干角風滿三千世界中熱惱變成清淨境禪心頓覺悟真空靠拄杖有甚共語處上堂大陽門下日日三秋明月堂前時時九夏古人甚麼道未免坐在者裏大慶即不然山轉疑無路溪回別有村上堂柳絮飄風杏華沐雨好箇生機快須薦取以拂子擊禪牀曰咄三十年後不得錯舉雪峰信嗣寧波天童西江謀禪師被勑住天童歷四十年貌枯色瘁涖衆孤峻機語峭拔音如洪鐘理宗朝三被寵錫其示衆曰春日晴黃鸝鳴最親切誰解聽一日將入滅顧侍僧曰一笑翻身日面月面遂逝華藏淨嗣福州雪峰石翁玉禪師禮雪峰塔偈曰入閩早是四旬餘象骨崖前縛屋居誰道開平年代後春疇煙雨幾鋤犁華藏淨嗣臨安中竺空巖有禪師室中垂語曰黃金鑄就鐵真人東海涌頌曰錦衣公子醉田家熟睡柴牀日未斜熱渴呼漿無所得便將玉帶換甌茶徑山玨嗣臨安淨慈千瀨善慶禪師嚴陵鼓氏子丱歲而孤萍蹤無寄聞荊叟珏主淨慈遂往親依一日聞舉洞山麻三斤話遂得大悟出住宜興之保安遷嘉禾之天寧後主淨慈嘗著扶宗顯正論進仁宗覽而嘉之賜金襴袈裟徽號慧光普照文明通辨禪師徑山玨嗣已上二人婺州寶林無機和尚上堂蘆華對蓼紅木落山露骨倣佛揚州依希越國拈拄杖卓一下曰為君卓破精靈窟無位真人赤骨律靈隱泉嗣溫州華藏瞎驢無見禪師舉興化打克賓頌曰興化打克賓言親語不親棒頭如雨點敲出玉麒麟黃龍開嗣臨安慧雲無傳祖禪師上堂佛佛廣說大智莫能知祖祖相傳凡情詎能測先天後地成壞長存入死出生去來不變於斯薦得已涉支離其或未然山僧更為下箇注腳以拂子擊禪牀曰啼得血流無用處不如緘口過殘春黃龍開嗣杭州護國臭庵宗禪師上堂舉豐干謂寒山拾得曰你與我去遊五臺便是我同流寒山曰你去遊五臺作麼干曰禮拜文殊山曰你不是我同流師曰豐干開口不在舌頭上寒山同坑無異土檢點將來兩箇駝子廝撞著世上應無直底人黃龍開嗣放牛余居士參無門開禪師凡有所問被開劈面截住曰不是不是一日向同參臭庵宗問曰吾師甚麼見解敢對人天顛倒是非宗曰我在無門座下無法可得無道可傳只得兩箇字士曰兩字如何宗曰不是不是士言下頓悟無門為人處安吉州沈道婆問是非關有幾句士曰有四句婆曰四句作麼舉士曰第一句有是有非則不可第二句無是無非又不可第三句是是非非也不可第四句非是是非亦不可若離得此四句始見本地風光曰我離得否士曰汝離不得曰人人有分我何離不得士曰嫁雞逐雞飛嫁狗逐狗走曰如何是本地風光士曰月子彎彎照九州幾人歡喜幾人愁曰不問這箇本地風光士曰問那箇本地風光曰無男女相底士曰既無男女相問甚是非關曰別有向上事也無士曰有曰如何是向上事士曰馬蝗丁住鷺鷥腳你上天時我上天黃龍開嗣已上四人福州鼓山皖山正凝禪師龍舒太湖人入閩禮孤峰秀和尚秀舉狗子無佛性話師不能答踰半載得臻閫奧乃頌曰趙州道無箭不虗發築著磕著全活全殺秀曰你也得只是未在一日秀舉德山見龍潭話問那裏是德山親到處師以手掩秀口即說頌曰潭不見龍不現全身已在空王殿夢回忽聽曉鶯啼春風落盡桃華片秀曰汝今日方知泗洲大聖不在揚州出現善自護持遂俾侍香久之太傅賈平章魏國公劄請住鼓山上堂入院方三日追陪人事忙燈籠與露柱密密細商量且道商量箇什麼拍禪牀昨夜碧天風浪靜一輪明月映螺江上堂六月旦夏巳中荷華開水面荔子映山紅無位真人處處相逢擬議雲山千萬重師化緣將畢集兩序示遺誡索筆書偈曰八十四年一夢相似夢破還空也無些事端坐而逝孤峰秀嗣婺州雙林一衲介禪師讚傅大士偈曰非儒非道亦非禪杜撰修行忒可憐擔閣一身三不了至今八百有餘年孤峰秀嗣已上二人葛廬覃禪師舉僧問石溪和尚如何是佛溪曰矮子看戲頌曰巍巍丈六紫金容百戲場中有變通矮子看來眉卓豎鐵鎚無孔舞春風容庵海嗣曹洞宗磁州大明寶禪師參普照辨問離四句絶百非請師直指西來意辨曰昨日有人恁麼問被打出去也師曰今日又如何辨曰你得恁麼不識痛癢師禮拜辨曰可惜許棒折也師直得汗下忽然猛省住大明上堂僧問如何是轉功就位師曰用盡钁頭力放下臥清風曰如何是轉位就功師曰不居無影谷曳杖入煙村曰如何是功位齊彰師曰掌上擎日月運照自無私曰如何是功位俱隱師曰石人同木女相邀入海中曰此是今時事如何是那邊事師曰待汝盡卻今時即向汝道上堂若論此事如人作針線針針相似忽見人來不覺失卻針祇見線這邊尋也不見那邊尋也不見卻自曰近處尚不見遠處那裏得來多時尋不得心煩不好昏悶打睡拽衣就枕方就枕時驀然一劄曰原來祇在這裏南庵依頌云百城煙水苦飄樓閣門門開未許通只有善財親得見德雲不在妙高峰位中符云為惜明珠糞掃堆婆心曲盡幾多回精光撥動由人取蛟宅無須費打開五位頌曰正中偏月鎖深宮午夜前燭香人靜丹墀冷一片虗明照碧天偏中正曉天不挂秦臺鏡金烏才擬出扶桑依稀還被輕煙映正中來深夜寒梅雪裏開馥馥清香無間斷頭頭觸處絶纖埃兼中至大用全彰無忌諱𢹂手相將賀太平熙熙風物從來異兼中到妙盡功忘非善巧枯木龍吟大地春靈根秀出寒巖草普照辨嗣慈雲十身覺禪師普照室中推為上座辨垂百問以驗學者一時鮮有契機惟師所答有同水乳略舉七則以見其槩問曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己師曰半夜石人無影像縱橫誰辨往來源問曰不見一法猶是半提作麼生是全提底道理師曰石馬驟千山問曰喫飯忘其飢力克忘其飽作麼生是力克底人師曰巨靈擡手無多子分破華山千萬重問曰直得不恁麼來者猶是兒孫邊事如何是向上人師曰半夜烏雞雪裏啼問曰行玄體妙落在今時究理窮源關山萬里只如未知有底人如何趣向師曰牀窄先臥問曰迷時千卷少悟後一言多且道悟了底人如何履踐師曰出不由戶坐不當堂問曰岸如欲止先停棹車若不行須打牛如今打牛也車行也未師曰下載清風付與誰普照辨嗣玉溪通玄圓通禪師嘗著百問激勵學徒其略曰沒底船子為甚麼無漏堅固豎起拂子曰為你說禪了也作麼生會又拈起拄杖曰還有向拄杖頭上下得一轉語底麼又畫一圓相曰三世諸佛六代祖師總在裏許作麼生會復以手空中點一點曰且道者一點明甚麼邊事豎起一指曰俱胝和尚向這裏放大光明轉大法輪諸人還見麼又曰折腳鐺兒為活計穿心碗子作生涯通玄庵內安然坐不管山前事似麻且道安然坐底是甚麼人普照辨嗣鄭州普照寶禪師磁州武氏子於滏陽造仰山寺忽有題詩柱上者曰人道斑鳩拙我道斑鳩巧一根兩根柴便是家緣了師見之大悟即入西山結茅以居遍參諸山遂入青州之室後住洪峪寶巖寺一夕大風震地宴坐而逝普照辨嗣已上四人慶元雪竇無印大證禪師鄱陽史氏子幼頴異年十四剃落受具出遊謁荊石𤥎思庵睿諸老不契聞雲外岫和尚唱道天童師往依之入室有省遂命典藏至治間詔天下善書者以金書藏經師應詔竣事上賜以織金屈眴之衣宋寧宗泰定初南還江浙丞相脫歡公領行宣政院事起師主衢之南禪繼領光孝既而洪之翠巖饒之芝山俱以行院檄請師以疾固辭元至正十五年遷雪竇上堂千說萬說不若覿面一見昨日二十九今朝七月一報你參玄人光陰如箭疾娘生兩雙眼箇箇黑如漆急急急回頭看取天真佛良久曰是何面目下座巡堂喫飯上堂妙不妙衲僧鼻孔多無竅玄不玄剎竿頭上無青天志士寧容袖手良馬豈待揮鞭全超棒喝不落蹄筌百鳥不來春又去巖房嬴得日高眠居四年退居定水之圓明庵次年示寂闍維牙齒數珠不壞舍利明瑩門人建塔圓明庵後天童岫嗣
