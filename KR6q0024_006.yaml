body:
  text: 六祖下二十二世臨濟宗杭州天目高峰原妙禪師蘇之吳江人姓徐氏母夢僧乘舟投宿而生離襁褓輒喜趺坐遇僧入門輒愛戀欲從之年十五懇請父母出家嘉禾密印寺十六剃髮十七受具十八習天台教二十入淨慈立三年死限學禪二十五請益斷橋倫和尚令參生從何來死從何去話於是脅不至席口體俱忘雪巖欽和尚寓北澗師懷香往謁方問訊即被打出閉却門再往始得親近令看無字自此參叩無虗日後凡入門欽便問阿誰與你拖箇死尸來聲未絶便打如是者不知其幾後值欽赴南明師上雙徑參堂方半月偶夢中忽憶斷橋室中所舉萬法歸一一歸何處話疑情頓發三晝夜目不交睫值少林忌隨衆詣三塔諷經次擡頭忽覩五祖和尚真讚曰百年三萬六千朝返覆元來是這漢驀然打破拖死尸之疑時年二十四矣解夏詣南明欽一見便問阿誰與你拖箇死尸到者裏師便喝欽拈棒師把住曰今日打某甲不得曰為甚打不得師拂袖便出翌日欽問萬法歸一一歸何處師曰狗舐熱油鐺欽曰你那裏學者虗頭來師曰正要和尚疑著欽休去自是機鋒不讓次年江心度夏過雪竇見希叟曇問那裏來師拖下蒲團曇曰狗子無佛性上座作麼生師曰拖出大家看曇乃自送歸堂暨欽挂牌於道場開法於天寧師皆隨侍服勞一日欽問日間浩浩時還作得主麼師曰作得主又問睡夢中作得主麼師曰作得主復問正睡著時無夢無想無見無聞主在甚麼處師無語欽囑曰從今日去也不要你學佛學法也不要你窮古窮今但只飢來喫飯困來打眠才眠覺來却抖擻精神我者一覺主人公畢竟在甚麼處安身立命師遂奮志入臨安龍鬚自誓曰拌一生做箇癡呆漢決要者一著子明白越五載因同宿道友推枕墮地作聲廓然大徹自謂如往泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處雪嶠信頌云南北無門路不通分毫有主賊來攻直饒主客都星散大似楊花逐曉風朝宗忍頌云月落霜天夜正寒錦鱗透網潑天瀾枕頭落地何時悟遮覺從前被悟瞞住龍鬚九年縛柴為龕風穿日炙冬夏一衲不扇不爐日搗松和糜延息而已德祐丙子春大兵至雙髻師掩關危坐自若事定戶履紛至師腰包宵遁直入西天目之師子巖巖拔地千仞崖石林立師即洞營小室丈許榜曰死關悉屏給侍服用破甕為鐺併日一食洞梯山以升雖弟子亦罕得見共築師子院請師開堂適雪巖欽於大仰寄師竹篦拂子遂拈香上堂僧問十方同聚會箇箇學無為此是選佛場心空及第歸龐居士恁麼道還有為人處也無師曰有曰畢竟在那一句師曰從頭問將來曰如何是十方同聚會師曰龍蛇混雜凡聖交參曰如何是箇箇學無為師曰口吞佛祖眼蓋乾坤曰如何是選佛場師曰東西十萬南北八千曰如何是心空及第歸曰動容揚古路不墮悄然機曰恁麼則言言見諦句句朝宗師曰你甚處見得僧喝師曰也是掉棒打月曰此事且止只如西峰今日十方聚會選佛場開畢竟有何祥瑞師曰山河大地萬象森然情與無情悉皆成佛曰既皆成佛因甚學人不成佛師曰你若成佛爭教大地成佛曰畢竟學人過在甚麼處師曰湘之南潭之北曰還許學人懺悔也無師曰禮拜著僧禮拜師曰師子咬人韓獹逐塊上堂無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧每日在張公洞裏橫眠豎眠或歌或咏諸人還知麼諸人每日在選佛場中東行西行或瞋或喜山僧還知麼若也彼此知得不免分身碓搗舌犂耕若也彼此不知管取釋迦拱手彌勒歸依因甚如此不見道知之一字衆禍之門上堂盡十方世界是箇盂汝等諸人喫粥喫飯也在裏許屙屎放尿也在裏許行住坐臥乃至一動一靜總在裏許若也識得達磨大師只與你做得箇洗腳奴子若也不識二時粥飯將甚麼喫參示衆海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷀牽此四句內有一句能縱能奪能殺能活若人檢辨得出一生參學事畢古南門云山僧亦有四句五更撞鐘腳落地三更接板狗子吠二時粥飯濕匙筯半夜放參霜點被此四句中有一句全用有一句全體有一句全體即用有一句全用即體有一句體用雙忘騰騰任運任運騰騰若人檢點得出便請歸家穩坐示衆百千諸佛歷代祖師乃至天下老和尚以拂子擊禪牀一下總向這裏墮坑落塹還有跳得出底麼又擊一下三生六十劫師嘗示室中垂問六則一曰大徹底人本脫生死因甚命根不斷二曰佛祖公案只是一箇道理因甚有明與不明三曰大修行人當遵佛行因甚不守毗尼四曰杲日當空無所不照因甚被片雲遮却五曰人人有箇影子寸步不離因甚踏不著六曰盡大地是火坑得何三昧不被燒却倘下語不契閉門弗接自非具透關眼者鮮不望崖而退鶴沙瞿提舉到山瞻禮施巨莊贍衆師固辭不受瞿請於官乃於蓮華峰別營禪剎曰大覺議以歲入給常住請嗣法祖雍領寺事師患胃疾已久適雍來省師囑以後事元貞乙未十二月朔黎明升座辭衆曰西峰三十年妄談般若罪犯彌天末後有一句子不敢纍及諸人自領去也衆中還有知落處者麼良久曰毫𨤲有差天地懸隔辰巳間復説偈曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而寂仰山欽嗣徑山虗谷希陵禪師字西白義烏何氏子家貧而苦學志求仕進一夕夢入淨慈羅漢堂至東南隅忽尊者指楣梁間詩示師曰一室寥寥絶頂開數峰如畫碧於苔等間翻罷貝多葉百衲袈裟自翦裁由是有出俗志年十九落髮後參徑山雲峰高禪師機語契合高甚敬之命掌藏鑰尋命分座説法出世歷遷至仰山元世祖召見説法稱旨賜號佛鑑成宗加號大圓詔住徑山仁宗又加號慧照轉藏經上堂僧問過去心不可得現在心不可得未來心不可得是如何師曰親不相贈僧禮拜師曰過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法只如過去心不可得現在心不可得未來心不可得三世既不可得作麼生依若向這裏知歸出息不涉衆緣入息不居陰界常轉如是經百千萬億卷祇如今日檀越請徑山一千七百大衆所轉者還在百千萬億卷中也無若在其中即取法相若不在其中即取非法相故經云若取法相即著我人衆生壽者若取非法相即著我人衆生壽者正當甚麼時還有定奪得出者麼若定奪不出明日來向汝説至正壬戌四月十二日手書付囑説偈而逝諡大辨塔曰寶華有瀑巖集及語録行世仰山欽嗣衡州靈雲鐵牛持定禪師太和磻溪王氏子故宋尚書贄九世孫也自幼清苦剛介有塵外志年三十謁西峰肯菴翦髮得聞別傳之旨尋依雪巖欽居槽廠服杜多行一日欽示衆曰兄弟家做工夫若也七晝夜一念無間無箇入處斫取老僧頭做舀屎杓師默領勵精奮發因患痢藥石漿飲皆禁絶單持正念目不交睫者七日至夜半忽覺山河大地遍界如雪堂堂一身乾坤包不得有頃聞擊木聲豁然開悟遍體汗流其疾亦愈旦詣方丈舉似欽反覆詰之遂命為僧一日欽上堂舉亡僧死了燒了向甚麼處去自代曰山河及大地全露法王身師於言下疑情蕩盡即出衆作禮曰適來和尚舉揚般若驚得法堂前石獅子笑舞不已欽曰試道看師曰劫外春回萬物枯山河大地一塵無法身超出如何舉笑倒西天碧眼胡欽敲卓子曰山河大地一塵無者箇是什麼師作掀倒勢欽笑曰一彩兩賽欽巡堂次師以楮被裹身而臥欽召至方丈厲聲曰我巡堂汝打睡若道得即放過道不得即趁下山師隨口答曰鐵牛無力懶耕田帶索和犂就雪眠大地白銀都蓋覆德山無處下金鞭欽曰好箇鐵牛也因以為號一時行輩靡不推服大德壬寅將寂侍僧求別語師曰吾別久矣恬然坐逝龕全身於陶具越三年顏貌如生爪髮俱長後塔於寺北沙潭仰山欽嗣其徒別流涇走浙江謁虞文靖公集求師塔銘虞問先有鐵耶先有牛耶涇曰先師親見仰山來虞點首笑曰吾試為汝模畫之天如和尚頌曰鐵牛誰後復誰先口永開時欠一拳好本弄成模畫去牽犁拽耙錯流傳袁州慈化鐵山瓊禪師十八出家首參雪巖欽和尚一日室中舉那吒太子析骨還父析肉還母因緣有省述偈曰一莖草上現瓊樓識破古今間話頭拈起集雲峰頂月人前拋作百華毬欽深然之謁東巖東問心不是佛智不是道上座作麼生會師曰抱贓叫屈東曰不是心不是佛不是物是甚麼師曰眉間迸出遼天鶻上堂冬在月頭賣被買牛冬在月尾賣牛買被卓拄杖者裏無尾無頭中道齊休行也休休坐也休休住也休休臥也休休睡眼豁開五雲現瑞光風霽月無處不周梅綻枯枝古渡頭風前時復暗香浮雖然到此向上一路萬里崖州何以見得靠拄杖休休後示寂塔於觀音閣後仰山欽嗣建昌能仁天隱牧潛圓至禪師高安人姚姓父兄皆名進士師志慕空宗十九芟染元貞間出住能仁與高峰妙同秉仰山記莂所著有牧潛集其送妙智上人入浙序略曰昔龍安悅公既首衆於洞山猶以己道為未至更匿其名潛出求之於食飲笑談之間聞素公一言之異則虗己自降踽踽為咨詢禮不以貶名為嫌卒能於立談之頃獲其終身之所欲豈獨雲庵之道恃以不墜使素公不賴悅以見於世世亦不識其為何如人矣蓋名者道之表也古之人有其表則求其實以應之而今之士反以表害實一居其名則崇高之勢傲然不可復屈雖內揆其不慊亦安肯降心以求其所未至耶噫此古今所以異道之所以衰歟大德三年戊戌示寂於廬山仰山欽嗣已上五人竹屋簡禪師舉孚上座聖箭因緣頌曰青絲雙勒玉驄嘶淡白春衫緑帶圍夜半歸來華底月金鞭敲落亂紅飛又曰九重城裏本非遙射折重重箭倍饒忽遇三軍圍繞處分明有路直通霄舉臨濟訪平田公案頌曰目前條路平如砥何不堂堂掉臂行撩撥老婆牛性發赤身挨棒可憐生斷橋倫嗣絶象鑒禪師示衆舉洞山不安令沙彌到雲居處傳語乃囑曰他若問和尚安樂否汝但道雲巖路相次絶也汝下此語須遠避立恐他打汝沙彌領旨去傳語聲未絶早被雲居打一棒頌曰洞山有路透雲巖絶處教通到者難拄杖頭邊開活眼方知不隔一毫端示衆舉投子和尚問僧連日好雨且道雨從何處來僧無對後閲華嚴經有省頌曰陌路遊人競採芳不知眼底度春光夜來一陳落花雨一百十城流水香斷橋倫嗣台州瑞巖方山寶禪師一日為衆挂牌入室垂語曰南泉斬却貓兒時如何衆下語皆不喫適有一僕在旁曰老鼠做大師笑曰好一轉語只是不合從你口裏出針工丁生者久依座下冀明本分一日剔琉璃燈有省述偈呈師曰提起提起放下放下者點光明照天照地師喜其行業淳素乃印許之示無見偈曰道人得得出山來盡把胸襟對我開坦坦平平如鏡面澄澄湛湛絶纖埃忽然得箇轉身句衲捲寒雲便歸去萬八千丈華頂峰一笑裂開鐵面具家山到後絶思惟拗折枯藤拄竹扉糞土埋中消息好芋香便是道香時斷橋倫嗣永宗本禪師上堂舉夾山參船子和尚公案頌曰笑中棄却竹林寺將謂華亭有許多窮性命於橈下喪看來成敗自蕭何斷橋倫嗣已上四人金陵蔣山月庭忠禪師舉僧問白雲舊歲已去新歲到來如何是不遷義雲曰眉毛在眼上頌曰罷釣歸來不繫船江村月落正堪眠縱饒一夜風吹去只在蘆花淺水邊落葉已隨流水去春風未放百花開青山面目依然在盡日橫陳對落暉無學元嗣蘇州崑山薦嚴竺元妙道禪師寧海陳氏子幼患右目母攜禱於觀音像師仰見像之右目有小蛛窠乃為揭去目患遂愈父母以為於佛有緣俾投杭之六和正嚴得度嚴令學百法論師曰一法不學學百法乎謁育王珙和尚聞舉乾屎橛話豁然大悟即説偈曰雲門乾屎橛光明照十方鄮峰才發足五日到錢塘珙驚異顧謂衆曰此子再來人也至元乙丑出主邑之慈源遷崑山薦嚴一晚與衆會茶舉東坡居士訪蔣山泉禪師山問大儒高姓士曰姓稱山曰是甚麼稱士曰稱天下長老舌頭底稱泉便喝一喝曰且道者一喝重多少士無語師命衆代語時別源遽起翦燭師笑曰源藏主翦燭一侍者咳嗽一僧請師自代師曰洎不過此仁宗詔住黃巖鴻福賜號定慧圓明淨慈靈隱兩剎爭欲致之俱不就年逾七十懷紫籜之幽絶乃往終焉育王珙嗣金陵保寧古林清茂禪師年十三為大僧聆老宿舉高庵和尚勵僧語不覺涕淚交下乃知有出生死超聖凡一著子淬志參訪遍歷門庭橫川居育王師往叩得法住金陵保寧上堂僧問毛吞巨海芥納須彌是衲僧分上事不是衲僧分上事師曰拈却門前大案山曰鯨吞海水盡露出珊瑚枝師曰金剛腦後鐵蒺藜曰只如教中道我得無諍三昧人中最為第一如何是無諍三昧師曰放你三十棒僧曰仁義盡從貧處斷世情偏向有錢家師曰知恩者少負恩者多上堂若説佛法供養大衆未免鬚眉墮落若説世法供養大衆入地獄如箭射去此二途畢竟説箇什麼三寸頭舌無用處一雙空手不成拳上堂舉洞山冬夜喫果子次問泰首座曰有一物上拄天下拄地黑似漆常在動用中動用中收不得過在什麼處泰曰過在動用中山遂喚侍者掇退果桌師曰者箇説話在今諸方每至冬夜未嘗不拈出注解一上然於正文未曾道著一句有底道洞山只見錐頭利不見鑿頭方抑屈人作麼有底道泰首座不得果子喫要且在大地人皆不得喫成人者少敗人者多殊不知洞山有偏正回互不犯底手腳直饒泰首座道不在動用中也不得他果子喫在良久水流黃葉來何處牛帶寒鴉過別村除夕小參今夜年盡月盡日盡世事悠悠何時是盡明朝年新月新日新千變萬化又見重新所以道窮則變變則通垂鉤四海只釣獰龍三千威儀八萬細行諸人固是不知若得聲和響順各守祖父田園知道飯是米做免向瞎驢邊滅却吾宗卓拄杖從前汗馬無人識只要重論蓋代功師著有續宗門統要行世後示寂於保寧育王珙嗣越州天衣斷江覺恩禪師族慈溪顧氏幼依雲門廣孝祝髮從延慶聞法師習四教儀七日貫通聞驚訝歎異往參育王室中機契一日室中衆侍立次忽扶杖而言曰老僧嵌空倚杖藜分明畫出須菩提顧左右曰會麼良久擲下拄杖倚蒲團而逝育王珙嗣已上四人杭州靈隱東嶼德海禪師台州臨海陳氏子年十四出家參石林鞏於承天鞏問如何是汝自己師擬議鞏便推出師即懷疑一日入室次鞏問盡大地是金剛正體何處著上座師擬對鞏便打從此徹證鞏遷淨慈命居侍司一日室中舉國師三喚侍者話師曰不是失却貓兒定是失却狗子鞏曰是孤負是不孤負師曰瞞人自瞞鞏以竹篦擊之曰亢吾宗者海子也至元二十七年出世天台寒巖遷姑蘇寒山崑山東禪勑賜金襴法衣延祐二年詔主淨慈至山門曰清淨慈門一湖秋水入得入不得虎咬大蟲蛇吞鱉鼻喝云咄室中垂語曰手握利刃劍因甚胡猻子不死囓破鐵酸餡因甚路上有飢人波斯去帽蔗咬甜頭魚以水為命因甚死在水中衆答皆不契泰定二年復遷靈隱四年丁卯九月示微疾召弟子付囑訖跏趺而化賜號明宗慧忍禪師有六會語録塔於育王後山之麓淨慈鞏嗣嘉興天寧竺雲景曇禪師浦江嚴氏子久依石林後住婺之治平蘇之北禪禾之天寧上堂金烏東上玉兔西沈伶俐衲子東討西尋忽然撞破虗空曠劫只在如今卓拄杖下座淨慈鞏嗣蘇州虎丘東山壽永禪師送僧偈曰動靜何曾涉蓋纏何須更透未生前故園千里今歸去陸有征途水有船約齋居士張鎡入道話頌曰一棒鐘聲到耳根三千剎海一時昏賊從赤肉團邊去明日依然不離門淨慈鞏嗣已上三人枕州徑山虎巖淨伏禪師淮安人至元間嘗召見有偈進上其略曰過去諸如來安住祕密藏現在十方佛成道轉法輪未來諸世尊一切衆生是由妄相執著結煩惱蓋纏迷成六道身枉受三途苦惟念過現佛不敬未來尊與佛結冤仇或烹宰殺害不了衆生相全是法性身昔有常不輕禮拜於一切言我不輕汝汝等當作佛若能念自他同是未來佛現世增福壽生生生佛國上覽畢大悅問從上帝皇有戒殺者否師曰昔宋仁宗一日語羣臣曰朕夜來飢甚思欲燒羊因慮後來遂為常例寧耐一時之飢不忍啓無窮之殺羣臣皆呼萬歲上嘉納即受帝師戒徑山度嗣寧波天童竺西坦禪師僧參師問從何方來曰金鵝師曰金鵝山高多少僧曰不見頂師呵斥之一日升座舉世尊拈華公案其僧言下有省徑山度嗣已上二人越州定水寶葉源禪師上堂舉張拙秀才參石霜霜問高姓曰弟子張拙霜曰者裏覓巧了不可得拙自何來拙言下大悟頌曰進前峭壁三千丈退後懸崖十萬重珍重大唐張拙老鐵鎚無縫舞春風徑山愚嗣蘇州虎丘間極雲禪師久依虗堂於徑山居第一座一日寶葉源問虗堂愚德山末後句若謂之有德山焉得不會若謂之無巖頭又道德山未會乞和尚慈悲指示愚曰我不會汝去問首座源詣師值師遊山歸索水濯足源亟進水復委身為師摩捋因仰面舉前話叩之師乃掇水澆潑曰有甚麼末後句源不契復上見愚愚曰首座如何向汝道源舉似前話愚曰那那我向你道他會得源乃釋然領旨舉興化和尚與唐莊宗酬價因緣頌曰君王寶自難酬價興化何曾敢借看天地既無私蓋載至今留得鎮中原徑山愚嗣已上二人南叟茂禪師嘗舉巖頭和尚於鄂渚湖邊作渡子兩岸各挂一板有人過渡打板一下巖問誰或曰要過那邊巖便舞棹迎之一日有婆子抱一孩兒乃曰呈橈舞棹即不問且道婆手中兒甚處得來巖便打婆曰婆生七子六箇不遇知音只者一箇也不消得便拋向水中頌曰鄂渚渡邊窮鬼子全機錯在扣舷時何如別下一轉語救取婆婆第七兒舉夾山參船子和尚話頌曰無相無瑕便倒戈只因輕信智頭陀若還不到華亭上鐵鑄船橈奈汝何舉龐居士賣摝籬下橋喫撲靈照見亦去爺邊倒士曰作甚麼女曰見爺倒地某甲相扶士曰賴是無人見頌曰孝順藏忤逆人前醜莫遮今生親骨肉宿世惡冤家徑山月嗣寧波育王東生德明禪師甬東劉氏子十六祝髮受具參頑極彌彌舉文殊是七佛之師因甚出女子定不得罔明因甚出得師曰春色無高下華枝自短長彌器之命掌藏鑰出世育王錫號佛日普光頌船子公案曰清世悠悠據要津一橈活計重千鈞朱涇路上行人少滄海難同方寸深後示寂瘞洞雲塔育王彌嗣杭州靈隱空叟欣悟禪師蘇之吳縣鈕氏子九歲入郡城龍興寺祝髮後參愚菴及和尚及詰曰如何是永明旨師曰某甲新到只見一湖水及可之遂容入室臨終書偈曰我年五十五踏斷死生關夜半日卓午茶毗舌根數珠不壞建塔靈隱東岡徑山及嗣長洲廣孝斯道道衍禪師蘇之相城人族姓姚乳名天禧年十四出家於里之妙智庵參徑山愚庵及和尚咨叩禪要盡得心髓掌內記三年出世普慶遷天龍嘗自題肖像曰看破芭蕉拄杖子等間徹骨露風流有時搖動龜毛拂直得虗空笑點頭洪武中宗泐禪師薦於朝侍文皇於燕邸永樂中以佐命功上官之不可一日召見上潛令人以冠服被體進爵太子少師亟命宣謝不得已拜命終不肯蓄髮嘗賜二宮人不能辭逾月猶處子也乃召還之不復強蓄一大雞每雞一號即起朗然誦經後師復以使事出還於道得疾抵城門不入命其下為幄曰上將來視已而駕果至撫勞備至賜金唾盂且問有何言師以手加額曰出家人復何所道遂示寂封榮國公諡恭靖後配享太宗廟庭遷供大興隆寺世壽八十五所著有道餘録行世徑山及嗣已上二人杭州徑山南石文琇禪師崑山李氏子出家於紹隆庵行中仁住雲頂師往從之針芥相契初住蘇州普門次遷靈巖後住徑山上堂十方無異路為甚麼南尋天台北尋五臺目前無異草為甚麼桃花紅李花白良久打破祖師關都是自家底靈巖上堂盡大地是自己森羅萬象從何而有會不得底三十拄杖會得底亦與三十拄杖諸方盡是粥罷上堂靈巖寺裏參退喫茶上堂今朝七月初一門前金風淅淅特地打鼓升堂一字也道不出露柱禮拜釋迦燈籠問訊智積獨有無事衲僧依然眼橫鼻直敢問大衆那箇是無事衲僧良久曰長三尺上堂馬大師道自從胡亂後三十年不少鹽醬此地無金二兩俗人沽酒三升居士問如何是衲僧門下事師曰你俗人如何曉得衲僧門下事又問如何是宗門下事師曰今日忙無暇與汝説宗門下事士擬議師喝出師才見僧入門便曰你者踏州縣漢腳跟下好與三十棒僧曰某甲話也未問便蒙賜棒師曰待你開口堪作甚麼僧擬議師便喝出僧參展坐具師曰我者裏無殘羹餿飯不用使破炊巾僧曰和尚慈悲師曰笑倒門前青石幢師七十餘示寂門人建窣堵波於寂照塔左著有增集續傳燈四卷行世萬壽仁嗣嘉興天寧西白力金禪師蘇之姚氏子參古鼎銘和尚舉德山見龍潭因緣示師久而有契出世瑞光帝師授圓通普濟號師幼孤母老無依築室城東奉養焉一日忽謂侍僧曰我有宿因未了當償之遂示疾而逝塔於嘉興城西徑山銘嗣杭州徑山象源仁淑禪師台州人一日趨入門大叫曰殺來了殺來了作麼生回避遂坐脫徑山銘嗣已上二人金陵天界覺源慧曇禪師天台人族楊氏年十六為僧受具聞笑隱欣和尚主中竺師往參叩備陳求道之切欣斥曰從門入者即非家珍道在自己奚向人求耶師退而有省一日聞舉百丈野狐話豁然大悟曰佛法落吾手矣只為分明極翻令所得遲欣曰汝見何道理師展兩手曰不值半文錢欣頷之一日師入門欣問何處來師曰遊山來欣曰笠子下拶破洛浦遍參底作麼生師曰未入門時呈似和尚了也欣曰即今因甚不拈出師擬議欣便喝師從此脫然又一日欣展兩手示師曰八字打開了也因甚不肯承當師曰休來鈍置欣曰近前來為汝説師掩耳而出住牛首祖堂上堂一句子墨漆黑無把柄有準則良久曰會麼碓搗東南磨推西北上堂經有經師論有論師龍河今日放一線道分科列段去也拈拄杖卓一下且道是何章句上堂者箇現成公案衆中領解者極多錯會者亦不少所以金鍮不辨玉石不分龍河者裏直下分辨去也張上座李上座一箇手臂長一箇眼睛大總似今日達磨一宗教甚麼人擔荷良久噓一聲下座洪武初師謁上於轅門上一見歎曰真福德僧也命主蔣山踰年改龍翔為大天界寺詔師主之設廣薦法會命師升座説法車駕幸臨恩數優洽御書天下第一禪林洪武元年賜紫衣及金襴方袍御制誥命授演梵善世利國崇教大禪師號住持大天界寺統諸山釋教事三年夏廷議西域未臣伏上以彼國敦尚佛乘特詔師往師承命即日登途自閩之洋凡歷國邑莫不聞風來歸四年秋七月至合剌國布宣天子威德館於佛山寺其王待以師禮寅夜參承合國士民悉皆瞻仰九月師示微疾王臣咸來相慰須臾沐浴更衣謂左右曰某幻緣已盡不能復命矣跏趺而逝踰五日顏色如生王大敬歎斫香為龕築壇而茶毗之王與百僚親送壇下薪火滅盡舍利無算舌根齒牙不壞收舍利靈骨及不壞者祔葬其國之世尊舍利塔中七年九月同行還奏上嗟悼之勑天界蔣山二寺住持宗泐等奉師衣鉢建塔於雨花臺之左有五會法語行世龍翔欣嗣金陵天界善世全室宗泐禪師台之臨海周氏子十四剃髮二十具戒依中竺欣一日欣問國師三喚侍者侍者三應汝意如何師曰何得剜肉作瘡欣曰將謂汝奇特元來無所得師喝一喝欣擬拈棒師拂袖便出上堂金剛王劍橫揮千妖屏迹爍迦羅眼洞照萬物潛形到者裏卷舒在我殺活臨時直得千歲巖中天𨁝跳錢塘水東海逆流諸人還知有也無舉拂子庭前石筍抽條也會見高枝宿鳳凰詔徵江南有道十人詣京就太平興國寺建廣薦法會列師居首上齋戒御製章疏車駕親臨用皮辨服搢玉圭北面禮佛羣臣各衣法服以從先是上命師撰獻佛樂曲進呈御署曲凡八章曰善世昭信延慈法喜禪悅遍應妙濟善成勑太常歌舞以節奏之復命師升座説法窮理盡性徹果法因顯密淺深無機不被上大悅命師主天界嘗欲命師蓄鬚髮以官之師再懇得免師以胡黨坐罪遣鳳陽槎峰建寺三年召還上賜詩有泐翁去此問誰禪朝夕常思在目前之句高皇后薨臨葬忽風雨雷電暴作帝不樂召師問曰今太后將就壙為朕宣偈送之師應聲曰雨落天垂淚雷鳴地舉哀西天諸佛子同送馬如來上意稍解賜白金百兩後以老求退賜歸槎峰渡江示寂於江浦石佛寺謂左右曰人之生滅如水一漚漚生漚滅復歸於水何處非寂滅之地耶言訖復顧侍者曰者箇聻者茫然師曰苦遂寂闍維舍利無算塔於笑隱欣窣堵波之右龍翔欣嗣杭州中竺用彰懶翁廷俊禪師據室拈拄杖室中若無棒頭取證底我拄杖子誓不喚作拄杖子有麼勑點飛龍馬跛鱉出頭來佛涅槃日上堂古德道涅槃後有大人相釋迦老子涅槃了也大人相在什麼處以拂子打圓相曰還見麼容顏甚奇妙光明照十方我適曾供養今復還親覲上堂近來衆中兄弟聰敏者多徹到者亦不少莫不自謂得之於心應之於手臨機見境踢將出來活潑潑地不費纖毫氣力到龍峰門下正好從頭按過拈拄杖卓一下譬如油蠟作燈燭不以火點終不明洪武建元寓鍾山端坐而逝茶毗舍利無數塔於杭之南屏龍翔欣嗣杭州靈隱介庵用真輔良禪師蘇之吳縣人范文正公十葉孫也示衆達磨一宗陵夷殆盡汝等努力如救頭然百千法門無量妙義於一毫端可以周知如知之變大地為黃金受之當無所讓否則素餐之愧咎將誰歸歲月流電向上事請各急著眼洪武四年正月十五日親理後事謂左右曰翌日巳時吾逝矣及期澡浴端坐書偈而寂闍維齒牙舌根不壞設剎無算瘞歸雲塔中龍翔欣嗣廬山圓通約之崇裕禪師毗陵陳氏子參笑隱舉無位真人話詰之師不覺釋然下拜欣曰汝何所見而作禮師曰更無第二人欣曰從門入者不是家珍師曰和尚慎毋壓良為賤後住南禪次遷圓通育王洪武五年秋召高僧建大會於鍾山師應詔至便殿上問佛法大意師以偈酬之上大悅賜食上前師或假寐鼻息作聲鄰坐引踞覺之上笑曰此老人無機心真善知識也後示寂塔於石耳峰龍翔欣嗣已上五人杭州淨慈孤峰明德禪師族朱氏年十七得度為大僧杖錫遊方首謁竺西坦聆上堂語有省復造淨慈見晦機機問什麼物恁麼來師曰胡張三黑李四機拈棒師拂袖竟出復抵雙林見明極俊會日本遣使迎俊師送至海濵適晤竺田霖和尚於明州霖挽師歸雪竇處以第一座一日霖上堂舉隱山泥牛入海公案音聲如雷師不覺羣疑頓釋述偈呈方丈霖曰人天眼目儼然猶在後師示微疾戒飭其徒曰汝等一真圓性與如來等世相起滅無異石火電光晝夜勤行毋生退轉吾沒後當遵佛制依法茶毗勿令衣麻而哭也言畢書偈泊然而逝雪竇霖嗣福州天寶鐵關法樞禪師溫之平陽林氏子聞元翁主秀之石門造而咨叩翁示以南泉三不是話經三年一日大悟述頌曰不是心佛物拶出虗空骨金毛獅子兒豈戀野狐窟喝一喝咄咄咄即詣方丈翁問作甚麼師曰南泉被我捉敗了也翁曰不是心不是佛不是物是箇什麼師曰牙齒一具骨耳朵兩片皮翁曰不是不是別道將來師曰鶯啼燕語鵲噪鴉鳴翁曰錯師亦曰錯翁曰南泉即今在什麼處師便喝翁曰離却者一喝南泉畢竟在什麼處師拂袖便出見虗谷陵於大仰不契謁海印如于饒之薦福才上方丈印問誰師曰暫到相看印曰什麼處來師曰江西印曰江西近日有甚麼事師曰集雲峰下藤條被人拗折子也印曰莫亂統師曰不因亂統爭得到者裏印曰且道者裏事作麼生師叉手進前曰即日恭惟堂頭和尚尊候起居萬福印曰不沙泥水一句作麼生師喝一喝曰風從虎雲從龍印曰一喝不作一喝用是如何師曰兩箇泥牛鬬入海直至如今無消息印曰錯師亦曰錯印喚侍者點茶來師曰不受供養印曰不受者供養受那箇供養師曰謝和尚供養印曰曾見甚麼人來師曰不曾見人印曰既不曾見人那裏得者箇消息來師曰若見人即無者箇消息於是服勤為淨頭印嘗謂衆曰永嘉樞侍者是煅了底金復遊東林參澤山咸值開室為衆舉竹篦因緣聲未絶師奪却竹篦過左邊立曰喚作甚麼即得咸曰掠虗漢師以竹篦打一下拗折而出次日咸復開室舉泗洲大聖因甚在揚州出現曰南山起雲北山下雨師又捉住竹篦曰南山起雲北山下雨意旨如何咸喝一喝師曰者是鬼窟裏活計畢竟意旨如何咸曰掠虗漢師以竹篦一送曰見説洛陽花似錦拂袖而出後復歸石門信才見便曰南泉向什麼處去也師曰説甚南泉釋迦老子來也翁曰不是心不是佛不是物是什麼師曰劍去久矣信曰趙州無聻師曰龍生金鳳子衝破碧琉璃信曰古人與麼道道道師喝一喝信曰錯師又喝信曰錯錯師遂禮拜信曰放汝三十棒乃囑曰善自護持師又潛衆十五年至延祐戊午出世閩之天寶帝師錫寺額加號妙覺真空大師至元六年八月示微疾作手書邀諸所與遊者入山期而畢至求法施者隨其所欲了無倦色正午沐浴端坐書偈曰本無來去一句全提紅霞穿碧落白日繞須彌擲筆而逝天池信嗣孤舟濟禪師月庭忠公居蔣山師為第一座時竺源參月庭至首座寮師問源曰蒙山嘗言栽松道者不具二緣而生達磨葬熊耳後隻履西歸為復是神通妙用是法爾如然源曰形神俱妙師叱之曰不然子他日當自知之源後參無能舉師語能曰為汝不解故也源釋然大悟蒙山異嗣宜興龍池一源永寧禪師別號虗幻子族姓朱淮東通州人至淮西太湖謁無用寬寬門庭嚴峻師方入門厲聲叱之師作禮於門外久之乃許入見問曰何處人師曰通州曰淮海近日盈虗若何師曰沃日滔天不存涓滴用便喝出師退徹夜不寐一日聞寬舉雲門須彌山話聲未絶而有省急趨前寬便打曰趙州無字作麼生師遽曰趙州狗子無佛性萬象森羅齊乞命無底籃兒盛死蛇多添少減無虗剩寬嗒然由是執侍左右者三年寬始以斷崖義所贊己像親署書授師曰汝緣在南逢龍即住遇池便居師遂受命南還至治癸亥宜興龍池疏請師以名符懸記欣然赴之先是山巔有池其深叵測龍出每大水居民苦之師授龍三皈戒遂不復出居久復至絶巘築室壁立如削斫木為棧棲板空中足不越限者三年帝師稔師道行降號弘教普濟禪師尋召入京宣命龍光殿升座説法上大悅賜金襴法衣加號佛心了悟庚子出領善權洪武己酉夏六月示微疾囑弟子裁紙製內外衣且曰吾將逝矣命移龕至絶巘索筆書偈曰七十八年守拙明明一場敗闕泥牛海底翻身六月炎天飛雪書畢吉祥而逝先一月池水忽竭及師順寂噴涌異常時黑白戀慕至有然頂灼臂以供養者茶毗現五色光齒牙舌輪皆不壞設利無算門人分餘骨與不壞者就龍池太平齊山紫雲麻蕻五所建塔藏焉太湖寬嗣杭州妙果竺源水盛禪師饒之樂平人范姓謁無能盡脫玄妙知解歷觀從前所悟宛如一夢能撫師背曰子後當大弘吾宗也辭能東遊隱居南巢天歷己巳出世西湖之妙果嘗示衆曰凡學道人當洞明諸佛心宗行解相應歲久月深具大無畏如透水月華萬浪千波觸之不散方始不被生死陰魔所惑故槌拂之下懸崖壁立務期實證實悟而後已未幾復還南巢至正丁亥戒飭徒衆且曰世尊有言我今背痛將入涅槃吾其時矣師揮叱曰何以偈為端坐而逝無能教嗣曹洞宗磁州大明雪巖滿禪師初參普照寶照曰兄弟年俊正宜叩參老僧當年念念常以佛法為事師避席進曰和尚而今如何照曰如生冤家相似師曰若不得此語幾乎枉行千里照下禪牀握師手曰作家那伴我侶頌云作家相見事紛拏佛法何如眼裏沙藥病頓忘無一物踏翻雲月復何家位中符頌云拶得磁州立地尿銛銛牙爪羡年少倒握王山夢裏符尉斗煎茶別有銚師與勝默同參嘗跪受呵斥或問其故師曰今諸方師資法屬諍訟招譏師蟲自食身中肉也某雖不肖敢復蹈覆轍耶後造王山體舉洞山覩影因緣師大疑體曰不疑言句是為大病子今既疑則病發也子知此病即子藥麼師一日讀五位頌至折合終歸炭裏坐忽然悟曰今日方知病是藥也去呈體體曰料掉沒交涉師曰老和尚這回瞞我不得也天界盛云草頭方子撞釆醫得一箇也拈拄杖云還有要識者草頭方子者麼卓一卓云料掉沒交涉上堂舉洞山解夏云夏末秋初兄弟或東去西去直須向萬里無寸草處良久曰祇如萬里無寸草處又作麼生去石霜曰出門便是草太陽曰直饒不出門亦是草漫漫地師曰三箇老漢雖然異口同音未免撞頭磕腦何也一人大開口了合不得一人高擡腳了放不下一人緊閉門了出不去王山即不然遍十方界非外全在一微塵在一微塵非內遍十方界祇者一微塵許也須極盡不可得向那裏安門甚處入草還會麼休侵洞口初秋草請看疏山臘月蓮僧問高郵定和尚透網金鱗以何為食定曰乾屎橛師聞之曰謝供養法音溗拈云是什麼人草草坐地五位頌曰正中偏邃洞沈沈鎖翠煙午夜碧空清似鏡一輪明月上層巔偏中正欲曉雲濃封野景雪屋靈明夢未醒冥然又若寒宵永正中來木人攜錫下崔嵬縱橫不履今時地石徑祥蓮襯足開兼中至懶提妙印無真偽碧莎叢裏恣情眠一任岩前花雨墜兼中到突兀三光曾未照夢手敲空聽者稀迥然不墮宮商調王山體嗣勝默光禪師上堂僧問如何是祖意教意師曰針頭削鐵佛面剝金曰此與雞寒上樹鴨寒下水是同是別師曰傳言送語過猶輕曰恁麼謝師賞罰分明也師曰亂統漢乃曰我宗無語句亦無實法與人德山老齒不關風作這敗闕欲識綱宗須先識句岩頭老腦後見腮莫與往來此是他父子提唱我石頭和尚明暗相對處且如何是回互不回互的意今日尋思去靈龜夜裏來嘗舉九峰不肯公案頌曰元座徒亡一炷煙九峰不是抑高賢若將一色為承紹辜負先師不借緣示衆舉麻谷振錫話曰是無可是非無可非是非無主萬善同歸梟雞晝夜徒自支離我無三寸鱉得喚龜迦葉不肯一任攢眉五位頌正中偏沈沈祕殿瑞雲攢夜央秋水羣囂息碧月寥寥朗照寒偏中正江堧曉霽煙籠景蘆花深處白頭翁紅日三竿眠未醒正中來玉龍初躍一聲雷十方齊和無私化石筍穿開古路苔兼中至邊方無令清平世耕夫釣叟恣謳歌溪月豅雲同意氣兼中到無功轉盡通身妙華冠拈却異中行消落太虗不得號王山體嗣已上二人磁州大明詮禪師久參仁山恆和尚而性好詼諧談笑山囑定侍者常拘撿之師曰人生一夢快樂一世是好夢拘撿一世是惡夢我寧作好夢次日侍者抽單去住後徒單二駙馬赴南京任道過磁州大明入堂見僧面壁而坐駙馬曰一箇好淡漢師曰淡中有味曰恁麼味師曰今日被公著鹽醬也仁山恆嗣鄭州大覺西溪弘相禪師欣州王氏子參慶壽亨十年乃佩其印記初住大覺晚住清涼一日雪後路峻石滑師年已老力不持足一跌翻墜巨壑中同行者失聲莫能救直下數十尺礙大樹而止衆驚問師神色不變徐曰學禪四十年腳跟乃為石頭所勘聞者皆驚笑有文集語録傳世慶壽亨嗣
