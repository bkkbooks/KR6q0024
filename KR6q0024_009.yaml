body:
  text: 六祖下二十五世臨濟宗蘇州鄧尉萬峰時蔚禪師溫州樂清金氏子襁褓中見僧輒微笑合掌年十三從演慶升法師受業便知向上宗乘至杭受具戒參虎跑止岩示不是心不是佛不是物話遂往明州達蓬山佛趾寺側卓庵晝夜力參一日聞寺主舉溈山踢倒淨瓶公案驀地觸發説偈曰顛顛倒倒老南泉纍我工夫却半年當下若還親薦得如何不進劈胸拳聞伏龍千巖長禪師直造丈室長曰將甚麼來與老僧相見師豎起拳曰者裏與和尚相見長曰死了燒了向何處安身立命師曰漚生漚滅水還在風息波平月印潭長曰莫要請益受戒麼師掩耳而出明日普請砍松次師拈圓石作獻珠狀曰請和尚酬價長曰不值半文錢師曰瞎長曰我也瞎你也瞎師曰瞎瞎即呈偈曰龍宮女子將珠獻價值三千與大千却被旁觀人決破誰知不值半文錢長謂左右曰蔚山主頗有衲僧氣息遂命居第一座一日長升座舉無風荷葉動決定有魚行師出衆震聲一喝拂袖便出遂卓庵於蘭溪之嵩山凡九載長嘗寄偈曰鬱鬱黃華滿目秋白雲端坐碧峰頭無賓主句輕拈出一喝千江水逆流三為手書招之愛重彌至旋付以法衣頂相上堂僧問如何是嵩山境師曰四面好山擎日月一湖秋水浸青天曰如何是境中人師曰三仙描不就終不與君傳問如何是目前事師曰眉毛眼上橫曰莫是他安身立命處也無師曰錯認定盤星石車乘拈曰此僧乘虛接響但見錐頭利不見鑿頭方開堂拈香畢乃曰千聖難明不了因遞代相傳古到今今日嵩山重舉似鐵樹華開別是春向無影樹下打眠宏開飯店於虗空背上經行大闡宗乘塵塵剎剎全彰物物頭頭合徹斷送衲子命根不作奇特商量不作玄妙解會直得淨名杜口共贊升平巖頭密啓咸宣至化正與麼時祝聖報恩一句作麼生道一片定光輝宇宙直教萬國奉君恩上堂舒兩手曰大開方便門便從者裏入復握拳曰閉却牢關説家裏話且道不開不閉一句又作麼生良久斂僧伽黎下座上堂三世諸佛如是説歷代祖師如是説天下老和尚如是説嵩山亦如是説若有不如是説者與他三十棒若有如是説者亦與他三十棒何故卓拄杖嵩山門下令不虗行上堂月頭是初一光明漸漸出月尾是三十光明何處覓假饒老釋迦也道拈不出拈道出萬事畢有人道得出來道看如無嵩山與諸人露箇消息我見燈明佛本光瑞如此解制上堂云一葉落天下秋一塵起大地收解開布袋口衲僧得自由腳頭腳底風雲起撒土揚沙輥入流逼塞虗空無影像啼鶯元在柳梢頭畢竟作麼生取用喝示衆舉古德云溪聲便是廣長舌山色無非淨法身堪笑古人猶在聲色裏作活計要見清淨法身太遠在既不在聲色裏畢竟在甚麼處會麼良久云須知更在青山外中夏示衆云達磨的的西來直指人心見性成佛且道性作麼生一喝於此直下死團百雜碎便見青青翠竹顯真如柳緑花紅明皎潔風生虎嘯石龍吟燕語鶯啼為汝決衲僧家活潑潑滿懷撒出夜明珠獻寶波斯難辨別放倒和衣打覺眠一任天崩與地裂其或未然參示衆大凡參禪做工夫者不得安然靜坐忘形死心澄空守寂昏沈散亂須是抖擻精神猛著精彩急下手腳剔起眉毛咬定牙關提起話頭立地要知分曉不得今日也恁麼明日也恁麼便就萬法歸一一歸何處上大起疑情疑箇一歸何處即將此一則公案盡平生氣力提在手中如一柄鐵掃帚相似佛來也掃魔來也掃邪來也掃正來也掃是也掃非也掃有也掃無也掃掃來掃去掃到無下手處無著力處正好著力無掃蕩處正好掃蕩忽然掃破虗空突出一箇苕帚柄來㘞元來却在這裏在這裏依前即是箇張上座一翻翻轉山河大地明暗色空盡是自家珍寶草木砂礫盡是自己法身到這裏説甚麼一歸何處只這一柄鐵掃帚亦乃和身放下坐斷常寂光超出無生界喚作無為無事人也若是打不徹透不過切莫匆匆草草道我會禪會道不用參疑我問你臘月三十日到來從前會得底道禪用得著麼所以參須實參悟須實悟不可弄虗頭認光影不求正悟須向遮裏將本參公案三百六十骨節八萬四千毫竅併作一箇疑團頓在眉毛眼睫上看定通身是箇萬法歸一一歸何處行也如是參坐也如是參靜也如是參動也如是參參來參去通身是箇話頭物我俱忘心識路絶澄澄湛湛寂靜無為驀然疑團子𪹼地一聲直得須彌粉碎大地平沈迸出一輪杲日照耀山川遮藏不得那時却來嵩山門下喫痛棒警䇿云大凡參學做工夫者先將平日所知所見人我利名盡情掃却然後將本參話頭頓在目前行住坐臥時也參著衣喫飯時也參屙屎送尿時也參靜閙間忙時也參喜怒哀樂時也參但於十二時中心心無間念念相續不忘這箇話頭須是大起疑情大疑即大悟不疑即不悟悟即悟自本心明即明自本性古人云佛見法見是二種鐵圍山若有所見盡成其障所以證道歌云心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙忘性即真此事不論根性利鈍只要信得及行得切時節到來忽然觸著磕著洞明大事祖師云我本求心不求佛法界元來無一物佛者覺也如何是覺㘞呵呵方知此語實無妄也且道笑箇什麼經云心生大歡喜自知當作佛然雖如是須經大善知識爐煹煅煉將來方可續佛慧命謹參謹參西來直指正單傳自念參疑意廓然今古上乘無別法盡皆心悟未生前後遊姑蘇鄧尉喜其山水盤結遂駐錫焉未幾四衆咸集成大伽藍名曰聖恩洪武十四年辛酉正月二十九日忽集衆曰老僧時節至矣即説偈曰七十九年一味杜田懸崖撒手杲日當天語畢泊然而寂門人奉全身瘞於山之西岡千巖長嗣杭州天龍水庵無用守貴禪師婺之甄氏子十八歲往投里之康侯山芟染後遊浙西適千巖長禪師居龍華師叩之默有所契復謁中峰本和尚羣疑頓釋旋退居嘉禾一日忽索筆書偈曰一蝸臭殼內外穢惡撒手便行虗空振鐸天龍一指令猶昨擲筆而逝築慈濟塔院於天龍西岡師生平不畜長物寒暑一衲律身甚嚴嘗墮一齒弟子輩藏之函櫝中生舍利五色千巖長嗣華亭松隱唯庵德然禪師里之張氏子祝髮受具遍叩諸方未有所契後於千巖會中聞上堂語豁然悟入嘗參石屋珙謂師曰子緣當在華亭因書松隱二字授之師遵懸記歸里築室於郭匯之陽遂名松隱足不踰閫者三載嘗刺血書華嚴有天華庭滿之異感居民為建寶坊洎千巖遷化衆請師繼席上堂僧問遠離松水來據龍峰海衆臨筵請師祝聖師曰萬年松在祝融峰曰祝聖已蒙師指示列祖家風事若何師曰冬到寒食一百五曰莫便是和尚為人處也無師曰斧頭是鐵作曰恁麼則龍門無宿客也師曰早已點額曰若不登樓望焉知滄海深師曰你道老僧眉毛有幾莖曰一堂風冷淡千古意分明師曰蹉過不少曰承師有言向上一路千聖不傳還端的也無師曰那裏得者消息來曰賣金須遇買金人師便喝曰金屑雖貴落眼成翳又作麼生師曰好向繡湖湖上看月明夜夜散金波曰三十年後此話大行師曰杜撰禪和如麻似粟僧曰大衆證明學人禮拜師乃曰山僧數年搓得一條龜毛索子今日拈來將三世諸佛西天四七東土二三天下老和尚鼻孔一串穿却了也且道山河大地草木叢林森羅萬象有情無情甚處得來良久莫將間學解埋沒祖師心復舉三聖道我逢人則不出出則便為人興化道我逢人則出出則不為人師曰者兩箇老漢同門出入宿世冤家一人向孤峰頂上臥月眠雲一人向十字街頭揚塵簸土點檢將來二俱漏逗各與三十拄杖且道新龍峰與麼提持是賞渠是罰渠驀拈拄杖卓一卓天上有星皆拱北人間無水不朝東上堂日可冷月可熱衆魔不能壞真説有來由無途轍六月炎炎撒冰雪文殊無處著渾身普賢特地呈醜拙是真説非真説若無間事挂心頭便是人間好時節喝一喝卓拄杖謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裏摩尼照徹十方洞裏桃花千葩競吐假劫外之春風應今時之律呂海神夜半看鮫珠眼光挂在扶桑國喝一喝結制上堂暖氣相接正在斯時深深冷灰裏撥著星兒之火向死柴頭上發機燎起亘天烈𦦨燒却舜若多神面皮敢問諸人作麼生回避擲拄杖下座上堂今朝是初一龍象如稻麻有事與無事歸堂去喫茶上堂達磨西來不立文字直指人心見性成佛大衆作麼生説箇見性成佛底道理良久幸是無瘡勿傷之也結制上堂蠟人為驗始於今日九十日中推功辨的黃面老瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢曰山僧即今駕無底鐵船普請大衆同入大圓覺海遊戲去也喝一喝看取定南針歲旦上堂元正啓祚萬物咸亨驀拈拄杖曰拄杖子昨夜抽條今朝吐蘂華開五葉香遍大千且道還當得新年頭佛法也無卓拄杖一下喝一喝臘八上堂明星一見出山來剛道娘生兩眼開不是髑髏乾得淨爭知春色上桃腮上堂德山棒臨濟喝拈放一邊諸人腳跟下道將一句來以拄杖畫一畫毗婆尸佛早留心直至如今不得妙示衆佛是衆生界中了事漢衆生是佛界中不了事人若欲決了此事但向十二時中四威儀內折旋俯仰與人酬應處看是什麼道理忽爾妄想滅知見忘究出自家一段光明洞徹十虗無絲毫隔礙始知佛與衆生本性平等一身清淨多身清淨一世界清淨多世界清淨無一塵不是真如境界無一剎不是解脫道場所以永嘉大師曰一月普現一切水一切水月一月攝諸佛法身入我性我性同共如來合斯言豈欺我哉示醫士話頭一則耆婆藥大藏諸經和劑方抹過二途開口笑不勞針砭起膏肓化燈油劫初一點光明種猛裂工夫拶出來瀉入碧琉璃裏去三千諸佛笑顏開坐禪銘參禪的的非細事貴在當人發真志真志不發願不堅決定茫茫墮生死古德垂慈何太切教人參禪要直截話頭一則重千鈞盡力提持須猛裂進前退後知幾回恰似冰爐煉生鐵冰爐爛鐵真箇難竭盡精神豈容歇驀然一拶火星飛面門簉破通身熱鉗鎚妙密始見真手兮眼兮用處親就中煉出吹毛利干將鏌鎁爭比倫耿耿寒光耀空碧在在處處興家國外道天魔盡喪魂鐵額銅頭俱失色古今庫藏無此珍天上人間何處覓殷勤為報參玄人趁此後生須努力千巖長嗣婺州清隱蘭室德馨禪師義烏方氏子年二十四投伏龍祝髮執侍數載復力抵諸方久之歸覲會千巖遷化乃結茅城西榜曰清隱後聖壽虗席四衆請師主之蘇平仲嘗過訪師寒溫之外不措一辭蘇曰千巖老師見客口如懸河娓娓不倦師今默然何也師曰道無隱顯焉有默然昔吾先師未嘗不言然而未嘗言今吾未嘗言然而未嘗不言也蘇乃擊節稱賞洪武壬子十一月十四日示微疾集衆訣別端坐而逝留龕七日顏色如生茶毗五色舍利無數千巖長嗣金華華山明叟昌庵主本郡浦江人縛茅於里之華山往謁千巖示以入道旨要旋歸晝夜孳孳不怠洪武丙辰十月三日忽辭衆説偈曰生本無生滅亦無滅撒手便行虗空片月語畢端坐而逝千巖長嗣已上五人京口金山慈舟濟禪師西竺作禮曰某甲拏得賊來請和尚決斷師曰贓在甚麼處竺拍案一下師往復徵詰復曰諸佛不説列祖不傳除却搖唇鼓舌瞚目揚眉還我到家一句來竺默然師曰去聖時遙尚有此子善自護持古梅友嗣一峰寧禪師西竺呈見解師為勘驗示偈曰青山疊疊雨濛濛師子金毛撥不通我也自知時未至十回放箭九回空古梅友嗣已上二人杭州正傳院祖庭空谷景隆禪師姑蘇洞庭黿山陳氏子初見懶雲開示法要後於虎丘禮石庵祝髮會庵遷靈隱師相隨七載因往天目禮高峰祖塔憩錫歲餘忽有省入徑造懶雲安求證安為助喜後住碧巖僧問如何是佛法的的大意師曰此問最親切曰覿露堂堂時如何師曰途路未為真曰南人如問雪我道是楊花師曰喚鐘作甕又爭得晚年於西湖修吉山卜地為生壙築室以居名曰正傳塔院復自製塔銘其略曰嗚呼死生一夢骨塔奚為蓋表佛法流芳靈蹤不斷即幻明真以致佛祖命脈源遠流長矣幻身雖滅佛性不遷後之來者見窣堵崚嶒峰巒蒼翠鳥鳴喬木泉瀉幽岩不馳外境不執內心盡忘愛惡陶然泰和始知法界為身虗空為口萬象為舌晝夜説法未嘗間歇於此見得明透得徹如醉忽醒廓然領悟便見佛祖不曾涅槃老僧不曾圓寂大圓鏡中覿面相見西來祖意兩手分付如古師嗣雲門青師嗣大陽無前後無去來大千沙界自他不隔於毫端十世古今始終不離於當念懶雲和尚是景隆受業師之受業師景隆心法受印可於懶雲即南極安禪師也得臨濟正傳二十世上泝天真則無極源雪巖欽前後嗣法亦無定規前嗣後者阿難嗣迦葉後嗣前者興化嗣臨濟理貫古今詣實為主銘曰廓周法界空蕩無涯羣靈升墜恆無已時佛祖垂應為導為師宿膺為幸值師化儀不善弘道隨力所宜卒於武林骨窆山崖窣堵奠安山同壽期以幻歸幻有為無為成住壞空斯道坦夷師所著有空谷集尚直尚理編行世辨山安嗣金陵天界古拙俊禪師姑蘇之吳江人祝髮受具首謁石屋珙次見三衢懶牧得禪定工夫復往叩古梅於高仰禮拜起即依實供通打趁出如是三度被打遂結伴歸里立限壁觀九年每三年撚一指歷燃三指一日忽然瞥地乃往參福林法戰相契遂留首衆時年二十八矣衆推主席師遁迹而去留偈曰半載相依唱祖機幾番談道奉嚴威出山便説歸時路又是重添眼上眉韜光巖壑三十餘年有平生最愛隈岩谷三十年來懶送迎之句洪武間奉旨剃度千僧至繁昌衆請東廬山開堂普説示衆禪之一字亦是強名云何曰參在信而已擬議即乖開口即錯若是發心不真志不猛利者邊經冬那邊過夏今日進前明日退後久久摸索不著便道佛法無靈驗却向外邊記一肚抄一部如臭糟甕相似是者般野狐精直饒到彌勒下生有甚交涉真正道流若要脫生死須透祖師關祖關透生死脫不是説了便休要將從上諸祖做箇樣子趙州老人四十餘年不雜用心為甚麼事長慶稜公坐破蒲團七箇為甚麼事香林老師四十年方成一片為甚麼事乃至歷代真實履踐剋苦用心為甚麼事山僧今日口喃喃地引古驗今為甚麼事諸禪德既有從上不惜身命積功纍德妙悟親證的樣子何不發大勇猛起大精進對三寶前深發重願若生死不明祖關不透誓不下山如是發願之後截斷千差路頭不與萬法為侶向長連牀上七尺單前高挂鉢囊壁立千仞寬立限期急下手腳盡此一生做教徹去若辦此心決不相賺我今為汝保任此事終不虗也永樂丁亥復奉旨延師於天界寺終老焉福林度嗣曹洞宗西京少室靈隱文泰禪師太原汾州陽城魏氏子禮本鄉智禪師剃染受業精修僧事服勤有年辭師遊學獨邁太行經入東魯初習教乘於演三藏德律師法席粗領大義次扣禪關廣參知識始參濟下宗師依雲峰恆和尚參請纍年親蒙授記仍付衣頌次參曹洞宗師後造太原深和尚丈室復蒙印證後詣燕京大萬壽寺參雪庭和尚庭問當機一句試拈出看師擬開口庭曰家産被人籍沒了也還在這裏叫屈師撫掌曰誰奈我何庭曰這風顛漢曰仁義道中且與一拜於是侍錫十載受囑開堂少林祖剎雪庭之門時稱二泰一肅師乃首推也上堂塵劫來事只在於今河沙妙德總在心源試教伊覿面相呈便不解當風拈出且道過在甚麼處卓拄杖曰祇為分明極翻令所得遲愚庵孟云只如靈隱還拈得出麼若拈得出何不略借一觀若拈不出河沙妙德向何處去也隔牆恩怨如何説獨抱琵琶月下彈龍唐柱云大小靈隱將奇珍異寶撒出當陽供養諸人了也拈拄杖云看看見之不取思之千里僧參提坐具欲展拜師曰天網恢恢疏而不漏曰本欲禮拜被和尚撑住拜不下時如何師曰撑汝飯袋子到骨出有甚麼用曰也須將錯就錯禮拜去也師曰當得甚麼碗僧無語師曰有頭無尾漢元世祖至元己丑正月示微疾謂門人曰古人坐脫立化即不無於衲僧分上皆餘事也言畢遂掩息右脅而逝少室裕嗣太原報恩中林智泰禪師汾陽魚城溫氏子剷䰂於華嚴專事經律一日喟然歎曰大丈夫當體究大事焉能區區於此耶時雪庭主萬壽師往依數載一日論執事以語觸庭庭曰有頭無尾東西有甚交涉師愈出語不遜庭曰不但無尾師生平疑礙一時冰釋遂受囑纍溫研久之乃奉詔宣任報恩僧問如何是萬里無寸草處師曰不是闍黎踐履之境如何是出門便是草師曰才動即乖曰如何是不出門亦是草漫漫地師曰住著即錯曰如何得不涉動靜去師曰遍界絶紅塵通身無影像一日示疾集衆曰吾緣止於此日汝等善自護持當惜寸陰勿令虗度聞者咸相感泣乃書偈怡然而逝少室裕嗣泰安靈巖足庵淨肅禪師保定永平張氏子究心二十餘年參請知識十餘輩皆不明了最後依雪庭淘汰有年付以衣偈初主萬壽次少室靈巖後退席香山上堂白露橫江黃花滿圃砧聲敲夜月蛩語泣秋風蟬聯岸邊之樹葉辭檻外之柯色色現海印三昧聲聲轉根本法輪諸仁者若能於斯會得則如面對鏡眉目分明方可喚作半箇衲僧猶有俗氣在若能打破鏡來便好與你相見祇如相見後又作麼生更有三十棒且待別時來僧問胡來胡現漢來漢現胡漢不來時如何師曰桃花歲歲皆相似人貌年年大不同曰此意如何師曰不因你來問山中太寂寥且喫一頓了去便打一日集衆告辭右脅而逝中林泰禪師為之銘曰撩天鼻孔點地腳跟心明眼正行古顏溫其事愈大其志愈敦諸方老宿遍叩其門受雪庭嗣為萬松孫機輪迅速電掣雷奔高標覺樹密固靈根慧燈朗耀銷鑠羣昏全機大用搖蕩乾坤掀翻渤澥踢倒崑崙三世諸佛一口渾吞二邊不滯中道寧論三居大剎四衆咸尊去來絶朕動靜亡痕虗空爛壞斯道常存少室裕嗣和林北寺覺印禪師上堂良久曰會麼若道我有説須無却我舌若道我無説須有却我舌金剛推倒一堆泥踏著稱鎚不是鐵且道是有説無説良久云等間失却手中橈只為貪觀天上月僧參師問會見我雪庭老師麼曰不曾見師曰瞎漢亂走作麼曰也知和尚有此一機師曰拾馬糞當飯喫有甚好腸胃出去少室裕嗣成都昭覺仲慶禪師上堂良久云喫鹽添得渴便下座僧攔問喫鹽添得渴時如何師曰吠影狗子無屎喫少室裕嗣安平守讓禪師示衆殺人刀活人劍是上古風規我者裏不費磨礱用得恰好且道此箇把柄從何處得來嵩山千丈雪熊耳一輪月少室裕嗣辨州太子久善禪師上堂舉僧問大龍色身敗壞如何是堅固法身龍云山花開似錦澗水湛如藍師云大龍恁麼道山僧則不然若有箇色身敗壞如何是堅固法身向他道山花瞎人眼澗水毒人耳寉不戀幽巢龍不藏死水少室裕嗣京兆華嚴覺印禪師上堂古人皆稱我是達磨兒孫却道神光依位而立是得髓只這些子便是做臭皮鞋底塵垢也做不得何故迷逢者少負恩者多少室裕嗣鞏昌廣嚴法興禪師因同參印和尚過訪師曰許久不相見眉毛作麼生印曰將謂老兄忘却師曰彼中快活法還可舉似故人麼印曰愁人莫對愁人説師曰恁麼則同條不共命也印曰笑倒寒山子師曰謝老兄光重少室裕嗣順德妙乘禪師垂語曰石頭和尚不識好惡説甚明中有暗洞山老漢被他語脈轉説甚五位正偏牽得後世子孫落在這等葛藤裏擺脫不去僧問和尚何不斬此葛藤別開一路師曰幽州猶自可最苦是新羅少室裕嗣已上十人燕京鞍山月泉同新禪師從鞍山堅公剃落能以苦行事衆忽一日聰慧頓發與同行人敘所得衆雜笑之師憤甚以偈書壁而去偈曰氣宇衝霄大丈夫尋常溝瀆豈能拘手提三尺吹毛劍直取驪龍頷下珠師謁清安方公方問欲窮千里一步為初如何是最初一步師進前叉手立方曰爭奈腳跟不點地何師拂袖便出次參林泉倫公遂承印記尋受請靈巖倫為引座師一音才唱萬衆歡呼能於言下得旨者甚衆示寂説偈曰來無所從去亦無方驀豎拳云且道者箇還有窒礙也無放拳曰撒手縱橫雲天蒼蒼瞑目而逝林泉倫嗣關中林禪師僧問如何是正中偏師曰木人夜半打鞦韆曰如何是偏中正師曰羣僚怕見秦臺鏡曰如何是正中來師曰木童土偶笑咍咍曰如何是兼中至師曰忿怒那吒擎八臂曰如何是兼中到師曰拄杖風前還自靠報恩秀下復庵照嗣後同十方進禪師僧問逢橋拆橋時如何師曰那討這般人曰師意如何師曰從來好手不彰名復庵照嗣嵩山法王暉禪師僧問如何是法王境師曰五乳峰前雪氣深曰如何是法王人師曰嵩山頂上撩天鼻曰人境交參時如何師曰看取令行時復庵照嗣泰安州靈巖復禪師示衆三十年後大有人疑著僧問如今便疑著時如何師曰平地無因得喫交復庵照嗣護國圓禪師僧問國如何護師曰寰中天子勑曰佛法何在師曰端坐受供養復庵照嗣崇孝普禪師見山門因雷雨乃呵呵大笑曰痛快平生在此日奴兒婢子共殷勤復庵照嗣淨土里禪師僧問如何是清淨佛土師曰莫作穢汙曰如何是穢汙佛土師曰徒自分疏曰師意如何師曰鐵樹花開不識春復庵照嗣汝州寶應海禪師一日病起僧問日面佛月面佛意旨如何師曰山益高兮水益深進曰覓起處不得時如何師曰良醫拱手處法身別有源復庵照嗣已上八人順德天寧仲復子顏禪師別號虗舟寧津人姓楊氏禮天寧虗照禪師下髮參悟得旨名重廟廷元世祖欲及之師堅執不從錫寶書開堂本寺僧參師退身便入曰外面有賊僧禮三拜師復顧曰作賊人心虗參堂去天寧照嗣太保劉秉忠居士瑞州人字仲晦初名侃法號子聰年十七為邢臺節度使府令史以養其親居常鬱鬱不樂一日投筆歎曰吾家纍世衣冠乃汩沒刀筆吏耶既棄去隱武安山投天寧照禪師為僧力參有省俾掌書記元世祖征雲南渡江攻鄂每贊以不殺為德凡克城擒敵全活無算雖位極人臣而猶齋居蔬食不改舊服一時通稱為聰書記至元十一年八月索筆書偈曰吾不負世世不負我吾之於世如水中月如空中花花沈月落是箇甚麼咄擲筆趺坐而逝天寧照嗣已上二人
