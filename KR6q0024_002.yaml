body:
  text: 六祖下十八世臨濟宗慶元天童密庵咸傑禪師閩之福州人族姓鄭母夢廬山老僧入舍而生自幼穎悟出家後究心禪理不憚遊行遍參知識後謁應庵華和尚於衢之明果華孤硬難入屢遭訶一日華問如何是正法眼師遽答曰破沙盆華頷之未幾辭回省親華送以偈曰大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便垛根吾有末後句待歸要汝遵玉林琇頌云踢過眼生盲棒來頭裂破迅趁生禽癡廬咬枯骨堯峯月函潛頌云千金蕩盡一無存衣食終朝取別人不是五陵真俠骨回頭猶戀舊頭巾上堂牛頭橫説豎説不知有向上關棙子有般漆桶輩東西不辨南北不分便問如何是向上關棙子何異是開眼尿牀華藏有一轉語不在向上向下千手大悲摸索不著雨寒無處曬朗今日普請布施大衆良久曰達磨大師無當門齒上堂舉婆子燒庵話師曰者箇公案叢林中少有拈提者今日傑上座裂破面皮不免納敗闕一上也要諸方簡點乃召大衆者婆子洞房深穩水泄不通偏向枯木上糝花寒灰中發𦦨箇僧孤身迥回慣入洪濤等間坐斷潑天潮到底身無涓滴水子細簡點將來敲枷打鎖則不無二人若是佛法未夢見在烏巨與麼提持畢竟意歸何處良久曰一把柳絲收不得和煙搭在玉欄杆上堂盡乾坤大地喚作一句子擔枷帶鎖不喚作一句子業識茫茫兩頭俱透脫淨倮倮赤灑灑沒可把達磨一宗掃土而盡所以雲門大師道盡乾坤大地無纖毫過患猶是轉句不見一法始是半提更須知有全提底時節大小雲門劍去久矣方乃刻舟上堂一箇葫蘆才倒地滿地葫蘆盡傾倒欲識單傳直指禪今日鬬湊得恰好僧問虗空消殞事如何師曰罪不重科師晚年退居天童之太白峰鉗錘訓誨學者雲集後無疾坐逝門人建塔於山之中峰天童華嗣衢州光孝百拙善登禪師和州烏江閔氏子上堂白日閙浩浩夜後靜悄悄長廊走波波步步無欠少不識主人翁全身入荒草撞著傅大士問訊維摩老臥疾毗耶城幾箇知天曉若是過量人不向那邊討為作麼如此喝一喝下坡不走快便難逢天童華嗣南書記福州人久依應庵華禪師於趙州狗子無佛性話參歷有年豁然契悟偈曰狗子無佛性羅睺星入命不是打殺人被人打殺定華稱其脫略紹興初示寂於歸宗天童華嗣侍郎李浩居士字德遠號正信幼閲楞嚴如遊舊國志而不忘後造明果投誠入室應庵華禪師揕其𮌎曰侍郎死後向甚麼處去士駭然汗下華喝出士退參不旬日徑躋堂奧華深許可以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還早起誰悟復誰迷有鬻胭脂者亦久參華頗自負士贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來者裏喫拳頭天童華嗣教授嚴康朝居士湖州長興人見應庵華得旨頌曰趙州狗子無佛性我道狗子佛性有驀然言下自知歸從茲不信趙州口著精神自抖擻隨人背後無好手騎牛覓牛笑殺人如今始覺從前謬天童華嗣已上五人泉州法石中庵慧空禪師贛州蔡氏子立春日上堂拈拄杖卓一下曰先打春牛頭又卓一下曰後打春牛尾驚起虗空入藕絲裏釋迦無路潛蹤彌勒急走千里文殊却知落處拊掌大笑歡喜且道歡喜箇甚麼春風昨夜入門來便見千華生碓㭰上堂千家樓閣一霎秋風祇知襟袖涼生不覺園林葉落於期薦得觸處全真其或未然且作寒溫相見上堂舉金剛經佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心要會麼春風得意馬蹄疾一日看盡長安花僧問先佛垂範禁足安居未審是何宗旨師曰琉璃鉢內拓須彌僧便喝師便打教忠光嗣臨安淨慈混源曇密禪師天台盧氏子十六圓具習台教棄去參大慧杲於徑山復叩泉州教忠光和尚一日光舉香嚴擊竹因緣豁然契悟述偈呈光光舉玄沙未徹話詰之無滯光乃囑曰子今可見妙喜矣師秉命即往梅陽服勤四載住淨慈上堂諸佛出世打劫殺人祖師西來吹風放火古今善知識佛口蛇心天下衲僧自投籠檻衆中莫有天然氣槩特達丈夫為宗門出一隻手主張佛法者麼良久曰設有也須斬為三段上堂舉雲門問僧光明寂照遍河沙因緣師曰平地撈魚蝦遼天射飛鶚跛足老雲門千錯與萬錯教忠光嗣吉州青原信庵唯禋禪師福之長樂李氏子年十有一歲出閩依盱江禪悅廣公為童子閲五白始獲僧服一日廣以佛國白公五十三知識頌授諸維那師侍其傍聞止住林有時要見十方佛無事間觀一片心之句便得要領廣異其根利俾還閩謁佛心才及東禪果西禪需諸老時晦庵光住龜山師往叩一日夜半摸索淨巾次恍然大徹黎明趨方丈通其所證呈偈曰業識茫茫本無所據昨日三更回頭一覷一段靈光本來獨露光不覺解顏頷之復出嶺見萬庵顏於番陽薦福入室次應對敏捷顏厲聲曰者福州子被人教壞了也一衆駭愕復往梅陽見大慧杲杲曰如何是佛師曰覿面相逢更無別法杲曰如何保任師曰飢來喫飯困來打眠既而隨杲北還杲一日問曰許多人入室幾人道得著幾人道不著師曰唯禋只管看杲忽展手曰我手何似佛手師曰天寒且請和尚通袖杲據打一竹篦曰且道是賞你罰你師遂以頌發揮佛祖機緣十數則呈杲其世尊初生頌曰撞出頭來早自錯那堪開口更稱尊當時若解深藏舌免得間愁到子孫杲為之擊節紹熙三年壬子五月十九日示疾書偈曰末後一句覿面分付擬議思量世諦流布遂跏趺而逝教忠光嗣已上三人荊州公安遁庵祖珠禪師南平人上堂不是心不是佛不是物瀝盡野狐涎躍翻山鬼窟平田淺草裏露出焦尾大蟲太虗寥廓中放出遼天俊鶻阿呵呵露風骨等間拈出衆人前分明是何物咄咄上堂玉露垂青草金風動白蘋一聲寒雁叫喚起未惺人東林顏嗣汀州報恩法演禪師果州人上堂舉俱胝豎指因緣師曰佳人睡起懶梳頭把得金叉插便休大抵還他肌骨好不塗紅粉也風流東林顏嗣臨安淨慈肯堂彥充禪師於潛盛氏子首參大愚大圓諸老後聞東林應庵顏禪師嘗謂衆曰我此間別無玄妙祇有木扎羹鐵釘飯任你咬嚼師竊喜之造謁陳所見顏曰據汝見處正坐在鑒覺中師於是憤然將從前所得底一時揚下一日聞僧舉南泉時人見此一株華如夢相似默有所契乃曰打草祇要驚蛇耳次日入室顏問那裏是巖頭密啓其意處師曰今日捉敗者老賊顏曰達磨大師性命在汝手裏師擬開口驀被攔𮌎一拳忽大悟直得汗流浹背點首自謂曰臨濟道黃檗佛法無多子豈虗語耶遂述頌曰為人須為徹殺人須見血德山與巖頭萬里一條鐵顏然之上堂世尊不説説迦葉不聞聞卓拄杖曰水流黃葉來何處牛帶寒鴉過遠村上堂舉雪峰示衆曰盡大地是箇解脫門把手拽不入師曰大小雪峰話作兩橛盡大地是箇解脫門用拽作麼上堂一向與麼去法堂前草深一丈一向與麼來腳跟下泥深三尺且道如何即是三年逢一閏雞向五更啼東林顏嗣婺州智者元庵真慈禪師潼川人姓李氏出家圓具後遊講肆聽講圓覺至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我者裏撥著動著放光動地以呈諸講主無能曉之者因南遊至廬山圓通挂搭時卍庵顏禪師為西堂為衆入室舉僧問雲門撥塵見佛時如何門曰佛亦是塵師隨聲便喝以手指胸曰佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人顏深頷之頌塵塵三昧曰鉢裏飯桶裏水別寶崑崙坐潭底一塵塵上走須彌明眼波斯笑彈指笑彈指珊瑚枝上清風起東林顏嗣成都昭覺紹淵禪師上堂鎔瓶盤叉釧作一金攪酥酪醍醐成一味如是賓主道合內外安和五位君臣齊透四種料揀一串放行則細雨濛濛秋風颯颯把住則空空如也誰敢正眼覷著且道放行為人好把住為人好等間一似秋風至無意涼人人自涼東林顏嗣徽州簡上座參大慧杲於徑山時卍庵顏禪師為首座一日為衆入室顏問曰一二三四五六七明眼衲僧數不出你試數看師便喝顏曰七六五四三二一你又作麼生師擬對顏便打出曰你且莫亂道師於言下有省遽呈偈曰你且莫亂道皮毛卓豎寒只知梅子熟不覺鼻頭酸頌狗子無佛性話曰趙州老漢渾無面目言下乖宗神號鬼哭東林顏嗣已上六人福州鼓山木庵安永禪師閩縣吳氏子弱冠為僧未幾謁懶庵需於雲門一日入室次需曰不問有言不問無言世尊良久不得向良久處會隨後便喝師當下契悟作禮曰不因今日問爭喪目前機顏許可之住後上堂拈拄杖臨濟小廝兒未曾當面道著木庵今日全身放憨也要諸人知有擲拄杖下座僧問須彌頂上翻身倒卓時如何師曰未曾見毛頭星現曰恁麼則傾湫倒嶽去也師曰莫亂做僧便喝師曰雷聲浩大雨點全無西禪需嗣溫州龍翔柏堂南雅禪師上堂瑞峰頂上棲鳳亭邊一杯淡粥相依百病蒙頭打坐二祖禮三拜依位而坐已是周遮達磨老臊胡分盡髓皮一場狼籍其餘之輩何足道哉柏堂恁麼道還免諸方簡責也無拍繩牀不合停囚長智西禪需嗣福州天王志清禪師上堂豎起拂子云者箇天不能蓋地不能載遍界遍空成團成塊到者裏三世諸佛向甚麼處摸索六代祖師向甚麼處提持天下衲僧向甚麼處名邈除非自得自證便乃敲唱雙行雖然如是未是衲僧行履處作麼生是衲僧行履處是非海裏橫身入豺虎叢中縱步行西禪需嗣南劍劍門安分庵主謁徑山大慧行次江干仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾年箇事挂胸懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來遂仍返西禪懶庵迎之付僧伽黎後庵居劍門化被嶺表西禪需嗣已上四人臨安靈隱妙峰之善禪師吳興劉氏子高曾祖父皆登膴仕師生紈綺中資性高潔年十三即辭家祝髮經論一見輒了大意參佛照光於鄖山以風幡話契旨印之以偈有今日與君通一線斬釘截鐵起吾宗之句復遊衡湘還入匡廬卓錫妙高峰下面壁十年學者尊之曰妙峰禪師後分座於鴈山能仁晚居靈隱密邇行闕輪蹄湊集師掩戶無所將迎公卿貴人一或見之寒溫而已會天童虗席時鄭清之秉鈞軸具疏勸請勉師必赴師曰老僧年踰耄矣尚夜行不休乎辭弗就靈隱上堂舉雲門普請搬柴次乃拋下柴片曰一大藏教祇説者箇大小雲門只見錐頭利不見鑿頭方示衆久參高士眼空四海鼻孔撩天見也見得親説也説得親行也行得親用也用得親只是未識老僧拄杖子在何故將成九仞之山不進一簣之土端平二年師將示寂澡身趺坐書偈曰來也如是去也如是來去一如清風萬里書畢而逝壽八十四臘七十一火浴獲舍利不可數計瘞於靈隱之西岡育王光嗣臨安淨慈退谷義雲禪師福州黃氏子幼業儒既冠遊國學因讀中庸有所悟入祝髮具戒後佛照光為之印可住淨慈上堂奔流度刃疾𦦨過風啐同時崖州萬里有底道如人學射久習則巧殊不知未彀已前中的早涉迂回了也趙州到茱萸靠却拄杖即且置只如孚上座道聖箭折也意作麼生喝一喝若不同牀睡焉知被底穿上堂舉首山拈竹篦示衆曰喚作竹篦則觸不喚作竹篦則背汝等諸人喚作甚麼葉縣省近前掣竹篦拗作兩橛拋向階下却曰是甚麼山曰瞎省便禮拜師曰臨濟一宗掃土而盡開禧二年五月示寂育王光嗣臨安北澗敬叟居簡禪師潼川王氏子閲卍庵語有省後參佛照光禪師機契追隨甚久出世天台報恩光孝退居飛來峰之陰大參真西山時為江東部使者以東林雲居力致之師高臥不起後奉旨遷淨慈上堂識者一萬事畢了事衲僧一字不識直饒恁麼未稱全提禹力不到處河聲流向西上堂舉趙州一日入僧堂曰有賊有賊見一僧便捉住曰賊在者裏僧曰不是某甲州托開曰是即是祇是你不宜承當師曰趙州收處太危放去太急淨慈則不然家賊難防家財必喪卓拄杖只可錯捉不可錯放頌世尊初生話曰一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥淳淳祐丙午春示疾索筆書偈紙尾復書四月一日珍重六字至期假寤寐而逝壽八十三臘六十二葬全身於月堂昌禪師塔側遵遺命也有北澗集十九卷行世育王光嗣臨安徑山浙翁如琰禪師台州周氏子上堂拈拄杖蔣山喚者箇作拄杖子諸人亦喚者箇作拄杖子還有緇素也無闌干雖共倚山色不同觀維摩贊曰毗耶示疾放憨癡添得時人滿肚疑不是文殊親勘破者些毛病有誰知育王光嗣福州東禪性空智觀禪師上堂舉鹽官國師因僧問如何是本身盧舍那國曰與老僧過淨瓶來僧將淨瓶至國曰却安舊處著僧再問國曰古佛過去久矣師曰盲者難以與乎文彩聵者難以與乎音聲者僧既不薦來機國師只成空設雲門道無朕迹扶國師不起雪竇曰直得一手指天一手指地爭得扶也扶國師不起以拂子畫一畫前來葛藤一時畫斷且道如何是本身盧舍那擲拂子下座育王光嗣湖州上方朴翁義銛禪師上堂舉趙州因僧問狗子還有佛性也無州曰無師頌曰狗子佛性無還他大丈夫是非雖入耳壁上挂葫蘆贊達磨像曰一言已出駟難追賴得君王放過伊楊子江心航折葦浪頭何似問頭危育王光嗣臨安靈隱鐵牛印禪師上堂舉南泉示衆曰王老師自小養一頭水牯牛擬向溪東放不免食他國王水草向溪西放亦不免食他國王水草不如隨分納些些總不見得頌曰不如隨分納些些喚作平常事已差緑草溪邊頭角露一蓑煙雨屬誰家育王光嗣慶元育王空叟宗印禪師西蜀人上堂據虎頭收虎尾第一句下明宗旨直饒句下宗旨明拈來猶較十萬里何故大慧祖師於此懸羊頭賣狗肉佛照老人於此冒姓名佃官田小比丘來坐斷芳塵畢竟如何施設拈拄杖平生無所有只此一枝藤上堂大道坦然離名離相剗除則失旨建立則乖宗從上佛祖古今知識顯大機彰大用盡是關空鎖夢過犯彌天印上座裂破面皮還免得麼良久拍禪牀曰不入驚人浪難逢稱意魚育王光嗣慶元育王秀嵓師瑞禪師上堂舉道吾和尚曰高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人大慧和尚曰高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是舊時人大衆二大老隨機應用即不無若是衲僧門下未夢見在且道衲僧門下作麼生良久云不是知音者徒勞話歲寒上堂舉灌溪參臨濟濟搊住灌溪溪曰領領濟乃托開師頌曰雨散雲收後崔嵬數十峰倚闌頻顧望回首與誰同上堂舉演化大師問報慈如何是真如佛性慈曰誰無化不契復請益護國國曰誰有師曰誰無誰有全機道言下翻身不唧𠺕直饒未舉已先行錯認簸箕作尉斗阿呵呵若人自解倒騎驢一生不著隨人後育王光嗣慶元天童無際了派禪師上堂三五十五月圓當戶然雖匝地普天要且秋毫不露對景憑誰話此心令人翻憶寒山子上堂諸人十二時中上來下去折旋俯仰起居問訊瞞崇恩一點不得只今坐立儼然賓主交參面面相覩崇恩亦瞞諸人一點不得既然彼此不相瞞為什麼自作障礙喝一喝因風吹火用力不多上堂釋迦老子昔向今辰入大寂定堪笑天下叢林刻舟求劍二千餘年區區不已崇恩今日不動神機捩轉瞿曇鼻孔不圖打草驚蛇只要大家相見汝等諸人各宜仔細觀瞻莫教錯過遂合掌曰不審不審育王光嗣慶元天童海門師齊禪師嘗口誦華嚴詣各殿堂行香及回方丈已畢全部行香告衆衆皆不信師乃令八十一人各執一卷師升座誦一卷畢其八十一人各聞誦自所執經始知師為華嚴菩薩應世云育王光嗣江州雲居率庵梵琮禪師上堂舉百丈野狐話頌曰百丈野狐石女無夫一回淚出滄海乾枯浴佛上堂且喜今朝降獨尊率庵無物慶生辰只將一霎薔薇露洗出湖山淨法身育王光嗣慶元育王孤雲權禪師上堂舉僧問雪峰古澗寒泉時如何峰曰瞪目不見底僧曰飲者如何峰曰不從口入又問趙州古澗寒泉時如何州曰苦僧曰飲者如何州曰死師曰一人隨波逐浪一人截斷衆流檢點將來總欠會在今日有問育王古澗寒泉時如何祇對他道須是親見雪峰飲者如何問取趙州育王光嗣石庵正玸禪師得法於育王後歸湖上偈曰鳥不驚飛水不流碧潭空闊冷涵秋一絲頭上無香餌風輥蘆花落釣舟育王光嗣共十四人福州鼓山宗逮禪師上堂世尊道應如是知如是見如是信解不生法相喝一喝玉本無瑕却有瑕東禪嶽嗣臨安徑山德灊禪師號寓庵興化人初住徑山至山門彈指一下便入東禪嶽嗣福州鼓山石庵知玿禪師僧問坐斷雲山事已彰可憐雲水自茫茫今日石門通一線端然衣錦便還鄉還鄉一曲作麼生唱師曰罕遇知音曰祇如未跨石門一句作麼生道師曰百雜碎曰已跨石門又作麼生師曰依舊却囫圇曰直得大頂峰點頭鼓山屴崱震動師曰未為分外曰祇今晏國師撫掌呵呵大笑曰幸得與老師相見去也師曰不是冤家不聚頭僧禮拜師曰放汝三十棒上堂語是謗默是誑不語不默轉增虗妄喝一喝春風吹落桃李華淡煙疏雨籠青嶂東禪嶽嗣已上三人慶元育王笑翁妙堪禪師慈溪毛氏子參無用全禪師於天童全問曰行腳僧遊山僧師曰行腳僧全曰如何是行腳事師以坐具便摵全曰此僧敢來者裏捋虎鬚俾參堂去用室中每示狗子無佛性話一日師擬開口全以竹篦劈口便𭣟師應聲呈偈曰大塗毒鼓轟天震地轉腦回頭橫尸萬里全頷之即命侍香已而報恩約公至請師分座太守程公請出住妙勝未幾詔住靈隱衛王以大慈完美請師開山及王薨師庵居上柏台州使君陳公以瑞巖邀師無何江心牒至監丞史公強之乃起淨慈詔下丐辭不允大參余公書來不可重違君命明年荊湖總臣奏令僧道買紫衣師號俾以師號住持師謂若是則千金之子皆可主法我道殆矣奏疏殿陛上書廟堂其議遂寢詔徙天童力辭東歸翠巖築室奉先世香火育王虗席復有旨起師再辭不許乃奉詔上堂膏雨及時江山如洗幽鳥語喬林殘紅隨流水可憐盲聾瘖啞人不識此方真教體後天童除書再至大參趙公復請主淨慈悉謝之示疾書遺表作寺丞張公書請主後事通守永嘉曹公來問疾從容敘世契移頃書偈曰業鏡高懸七十二年一槌擊碎大道坦然置筆泊然而逝天童全嗣臨安靈隱石鼓希夷禪師上堂舉琅琊覺法華舉相見公案頌曰聞名不如見面見面不如聞名此地無金二兩俗人沽酒三升上堂舉南泉曰文殊普賢昨夜三更起佛見法見每人與三十棒趁出院也趙州曰和尚棒教誰喫南泉曰且道王老師過在甚麼處趙州禮拜而出頌曰春風吹落碧桃華一片流經十萬家誰在畫樓沽酒處相邀來喫趙州茶天童全嗣幽州盤山思卓禪師上堂拈拄杖曰登山涉水全藉者人擲拄杖曰相見易得好共住難為人上堂寂寂惺惺有氣死人惺惺寂寂無用頑石嘻下載清風付與誰天童全嗣慶元雪竇野雲處南禪師上堂百計推尋永不見面一時休去在處逢渠長連牀上喫粥喫飯取飽為期我且問你常住一粒米是幾番過手上堂斬釘截鐵特地乖張就下平高衲僧笑具皇覺到此有理難伸未審諸公如何理論天童全嗣福州雪峰滅堂了宗禪師上堂空索索冷冰冰清虗之理畢竟無身為什麼却有許多煙雨會得麼若會得七種供養諸人若會不得滴水難消天童全嗣相國錢象祖居士初守金陵嘗遊保寧問道於無用全公有所契入後於鄉里建接待十所皆以淨土極樂名之創止庵為棲息之所自左相辭歸精修淨業嘉定二年閏二月得微疾有問起居者則曰不貪生不怖死不生天上不生人中惟當往生淨土耳言訖趺坐而化天童全嗣已上六人臨州乾元宗穎禪師上堂卓拄杖性燥漢祇在一槌靠拄杖伶俐人不勞再舉而今莫有伶俐底麼良久曰比擬張麟免亦不遇西禪淨嗣興化華嚴別峰雲禪師西禪印證後初住福州支提遷福泉華嚴上堂千種言萬般解只要教君長不昧且道不昧箇什麼喚作竹篦則觸不喚作竹篦則背上堂彌勒大士朝入伽藍暮成正覺總似者般鈍漢有甚用處直饒隔山望見支提雙童峰便回去腳跟下好與三十西禪淨嗣福州中濟無禪立才禪師上堂舉趙州和尚喫茶去話頌曰趙州逢人喫茶誰知事急出家翻手作雲作雨順風撒土撒沙引得洞山無意智問佛也道三斤麻讀此庵語録偈曰南海波斯持密呪千言萬語少人知春風一陳來何處吹落桃華三四枝西禪淨嗣已上三人湖州何山月窟慧清禪師上堂舉天台韶國師初參法眼因僧問法眼如何是曹源一滴水眼曰是曹源一滴水韶聞豁然開悟頌曰曹源一滴水相罵饒接𭪿鷃省空啾啾驊騮已千里華藏演嗣建寧仙州山吳十三道人每以己事叩諸禪伯茫無入路及參開善謙得法後結茅於其左遂往給侍紹興庚申三月八日夜釋然啓悟呈偈曰元來無縫罅觸著便光輝既是千金寶何須彈兒善答曰啐地折時真慶快死生凡聖盡平沈仙州山下呵呵笑不負相期宿昔心開善謙嗣如如居士顏丙有僧舉南泉有主沙彌話問士以頌答之曰解把一莖茅草喚作丈六金身會得頭頭皆是道眼中瞳子面前人頌子湖狗話曰貧家無所有只養一隻狗便是佛出來也須遭一口雪峯然嗣明州育王妙智從廓禪師閩之長溪林氏子幼頴悟喜聞出世法十五祝髮受具時閩中多有道之士悉往從之遊後依大圓圓門風孤峻始齟齬久之豁然有得服勤數載大圓撫之以為類己後出世育王孝宗詔舍利入禁中供養親覩殊勝召對碧琳堂帝問舍利從何發現師奏曰從陛下聖心發現上大悅晚年建庵於烏石杜門不與世接示微恙而逝育王璞嗣慶元天童息庵達觀禪師義烏趙氏子也初參應庵次見無庵於道場後於淨慈水庵室中明得二老垂手處一語破的而返至龍翔柏堂分第一座後閲四剎被旨升靈隱上堂舉二祖問達磨安心公案頌曰長安深夜雪漫漫欲覓心安轉不安總使言前開活眼那知已被老胡謾淨慈一嗣袁州仰山簡庵嗣清禪師上堂舉達磨大師一日謂門人曰時將至矣汝等盍各言所得乎最後慧可出禮三拜依位而立磨曰汝得吾髓師頌曰揑目生華立問端得他皮髓被他謾者般瞎漢能多事六月無霜也道寒淨慈一嗣已上二人常州華藏伊庵有權禪師臨安昌化祁氏子年十四得度十八歲參禮佛智裕於靈隱時無庵全居第一座室中以從無住本建一切法問之師久而有省答曰暗裏穿針耳中出氣庵可之遂密付心印嘗夜坐達旦行粥者至忘展鉢鄰僧以手觸之師感悟説偈曰黑漆崑崙把釣竿古帆高挂下驚湍蘆花影裏弄明月引得盲龜上釣船佛智嘗問心包太虗量廓沙界時如何師曰大海不宿死尸智撫其座曰此子他日當據此座呵佛罵祖去在師益自韜晦復見應庵華於歸宗參大慧杲於徑山洎無庵全禪師住道場命師分座上堂今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴嚏也成獅子吼旃檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜淳熙庚子秋示微疾書偈趺坐而逝茶毗齒舌不壞獲五色舍利無數葬於橫山餘骼塔萬年寺左道場全嗣明州天童癡鈍智穎禪師舉達磨見武帝因緣頌曰提起須彌第一鎚玉關金鎖擊難開重施背踏空勞力應悔迢迢萬里來焦山體嗣鎮江金山退庵道奇禪師僧問雪峰道望州亭與汝相見了也意旨如何師曰左眼半斤曰烏石嶺與汝相見了也作麼生師曰右眼八兩曰僧堂前與汝相見了也又且如何師曰鼻孔大頭向下曰只如鵝湖驟步入方丈保福入僧堂此意又作麼生師曰水向石邊流出冷風從華裏過來香徑山印嗣婺州三峰印禪師上堂舉百丈野狐話頌曰不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨春風有時自西還自東雙林用嗣慶元徑山蒙庵元聰禪師福州朱氏子晦庵會中得心要衆推為高弟慶元三年自福之雪峰被旨遷徑山上堂舉藥山首造石頭之室便問三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了伏望指示頌曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山罔措頭曰子因緣不在此且往馬大師處去山稟命禮馬祖仍申前問祖曰我有時教伊揚眉瞚目有時不教伊揚眉瞚目有時揚眉瞚目者是有時揚眉瞚目者不是汝作麼生山於言下契悟便禮拜祖曰汝見甚麼道理便禮拜山曰某甲在石頭如蚊子上鐵牛祖曰汝既如是善自護持師頌曰倒腹傾腸説向伊不知何故尚遲疑只今便好猛提取莫待天明失却雞上堂舉玄沙見僧禮拜次乃曰因我得禮你頌曰因我得禮你莫放屁撒屎帶纍天下人錯認自家底龜峯光嗣平江萬壽月林師觀禪師俗姓黃福州侯官人僧問三聖道逢人則出出則不為人意作麼生師曰錯曰興化道逢人則不出出則便為人意作麼生師曰錯僧曰興化旗鎗倒卓三聖肝膽齊傾師曰引不著曰只如今日和尚作麼生為人師曰一棒一條痕大洪證嗣常德德山子涓禪師潼川人也上堂見見之時見非是見見猶離見見不能及喝一喝鯨吞海水盡露出珊瑚枝衆中忽有箇衲僧出來道長老休寐語却許伊具一隻眼大溈行嗣萬松壞衲大璉禪師讚出山相偈曰行滿功圓徹骨窮不勝羸瘦髮髼鬆彌天罪過今無數毗舍耶中一款供雲居會嗣溫州龍鳴在庵賢禪師上堂舉崇壽示衆曰識得凳子周匝有餘雲門道識得凳子天地懸殊師曰崇壽老漢坐殺天下人雲門大師走殺天下人龍鳴則不然識得凳子四腳著地要坐便坐要起便起萬年賁嗣潭州大溈咦庵鑑禪師會稽人上堂木落霜空天寒水冷釋迦老子無處藏身拆東籬補西壁撞著不空見菩薩請示念佛三昧也甚奇怪却向道金色光明雲參退喫茶去上堂舉罽賓國王問師子尊者蘊空公案頌曰尊者何曾得蘊空罽賓徒自斬春風桃華雨後已零落染得一溪流水紅萬年賁嗣慶元瑞巖景蒙禪師溫之平陽邵氏子年十三祝髮習台教知名相之學不足了大事去參育王裕裕問師鄉里師曰永嘉曰還識永嘉大師否師未及答批頰而出寢食不安者纍月忽聞鐘聲而悟即造室中裕復理前問師曰即日恭惟和尚尊體起居萬福裕曰如何是向上事師擬對被逐次日再造室次裕方發問師抗聲曰老漢今日敗關也一拍而出裕歎曰俊哉因省母歸里龍翔賁一見深器之問曰言無展事話不投機承言者喪滯句者迷祇如言詮不及處如何通箇消息師以左手畫一圓相賁以拂子擊左師又畫以右手賁以拂子擊右師又畫於手中以兩手拓呈賁以拂子當中畫一畫師禮拜而立賁大笑曰三十年揀苗今日得此烏喙遂令執侍盡揭底蘊萬年賁嗣慶元天童雪庵從瑾禪師永嘉楠溪人俗姓鄭禮普安院子回落髮謁心聞賁於瑞巖一日入室賁舉紅爐片雪問師擬答忽領旨留侍三年入閩見佛智於西禪問甚處來師曰四明智曰曾見憨布袋麼師便喝智便打師接住拳曰和尚不得草草智曰瞎漢過者邊立時賁主江心師歸省命充維那一日問師一喝分賓主照用一時行如何是一喝分賓主師便喝賁曰者一喝是賓是主師曰賓則始終賓主則始終主賁笑曰汝又眼花了師即呈偈曰一喝分賓主依然又眼花倒翻筋斗去踏殺死蝦蟆慶元六年七月二十三日索浴更衣書偈投筆而寂壽八十四臘七十全身葬心聞賁禪師塔右萬年賁嗣已上四人此據箬庵存稿補入又查覺浪所著禪燈正宗所載直翁淨嗣亦同名同號機緣一則附刊備考雪庵從瑾禪師僧請益倩女離魂話師示以頌曰南枝向暖北枝寒何事春風有兩般憑杖高樓莫吹笛大家留取倚闌干曹洞宗襄州鹿門覺禪師參長翁淨禪師值淨上堂舉靈雲見桃花悟道因緣頌曰一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩邊翅堪笑烏梅咬鐵釘師不覺失笑曰早知燈是火飯熟幾多時後承印記出住鹿門示衆曰盡大地是學人一卷經盡乾坤是學人一隻眼以這箇眼讀如是經千萬億劫常無間斷諸人還看讀得麼如看讀得老僧請他喫箇無米油糍嘗作五位正偏頌曰正中偏月黑雲龍午夜天佛祖無蹤凡聖盡箇中誰辨往來源偏中正金井玉盤秋水冷海天紅日已生東餘輝不照毗盧頂正中來戴角披毛知幾回應物轉身全得妙雲收終不露崔嵬兼中至覿面誰能容擬議手提妙印不當風大用繁興豈凝滯兼中到無舌童兒方會道撥塵何處得逢渠撒手回途還得妙天童淨嗣近有位中符禪師博極羣書查有鹿門覺親見芙蓉楷機緣云覺問笳笳曲子不墮五音韻出青霄請師吹唱楷曰木雞啼夜半鐵鳳叫天明覺曰恁麼則一句曲含千古韻滿堂雲水盡知音楷曰無舌童兒能繼和覺曰作家宗師人天眼目楷曰禁取兩片皮覺從此契悟位中所著大統竟削去傳燈丹霞真歇宗珏足庵如淨五世但傳燈入藏已久指月盛行於世即位中向年所刻洞宗續燈及拈頌諸本皆遞代相承並未改削一旦以北直僧塌來青州塔記忽翻舊案謂天童淨下鹿門覺即是芙蓉楷下淨因覺夫淨因嗣芙蓉五燈中自有列傳及上堂法語與鹿門何涉誤併兩人為一人不知有何所據紊亂世次余深痛之近讀鼓山霈和尚辨謬一書知位中所據青州塔記其偽有三夫塔記既是自敘何以略於問道機緣而詳於出處歲月無他不過以歲月為辨論張本是其所長耳其偽一也又敘得法原由而於本師師翁師伯皆直叱其名曰政和間參襄州鹿門自覺覺使見芙蓉楷道經鄧州得謁丹霞淳迹此數語乃是老師大衲為後生晚輩作傳口氣豈是自敘之詞不過以見芙蓉丹霞為改鹿門為淨因之張本耳其偽二也又敘示寂顛末云皇統九年臘八親書塔記十二亥刻示寂試問此數語為是未死之先預為敘耶抑亦死後復起再敘耶其偽三也有此三偽乃欲據削從上五代世系位中欲借以欺人而不知實自欺耳蓋代人草創潤色是位中平日手段如青州辨無機緣便作出一段機緣鹿門覺上堂語便安入淨因章中安知其不能改塔記乎若塔記果是恁麼説話則此記亦不足信矣何況彼之謬書乎是編也悉從傳燈世系指月定本相次而成並不誵訛讀者其識諸
