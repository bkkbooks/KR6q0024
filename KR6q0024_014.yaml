body:
  text: 六祖下三十世臨濟宗竟陵荊門天琦本瑞禪師南昌鍾陵人父江堂母徐氏年二十忽念色身無常棄家遠遊投荊門無說能剃髮能示萬法歸一一歸何處話後遇高郵全首座同往襄陽途中偶聞婦人呼豬聲全曰阿娘牆裏喚哪哪途路師僧會也麼拶破者些關棙子娘娘依舊是婆婆師矍然汗下一日染病甚劇有暉禪者勉師曰病中工夫切不可放過昔大慧和尚在徑山患背瘡晝夜叫喚或問和尚還有不痛底麼慧曰有曰作麼生是不痛底慧曰痛殺人痛殺人師於言下豁然又一日聞山鹿叫喚會得日用之中無不是底道理復往蜀中謁楚山問曰某甲閒時看來了然明白及至臨機因何茫然山曰毫𨤲有差天地懸隔後遊金陵途中忽然如從夢覺從前所得一場懡㦬遂參寶峰瑄和尚於高峰針芥相契遂蒙印證師一日對普照太初舉云不論向上三玄要了末後一著初云如何是末後一著師曰風吹牆畔柳日曬㵎邊榆照云青山低處見天闊紅藕開時聞水香初作噦聲云正是弄嘴師云你作麼生初云如人上牆百無計師作噦聲起身歸位石車乘拈曰一噦聲百無所計一噦聲起身歸位具眼的辨看示衆曰世間無法出世間無法會得者箇無法歸家穩坐笑巖寶別曰若會得者箇無法且請上居門外法音𣽘曰若會得者箇無法三生六十劫何也大似傍若無人一日舉金剛經滅度一切衆生話師云先聖先賢皆要絶後再蘇我即不然何故松之本翠柏之本蒼去歲半斤今年八兩且道還有絶之與蘇若能會得始是欺君不得若然不會切莫造次笑巖寶拈曰焭絶老人貴要圖箇本分不知翻成分外示衆祖師西來不立文字直指人心見性成佛更無別法若向者裏知箇落處定也有分慧也有分宗也有分教也有分佛法世法無可不可腰纏十萬貫騎鶴上揚州其或不然定也不是慧也不是宗也不是教也不是蓋為不識本心名為狂妄經云虗妄浮心多諸巧見不能成就圓覺方便諸佛諸祖惟傳一心不傳別法汝等不達本心便向外求於妄心中起妄功用所謂如邀空華欲結空果縱經塵劫只名有為須知見性成佛性乃不是見他人之性佛乃不是成他人之佛決定是汝諸人本有之性與十方法界秋毫不昧人人本具箇箇不無但向二六時中一一之處回光返照看是阿誰不得執定祇在一處須是於一切處大起疑情將高就下將錯就錯一絲一毫毋令放過行時便看者行底是誰住時便看者住底是誰坐時便看者坐底是誰臥時便看者臥底是誰見色時便看者見底是誰聞聲時便看者聞底是誰覺一觸時便看者覺底是誰知一法時便看者知底是誰乃至語默動靜回頭轉腦屙屎放尿著衣吃飯迎賓待客周旋往返一一返看晝夜無疲倘若一念忘了便看者忘了底是誰妄想起時便看者妄想底是誰你道不會只者不會底又是阿誰現今疑慮你看者疑慮底又是阿誰如是看來看去不妨頭頭獨露法法全彰萬境不能侵諸緣不能入得失是非都無縫罅明暗色空了無彼此山河大地日月星辰盡聖盡凡都盧祇是一箇誰字更無別念上下無路進退無門山盡水窮情消見絶豁然𪹼地一聲方知非假他求不是一番寒徹骨爭得梅花撲鼻香寶峯瑄嗣匡山天池林隱淨菴智素禪師東萊趙氏子早年父母俱喪年十五祝髮謁雲溪瑛得旨後住天池上堂體露金風光皎潔一色明明無間歇𦏪羊挂角覓無踪海底蟾蜍吞却月荊藩請住東山上堂在天天高在地地厚一毫端上應時納祐此猶是者邊事且道那邊事作麼生拊几曰釋迦睡重彌勒起遲下座雲溪瑛嗣嘉興東塔野翁曉禪師無趣空參每呈見解師皆不諾一日謂趣曰我有一言要與汝說空聳耳而聽師但笑而不語空再四懇請師復笑空始具威儀作禮跽而哀懇師乃曰祖師西來直指人心見性成佛貴在直下體究子若果信得及可放下萬緣參箇一歸何處空從此死心看話頭經三載一日聞雞鳴有省詣師求證師反覆徵詰後付衣拂復示偈曰非法非非法非性非非性非心非非心付汝心法竟寶芳進嗣嘉興天寧法舟道濟禪師郡之張氏子年十八猛省出家父母難之至二十一歲投天寧為行者祝髮參吉庵祚庵門庭孤峻師朝夕咨叩一日聞磬聲豁然洞徹庵印可之未幾長安覺王寺請居第一座室中秉拂機用莫能湊泊嘉靖初住金陵安隱僧問如何是安隱境師曰三山半落青天外二水中分白鷺洲曰如何是安隱家風師曰石虎山前鬬泥牛水底眠僧曰不會師曰用會作麼精嚴晚參精嚴寺裏撞鐘府譙樓上擂鼓同時顯大神通穿透千門萬戶大衆還聞麼若道不聞爭奈鐘鼓分明人人有耳若道聞將甚麼聞即今鼓絶鐘消聞底事作麼生試道看卓拄杖黃金自有黃金價終不和沙賣與人陸五臺居士問畫前元有易不師曰若無伏羲將甚麼畫士曰畫後如何師曰元無一畫士曰現有六十四卦何得無言師曰莫著文字士曰請和尚離文字發一爻看師召居士士應諾師曰者一爻從何處起普明用拈云畫前畫後論有論無總與大易無涉直饒一喚一諾爻象分明也未是衲僧極則畫前原有易否天寧者漢何不當頭便喚五臺待他應諾卻好云元有易否陸公者裏必然別有所入且免後來許多周遮玉林琇頌云倒垣破屋住幽林徹後通前不掩門轉北回南接影響可憐咫尺隔千層一初元頌云羲皇殿上話庖氏夫子庭前毀仲尼共住都因不相識卻教腦後擊金椎士又問至人無夢何也師曰常人於現前虗幻分別境界不知全體是夢認為實有而以昏昧想心繫念神識紛飛境界為夢所謂夢寐俱夢夢中復作夢也至人於自心境界如實而知故於現前虗幻境界妙用泠然通徹無礙而睡夢亦自明明而知歷歷而覺所謂寤寐一如者也故至人無夢之說非有無之無乃是無夢無非夢夢與非夢一而已矣士又問夢裏須臾何以歷涉萬里師彈指一下曰千里萬里只在者裏問聖人有妄念不師曰無曰既無妄念何用兢兢業業師曰兢兢業業故無妄也問為政如何得無倦師曰榮辱得喪毀譽是非一切不管但虗其心行其所無事則無倦矣問終日吃飯何故不曾咬著一粒米師曰吃飯底人居士還曾見不士問四方上下有窮盡不師曰居士試返觀自己心量有窮盡不士良久曰實無窮盡師曰世界亦然士又問地獄實有不師曰人作了惡歷歷自知雖經久遠憶持不忘便是業境自心明知自惡不能自釋便是法王心地不空地獄實有心若空了地獄隨空示人偈曰工夫不間四威儀聽板聞鐘好下疑打破未生時面目好來爐畔受鉗鎚道本無為豈屬修有修頭上更安頭虗空若使重加柄野草間花正好愁將謂衣中有寶珠衣穿方信寶珠無前年尚有無珠說今日無珠說也無內不尋思外不求大千沙界一毫收塵塵剎剎蓮華藏認著依然是外頭人人心上古彌陀末法人中不信多念念他方求佛法不知念念是彌陀後遷辨山晚年復退歸天寧庚申秋示疾或請說偈師舉手搖曳而逝吉庵祚嗣湖州天池月泉玉芝法聚禪師嘉禾富氏子兒時每藉地趺坐折草念佛人皆為其親曰此兒他日必為佛弟子稍長淹通經史年十四從資聖堅法師受業芟染受具矢志參學夙夜匪懈一日閲壇經有省往謁吉庵祚不契復見法舟濟多所啓發偶會陽明王公於多士中王拈袖中鎖匙問師見麼師曰見王復納入袖中曰見麼師曰見王曰未在師疑不決一日聞僧舉僧問大顛和尚如何是見性顛曰見即是性不覺釋然一笑述偈曰湖光倚杖三千頃山色開門五六峰觸目本來成現事蒲團今不鍊頑空後往結制於漏澤之雲峰忽憶雪巖和尚問高峰正睡著時無夢無想無見無聞主人公在甚麼處便有見處究未脫然一日聞友人誦天通顯禪師碧峰寺裏有如來之句遂詣碧峰才見便問碧峰寺裏有如來莫便是和尚不顯曰上座還見麼師曰總見也是金屑落眼顯曰者漢死去多少時汝來為他乞命便歸方丈次日顯上堂舉古德曰打破大唐國覓箇不會佛法底也無又曰向南方走了一轉拄杖頭不曾撥著一箇會佛法底此二語甚有誵訛試為酬一語看師曰前不搆村後不迭店顯曰未在更道師曰不遇知音者徒勞話歲寒顯曰有甚得力句試舉看師遂呈二偈顯曰未免落人圈䙡師曰如何得不落人圈䙡顯便掌曰是落不落師豁然大悟平昔所蘊皆冰釋已而侍顯過杭遊南屏至宗鏡堂顯登座曰此處正好說法師曰說法已竟顯便下座顧師問曰何者是我所說底法師曰劍去久矣顯頷之遂蒙印可後歸隱天池衲子日臻遂成叢席示衆至道無為非有為無以造其深絶學無學非力學無以臻其極譬猶玉之在璞珠之在淵非剖鑿探求終無以獲故雪山苦行六年少林壁觀九載以至斷臂求法腰石負舂趙州三十年不雜用心香林四十年方成一片孜孜矻矻廢寢忘餐惟欲究明大事者皆參禪學道之榜樣也奈茲禪林秋暮法道荒涼逐妄隨邪無復自振惟知粥飯現成不愧虗消信施或遊心異學肆志便聰或穿鑿機緣馳求義解是皆唐喪光陰徒增業識如舍父窮子飄轉無據可勝嘆哉若是英靈漢直須於生死岸頭猛著精彩一念純真纖塵不立如遇怨敵單刀直入不顧危亡如墮深井念念無他但求出路若能具如是深心管取到家有日在僧問金軀初降九龍吐水聖誕重逢未審有何祥瑞師曰金鳳銜華呈瑞彩錦鶯翻調奏新篁曰周行指顧示真機今日如何露消息師拈拄杖曰拄杖子上透三十三天築著帝釋鼻孔下透十八重地獄擊破閻羅王頂門俯應羣機萬象森羅咸稽首宣揚般若大地山河側耳聽僧曰恁麼則昔時靈鷲今日天池師曰一道神光輝宇宙莫將今古較疏親便下座陸五臺居士問東土一千七百善知識即今總在什麼處師指庭樹鳴蟬曰者裏也有一箇士曰聲響便是麼師曰喚作聲響即蹉過也士又指石問曰無情說法只如者箇作麼說得師曰居士喚者箇作什麼士曰石頭師曰又道說不得師於嘉靖癸丑五月十九日示寂天通顯嗣建寧雙峰古音淨琴禪師本郡建陽蔡氏子自幼卓犖不羈每嘆曰世間有求皆苦不如早覓箇出身處年二十五從東峰祝髮初見大闡無所啓發次謁性空關主一日見座下尊宿靜晃閲古梅語録中有僧上方丈曰某有箇入處梅便打出僧又進方丈梅復打出晃笑曰者僧實有悟處只是大法未明耳師聆晃語便起身設禮求示入道旨要晃曰佛性雖人人本有若不以智慧攻化只名凡夫今欲成辦此事直須盡掃葛藤枝蔓只將一句無義味話頭自疑自問自逼自拶不肯求人說破不肯依義穿鑿決要命根頓斷親證親悟如此晝三夜三迫勒將去年深月久忽然心華發明如雲開見日古人公案一一洞了始知無禪可參無佛可做頭頭上了物物上通如人到家不問路也師蒙示誨即死心研究看萬法歸一一歸何處話復過滇南參壽堂抵雞鳴灘忽然大悟泊見壽堂針芥相投即承記莂歸隱雙峰正德壬申遷瑞巖示衆學道人當截斷諸緣屏息雜念單提本參話頭於行住坐臥苦樂逆順一切時中不得忘失凡靜中所見善惡境緣皆由不正思惟但只瞑目靜坐心不精采意順境流半夢半醒或貪靜境致見種種境界若是正因衲子做工夫當睡便睡一覺便醒起來抖擻精神摩娑兩眼咬定牙關揑緊拳頭專心正念切切偲偲疑來疑去到水窮山盡時節忽然疑團迸散頓見自己一段本地風光非從外得到者箇時節才名入門得地更要求明眼宗匠決擇不可便休一法不明直須辨明一理不通直須通透假使悟後不能通達化門古人謂之坐在百尺竿頭不能至於一切智海懸崖撒手自肯承當絶後再蘇欺君不得珍重壽堂松嗣杭州徑山萬松慧林禪師郡之仁和沈氏子從天目平舒獲聞心要後遊金陵聞僧誦丹霞禪師上堂語遂大徹時伏牛空幻覺禪師寓廣德師往謁呈所見即蒙印可後往徑山一日辭衆書偈曰七十六年萍踪何倚本無去來應緣而已書畢而逝金臺覺嗣曹洞宗西京嵩山萬壽俱空契斌禪師平陽垣曲人族姓王從重興院無相法師剃染久而參方謁凝然改禪師於嵩山求示心要改曰你向達摩未西來時道一句看師無以對心甚疑之一日覩秦封槐豁然契悟徑往丈室擬舉似間改遽謂之曰契斌參得禪也師便喝改曰喝作麼師曰和尚何得以贓誣人然曰趙州勘破婆子婆子敗闕在甚麼處師曰一對無孔鐵鎚然曰趙州意又作麼生師曰荊棘林中重加陷阱然曰石頭書亦不通信亦不達是何意旨師曰千里同風然曰青原垂足又作麼生師曰禍事禍事然曰洞上一宗密在爾躬矣景泰四年主祖庭僧問如何是空劫已前事師曰烏龜向火愚菴盂云料掉沒交涉且道過在主家賓家者裏明得方許你會空劫已前底事如或不明且看烏龜向火龍唐柱云恁麼舉揚還當得空劫已前事麼天色稍晚各自歸堂參取好問如何是正中偏師曰夜半烏雞帶雪眠曰如何是偏中正師曰老翁抱著石烏龜曰如何是正中來師曰出匣吹毛寒逼天曰如何是兼中至師曰公孫舞劍難思議曰如何是兼中到師曰黑狗銀蹄無處討曰五位既蒙師指示少林直指事如何師曰沙裏無油麥中有僧問如何是君師曰誰能窺測九重深曰如何是臣師曰萬里山河點墨痕曰如何是君向臣師曰寶殿光含萬化新曰如何是臣奉君師曰玉階仙仗龍顏近曰如何是君臣道合師曰端拱無為天下平曰向上還有事也無師曰闍黎珍重始得僧禮拜師微笑曰山僧今日不著便下座景泰壬申師示寂塔於少林之西塢凝然改嗣
