body:
  text: 六祖下二十八世臨濟宗金陵東山翼善海舟永慈禪師按東山行實載師為蜀之成都余氏子生於洪武二十七年甲戌齠齔時見僧輒喜一日聞說生死事遂發志棄俗趨彭縣大隋山景德寺投禮住持獨照月師剃染後入西山住靜八載發志參方行腳首謁太初和尚請益開示父母未生前話做工夫一日初問師曰父母未生前那箇是本來面目師即從東過西叉手而立初曰未在更道師曰兩眼相對有甚相瞞初大悅制解起單復參東普無際和尚不契乃出峽赴京得度宣德二年復還金陵靈谷掛塔雪峯和尚請師充首座制解即詣古道山參東明旵禪師一見便問無相福田衣甚麼人得披旵下座摑一掌師曰四大本空五蘊非有汝作麼生掌旵又一掌師曰一掌不作一掌用速道旵又一掌師神色不變曰老和尚名不虗播復展具三拜而立旵曰我居古道山三十載今日只見得者僧乃留旬日欲付袈裟師曰某甲不為衣來堅不受下山自此聲譽叢林金陵牛首請師領衆三載退隱天界山居太監袁誠法名智海欽師道德請住翼善寺開山說法正統五年庚申六月二十八日旵和尚留囑明白庵曰吾有衣法二物待十年後送至金陵東山海舟和尚受納付囑曰字付慈海舟訪我我無酬明年之明日西風笑點頭明年如期果寂白庵不違遺囑限滿日請首座法薦於景泰二年八月二十三日持衣齎至東山師祝香而受東山旵嗣杭州東明海舟普慈禪師按師七世孫天童悟和尚傳云蘇之常熟人姓錢世宗儒業出家於破山初至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師云佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯蔚和尚去師聞欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只者是實義師有省起曰好只好大費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿跡護持莫輕為人師範師自以為得乃結廬於洞庭山塢二十九年一日僧至師問曰上座何處來曰安溪曰安溪有人麼曰虗白和尚說法不異高峯曰是誰弟子曰寶藏曰有甚言句僧舉室中驗人語云心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問師曰參寶藏否師曰我與寶藏同參萬峯僧曰當日有何所見遂隱於此就再不參人去師曰問但有言說都無實義峯便打我從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧笑曰若據此見解生死尚未了何得云悟未在未在不見道心不是佛智不是道耶師遂有疑曰彼處衆中有真大徹者麼僧云無師即棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是甚麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口師無語次日黎明遣侍者請師師即至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰為敘先後耶為佛法耶若敘先後萬峯會下有千人若論佛法老闍黎佛法未夢見在何驚之有若親見萬峯萬峯即今在甚麼見師面赤罔然明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟由明曰老闍黎承嗣萬峯去師曰白公為我打徹豈得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脈續綿綿乃擲下拄杖云千斤擔子方全付玄要如今拄杖談以拂子擊三下下座隱元琦頌云痛領萬峰白棒痕洞庭搖拽小乾坤無端一陳業風起浪拍孤舟過海門師即入方丈禮拜明曰老僧不出月去也至二十七夜辭衆二十九日示寂師仍欲遁歸洞庭四衆苦留乃繼其席嘗舉興化問克賓維那你不久為唱導之師賓云不入者保社化云會來不入不會不入賓云沒交涉化便打云克賓維那法戰不勝罰錢五貫克設堂飯至來日齊飯成興化自白椎云克賓維那法戰不勝不得喫飯即便趕出院師拈云若為濟宗兒孫必要明他家裏事豫昔蒙萬峯老人付我偈便以為得直至今日始知我錯萬峯不錯一遇東明和尚乃明棒頭賞罰言句亦然果然悟在己而法藉師豈曰一悟即為了當如以一悟靈通不求師法正謂威音已前無師可也威音以後師師相受者此也所以克賓識得父師苦心策發已明向上關棙子洞達閨閾中事不在言宣失錢喫棒受罰出院骨碎身粉也難酬報興化萬一況打罰出院乎海長老今日所以不嗣萬峯而東明者亦此也古諺云養女方知娘受苦生子乃識父辛勤誠哉是言也實有箇中大事豈容草草若與人抽釘楔坐獅子座為人天師抉人眼翳紹佛祖位者必須一一透過切莫以悟為是將綱宗抹殺置而勿究何異天魔外道莽蕩招殃悔乎萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若是別人不可救也爇此瓣香堪酬接引喝一喝云只笑你護短沒投師佛法當人情展坐具禮拜又拈香云此一瓣香供養東明長老一片赤心鞭策令余洞達宗源連喝兩喝云一言豈盡普慈心千古兒孫贊報恩又拈香云此瓣香供養昔日師僧指南之力若不蒙師何有今日他日到來拄杖三十喫有分堪報不報之恩喝一喝云受恩深處便為家有乳方知是阿娘禮拜起說偈曰源頭只在喝中存三要三玄四主賓五棒當人言下會四料還須句裏明末後真機死活句箇中消息在師承碎形粉骨酬師德將此身心報佛恩慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打圓相云釋迦至我六十二世有不可數老和尚又打圓相云多向者裏安身咄乃投筆而逝景泰元年全身塔於東明左側得法十二人東明旵嗣師著拈頌一帙行世花城弟子沈貫為之序其略曰海舟嗣旵公一事自佛至今無有其人人我四相些微未盡者不能為之師誠古佛再現人間也無奈師年邁臘尊出世無何而入滅宗風未能大暢寰中惟有拈頌古機緣百則令慧日重開破暗千古其頌或引人詩句出自手眼有合佛祖意者採托而成之箇中意旨是非不敢固必但見師之操履人品為法忘形去名存實自無苟足而其頌拈量不妄意測度謬為撰述者也明眼人見之究之奉行有日在嗟乎今時魔熾法殘拈花一脈寥寥不顯於世真正宗師煨鐺山穴保養聖胎俟時待緣暗流支派使兒孫布揚祖道雲興雨澍潤澤靈根佛祖花開香浮震旦觸聞其香咸令悟入者舍師之裔其誰歟時景泰丁丑三月九日山曉皙禪師崇正録云潭吉五宗教中之說總以未見永慈之誤之天童先師翁闢妄中答潭公書云老僧誠有意探討故刻小字印於語録之前數年竟不能得邇來有法侄山茨將海舟寶峰二祖機緣刻行於世蓋得之丹壑查居士家藏佛祖源流中者然則萬峰蔚出寶藏持持出東明旵旵出海舟慈慈出寶峰瑄又得靜菴素禪師語録素為海舟二世孫敘聯芳圖始自釋迦遞代相承敘至東明旵海舟慈雲溪瑛瑛與寶峯瑄為昆季焉據是源流的的相承海舟慈為東明旵祖之嗣無疑矣當時潭公聞先師翁之言始得豁然嗣後竟無餘議但俱未見翼善之誤以普慈為永慈耳樂讀氏曰海舟永慈翼善按康熙元年大咸咸公住東山時始為刊布四方一時名衲皆宗之前人俱未之見焉其東明海舟普慈傳乃悟老人作於崇禎年間山茨際公住東明時刊行也不謂翼善一誵訛互異不得已而兼存之所謂余生也晚前不見古人後不見來者惟有多聞闕疑已耳古今僞甚多世之譜牒造端恆有之具戒衲子有是事乎昔之天皇天王今之永慈普慈並載為是知我罪我我何畏焉水心月江覺淨禪師蘇之沈氏子十五歲往從古拙芟染參峴山宗不契後見東明旵和尚親依最久一日問旵如何是祖師西來意旵曰你那裏去來師進前曲躬曰那裏去來旵便喝師亦喝旵便打成化己亥正月十九日戒飭徒衆說偈而逝東明旵嗣已上三人邵武君峯大闡慧通禪師建寧邵氏子參雪骨中禪師一夕有省即說偈曰手把清風斧毗盧頂豁開三千諸佛祖一串穿將來旦詣丈室求見中曰還我舌頭來師復說偈曰坐斷恆沙界全心一物無浮雲都散盡獨耀一輪孤中印可之後住君峯弘治十四年二月十七日集衆說偈曰人生七十古來稀更添一歲也希奇若問老僧何處去處空獨露笑嘻嘻沐浴更衣趺坐而逝天界中嗣金陵高座古溪覺澄禪師蔚州人從雲中天暉昶芟染閲大藏歷五寒暑於大慧録中無字話染指參投子琦禪師言下機契親炙久之得盡其旨隱於固始之南山有年後住金陵高座結制小參三條椽下座堆堆把定身心若死灰撥出爐中些子火驚天動地一聲雷還有不惜眉毛者麼良入乃曰有時三世諸佛與火爐說法覓火和煙得有時火爐說法三世諸佛諦聽擔泉帶月歸於斯會得芥子納須彌也得須彌納芥子也得正眼觀來兩箇火爐三世諸佛結住於青州布衫一粒芥子百億須彌收歸於雲門胡餅兩堂雲水穿又穿不得咬又咬不得大衆正當恁麼時畢竟作麼生還會麼眉間拶出金剛𦦨露柱燈籠盡放光成化癸巳八月九日沐浴更衣集衆訣別端坐而逝少頃衆泣師復開目慰衆曰不須如是復瞑目投子琦嗣襄陽大雲興禪師久侍楚山琦和尚一日琦出郡歸衆途迎琦曰我不曾下山亦未嘗出郡且道甚處去來師曰大衆久立請和尚回寺琦曰那裏是寺師曰鐘聲響得好琦呵呵大笑師便禮拜後琦付偈曰躬自西州定宗旨親從投子付袈裟他年出世提綱要不立孤危是作家投子琦嗣涿州金山寶禪師參楚山琦和尚琦問曰面南看北斗且道明甚麼邊事師曰和尚合取口好琦曰未在師曰瞞別人即得琦曰如何是透關眼師振聲一喝琦曰向上一機又作麼生師曰青天日卓午琦曰未夢見在師曰木童拈玉線石女度金針琦曰轉身一句速道速道師曰雨添山色秀風來竹影移琦拈拄杖師便喝拂袖而出琦曰放汝三十棒師轉身作禮曰謝和尚慈悲琦曰子雖有滔天之浪且無湛水之波師俯首默然琦深肯之投子琦嗣唐安湛淵奫禪師參楚山幻叟琦和尚親依最久一日入室次琦問如何是至理一言師曰有口說不得琦曰松風流水為什麼却說得師曰為渠無口琦曰你道他說些什麼師曰和尚適來問甚麼琦曰祇如絶音響處還有說也無師曰有則灼然有只是聞不及琦曰聞即且置你道他說箇甚麼師乃豎起拳頭琦曰還有聞得及者麼師以手指香爐曰是渠却聞得琦曰因甚渠却聞得師曰為渠有耳琦曰汝亦有兩耳為甚聞不得師曰雖然聞不得瞞他一點不得琦曰放汝三十棒師便禮拜投子琦嗣石經海珠祖意禪師掩關次一日楚山琦和尚至關前擊門一下曰請關中主相見師斂手鞠躬而立琦曰趙州無字作麼生師曰只為婆心切肝膽向人傾琦曰不涉有無時如何師曰某甲到者裏却不會琦曰待汝出關與汝一頓師曰某甲即今亦不在關內琦指關門曰爭奈者箇何師便喝琦曰天氣炎蒸善加保護師便禮拜投子琦嗣長松大心真源禪師三池張氏子謁楚山琦問曰從上佛祖言不及處行不到處請師直指琦拈拄杖曰聻師便喝琦便打師又喝琦又打師便禮拜一日室中侍立次琦曰向父母未生前道一句來師曰道不得琦曰因甚道不得師曰他沒口琦曰又道沒口師曰謝師答話投子琦嗣松藩大悲崇善一天智中禪師彭縣人體貌奇異年十二從月光受業具戒後居松藩一日楚山琦和尚過其廬師述悟由琦曰如何是無字意師曰出匣吹毛劍寒光射斗牛琦曰趙州因甚道無師曰波斯嚼冰雪不覺齒牙寒琦曰拈過有無如何湊泊師曰夜深誰把手同共御街游琦曰向上奇特一句作麼生師曰秋夜家家月春來處處花一雙清白眼何用撒泥沙琦即印可之投子琦嗣石經豁堂祖裕禪師成都巨氏子久從楚山琦游一日琦閲經次師詣前曰和尚看底是什麼琦便喝曰你道是什麼聻師亦喝琦舉起經曰百千三昧無量妙義皆從者一卷經流出且道者一卷經從甚麼處來師彈指一下琦便休去投子琦嗣三池月光常慧禪師簡州李氏子參楚山琦琦曰久聞上座嘗覽大藏是否師曰和尚莫謗某甲好琦曰白底是紙黑底是墨畢竟如何是經師曰和尚莫要不本分琦曰作麼生是不本分底道理師曰經聻琦曰似即似是即未是師便禮拜投子琦嗣中溪隱山昌雲禪師參楚山琦琦問汝名甚麼師曰昌雲琦曰號聻師曰隱山琦曰雲在山中隱如何又出山師曰只因夜來鶴帶過嶺頭關琦曰或為霖雨時如何師曰遍潤寰區琦曰忽被猛風吹散時如何師曰依舊青天白日琦呵呵大笑投子琦嗣翠微悟空禪師關西人久依楚山一日入室次琦問踏翻大地無寸土徹底窮源事若何師曰有星皆拱北無水不朝東琦曰還假履踐功用也無師曰履踐則不無功用即不可得琦曰只箇不可得處亦不可得子又作麼師擬進語琦震威一喝師曰恩大難酬便禮拜投子琦嗣圭菴祖玠侍者一日病次琦往視值心上座來琦顧師問曰如何是心師曰開口不容情琦曰未在師返顧心曰何不禮拜和尚心便就禮一拜琦休去後病革有痛苦聲琦曰平日得力句到者時節還用得著麼師點首琦曰既用得著又叫喚作麼師曰痛則叫癢則笑琦曰只如三寸氣斷向何處安身立命師曰雨過天晴青山依舊琦曰從今別後再得相見否師曰曠劫不違今何有間琦曰恁麼則子不曾病耶師曰病與不病總不相干琦復執其手曰者是甚麼師便合掌曰某當行矣振身端坐而逝投子琦嗣共十二人五臺顯通大巍淨倫禪師雲南康氏子古庭堅和尚居浮山師往叩室中機契後住顯通上堂無孔鐵鎚當面擲黑漆崑崙攔路坐莫有挨拶得入拈弄得出底出來道看僧問如何是臺山境師曰不是天晴便是下雨曰如何是境中人師曰金剛窟裏萬菩薩曰未審尋常所說何法師曰清風吹幽松近聽聲愈好問如何是佛法的的大意師曰今年調雨水農家好春麥問如何是祖師西來意師曰待飯仙山轉身即向汝道乃曰拈砒霜作醍醐亦曾有也撒珍珠如瓦礫誰箇不然開眼上樹特地喪全身夢升兜率也是揚家醜未動情思轉魔女盡成菩提寶器不勞腕力指娑婆便為妙喜淨長水濬嶽積而來琅瑘覺冰消而去信腳踏翻琉璃穽等閒擊碎珊瑚枝上堂三聖震威一喝正法眼裏撒沙南泉白刃高揮古佛家風掃土何必不必探竿豈在人手湘南潭北塔樣脫體持來不萌枝上放春回烈𦦨堆中飛片雪有斯作略可謂其人誰家井底無天到處波心有月冬至示衆五頂瓊瑤堆千松珠玉枝盡臺山泉石煙雲飛樓涌殿總是文殊一隻智眼真光是汝諸人常在於其中經行及坐臥還知從不曾動著渠一莖眉毛麼若也與麼見得便爾攝大千於毫端廣塵沙於法界其或未然切忌東卜西卜老僧為汝諸人真實告報今朝冬至一陽生珍重示衆山高海闊月朗風清松蒼石白夏暑冬寒如是歷歷分明一一成現且道衲僧分上成得箇甚麼邊事莫有道得者麼不妨出來道看若無老僧自道去也拈拄杖便下座示衆演祖道有則奇特因緣舉似諸人欲說又被說礙不說又被不說礙大小演祖大似靈龜曳尾一言既落人耳如何諱得老僧也有一則奇特因緣索性舉似大方令他倚門傍戶者一箇箇壁立千仞便下座示衆老僧者裏也不說東村李大郎太儉也不說西社王二姊太奢也不會安角呼兔也不會添足畫蛇早起一盂白粥午後一碗清茶誰管他陳年爛葛藤冷地開華展兩手曰汝等諸人來者裏討甚麼乾木查師有山居吟無事山房門不開土階春雨緑生苔此心將謂無人委幽鳥一聲何處來古庭堅嗣夷峯寧禪師參大岡月溪澄和尚久而徹證澄付以偈曰祖祖無法付人人本自有汝證無授法無前亦無後藏本纘續後二句云汝受無付法急著傳於後月溪澄嗣杭州天真毒峯本善禪師祖貫鳳陽吳氏父宦遊廣東雷陽而生年十七出家初遇源明和尚示無字話師當下便能領解舉似明明曰我二十年看箇無字如蚊子上鐵牛子才學做工夫便有許知見復曰觀子根器有異於人切莫途中被人哄去作長老誤汝大事師蒙誨即發願一味拍盲做工夫自誓此生以悟為期慕無際道風入川參叩會際蒙召赴京遂掩關不設臥具惟置小凳昏重并去凳一日聞鐘聲有省說偈曰沈沈寂寂絶施為觸著無端吼似雷動地一聲消息盡髑髏粉碎夢初回再往謁際適際遷化遂求證於月溪澄和尚言下有契後澄遣書召師付囑師適因事他出澄臨委息命送衣拂師得法住山凡四十餘載成化初掩關石屋後住天真僧問如何是和尚家風師曰前江潮急魚行澀後嶺峯高鳥泊難僧請益高峯和尚示衆曰海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若人檢點得出一生參學事畢未審是那一句師曰待汝悟即向汝道僧曰不會師曰不見道你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子普說略曰寶劍全提日用中高揮大抹肯從容卷兮魂膽迎風喪舒也髑髏遍地橫萬死萬生渾不顧一鎗一騎便收功趙州性命分明也血刃參天不露鋒以拂子拂一拂虗空廓徹無消息萬里無雲天漢碧拶得須彌入藕絲彌勒釋迦齊叫屈倒騎鐵馬逐西風驚得泥牛從海出諸仁者若作奇特會孤負己靈不作奇特會抱贓叫屈且作麼生會解藏天下於天下始見林梢掛角羊壬寅示寂於天真塔於本山之岡月溪澄嗣五臺普濟孤月淨澄禪師西河張氏子首參月溪澄和尚令看趙州無字話三日有省澄異之復入蜀謁廣福福問大死底人却活時如何師曰眉毛眼上橫鼻孔大頭垂曰如何是無字意師曰風行草偃水到渠成曰大地平沈虗空粉碎汝向何處安身立命師曰雲消山嶽露日出海天清天順改元還清涼代王延詣內掖問道尊禮之令旨建寺於華嚴谷額曰普濟師住山後嘗有山居偈曰寰中獨許五臺高無位真人伴寂寥一任諸方風浩浩常空兩眼視雲霄甘貧林下思悠悠竹榻高眠石枕頭格外生涯隨分定都緣胸次略無求自住丹崖緑水傍了無榮辱與間忙老僧不會還源旨一任青山青又黃深隱巖阿不記年名韁利鎖莫能牽七斤衫子重聯補日炙風吹愈轉鮮颯颯春風和鳥哀清音直到耳邊來爐燒柏子端然坐對月殘經又展開後坐脫於本山月溪澄嗣已上三人鳳陽槎山護國無用文全禪師濟南商河劉氏子年十九投靈巖祝髮初見月天蒙示法要次參別傳有省入傳問虗空粉碎大地平沈汝在甚麼處安身立命師曰昨夜泥牛吞浩月今朝木馬吐清風傳曰一歸何處聻師曰一自白牛歸雪嶺直至如今不見踪傳頷之復往金山謁無極囑師見寶月月問有草鞋錢麼師曰青山不露頂月曰如何是應物現形師曰孤光明月普天輝萬象森羅全體現一日月入堂坐次叫曰寒寒師便搬火爐向前月曰如何是火爐邊事師敲火爐三下月微笑而出入室次月拈拄杖曰者是拄杖子且道主在甚麼處師奪拄杖擲地叉手而立月曰看者漢撞却拄杖子了也師拂袖便出後蒙印可出世槎山上堂舉古人道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾且道意作麼生衆無語師云不識匡廬真面目都緣身在此山中上堂法不孤起仗境方生道本無言因言顯道然雖如是猶未是衲衣下事在且道作麼生是衲衣下事僧問三乘即不問直指事如何師曰雙峯頂上鶴棲樹九龍山上鳥啼華曰西來祖意蒙師指東土相傳事若何師曰嶺上有風千古秀㵎邊流水萬年清問如何是白水境師曰一片荒田堆四野三間茅屋壯諸山曰如何是境中人師曰白虎頭邊天子廟黑龍潭上帝王基曰人境兩忘時如何師曰蘇武不知青羝意七郎常恨白鴉歸僧禮拜師拍案下下座廣善潭嗣崇福大慧覺華禪師維揚劉氏子初見海舟有省復參寶月於繁昌遂蒙印證住後上堂舉拂子威音那畔只是者箇如今目前也只是者箇若喚作拂子瞎却人天眼目不喚作拂子瞎却人天眼目大衆畢竟喚作甚麼若也直下見得便知迦葉微笑二祖覓心了不可得紹如來傳燈續祖宗正脈良久曰千聖不能識以拂子擊香案一下廣善潭嗣已上二人處州白雲無量滄禪師示衆二六時中隨話頭而行隨話頭而住隨話頭而坐隨話頭而臥心如栗棘蓬相似不被一切人我無明五欲三毒之所吞噉施為動靜通身是箇疑團疑來疑去終日呆樁樁地聞聲見色管取㘞地一聲去在頥庵真嗣明州用剛宗軟禪師示衆大凡做工夫只要起大疑情不失正念千疑萬疑祇是一疑才有間斷即落空也見汝等做工夫未曾半月一月打成一片焉得不走作果若真疑現前撼搖不動自然不怕惑亂又不得起一念歡喜心才有絲毫異念即打作兩橛只管勇猛忿將去終日如箇死漢子相似到者般時節那怕甕中走却鱉和庵忠嗣黔中正法雪光禪師族趙氏遍歷諸方凡五臺峨眉普陀諸名勝道場及各祖開山處無弗參訪至靈峯度夏聞舉嚴陽尊者問趙州公案舉似寂照照曰無功用處正好用功莫認些子光影有誤生平復結冬於景德一日於定中聞巖瀑聲觸發默舉從上佛祖機緣一一透得參潔空通禪師從頭舉似之通曰不見道莫謂無心云是道無心猶隔一重關道了便入寢室師自是茫無意緒懷疑不決一日見寒山子詩吾心似秋月之句凝滯頓釋得蒙印證後庵居古山示衆禪之一字學者須真參實悟才知其中平坦捷徑不可泛泛留心或作或徹須要死心用功朝夕向三寶前發大誓願起大精進將古人留下許多葛藤公案盡皆丟下萬萬不可將平日見聞增大我慢障我光明遲則十年二十年速則彈指剎那自然有箇透脫處直得千聖不傳之祕不異繫珠衣裏頓護故物自有一種真切受用處即所謂踏破鐵鞋無覓處得來全不費工夫者是也師住古山道風遐布慈心接引後學多增真實工夫視師恩逾慈母示疾之日索筆書偈曰如此而來如此而去欲叩真乘如此而已遺命脫化後七日封龕香雲繞室門下弟子及檀信千人共覩掩龕哀聲震谷云潔空通嗣性空和尚嘗作顯宗歌曰達此宗無今古拶破虗空還自補聲色堆頭妙覺場放去收來無間阻體中妙夜半木人臨鏡照波斯南岸嚼寒冰塞北兒童街市鬧用中玄石女吹笙碧樹巔趙州葫蘆挂東壁村中王老夜燒錢玄中玄妙中妙寶絲網裏鬬明珠須向暗中通一竅海潮音熾然說師子筋琴彈白雪兩岸青山笑點頭百年狐兔形摧滅雪峯瑞嗣曹洞宗南陽萬安松庭子嚴禪師河南緱氏縣人族姓樊幼多疾病父母許願出家九歲投少林霽雲師披剃十八受具博通內外典詩古文辭不學而能更遞酬唱下筆輒就碩師巨儒無不以法器期之初參江月照息菴讓皆有省發後參淳拙才禪師舉前所得質之才曰子不聞蠱毒之家水莫嘗否師曰也須吞得入吐得出始是好肚皮才曰蒼天蒼天更添冤苦師曰謝和尚印可復以參同契寶鏡三昧反覆徵辨大豁疑礙才曰荷擔大法盡在子躬遂付以衣法有五乳峯頭獅子子光前耀後自超羣之句時南陽萬安虗席延師主之洪武二年主少林力田給衆偈曰亂後歸來自耨耘生涯辛苦與誰論晝拈塊石驅山鳥夜坐巢菴逐野豚腸斷秋風頻擊柝目窺夜月以銷魂近來始識農夫苦一飯仍思施主恩僧問地藏栽田博飯與和尚是同是別師曰闌干雖共倚山色不同觀曰百丈開田說義但展兩手意旨如何師曰雖然無語其聲如雷曰和尚又作麼生師曰晝拈塊石驅山鳥夜坐巢庵逐野豚問岩頭參洞山不肯洞山嗣德山不肯德山岩頭有甚長處師曰若肯二師則孤負二師也曰他道洞山好佛祇是無光却是如何師曰賺殺一船人問和尚升座秦封槐因甚不來聽法師曰你還見秦封槐麼闍黎若見聽他說法有分僧問達磨面壁時如何師曰早是魔魅了也曰如何得剿絶去師曰倒搓芒繩縛鬼子杖人盛贊曰參了江月照卻被松風吹再謁息庵讓臨機不見師撞門淳拙鋪毒蠱能吞吐蒼天連呌冤靈鑰真風度五乳獅子兒哮吼超羣去岩頭何過師不肯洞德老賺殺一船人煙波誰解討秦槐不聽法面壁已遺殃左搓箇芒繩秋草空斷腸十三年冬周王為國母慈孝皇后悼資冥福命師升座說法賜僧伽黎後退老閒居七十而化香巖才嗣佛巖稔禪師上堂英雄識英雄豪傑喜豪傑山僧非二者一生友難結獨有七尺藤相憐還相悅夜來忽反目要打我腰折諸兄弟你道他為何如此謂我太把達磨心髓為人都漏泄今早他又求懺悔只為愛我之深却乃誤了此祕訣決然無人能辨別山僧亦欲將他也拗折豈不與彼成兩橛乃卓拄杖曰依舊兩生歡喜間非且拋撇香巖才嗣登封嵩山竹庵子忍禪師鄧州內鄉王氏子上堂舉法鐙欽開堂曰法鐙本欲棲藏巖竇養拙過時奈緣先師有未了底公案出來與他了却僧遽問如何是先師未了底公案鐙便打曰祖禰不了殃及兒孫曰過在什麼處鐙曰過在我殃及你天童覺云者僧若是箇漢出來便與掀倒禪牀不惟自己有出身之路亦免見祖禰不了殃及兒孫師云山僧則不然今日若有問如何是不了底公案拈拄杖便打云獅子咬人韓獹逐塊香巖才嗣登封華嚴遇禪師上堂說到不如行到行到不如忘套如何得忘套去靠拄杖曰白雲不約來青嶂緑水無心弄碧蟾下座香巖才嗣陝州熊耳登禪師上堂達磨皮鞋一隻不知是誰竊了去尚有此話大行莫道無可憑據噫若是一向恁麼去則今日使箇全無些子興趣乃拋下一隻鞋曰者箇還當得麼自笑曰也祇要此話大行下座香巖才嗣古蔡元禪師小參今夜不答話僧出師曰討棒喫的漢有甚了期僧曰何不便棒師曰賊是小人拈拄杖便歸方丈香巖才嗣已上六人天寧才禪師上堂山僧一生性急了弄成病又因性急了弄去病只因性急了多敗闕又因性急了多補闕如今垂老急不得却又不急不得如何是好仔細看來事到頭來不自由汝等又作麼生卓拄杖便下座空相圭嗣南陽維摩懷禪師上堂僧問文殊問疾時如何師曰掬水月在手曰維摩獨臥時如何師曰弄花香滿衣曰三十二菩薩說不二門時如何師曰穿花蛺蝶深深見曰維摩文殊互相激揚時如何師曰點水蜻蜓欵欵飛曰和尚是僧如今却演俗詩師曰一滴水墨兩處成龍曰和尚善讀唐詩師曰我知汝不善讀唐詩空相圭嗣雒陽天慶能禪師示衆一人有慶兆民賴之杖子有幸麟鳳紛飛僧問盲龜跛鱉時如何師曰好箇堂堂老大隨草鞋覆却骨包皮空相圭嗣韶陽雲門憨禪師參空相圭問一見便去時如何圭曰太鹵莽生師曰深入堂奧時如何圭曰太穿鑿生師曰恁麼則節拍相應去也圭命維那明窗下安排者杜撰衲子維那曰既是杜撰衲子如何安排明窗圭曰你試杜撰看那擬對圭即逐出師大笑圭𢹂手親送入客寮後出世雲門空相圭嗣陝州安國仁禪師上堂以手加額曰日早晚也侍者曰老和尚照顧眉毛好師曰善哉照顧眉毛去遂下座空相圭嗣大都天寧壽禪師上堂驢事未了馬事到來茫茫大地誰是放懷阿呵呵師去來無根樹子清風起不待春回花自開空相圭嗣遼州定禪師僧問如何是西來意師曰胡地冬抽筍曰若遇客來時如何師曰你莫思量我別甑炊香飯供養你曰何以克當師曰茅屋粗疏聊喫一頓便打曰深感盛欵師笑曰小人偏揑怪空相圭嗣解州沿禪師僧問有一問犯尊諱時如何師打曰賞你一箇大膽曰沿門乞丐是何行履師又打曰賞你一箇小心曰恁麼則小出大遇也師曰合眼跳河空相圭嗣曜州顯禪師僧問打地和尚被人撤去子時如何只用口咬天師曰今日又咬者箇頑皮漢又問彼門人因人問便拋柴在鍋中時如何師曰龍生金鳳子沖破碧琉璃空相圭嗣已上九人金陵靈谷潔菴正映禪師撫州金溪洪氏子幼入安仁三峯為沙彌洪武丙寅試經得度謁靈谷巽中謙禪師方入門懷中香忽墮地遂有省謙命領維那謙沒往天界參雪軒成公軒命典藏會泉州開元寺虗席乃鬮舉奉敕入院日上堂僧問法筵肇啓四衆具瞻皇恩佛恩如何普報師曰甘露泉開流大地曰報恩一句蒙師指西來祖意若為宣師曰庭前石塔聳寒空曰恁麼則遍界不曾藏也師曰汝見箇甚麼曰某甲終不敢自瞞師曰切莫眼花問如何是和尚為人一句師曰兔角杖挑天上月龜毛拂散海濵雲曰恁麼則龍天胥慶僧俗歸仁去也師曰且合取口僧禮拜師乃曰山僧蒙恩點住此剎親蒙天語叮嚀付以清心潔己四字此是傳佛心印亦是順海明珠既已頂戴南來亦要普施大衆須知世法佛法落霞與孤鶩齊飛古佛今佛秋水共長天一色天心罔測山益高而海益深聖語難窮天普蓋而地普載大衆作麼生會聖意去莫是不染世塵麼莫是不貪法味麼莫是不飲無為酒不坐涅槃牀麼若恁麼會非則不非是則未是山僧今日不敢久祕未免當堂指出去也木人舞出法堂前一任炎天飛白雪下座永樂元年朝京回福州諸山舉住雪峯寺時殿宇老敗師一舉而新之人咸以為應雪峯再來之讖後卒於金陵靈谷有語録名古鏡三昧行世靈谷謙嗣祖派圖以師嗣清遠渭者非是蓋誤以報國謙為靈谷謙也陝州熊耳松溪子定禪師偃師馬氏子七歲禮古巖祝髮逮巖遷化往參息菴命師主藏因白事次言下豁然大悟出世熊耳山小參宗門中事號曰單傳一心之外更無餘法祇為此土衆生好在言句中著腳甘在道理中埋殺於一心之法轉增迷悶所以初祖西來打破舊日窠臼闢開別樣乾坤非是好奇立異祇是見病與藥非為得已如初祖一到少林三緘其口九年面壁坐斷一切枝葉單提向上巴鼻任你窺伺無門鑽研不入者裏不可以有言會不可以無言會不可向格內通不可向格外通直須忘情泯見方可得其心髓則諸佛之法印列祖之慧命無出於此按一指而地轉天旋行一令而山崩海竭又安用割截虗空巧立門戶隨波逐浪別生枝節哉今日許多禪和不知務本祇尋枝摘葉過日不知有甚用處如洞山玉線金針大似花前弄影臨濟三玄三要無非醉後添杯諸人還看得破麼良久曰夜靜水寒魚不餌滿船空載月明歸師之勘辨學者凜若秋霜烈日隨機應酬如盤走珠一日示寂謂門弟子曰吾世緣已畢化時至矣汝輩勿以世情眷戀有乖道誼末後一句聽吾分付言訖泊然而逝天慶讓嗣舜都宗禪師僧問如何是長老家風師曰飢餐鐵釘飯渴飲木札羹曰作家到來以此相待遇著俗漢又作麼生師便打曰聊當點心天慶讓嗣空杏偉禪師僧問忽遇大蟲時如何師曰還見大空小空麼僧作虎吼師曰者畜生𨁝跳作麼曰如何得不𨁝跳去師曰空杏門下無弱將天慶讓嗣廣平實禪師僧問九蠻十八洞中是甚麼人教化得師曰拄杖子曰他不會鄉談師曰獨有此子伶俐曰敢乞和尚借去為引導如何師便打曰他那肯與人作情面天慶讓嗣已上四人
