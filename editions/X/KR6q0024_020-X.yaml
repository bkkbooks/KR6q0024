body:
  text: 六祖下三十五世曹洞宗北京大覺慈舟方念禪師別號清涼唐縣人族姓楊年十歲矢願出家投金臺廣德大慈老宿披剃自念生死事大受具參方初遊講席博探性相宗旨於暹禮二法師座下為唱導之師一日偶聽古道法主講楞嚴經至七處徵心處頓悟緣生不實法海深遠乃心自愧赧腰包直上少林參幻休潤和尚於立雪庭禮拜次潤問甚處來師曰北方來潤曰北方道法與此方如何師曰水分千派流出一源潤曰恁麼則何用到此師曰流出一源水分千派潤可之即命典維那余集生云二大老驀地相逢如馬伏波陳師反正俱妙似孫武子用兵進退合宜如龍插翼似虎帶角直是攖他不得近他不得然雖如此回互處各見機宜畢竟茫無涯畔若據明眼人看來各與拄杖三十何故聻急須著眼看仙人莫看仙人掌中扇一日師至五乳峰前隨喜初祖達摩大師九年面壁處忽然契悟從上大法亟詣潤方丈呈偈曰五乳峰前好箇消息大小石頭塊塊著地潤即為印證囑曰從上佛祖以自己所證遞相承襲欲令一切眾生知有此事余得之小山先師十餘年矣今將從上佛祖心印源流付囑於汝汝當上體佛祖之心為心以續慧命證燈相繼毋令喪失然雖如是尚宜晦跡林泉乘時而出師禮拜受囑潤復付以偈曰無上涅槃心佛祖相傳付吾今授受時雲淨風頭露師掩關五臺晝則一食夜則孤坐久之自念差別智不可不明乃肆遊諸方一切苦行人所頞蹙者師皆身親歷後至石城精厲過分雙目忽盲師曰幻身非有病從何來將身心一時放下硬坐七日雙目復明南遊普陀歸由越之止風塗眾請說法湛然澄公來參師問止風塗向青山近越王城畔滄海遙時如何澄曰月穿滄海破波斯不展眉師復舉洞上宗旨逐一問澄澄乃說偈呈似曰五位君臣切要知箇中何必待思惟石女慣弄無針線木偶能提化外機井底紅塵騰靄靄山頭白浪滾飛飛誕生本是無功用不覺天然得帝畿師閱曰語句緜密不落終始真當家種草也遂召入室印證曰汝後開兩片唇皮截斷天下人舌頭有分在即付偈曰曹源一滴水佛祖相分付至今授受時大地為甘露咄五乳峰頭無鏃箭射得南方半箇兒師應請住禾之東塔豫之雲居匡廬後欲投老臺山越中緇白力挽師歸寶林道場汰如河法師續高僧傳稱師為清涼國師後身示寂後法嗣湛然澄公迎龕塔於顯聖南山之麓幻林潤嗣嵩山少室無言正道禪師豫章新建胡氏子投上藍寺薙染年十五遇知休老宿指示禪要遂從休遊憩南嶽淨瓶崖朝夕參叩休曰欲究明此事須將宗教葛藤穿過始得指參遜庵昂昂語休曰無言足稱法器切不可以一知半解入渠胸臆第令南詢自參自悟休指張拙頌勘其履踐師曰真如尚不可為何頌之有休指往少室參幻休潤禪師潤上堂師問如何是洞上宗風潤曰月下三花樹峰前雙桂枝師曰和尚還別有否潤曰惟此一事實無二亦無三師言下大悟即呈偈曰雲攢絕頂月鎖幽巖石人撫掌木女舒顏潤頷之乃印以偈曰無言的旨不離言玄唱玄提妙絕玄今日單傳親印授他年雙桂利人天萬歷庚寅嵩山四眾請住少室祖庭周籓國主迎師說法主大開悟汝寧王聞之亦迎師至世子病足倚杖而視師乃引之周行七轉汗流如注而足即瘳僧問外道問世尊曰不問有言不問無言世尊良久意旨如何師曰動容揚古路不墮悄然機問如何是新年頭佛法師豎拂曰會麼曰不會師曰來年更有新條在不假重重為指陳老宿問如何是無言師曰四時行焉一老宿又問如何是無言師曰百物生焉師機鋒敏捷襟懷平實後逝寂塔於少室祖塋幻休潤嗣內丘智空了睿禪師本邑張氏子弱冠出家禮羅漢覺公祝髮初事蓬山天然禪師次歷燕都徧訪禪伯靡不升堂入室深造其閫奧復聞鄴下古風和尚開法於真定舍利摳衣座下決擇六載已而又值豫章大千潤和尚主少林結同志五人往謁潤一見以大器期之許入室凡室中徵詰皆迎刃而解服勤五載方領衣法頂像歸里京城衲子恭就廣慈蘭若請師開法僧問懷才抱德來時和尚如何相見師曰看君好似南陽隱不待茅廬三請來僧曰知音有幾人師曰還記得梁甫吟也無僧無語師曰蝦䗫打鼓蚓吹簫師名振長安列剎相望禮聘開法日無虗席後因見達觀憨山二大師皆為弘法罹難謂眾曰大名之下難以久居直下抽身南還就內丘結草庵二十年足不踰戶天啟四年十二月初五日端坐而化壽八十五門人智融等塔於本寺之後幻休潤嗣上黨宗教鰲谷妙銀禪師邯鄲苗氏子生有異相宛如梵僧父母知其非世俗中人送本邑杜家庵剃度一日看天童頌臨濟三聖不得滅却正法眼藏機緣有云心心相印祖祖傳燈想佛祖授受之道必肘後另有玄符豈直熟讀禮誦衣鉢束身能荷佛祖之事乎遂出參方謁大千潤和尚得法開堂上黨道聞帝闕說法內廷辭歸鄴下後遇流賊犯上黨眾請入城避之師曰有何不了乃避之耶是夜無疾笑談而逝門人奉全身塔於宗教院之東北隅幻休潤嗣象城淨業無疑真信禪師別號西巖蓬山皇親劉氏子禮城之中陽現公出家受具常書華嚴經一夕書入法界品至中夜無燈金光滿室緇素無不驚異現公以若作聖解即受羣邪語示之勉其往參大千潤和尚潤教看父母未生前話力參數載始得有省呈似潤潤急索曰速道師曰貍奴今日翻觔斗報道娘生鼻孔真潤乃付囑幻休潤嗣南宮令于鍾英居士字見明河南鄴下人生而胎素長舉孝廉屢上公車不第謂同胞曰人生各有夙懷願隨所慕今既不能遂志龍門想選佛場中心空及第亦不可獨讓龐公既就都門探賾禪講撥草瞻風深得智空禪師切磋深入少林閫閾聞大千潤和尚奉命入都駐錫大悲禪寺士往咨決門下凡三載一日請益如何是自己清淨法身潤曰四肢百骸九竅六臟備賅而存焉又不許向這裏會取限三日道得契即為授記一夜至五更忽聞禪堂開靜鐘響豁然省契遂擊方丈告報曰我會也潤乃把住曰速道速道士呈偈曰逃禪來扣少林風末後鐘鳴一竅通我做維那師便問幾椎打破太虗空潤囑之曰竿頭進步現宰官身修菩薩行無不可者後士第進士初知南宮旋棄去就鄴郡南北創廣濟寶蓮禪院二處開堂說法嘗有偈曰金榜慚將名姓傳濫竽三縣小烹鮮而今拋向雲霄外蓮社虎溪度歲年又曰久歷叢林每自憐為調心性不知年寂光法爾周沙界廓落無依笑普賢幻休潤嗣已上六人建昌黃龍壽昌無明慧經禪師撫州崇仁裴氏子誕時難產祖父誦金剛般若經而娩因名經初生頴異長貌蒼古九歲入鄉塾便問浩然之氣是箇甚麼塾師異之長依廩山忠和尚出家常疑金剛四句偈必有指據偶見傅大士頌曰若論四句偈應當不離身不覺釋然遂辭廩山隱峨峰嘗登絕頂顧盼而作偈曰踏上雲頭第一峰眼中廣博小虗空當時欲見無由面今日相逢處處同結廬三年人無知者閱傳燈見僧問興善如何是道善曰大好山師日夜提撕至忘寢食一日因搬石次堅不可舉極力推之豁然大悟即述偈曰欲參無上菩提道急急疏通大好山知道始知山不好翻身跳出祖師關南庵依頌云廣州城外一片石多少刺史移不入老僧舉起示諸方孟嘗夜渡秦關黑神莫測鬼莫測三百年來大好山巍巍占斷大唐國巨音選頌云處處春風草離離不堪悲處更堪悲巨靈劈破華山路虎勢龍威在此時遂往廩山呈偈忠和尚即為印可始許薙髮受具自此服勤左右日夕溫研影不出山者二十四年出住寶方時師年五十一矣師住山日有僧問師住山前曾見何人師曰總未行脚僧激之曰豈以一隅而小天下乎師善其言遂徧參蓮池宏達觀可憨山清諸大老語各投契名布叢林師至少室禮祖塔會無言宗主言見師舉揚奇特乃與河南當道熊公尚父請師就寺說法峨峰入院日上堂大眾會麼此是三世諸佛用不盡的一齊撒向娑婆世界釋迦牟尼佛猶用不盡西天東土歷代祖師亦用不盡山僧今日信手拈來與大眾商量還是教外別傳經中玄旨麼函葢乾坤隨波逐浪麼截斷眾流擡薦商量麼大用現前探竿影草麼當陽撒出金剛寶劍麼據實而論窮劫不盡且要具眼者揀辦得出白是白黑是黑即不囫圇打作一塊始可定叢林之是非驗學者之邪正然後應聖應凡自然不被詐明頭之所欺舉措應緣無不合轍然此道離微昧之久矣眾中有大智者當拌身命盡力匡扶以悟為期自他兼利一生不足再拌一生盡其三生自然合得古人云不入生死大海難得無價寶珠此猶是鈍機伶俐漢一聞便知妙然雖如此不得春風華不開且謾道及至華開又吹落上堂臘月逢辰叢林設粥所為何緣無非順俗衲僧門下不必如斯豈不聞三世諸佛不知有貍奴白牯却知有若恁麼則三世諸佛已立下風況迦文佛乎且道貍奴白牯有甚長於諸佛首座曰為他金烹大冶玉出藍田師曰然雖如是寶坊不免連貍奴白牯一齊趕出三門下何也秉綱立紀振叢林海晏河清正令行好漢盡收歸寶所化城推倒不留人首座曰和尚道化城推倒不留人在和尚分上即得某甲則不然師曰汝又作麼生座曰閒挑布袋渾無事笑等街頭一箇人師曰也是閒弦子下座觀音誕日上堂觀音大士且喜來也某甲有句話請問大士實是今日聖誕耶只知天無葢地無底一切世界有情無情從何而起道得即共大士七十三八十四道不得未免拄杖饒舌良久曰先已告過當仁不讓念大士記正法明王且放三十棒上堂揮尺一下曰宗乘中事難以措辭大道門庭爭容擬議等閒垂一機如太阿鋒離匣逢之者死不移時似塗毒鼓受槌聞之者喪不旋踵所謂妙峰峻仞野獸難藏寶樹晶光靈禽莫泊其用也單趕金毛歸野窟直追鐵額入深山掃天下之攙搶拂人間之孼屑提墮坑落塹之類揭迷封滯殻之流其功也使法界世界虗空界一體同觀俾佛道人道地獄道萬法融會雖然如是猶未為向上事且道出格限量外一句作麼生道咦正令不行先斬首大機一撥聖賢悲久立珍重上堂拈起一著佛祖一齊捉放下一著聖賢悉皆縛轆轤飛上天庭泥牛眠交地角非惟九有霑恩亦乃四生受樂惟有八大金剛弩力睜眉橫拈倒卓何則不許眾生亂描摸上堂青山青無山不藏雲綠水綠無水不生木惟有衲僧心調直無阿曲揮尺一下下座上堂真正龍象子有時提得起放不下有時放不下提得起不弄死蛇頭要將生虎尾有時跨上金毛背自然足下清風起會麼水不涸兮魚自在山青幽也鳥安詳僧參師問趙州道臺山婆我為汝勘破了也畢竟勘破在什麼處僧曰和尚今日敗缺了也師曰老僧一生也不柰何好教你知若實會舉似來看僧擬進語師打一棒云者掠虗漢竺庵成拈云臺山一案拈却多少人鼻孔換卻多少人眼睛者僧也解詐明頭及手老漢拈出箇柴頭向他面前一吹直得退身無路且道者一棒他還知落處麼師問僧如何是佛僧無語師云佛也不識僧云某甲初機請和尚慈悲指示師曰野猿峰頂空哀哭僧禮去僧問和尚因甚不行脚師云木馬休鞭橫兩腿鐵牛不索莽低頭白鶴魚頸項直斑鳩呼雨嘴頭鉤會麼僧無對師云行脚去僧問經年不會請師方便師云且將不會底來曰鐵橛子師云未是不會底曰和尚也不得拗直作曲師云老僧眼若摩尼曰某甲不會師喝出僧問有人不通宗教不達性理和尚還接否師云不接曰為甚不接師云為伊不通達曰已通達者即接耶師云亦不接曰為甚不接師云為伊已通達也曰總不恁麼來時如何師云若得恁麼老僧接之曰請師接師即打曰情知和尚只會恁麼師連打出僧問未相見時如何師云今日不答話進云相見後如何師云向道不答話僧又擬伸問師即打云鈍置殺人僧問如何是壽昌境師云雲散晴空不露頂如何是境中人師云天地清平海眾寧如何得不被境風飄泊師云挂印封侯猶不樂作麼生得大安樂師云不雜碎無繩自縛曰和尚還安樂否師云你試看僧喝師即打洞山五位君臣頌曰正中偏如意珍藏鑑眾賢雖然萬派皆相應宛爾無離玉座前偏中正應物現形不涉定但見千差共一宗不分貴賤皆寧靜正中來九重勑旨徧天涯發令通行寧朕兆玄音利樂絕纖埃偏中至靈機廓運撑天地一塵不控大慈威唯克自心存利濟兼中到妙不拘玄玄契妙親賢避惡悉無依入聖超凡俱不要師住寶坊峨峰壽昌三剎別建庵院二十餘所七旬尚混勞侶耕鑿不息丈室蕭然惟作具而已益王嚮師道德深加襃美每歎曰去聖時遙幸遺此老萬歷丁巳臘月七日師自田中歸謂眾曰老僧自此不復砌石矣眾皆愕然除夕上堂曰今年只有茲時在試問諸人知也無那事未曾親磕著切須痛下死工夫復曰此是老僧最後分付一著大眾切宜珍重新正十三日示微疾遂不食曰老僧非病會當行矣大眾環侍不懌師以偈諭之曰人生有受非償莫為老病死慌可笑無生法忍將何業識消亡一時雲淨常光發佛祖聊安此道場十四日書辭道俗十六日作舉火偈曰無始劫來祇這箇今日依然又這箇復將這箇了那箇這箇那箇同安樂復命侍者代為發火宣偈次晨取水盥漱拭身曰不必再浴迺索筆大書曰今日分明指示擲筆端坐而逝茶毗火光五色頂骨諸牙不壞即於本寺方丈建塔廩山忠嗣憨山德清禪師題師像曰久嚮無明名未識無明面突出大好山千里遙相見生涯在钁頭說法如奔電提張沒弦弓慣用石鞏箭只要射箇人應弦早奔竄忽撞頑石頭鏃羽一齊限拋出鐵渾淪見者絕思算此是吾師老面皮相看只許言前薦若問當陽向上機雲山滿目難分辨續指月錄尊宿集盧陵聶先樂讀編輯濟陽江湘郢上參訂尊宿機錄饒州薦福承古禪師操行高潔稟性虗明參大光敬玄禪師乃云祇是箇草裏陣遂參福巖雅和尚又曰祇是箇脫灑衲僧由是終日默然深究先德洪規一日覧雲門語錄忽然發悟自此韜藏不求名聞棲止雲居弘覺禪師塔所四方學者奔湊因稱古塔主范公仲淹出守鄱陽聞師道德請居薦福開闡宗風僧問大善知識將何為人師云莫曰恁麼則有問有答去也師又云莫問青青翠竹盡是真如鬱鬱黃花無非般若如何是般若師云黃泉無老少曰春來草自青師曰聲名不朽曰若然者碧眼胡僧也皺眉師曰退後三步僧曰苦師乃云吽吽問臨濟舉拂學人舉拳是同是別師曰訛言亂眾曰恁麼則依令而行也師曰天涯海角上堂夫出家者為無為法無為法中無利益無功德近來出家人貪著福慧與道全乖若為福慧須至明心若要達道無汝用心處所以常勸諸人莫學佛法但自休心利根者畫時解脫鈍根者或三五年遠不過十年若不悟去老僧與你入拔舌地獄冬至日示寂書辭眾偈曰天地本同根鳥飛空有跡雪伴老僧行須彌撼金錫恰逢冬至日靈光一點赤珍重會中人般若波羅密偈畢而逝嘉興聖壽宣翁可觀禪師出家南屏從車溪得省住聖壽遷當湖德藏退隱竹菴每自怡曰松風山月我無盡衣鉢也宋乾道七年丞相魏𣏌請主吳之北禪入院適重九指座曰胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登高臨安靈隱普覺湻明禪師因奉旨斷還九里松上堂山前一片閑田地曠大劫來無界至今朝恢復又歸來坐斷脚頭并脚尾東也是西也是南北東西無不是畢竟酬恩作麼生十里荷花九里松直指堂前香一炷和州淨戒守密禪師為薦福古嗣法上首僧問如何是佛師曰稽首稽首曰學人有分也無師曰頓首頓首僧作舞而出師曰似則恰似是即未是青州佛覺禪師頌仰山師子曰一色無過指示人白銀世界裏頻申超然推倒還扶起爭似東風煦日新一日佛日堯禪師詣師道場自撾鼓上堂抑揚雲門臨濟宗風平分半座不辭而去圓通善國師佛日自江右至燕寓大聖安一夕與佛覺晦堂夜話次時師年方十二座右侍立日曰山僧自南方來拄杖頭不撥著一箇會佛法者師叉手進曰自是和尚拄杖短日大驚曰可乞此子續吾臨濟一宗師曰雲門臨濟豈有二邪日稱賞不已金世宗幸聖安瑞像殿問師曰禮則是不禮則是師曰禮則相敬相重不禮則各自稱尊帝大悅得法後住延聖示眾舉洞山云秋初夏末兄弟或東去西去直須向萬里無寸草處去又曰祇如萬里無寸草處作麼生去石霜曰出門便是草大陽曰直道不出門亦是草漫漫地師曰且道諸人即今脚根下一句作麼生道若道無寸草許你參見洞山若道出門便是草許你參見石霜若道不出門亦是草漫漫地許你參見大陽若總道不得許你參見延聖何故惟有好風來席上更無閑語到人間燕山慶壽玄悟玉禪師金世宗令中使持紙一張書心佛二字問師曰者是甚麼字時圓通在座應聲答曰不是心不是佛稱旨次日賜長短句曰但能了淨萬法因緣何足問日用無為十二時中更勿疑常須自在識取從來無挂礙佛佛心心佛若依心也是塵師答謝曰無為無作認著無為還是縛照用同時電卷星流已太遲非心非佛喚作非心猶是佛人境俱空萬象森羅一境中黃山趙文孺居士為圓通善入室弟子記莂後常作頌曰妄想元來本是真除時又起一重塵言思動靜承誰力仔細看來無別人高郵定禪師初參玄悟室中舉僧問玄沙如何是清淨法身沙曰膿滴滴地師於言下有省僧問透網金鱗以何為食師曰乾屎橛溈山太初禪師字子愚溫陵人世為儒者師倜儻有大志所為詩文皆不凡士大夫多推目之一旦棄去選佛於尊勝以律自撿盡去豪舉之習出嶺徧參叢林有聲久之罷參歸閩會南劍報恩虗席郡守陳宓聞師名命主之未幾真德秀西山居士延師主大溈二十餘載日繞萬指師說法縱橫博大不讓古尊宿西山既致政每與師游從容論道莫不心醉大抵師以平實接人故諸儒雅重之中觀沼禪師海雲印簡之受業師也常誨海雲曰汝所欲者文字語言耳向去皆止之令身心大死一場休有餘氣到那時節瞥然自省方可與吾相見後同海雲為元兵所劫北渡至朔方元國主署師慈雲正覺大師之號及師將示寂有羽客楊至慎求偈師命執筆代書偈曰七十三年如掣電臨行為君通一線泥牛飛過海東來天上人間尋不見客曰師幾時行師曰三日後時五月二十七日也至六月初一果無疾而逝雪峰樵隱悟逸禪師懷安聶氏子屢叩名宿後得法於雪峰佛海禪師郡帥舉住雪峰凡七載退居西菴皇慶二年復奉旨再住賜佛智之號凡六年謝去至泰定二年仍奉旨補前席又居七載師三住雪峰百廢具修大為法門盛事嘗序雪峰錄有曰老真覺自德山一棒桶底脫後直得鰲店月寒象峰雪霽攬醍醐於一杓彰大用於三毬譬之轟百億雷霆於四天之下曠數百世真聲愈宏所有垂示流出胸襟葢天葢地廣陵一奏么絃下里不復聲矣元統二年示寂塔於佛海塔傍五臺鐵勒院子範慧洪大師因閱楞嚴至一人發真十方銷殞忽悟遂造河朔汶禪師陳所見汶可之臨終偈曰六十春光又八年浮雲收盡露青天臨行踢倒須彌去後夜山頭月正圓更衣坐脫建寧奬山慧空元模禪師古田蘇氏子修習禪定遐邇皈仰一日於定中游奬山至玄獎禪師道場有老人迎謁曰吾為師守此山五百年矣言畢化黑龍而去既寤乃曰吾當還此山也遂往卓菴一日謂眾曰吾今化緣已畢即當入滅復說偈曰四十餘年寄俗塵如今卻顯箇中尊巖頭一夜東風起吹得花開滿樹春鐵船無舵亦無蓬撑入金蓮性海中末後一機今說破白雲元不離長空大地山河覽無跡虗空撞破見端的縱教鐵輪頂上旋本性圓明常不失復曰西天第三代商那和修尊者隱象白山現龍奮迅三昧說法調伏諸外道然後化火自焚吾今往象鼻巖前亦當如是乃入龍奮迅三昧時雲霧四起雷雨大作繼而化火自焚眾收靈骨塔於菴之西鄭州普照佛光道悟禪師蘭州𡨥氏子偶宿灣子店聞馬嘶豁然大悟歸告母曰某於途中拾一物母曰何物師曰無始來不見了的母掌曰何喜之有遂辭母參方母曰將何之師曰水流須到海鶴出白雲頭往參白雲海禪師遂承印記元泰定二十四年出主普照身著白衣跨黃犢吹短笛游於雒中嘗曰道我凡耶曾向聖位中來道我聖耶又向凡位中去道我非凡非聖耶却向毗盧頂上別有行處泰和五年入滅鴈山羅漢寺證首座目瞽見道明白晨朝躬自汛掃或問者片田地掃得乾淨也未座豎起苕帚示之又問真淨界中本無一塵掃箇甚麼座亦豎起苕帚示之嘗題九牛山偈曰四五成羣知幾年春來秋去飽風煙清溪有水何曾飲綠野不耕長自眠箇箇脚跟皆點地頭頭鼻孔盡撩天尋常只在千峰頂大地人來作麼牽溫州靈雲省菴思禪師台之寧海人兄弟四人師居長同時發心出家祖父遺業悉散眾親徧叩諸方後出世靈雲結夏上堂以大圓覺牛角馬角為我伽藍瓜籃菜籃上堂舉趙州狗子無佛性話頌曰狗子佛性無狗子佛性有猴愁摟拽頭狗走抖擻口晚年退居靈雲之前山至正甲申空室偕數衲往謁時師年踰九十矣龐眉皓髮頎然清聳拽履而出且行且問曰何處來空室曰江心師曰深幾百丈室曰謾老和尚不得師曰且坐吃茶文獻公黃溍居士字晉卿婺之義烏人元天歷初詔天下僧儒善書者會集杭州淨慈泥金書大藏尊經士亦預焉每食必與眾僧共處若別為治具則不樂甚至詬罵不食而去嘗題懸崖墨蘭曰嫋嫋春風一樣吹託身高處擬何為從他自作顛倒想要見懸崖撒手時題東坡像贊曰五祖禪師世外人娑婆久已斷生因誰將描邈虗空手去覽他年身外身題山谷像曰笑殺當年老晦堂相逢剛道桂華香披圖面目渾依舊鼻孔何曾有短長坱北和尚姓蔣不知何許人年十五涉獵經史言辭簡𨗉髼首垢面動靜不羈至正初抵松江沈氏家園常題詩曰萬紫千紅總是春何須饒舌問東君啞人得夢向誰說豎起空拳指白雲又曰不偏不倚立於中不著西邊不著東超出東西南北外一毫頭上釣蒼龍一日謂眾僧曰吾垂化盡矣若等勉之言絕而蛻奉化雪竇常藏主不諳文字專習禪定儕輩呼為常達磨云所作偈頌事理圓融音律調暢其頌鐵牛曰百煉爐中輥出來頭角崢嶸體絕埃打又不行牽不動者回端不入胞胎頌海門偈曰業風吹起浪如山多少漁翁著脚難拌命捨身挨得入方知玉戶不曾關頌苦筍偈曰紫衣脫盡白如銀百沸鍋中轉得身自是苦心人不信等閒嚼著味全真又息菴偈曰百尺竿頭罷問津孤峰絕頂養閒身雖然破屋無遮葢難把家私說向人台州黃巖濠頭丁安人法諱覺真號竺心初見絕田耕於委羽山有省入遂棄家築室自居復參涌泉古愚泉曰良家子女東奔西走作麼安曰特來禮拜和尚泉曰者裏容你不得安乃拍手一下曰三十年用底今朝捉敗泉便休去往鴈山春雨菴謁無際纔入門便曰春雨如膏行人惡其泥濘際曰不是不是安擬進語被際喝出晚年就邑中明因寺側開接待一僧提包笠直入臥內安問是什麼僧曰行脚僧安遽指其足曰草鞋𦄍斷為甚不知僧無語安便將包笠擲出曰者裏無汝措足處一日明因奎禪師相看安曰聞說長老夜來生得兒子是否明曰且道是男是女安曰鷄銜燈盞走鼈齩釣魚竿慶元育王勉侍者送同事僧遊台鴈偈曰鳥窠吹布毛侍者便悟去雖不涉言詮早已成露布天台嶺上雲鴈宕山中樹此去好商量莫觸當頭諱臨終偈曰生本不生死亦非死祕魔擎杈俱胝豎指鑷工張德道者鄞之下水人一日大雪沙彌團雪作佛像眾皆述偈詠之德亦隨後占偈曰一華擎出一如來六出團團笑臉開識得髑髏元是水摩耶宮裏不投胎永福靈江浩首座依古林於饒州永福居第一座結夏秉拂僧問進一步時如何座曰撞牆撞壁曰退一步時如何座曰墮坑落壍曰不進不退時如何座曰立地死漢天歷老素首座生平一關深隱罕有識之者有僧得其山居述懷三偈曰傳燈讀罷𩯭先華功業猶爭幾洛叉午睡起來塵滿案半簷斜日落庭華尖頭屋子不教低上有長林下有池夜久驚猋掠黃葉却如蓬底雨來時浮世光陰自不多題詩聊復答年華今朝我在長松下背立西風數亂鴉淨慈元菴會藏主臨安人修涅槃堂偈曰涅槃一路盡掀翻觸處工夫見不難洗面驀然摸著鼻繡鍼眼裏好藏山杭州天目一山魁菴主蘇州人也天資敏捷通內外典與平石砥友善棲遲巖谷不與世接僅有山麓洪氏子弟往來送供一夕洪氏婦夢主乘肩輿至其舍覺而產一子翌旦登山候之果化去矣因名應魁字士元幼讀書補邑庠娶妻生子年三十一旦忽自猛省遂棄家縛茅於東峯絕頂晝夜精勤行道一日空室和尚因避𡨥自徑山過其廬見其舉止閒雅應對從容叩其所以乃知其為一山後身也因謂之曰公前身與平石翁為莫逆交翁今年垂九十尚耳目聰明何不通箇信息亦見一夢兩覺而夢覺一如乎主欣然揮毫作偈寄之曰寄語天童老平石一念非今亦非昔欲聽寒山夜半鐘吳江依舊連天碧溫州壽昌絕照輝禪師嘗坐夏於淨慈東圊寮壁間有水墨大士像師朝夕禮拜墾禱甚切一日忽見淨瓶水從壁涌出通身慶快從此智鑑日明嘗有偈曰工夫未到方圓地幾度凭闌獨自愁今日是三明日四雪霜容易上人頭明州育王虗菴實首座寄臥雲菴主偈曰黃金園裏馬交馳徑寸多成按劍疑月曬梅華千樹雪臥雲一枕夢回時明州天童幻菴住首座禮應菴塔祖偈曰眈眈睡虎管窺斑便把中峯作靠山不得破沙盆一箇兒孫乞活也應難明州天童默中唯西堂詠蠶偈曰桑空柘盡始心休緜密工夫一繭收爐炭鑊湯拌得入為人只在一絲頭佛隴宜興可上座聽雨偈曰簷頭滴瀝甚分明迷己眾生喚作聲我亦年來多逐物春宵一枕夢難成瑞州九峯壽首座臨終偈曰七十二年者邊那邊喫十方飯參達磨禪今朝一擲翻身去笑破傍觀𭪿半邊天台雲峯無盡祖燈禪師四明王氏子參日溪詠公於天寧問曰生死事大無常迅速乞賜指示溪曰十二時中密密參究忽然觸著却來再問師抗聲曰無常迅速生死事大語未終師便喝師遽禮拜溪曰見何道理便爾作禮師曰開口即錯溪頷之出參諸方尋卓錫上雲峯影不出山者五十年洪武二年二月八日示微疾夜將半顧左右曰天向明乎曰未也或曰和尚正當此際如何師笑曰昔德山疾僧問還有不病者麼山曰有僧曰如何是不病者山曰阿㖿阿㖿師良久曰如此喚作病得否眾無語師曰色身無常蚤求證悟時至吾將去矣侍者執紙乞偈師曰終不無偈便未可死耶侍者請益堅乃書曰生滅與去來本是如來藏拶倒五須彌廓然無背向投筆端坐而逝徑山傑峯英禪師金華人初為徑山首座歸鄞楚石琦有偈送之曰凌霄峯頭第一座摩訶衍法皆明破百非四句俱已離白雪陽春誰敢和上堂衲僧行履豈尋常出匣吹毛不隱藏奪食驅耕全正令東西無復鬼分贓又偈曰清平世界罷干戈無柰兒曹籍甚何急水灘頭拋直釣錦鱗不遇枉哆囉尋常持金剛般若經一日持經畢即泊然而逝徑山敬菴莊禪師台州人自幼厭葷穢薄世塵父母捨廣慈菴出家久之徧參知識了徹宗源會於越中主二剎稍不如意即辭去往依全室於天界全處以二座未幾推主徑山道化隆盛永樂十二年奉詔入京同修大典寓天界三載少師姚公等交章薦師住持堅辭不受歸徑山示寂塔於水嶺小池上淮南祐上座者久歷叢席儕輩重之客鼎州天王寺以道自牧人不得而親疏居無何語眾曰吾去矣或謂其戲也迫之求頌即索毫楮大書曰來不入門去不出戶打破虗空更無回互拍手呵呵歸去來白雲散盡青山露乃趺坐奄化主事僧亟呼撼之師復張目舉手謝曰不致上累善為保重是時郡守蘇公亦往致敬撫其遺體曰可謂了事衲僧也佛妙禪師昆明人出家於天華寺洪武十六年赴京賜衣鉢杖錫遊浙之徑山宣德四年十二月沐浴更衣書偈曰去年七十九今年滿八十萬里為參尋世緣今已畢擲筆端坐而化杭州仙林雪庭禪師杭之仁和桂氏子毀齒喪父患痘風因雙目短視數求出家謁休休於仙林一見契合閱楞嚴至一毫端現寶王剎有疑後在江陰乾明寺忽覩萬佛閣金碧崢嶸於眉宇間有省後因除夕聞鐘聲不覺數年行履忽爾浩脫偈曰圓響心非聞大千同一照抹過上頭關更不存玄妙師自號梅雪隱人又曰幻寄嘗曰夫幻即寄之踪寄乃幻之跡幻起寄亡全寄是幻幻逐寄生全幻是寄翳目生華山河大地華翳不生空真實際幻之寄之誠哉兒戲吉州武功山白雲明星禪師閩之長汀張氏子落髮受具專修止觀忽歎曰大丈夫道業未就如生死何遂徧叩名宿緣機有契隱瀟峯二十餘年太守汪公勉師出世師復移茅深入學侶嚮至漸成精藍一日辭眾曰吾去矣眾問何往師示偈曰明月落波心白雲橫嶺上欲識本來機鐵牛吞大象語畢端坐而逝全身塔於本山杭州徑山月林鏡禪師本郡人少穎異穉齡出家間扣名碩俾參本來人久而有省作偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔試看元來是白丁金陵永寧古淵清禪師聞鷄鳴有省偈曰喔喔金鷄報曉時不因它響詎能知三千世界渾如雪井底泥蛇舞柘枝伏牛無礙明理禪師汾州和氏子參松竹大方和尚隨眾打七有一聲虗空碎獨露法中王之句後同月菴大圓入終南一日菴舉高峯銀山鐵壁話師頓悟述偈有一覺心空疑便消拈來放去自逍遙之句過方求證方曰伏牛打七即不問終南靜室意如何師曰伏牛打七泥團土塊終南靜室放大光明方喝曰即今光明何在師向前一掌方大笑曰如是如是杭州雲棲蓮池袾宏禪師郡之仁和沈氏子年十七補邑庠每書生死事大四字於案頭一日失手碎茶甌有省作七筆勾見志投西山性天和尚祝髮北遊參徧融後謁笑巖於柳巷求開示巖曰阿你三千里外來開示我我有甚麼開示師恍然辭歸過東昌道中聞譙樓鼓聲忽悟偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾閒事魔佛空爭是與非住雲棲侍郎王公宗沐問夜來老鼠唧唧說盡一部華嚴經師曰貓兒突出時如何王無語師自代曰走却法師留下講案遂頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑貓兒突出畫堂前牀頭說法無消息無消息大方廣佛華嚴經世主妙嚴品第一銓部虞公湻熈問慧日點五百病僧因緣師曰慧日自甘窮子捨己從人西院屈陷平民將生就死可惜五百僧只解點著便行曾無一二高臥不起令慧日顯異惑眾禍及兒孫郡主深切民瘼我山僧急趨時難倉卒中失帶了竹杖子不免奮空拳向居士癰腫上劈地一下敢保沈疴潰散毒血淋漓萬派流通百骸舒暢雖然如是云何一人能令眾起不見道陽回片葉春滿千林者事且止祇如終日把竹杖子東指西揮不如一直在木頭上朝持暮守守來守去忽然枯木重花便是死人再活說甚麼竹木管取盡大地草木叢林悉皆成佛去也何以故青青物外虗空體即是如來堅實心題自像曰十畫九不像惱殺丹青匠庶幾此近之權留作供養若道這便是依然成兩樣不兩樣三十棒問參禪念佛可得用融通否師曰若是兩物用得融通著問世尊默然良久外道謂開我迷雲空生宴坐不言帝釋云善說般若師曰良久處欲望開迷陰霾萬里宴坐邊擬聞般若說竟多時雖然如是鞭頭得旨空裏飛花者畢竟見箇甚麼新春日示眾今日賀新春歲時重換却昨日作麼生萬歷四十三年七月初四日師將示寂預別眾曰半月後吾將他往矣人皆莫測至期示微疾面西而逝徑山紫柏達觀真可禪師吳江灘缺沈氏子年十七剃髮遊方聞誦張拙偈至斷除妄想重增病趨向真如亦是邪大疑一日齋次忽悟乃曰使我在臨濟德山座下一掌便醒安用如何若何遂遊江南居無定所後住燕山有居士言及金剛經應無所住而生其心句師曰如何是應無所住而生其心士惘然師曰汝問我我為汝說士遂問師忽擊案曰聞麼曰聞師曰此非而生其心麼又曰汝是有心聞無心聞曰無心聞師曰此非應無所住麼復說偈曰木魚打得頻怕痛忽生嗔汝若知痛處禹門度金鱗萬歷癸卯秋忌師者以他事陷師罹難先是神宗皇帝手書金剛般若偶汗下漬紙疑當更易亟遣近侍質於師師以偈進曰御汗一滴萬世津梁無窮法藏從此放光上大悅師被逮日上見章奏意甚憐之在法不能免因逮及旨下曰著審而已拷訊時神色自如備嘗笞楚抵死以傳燈未續則我出世慧命一大負餘無他言始終不屈至十二月初五日入獄十七日法司定案欲死師師說偈曰一笑繇來別有因那知大塊不容塵從茲收拾娘生足鐵橛花開不待春又曰世法若此久住何為乃索浴罷囑侍者性田曰吾去矣幸謝江南諸護法侍者痛哭師叱之曰爾侍予二十年仍作此去就耶時有吳生者侍問大法復為說偈曰事來方見英雄骨達老吳生豈夙緣我自西歸君自北多生晤語更泠然語畢端坐而逝御史曹學程聞之急趨至無之曰師去得好師復張目笑而別獄中香雲不散待命六日顏色不改及出浮葬於慈恩寺外後迎龕建塔徑山著有紫柏集行世瑞州黃檗無念深有禪師黃州麻城熊氏子年十六患痘垂絕叔兄議許出家乃甦祝髮蕩山有老僧謂之曰十方一粒米重如須彌山若還不了道披毛戴角還師聞悚然即事參訪聞僧舉僧問大休如何是西來意休曰黃瓜茄子師大疑徧參江浙名宿謁廬山大安禪師安問曰汝號甚麼師曰無念安曰那箇是無念師茫然一夕聞哭笑二聲相觸猛然開悟偶見一盆在當路掇起送入櫃中見有果籠將手推開不覺失手櫃葢打頭渾身汗流笑曰徧大地是箇無念何疑之有將前疑滯一齊打破萬歷辛巳往龍湖同李卓吾居士至駟馬山有講主至士問主曰清淨本然云何忽生山河大地僧依文講訖士曰無念你說看師將開口士將師膝上一推曰這箇聻師忽猛省乃知十地菩薩夢見眾生身墮大河欲救度故起勇猛心發大精進人法兩空始得入門全無干涉有偈曰四十餘年不住功窮來窮去轉無踪而今窮到無依倚始悔從前錯用功僧問道果有耶果無耶師曰說有說無二俱成謗曰如何即得師曰無求即得曰如何是道之體師曰滿口道不著曰四大離散時如何師豎起拳曰者箇不屬四大問古人迸除却咽喉唇吻道將一句來者一句如何道師曰我不迸却咽喉唇吻你且道一句看僧無對師曰你被音聲塞却口問見性成佛是否師曰是曰性是無形底如何得見師曰性是有形底只你不見曰請和尚指出我看師曰我說汝不見問如何出離生死師召僧僧應諾師曰從者裏出曰和尚說底話某甲不曉得師曰等你曉得堪作甚麼夔州白馬儀峰方彖禪師達州羅氏子參如何是鬼神覰不破之機三年有省出峽徧謁知識結茅雙溪一日午炊聞甑中作聲忽大悟作頌曰三玄三要沒來繇用盡機思無處求窗前移步竈門下白雲青峰齊點頭齊點頭南嶽天台共一籌又曰二八女子嫁新郎績麻捻線一如常稱家豐儉隨時過嬾插堂前者炷香無幻聞之曰此人曾作細密工夫來萬歷壬辰秋歸達州中興白馬寺僧問如何是西來意師曰兩頭燒火一頭煙師平昔手中常執一鼗鼓一面書矗字一面犇字凡答話多舉而搖之示寂塔於龍神山廣信鵝湖養庵心禪師郡之上饒朱氏子偶過戚屬會道者譚四生之義師於言下洞了物我平等大意往雒之太平落髮南歸焦山度臘聞江中推船聲有省偈曰夜靜江空闊推船㘞㘞聲不知何所住擔子半邊輕謁華山聞山拈一段生涯六不收話有疑猛提七日身心脫然尋歸故里住靈山畫大圓相於壁間題曰內寫莫教塗黑外寫勿使傷白有人向圈裏圈外下得註脚者許汝學道無疑不然總是懡㦬後住鵝湖十年不立座元博山參以趙州無字話相契請居厥職贈以偈曰鵝湖十載虗元位一旦緣何立少年兩道眉毛八箇繓須知佛祖不容前師嘗以無門鎖置丈室以驗諸方偈曰上古留傳鎖憑君智鑰開若無開鎖法相見不須來萬歷丁卯二月晦日上堂說法置齋作別復示偈曰八十餘年幻夢中鐵牛耕破太虗空臨行一句相分付半夜金烏帶日紅端坐而逝杭州真寂聞谷廣印禪師嘉善周氏子母夢玄武神仗劍率諸甲士擁護其門而生七歲常瞑目端坐父母送之杭州開元寺剃度後師歸省親母誡之曰三朝新婦一世禪和子其勉之師每述其兩句終身受用不盡一日見壁間法界圖問其師曰十界從心生心從何處去其師不能答時儀峰和尚結茅清平往叩之峰曰汝要會須妙悟始得師曰如何得悟去峰乃教看雲門露字師一聞便信直下挨拶至忘寢食尋上雙徑結茆白雲峰下看亮座主參馬祖因緣疑不能釋一日見黃瑞香花忽大悟曰却是虗空講得經碌磚瓦礫正堪聽向來扭揑娘生鼻錯認葫蘆作淨瓶於是往雲棲盡得蓮大師之益次參龍池傳和尚適傳負暄階下師問曰和尚在那裏傳曰恰好不在師即展禮人事畢傳出所著德山托鉢頌示師且曰汝別頌看師即頌曰末後之句有也無德山父子太誵訛同條生不同條死活得三年恨轉多傳喜甚謂師曰何不承當此事共相唱和師不自肯傳曰更欲如何師曰視圓悟大慧為多愧耳傳憮然曰當今學者未會先會那能得不自肯如子者乎老僧當避一頭地矣瀕行傳送至門外撫師背曰老姪我還疑你在師曰甚處疑某甲傳曰如何是密啟其意師曰今日不打宜興轉傳呵呵大笑師頂笠便行北遊五臺還真寂四眾懇請開堂師堅持不肯遂南遊隱建州廢寺及自閩歸司理黃端伯復以為請師曰某孀居久矣豈更適人耶師生平滴水滴凍不肯一念外馳雖洞透祖關而挽回流俗終不以悟自居教律三宗鼎立師皆能洞晰其微時或為眾演說聞者靡不心服崇禎丙子臘月辭眾告寂塔全身於孔青之陽海虞破山洞聞法乘禪師別號雪柏吳江李氏子少從華山剃度單身行脚參紫柏可尊者可問一句中具三玄即不問一玄中具三要如何師屈指曰也是死蛇當頭可大悅以禪虎稱之一時名重叢林師住天目中雲庵雪嶠信參次師坐火箱口喃喃地信即跳入火箱同坐曰口喃喃地作甚麼師笑曰汝從何處來到此天目信曰從無陰陽地上來師默然信即跳下火箱林皋豫參師適在山門相遇師曰那裏來豫展兩手師曰這裏天王殿倒却還知麼豫曰既是天王殿為甚麼倒却師曰賊師一日謂嚴天池曰穹窿山昨夜點頭矣不知居士道箇甚麼勿謂三世諸佛口挂東壁也如居士灑灑落落不妨我多多和和師住破山舉漢月藏為首座每言近日禪病往往摶量公案註解因緣磨楞合縫稱斤度兩不惟自隔千生更復陷人無算天啟三年七月臨示寂呼侍者至即為坐脫供全身三七日儼然如生世壽七十二塔於破山寺南牧雲門禪師刊師語錄十卷行世雪嶠信和尚為之敘達澄受昭禪師通州人不言姓氏嘗參天童悟充西堂未幾忽棄去人莫測其意或嚴寒履冰或深夜陟巘或俗其頂或民其衣獨語咄咄不休或談鬼幻事聞者疑駭遇眾環拜視如路人輒叱之曰我不識汝或反拜之林和尚迎師住天童丈室禮敬甚恭少頃所有牀坐一時擊碎擲階下眾愕不知所謂更為陳設師即掩戶不語粥飯從牖入徒眾每隔戶稱名禮拜師皆不內忽一日逸去不知所之四眾悲戀牧雲門為師立師行道江陰黃毓祺介子居士晤費隱容於金粟自敘到過天童容云曾住幾時士云七八日容云還得天童意旨麼士云不得容云既不得莫是蹉過麼士云若有得則真是蹉過容云今日識得居士也士乃休士久依悟和尚大有入處悟化後同門法嗣請士結集悟和尚語錄書問行世後鼎遷士被執石頭城獄留題山翁忞像云憶自黃巖嗣席天童踞先覺堂卓卓孤風楔以楔出毒以毒攻蛇吞鼈鼻虎齩大虫正令全提孰敢嬰鋒出語成詠百折不窮佛果衙官大慧附庸穅秕之導往來愚衷國難以來蹤迹西東兄遊天外我戲圜中世出世間皆大英雄不負先師舊衲蒙茸眉毛結供鼻孔氣通曹谿正脈臨濟真宗是木上座亦號山翁三日將決矣復作絕命詩曰劍樹刀山掉臂過長伸兩脚自為摩三千善逝原非佛百萬波旬豈是魔潦倒不妨天亦醉掀翻一任水生波夜來夢作脩羅手其柰雙丸忽跳何以一破箑書寄牧雲門禪師然後坐脫圜中明州白雲延祥鹿門西師太楚之襄陽人也姓氏未詳早歲博通教典至濠泗間士大夫皆尊禮之不啻蓮社遠公矣於壽霍適中之地營塌房化城二剎後聞密老人唱導天童師易服腰包即詣座下悟一見契重之深錐痛劄盡捐寶惜未幾呈偈曰幾度喫棒最親切歷劫狂心當下歇不用擬議問如何覿體分明皮破血悟印可久之密老人過通玄遷化師聞白雲相距不遠即往觀之曰吾夙緣在矣有一虎出林伏師前眾皆驚愕師曰莫驚乃護三寶神也即廬其址虎乃為侍人皆言為之常禪師再來也郡伯韋公嚮師風訪於廬果見其道行精嚴容貌雍肅虎侍之異曰予與龐公霄壤之不侔而有同然也即捐資贖產聿成梵宇為白雲之中興也師於順治戊戌臘月一日辰刻集眾囑曰本寺當作十方叢席無違我願闍維後將吾骨為粉散於東湖令水族得利切勿營塔言畢書偈跏趺而逝當晚侍虎非嚎三日亦終弟子奉師全身三年顏貌不變後闍維舍利無數弟子將半骨散湖中尊師之願半骨塔於本山右麓青林如鑑老宿侯官林氏子十八矢志慕道出嶺禮雲棲宏又參顯聖澄和尚看無字有省以偈呈曰趙州狗子無佛性脫下袴子來遮面面子未曾遮得全半身露出令人厭澄撫而印之師不自當後以省親歸閩及祝髮復出嶺侍澄久之歸鼓山居東庵及博山無異和尚開法茲山宿傾心事之遂稱得旨自是深埋頭角潛修密煉至年八十七示寂於石林舊隱閱七日茶毗火光金色香氣馥郁平日所持木念珠不壞優曇和尚湖廣人族姓甯十九投顓愚衡祝髮後參天童悟和尚依侍久之悟一日見師擡石遽喝云翻轉石頭來師於言下有省悟深然之次日辭去結茅深隱後住靜江都參徒日集師終不自肯口喃喃梵唄不歇凡有請益皆叱之曰參方去康熙壬子五月朔示微疾至初八日命諸參徒入室問汝等還知老僧去處麼恩侍者云月明照見夜行人師云套語進云師意如何師云壬寅年不生壬子年不死汝再道看進云壬寅年却生壬子年却死師振聲大喝云得恁麼塗汙老僧進云畢竟如何師示偈云咫尺雲程九十州脚跟任意把拳揉門前柳色開金眼檻外諸峰笑點頭偈畢問甚麼時候了侍云午矣師乃索茶嗽口跏趺擲盞而寂太史蔣超虎臣居士江南金壇人謁鐵舟海禪師於金山問山河大地俱有壞時且道金山壞不壞海伸一足云向這裏下得一轉語便見端的士云下語也不難祗恐與師隔一層了也海云恁麼道又爭得士云和尚又如何海云切莫當面錯過士諾諾又問蘇長公與佛印禪師玉帶機緣請師代一轉語海云山衲若代語玉帶又要還了也士云畢竟下甚麼語方得相應師云莫謂山衲無語好士云將謂別有海云今日方始瞥地那士一日舉似同年孫孝則孝曰何不道是語何有是坐何處士寓孝則居士園久之孝問曰邇來不見兄有禪士曰禪可見麼孝曰試道看士曰想不必道次日孝謂士曰大悲閣記是兄的是古人的士曰是我的孝曰兄忘却了也士點首後入都寄書云此行良苦幸蚤為我賦招魂也孝復曰安得便心動北風有何惡士請告歸道經高郵乃別孝曰予將浪蕩了此一生孝曰何處去士曰過得廬山又峩嶺矣後果終於峩眉伏虎寺臨寂留詩一律云翛然猿鶴自相親老衲無端墮業塵直向鑊湯求避熱又從大海去翻身功名傀儡場中物妻子骷髏隊裡人只有君親無報答生生一念祝能仁題畢趺坐擲筆而逝寧波天井天壽鏡宗新禪師早參拈拄杖曰大眾米裏有虫飯裏有沙總是尋常事為甚麼須菩提咬落拇指良久曰有些脚酸示眾曰欲識佛性義當觀時節因緣高聲曰且道是甚麼時節買帽相頭早參卓拄杖曰老僧祇解這箇諸人又作麼生又卓拄杖曰上山擒虎易開口告人難明州天井秀峰敢禪師本郡邵氏子因僧問諸佛妙理即不問向上宗乘事若何師一喝僧一喝師曰且道那一喝是賓那一喝是主僧又喝師曰那裏學得這虗頭來因僧問如何是未生前本來面目師曰這問最親切僧曰學人不會再乞方便師打云正好向者裏會去金陵紫竹林卉堂旋煥禪師楚之武岡羅氏子心慕內典棄儒入釋禮圓照佛語和尚披剃歷有年所遂傳心印建峩山住五臺弘演教律道風遠振江南諸護法請住紫竹林除夕示眾月月有箇三十日惟茲三十休兒戲閻羅老子算飯錢試問諸人何所敵若敵得炎炎火宅清涼域若敵不得二六時中須著力且道如何是著力一句紅爐𦦨裏翻身轉那怕閻君面似鐵著有祇園小集藥師法懺清磯集說楞嚴綱旨法華提綱紫竹集等書盛行於世江南興化蘆渡大威權禪師本邑程姓投五台祕魔巖徧融老宿薙染參憨山清達觀可笑巖寶最後謁龍池傳時值密雲悟繼席執侍最久嘗發願云如今生不明此大事因緣誓不倒單晝夜端坐如一座泰山相似悟見師如此行履一日悟問汝在此多少時師曰三年悟曰三年前在甚麼處師打一掌曰在這裏悟曰這是三年後的事如何是三年前的事師又打一掌悟曰一掌不作一掌用時如何師曰今日被和尚一問只得嘴挂壁上悟曰如何是日用中事師曰飢則喫飯寒則添衣即呈偈曰一拶通身冷汗流全然放下任悠悠西來祖意何須問魔佛從今一筆鉤師一日請悟沐浴次師曰清淨法身作麼生浴悟便打師曰本來無一物又打箇甚麼悟痛打曰這漢若不打三十年後罵老僧去在師一日告眾送信檀樾曰老僧某日去矣侍僧問曰和尚往甚麼處去師以手指西而逝世壽九十九僧臘八十八古徐州龍山容止量禪師興化王氏子參山茨際和尚於東明際問曰汝是何鄉人師曰江北際曰可曾帶得鄉里物來麼師豎起拳頭際曰我不識這是甚麼東西師曰非但和尚不識三世諸佛亦不識際曰不識箇甚麼師一喝際便打師拂袖曰今日識破這老漢師於康熈壬子忽示眾曰吾行矣言畢泊然而逝續指月錄尊宿集終
