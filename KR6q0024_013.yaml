body:
  text: 六祖下二十九世臨濟宗杭州東明寶峯智瑄禪師蘇州吳江范氏子在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師恍然有警遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日負柴次舟見曰將荊棘作麼師曰是柴舟便呵呵大笑師罔然無措舟曰是柴將去燒却師起曰和尚畢竟是甚麼道理故問我我不能答是日刻意參竟不覺被火燎去眉毛面如刀割以鏡照之瞎然大悟作偈曰負薪和尚喚為棘火𦦨燒眉面皮急祖師妙旨鏡中明一鑑令人玄要得乃呈於舟舟便打師奪拄杖曰只條六尺竿幾年不用今日又要重拈舟大笑師又呈偈曰棒頭著處血痕斑笑裏藏刀仔細看若非英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗果是從緣入者永不退失從疑得者妙用隨機乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止從此名聞遐邇學者雲集一日天琦瑞參師問甚處來琦曰北京師曰只在北京為復別有去處琦曰隨方瀟灑師曰曾到四川麼琦曰曾到師曰四川境界與此間如何琦曰江山雖異雲月一般師舉起拳曰四川還有者箇麼琦曰無師曰因甚却無琦曰非我境界師曰如何是汝境界琦曰諸佛不能識誰敢強安名師曰汝豈不是著空琦曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一石車乘拈曰寶峯應機綿密覿面活埋不是天琦和尚洎合失卻一隻眼雖然如是且如何是西天九十六種外道底第一良久云諸佛不能識誰敢強安名金粟恁麼道卻是黑豆換眼睛法音溗曰溗上座仔細撿點將來三大老總不出九十六種外道內何故有舌無口琦拂袖便出師以偈付曰濟山棒喝如輕觸殺活從教手眼親聖解凡情俱坐斷曇花猶放一枝新時座下得法五人琦居首焉成化八年壬辰十二月九日師無疾而逝全身塔於東明寺右海舟慈嗣廬山雲溪碧峯智瑛禪師少未讀書苦不識字晚年信口成章時多奇之囑門人智素偈曰見徹娘生親面目從今保守者天真爪牙養就崢日哮吼一聲百獸驚海舟慈嗣已上二人邵武君峯清祥上座大闡問曰何者是有何者是無有無都不計後作麼生師曰有即是生無即是滅有無都不計非生亦非滅故曰佛性不生不滅佛性即是自性自性即是佛性有無不計獨露真如自性更無別説有即是幻無即是化有無不計非幻亦非化是名離幻即覺常覺不住故曰真如妙心有即是惡無即是善有無不計非惡非善生死永斷故曰菩提故曰般若故曰妙法故曰妙心故曰三世諸佛故曰列代祖師心印亦名自性圓通倒去顛來縱橫自在無坐無禪無修無證無定無亂望師慈悲證其虗幻復呈偈曰法性空無礙平等觀自在截斷兩頭機是名超三界闡曰宜深保養不宜速説君峯通嗣杭州徑山天才英禪師嘗曰默堂和尚平地上涌起波濤虗空敲出木楔中毒氣回來剛道親見寶月不知瞎却多少人眼睛呀洎合饒舌天寧宣嗣金陵碧峯天通顯禪師玉芝問碧峯寺裏有如來莫便是和尚否師曰上座還見麼曰縱見得也是金屑落眼師曰這漢死來多少時汝來為他乞命轉身歸方丈明日上堂舉古德云打破大唐國覓箇不會佛法的也無又曰向南方走了一轉拄杖頭上不曾撥著箇會佛法的此二句甚有誵訛試為酬一語看芝曰前不遘村後不迭店曰未在再道曰不遇知音者徒勞話歲寒師復問曰汝向南參有何言句試道看芝舉前悟道偈曰湖光倚杖三千頃山色開門五六峯觸目本來成現事蒲團今不鍊頑空滿目風光足起居有誰平地別親疏縱令達磨傳心訣問著依然不識渠師曰非非芝曰云何非非師曰子不非非恁人非非梁皇達磨兩不見機何勞折葦又遣人追古之今之落人圈繢曰如何得不落人圈繢師打一掌曰是落也是不落也芝聞師示將平日所蘊泮然冰釋即展謝去師遊西湖宗鏡堂升法座曰此處正好説法芝從傍唱曰説法已竟師便下座顧曰何者是我説法處芝曰劍去久矣師笑而頷之東方裕嗣杭州天目寶芳進禪師參夷峯寧有省付法偈曰真性本無性真法本無法了知無法性何處不通達師臨終呼門人問曰有水否從者以湯進師叱曰水以取淨何用暖耶汝等可易來從者易水至師嗽口作梵唄聲曰生如水濁死如水清清濁無定是箇恁麼大喝一聲而寂夷峯寧嗣荊州圓通夢菴懶牧湛覺禪師長安曲江張氏子幼慕禪悅從藍田秀芟染矢志究明生死大事朝夕孜孜至於寢食俱廢一日有省往見性空求為決擇遂蒙印證成化丙戌開法圓通上堂選佛場草深三尺空王殿浪捲千尋圓通有一句子囫圇吐不出吐出不囫圇若有人檢點得出許他具一雙眼性空法嗣曹洞宗西京少室凝然了改禪師嵩陽金店任氏子自齠齓繫念空宗依訓公剃落知有己躬下事遂依止祖庭草歲納僧服初參月印於香山涉歷寒暑鮮克契入會松庭嚴禪師主天慶師往依之每以己事咨扣舉印示衆路逢死蛇莫打殺無底籃子盛將歸語從此深明洞上宗旨師乃問曰這箇莫是背觸不得底意麼嚴曰笑破山僧口師聞罔措嚴呵曰你在鬼窟裏討甚麼碗師愈不安一日嚴上堂曰一言迥脫獨拔當時師當下釋然舉似嚴嚴乃印可歸隱二祖菴洪武二十三年請主少室上堂祖師心印不是有言不是無言不是有知不是無知豈可向言句下研窮意識中揣度哉昔日祖師初來販得久遠滯貨無人承當祇得九年面壁後來二祖却似癡猿捉月來問安心這老漢也是憐兒不覺醜向他道將心來與汝安二祖便承虗接響喚作得髓看來也好與三十棒何故才涉唇吻便隔千山諸人還會麼咄山僧今日與麼道也好與三十棒上堂莫向言中取則直須句外明宗若能如是會徹古徹今自由自在知麼師嘗有山居詩曰嵩山萬丈絶躋攀長夏松風儘日間自笑鼻頭雙孔大氣通天地有無間題石羅漢曰巖頭一尊石羅漢藤作髭鬚向風戰千年從不化齋糧身心如一無更換趺坐山頭數百秋也無歡樂也無愁縱然血浸齊腰雪羡爾惟將一默酬永樂庚子無恙忽召衆敘別説偈曰壽年八十七出息復入息撒手威音外綿綿與密密五燈纘續作撒手威音前金烏呌天碧杖人覺浪盛頌云香山月印再三撈還來松庭覓甚碗路逢死蛇盛將歸鹵莽卻來弄擔板笑裂山僧臭口門一言獨出行欵久販滯貨捉月癡猿句外明宗大蟲紙裹得髓須教三十棒莫聽千峯啼杜鵑師平日行止端莊王侯敬仰周蜀伊三藩登山供養厚贈珍貝師泊如也松庭巖嗣
