body:
  text: 六祖下二十四世臨濟宗婺州烏傷伏龍無明千巖元長禪師蕭山人族姓董年十九剃髮受具會行丞相府飯僧師隨衆入中峰本和尚適在座遙見師呼而問曰汝日用若何師曰念佛本曰佛今何在師擬議本厲聲叱之師作禮求示法要本以狗子無佛性話授之縛茅靈隱脅不沾席者三年一日聞聲有省亟往見本具陳悟由本復叱之師憤然歸中夜忽鼠翻食貓器墮地作聲恍然開悟即往質本本曰趙州何故云無師曰鼠餐貓食本曰未也師曰飯器破矣本曰破後如何師曰築碎方甓本乃微笑囑曰善自護持時節若至其理自彰師受囑隱天龍之東庵諸山爭相勸請師逸至烏傷之伏龍山卓錫巖際誓曰山有水吾將止焉俄山泉溢出作白乳色師遂依大樹以居初山有禪寺名聖壽荒廢已久當師入山鄉民咸獲夢異遂相率披蒙茸以訪見師晏坐不動各獻飲食共營起建尋因舊號成大伽藍朝廷三遣重臣降香錫號佛慧圓鑒普濟大禪師并錫金襴法衣上堂僧問如何是第一句師曰有口如啞曰如何是第二句師曰有眼如盲曰如何是第三句師曰棒折也未放你在乃擲下拂子曰此是老僧第二句如何是第一句便下座上堂僧問如何是奪人不奪境師曰日照山河影動搖曰如何是奪境不奪人師曰背水陳圓增勇健曰如何是人境俱奪師曰任是鋒刃常坦坦假饒毒樂也間間曰如何是人境俱不奪師曰野老不知堯舜力鼕鼕打鼓祭江神僧禮拜師曰有麝自然香何用當風立示衆舉德山拓鉢因緣拈曰末後句子德山巖頭雪峰總跳不出乃喝一喝大丈夫當為真王何以假為示衆良久曰大衆會麼會則事同一家不會則萬別千差臨濟和尚道我在黃檗喫六十痛棒如蒿枝拂相似如今更思量一頓喫不知誰為下手時有僧出曰某甲下手濟度杖與僧僧擬接濟便打看他的的顯示者些子無你諸人近傍處豈常情之所能測老僧尋常痛口罵你痛棒打你你不作無明會便作佛法會又何曾夢見我先祖門風所以古人云臨濟之道將墜於地痛哉正與麼時合作麼生超羣須是英靈漢敵勝還他師子兒示衆今年臘月二十五雲門一曲曾無譜爭似無明調轉高等間唱出千山舞大地為琴虗空為鼓拍拍相隨聲聲相助汝諸人須聽取白雪陽春何足數箇中端的孰知音寥寥永夜松風度示衆舉琅琊覺禪師曰有句無句如藤倚樹樹倒藤枯好一堆爛柴大慧和尚拈曰作賊人心虗雖然如是恩大難酬師曰一人作佛法商量一人作世諦流布簡點將來總欠悟在無明見處也要諸人共知有句無句如藤倚樹枝樹倒藤枯響示衆舉文殊普賢起佛見法見還免得貶向二鐵圍山麼世尊也是憐兒不覺醜示衆江月照松風吹面面青山展笑眉經有經師論有論師莫怪老僧無法説勞汝諸人立片時示衆舉調達謗佛生身陷入地獄佛令阿難傳旨汝在獄中安否達曰我雖在獄中如受三禪天樂阿難曰汝還求出否達曰我待世尊來便出阿難曰世尊是三界大師豈有入地獄分達曰我豈有出地獄分師曰臨危不悚真大丈夫日本國請法衣上堂舉石門聰曰西天二十八祖盡得傳衣付法東土六祖之後得道者多只傳其法不傳其衣無明則不然衣以表法故謂之法衣人能弘道故謂之法身無處不遍無處不明故謂之法眼高峰老祖法衣一頂今春對衆請與高麗國金剛山供養去也幻住先師法衣一頂我得來三十年矣如今大拙首座又要請歸供養雖然如是從上諸祖各各有三十棒分無明亦有三十棒分衆中莫有下得者般毒手者麼有則出來下手看如無他時後日不得向背地裏叫苦叫屈擊拂子下座僧參師問甚處來僧曰浙西師曰此間無飯喫來作什麼僧曰求和尚佛法師喚僧近前乃打一拳云會麼僧云不會師曰呆子拳頭也不識石車乘拈曰若是箇伶俐衲僧撥著便知來處既然不會纍千巖老漢更打一拳我當時若見擬議連棒趁去何故不入虎穴爭得虎子法音溗曰青山孤月近趺坐意如何要會拳頭旨千山盡懡㦬學士宋景濂謁次師問聞公閲盡一大藏教有諸士曰然師曰公耳閲乎目觀也士曰亦目觀爾師曰使目之能觀者公為誰耶士揚眉向之師於是相視一笑山茨際頌曰林下尋師叩板扉揚眉相向頗依稀作家手眼天然別笑殺全韜殺活機至正丁酉六月十四日示微疾沐浴更衣集衆説偈曰平生饒舌今日敗闕一句轟天正法眼滅投筆而逝弟子用陶龕奉全身瘞於青松庵中峰本嗣蘇州師子林天如惟則禪師吉安廬陵人族談氏受業禾山得法中峰僧問佛佛授手祖祖相傳畢竟傳箇甚麼師曰腳未跨門與你三十棒了也僧問如來一音説法衆生隨類各解未審和尚如何為人師曰蝦蟆𨁝跳上天蚯蚓驀過東海曰恁麼則超佛越祖去也師曰你向那裏見得曰今古應無墜分明在目前師曰杜撰禪和華嚴會僧問無邊剎境自他不隔於毫端既有自他如何不隔師曰懷州牛喫禾益州馬腹脹曰十世古今始終不離於當念既有始終如何不離師曰天下覓醫人灸豬左膊上曰此會翻宣教典毋勞説禪且望和尚直談教文師曰山僧無兩箇舌頭曰一真法界十種玄門還有自他終始也無師喝曰那得許多骨董來曰既無許多骨董畢竟華嚴所説何義師曰説華嚴曰離却法界玄門華嚴經在甚處師曰在你諸人手裏曰與麼則信受奉行去也師曰贈你三文買草鞋問德山小參不答話問話者三十棒意作麼生師曰我者裏不行有問即答曰無法可説是名説法又作麼生師拈棒僧便走師曰作賊人心虗問禪門一派分為五宗其間還有優劣也無師曰五五二十五曰臨濟一宗兒孫遍地他有何長處師曰細魚咬斷鸕鷀腳白鷺驚飛上樹梢曰涅槃心易曉差別智難明五宗異同請師開示師曰退身三步師不住山居恆隨機開導行省平章咸稽顙執弟子禮屢起江浙諸名山堅却不赴遁迹吳淞間弟子就吳中搆地結屋名師子林至正十四年帝師錫以佛心普濟文慧大辨禪師號兼賜金襴法衣示寂後塔於水西源中峰本嗣日本建長古先印原禪師國之相州人姓藤氏藤為日本貴族師生有異徵年十三父母頓捨出家剃染受具慨然航海南詢初謁無見於天台見指往天目參本和尚本命給侍師屢呈見解本呵之曰根塵不斷如纏縛何師退而悲泣食寢俱廢本憐其誠因語之曰此心包羅萬象迷則生死悟則涅槃生死之迷固是未易驅斥涅槃之悟猶是入眼金塵當知般若如大火聚近之則焦首爛額惟存不退轉一念生與同生死與同死自然與道相符脫使未悟之際千釋迦萬慈氏傾出四大海水入汝耳根總是虗妄塵勞皆非究竟師聞不覺悚然汗下一日有省趨告本曰印原撞入銀山鐵壁去也本曰既入銀山鐵壁來此何為師釋然領解本因囑曰善自護持一日示疾謂侍者曰時至矣可持觚翰來乃曰吾塔已成未書額耳大書心印二字端坐而逝初門人欲畫師像預索讚語師作一圓相題其上曰妙相圓明如如不動觸處相逢是何面孔中峰本嗣已上三人建寧仰山古梅正友禪師貴溪丁氏子參絶學誠發明宗旨流寓江淮垂三十年思得佳山水結茅歸隱慕武夷幽勝遂入閩建陽簿蔣德懋洎長者陳益宗捨園作庵迎師開山勑額大覺妙智室中每舉狗子無佛性話鉗錘勘驗不少假借結制上堂仰山結制尋常活計眼裏放光鼻孔斢他口切氣遇飢而餐遇困即睡諸方撒土揚沙仰山心空及第上堂九旬禁足又過一半心地未明如牽火鑽光陰莫虗度了却間公案平地無端捉得賊老僧出來為汝斷解夏上堂九旬禁足特地成錯三月安居無繩自縛布袋解開乾坤寥廓放去若龜毛收來懸兔角試將兩眼挂虗空一陳涼風生殿角小參日落山頭慘雲橫谷口陰欲明生死事直見本來人還有會得本來人底麼良久曰夜靜不勞重借月玉蟾常挂太虗中般若誡嗣杭州淨慈德隱普仁禪師婺之蘭溪趙氏子十四祝髮二十參方時了然義禪師弘大辨之道於智者寺師往叩機鋒觸發遂受記莂洪武初高帝親帥六師至婺州幸智者寺詔師主之後遷淨慈一日示微疾屈指計曰今夏五月矣左右曰然師曰八月八日最良吾將逝矣至期整衣端坐而逝智者義嗣杭州止庵德祥禪師本郡人與同庵俱為平山嗣德業風雅為時賢所重一日將涅槃衆請説偈師忽倚座曰者一隊噇酒糟漢我爭如你何竟趨寂淨慈林嗣金陵天界同庵易道夷簡禪師主南屏淨慈福緣日甚勑主天界進院日上堂毗盧遮那佛願力周沙界一切國土中恆轉無上輪者無上輪如何轉去卓拄杖云轉也轉也遂下座淨慈林嗣已上二人湖州辨山白蓮南極懶雲智安禪師嘉興沈氏子示衆萬法歸一無孔鐵鎚當面擲一歸何處抹過西天并此土青州布衫重七斤寒巖古木璚華春仁者勤殷問端的娘生鼻孔從來直倘然言下解知歸九九方明八十一海門則嗣處州福林白雲智度禪師郡之麗水人族吳氏聞無見覩和尚説法華頂往叩之曰西來密意未審何如覩曰待娑羅峰點頭却與你道師擬進語覩便喝師曰娑羅峰頂白浪滔天花開芒種後葉落立秋前覩曰我這裏無殘羹餿飯師曰此非殘羹餿飯而何覩頷之遂服勤數載辭去日覩囑曰昔南嶽受太鑑記莂後得馬祖授以心法針芥相契不在多言勿掉三寸舌誑人須真正見解著於行履方為報佛深恩耳洪武己酉詔徵天下高僧建法會於蔣山師應詔後還至杭杭人奉居虎跑秋趨華頂明年春示微疾仍回福林沐浴更衣索筆書偈曰無世可辭有衆可別太虗空中何必釘橛擲筆而逝闍維舍利五色齒牙數珠皆不壞建塔瘞於院西華頂睹嗣明州天童元明原良禪師寧海周氏子掃洞宗宏智禪師塔曰嗚呼山不讓塵故能成其高海不讓流故能成其深師非宿備六度萬行之願輪則曷由樹大法於古今壽昌源嗣杭州徑山呆庵敬中普莊禪師台之仙居袁氏子參了堂於天寧堂問何來師曰天童堂曰冒雨衝寒著甚死急師曰正為生死事急堂曰如何是生死事師以坐具作撼勢堂曰敢來者裏捋虎鬚參堂去一日室中舉庭前柏樹子話師擬開口堂劈口便掌從此悟入初出世撫州北禪後遷雲居徑山洪武初師應詔説法稱旨後銜命祀廬山禮成上堂老僧開荒時於法堂基上掘得一箇鈯斧子久聚兄弟若有用得著者兩手分付若是荷負不去老僧收得來著甚死急不如揚向擸𢶍堆裏從他日炙風吹去也驀拈拄杖卓一下鞭起鐵牛耕大地誰能井底種林檎冬至上堂舉洞山冬夜與泰首座吃果子次問曰有一物明如日黑如漆常在動用中動用中收不得過在甚麼處座曰過在動用中洞山令侍者掇退果桌師曰當斷不斷反招其亂若是徑山見他道過在甚麼處便與掀翻果桌亦使洞山知有宗門向上爪牙今日兒孫不致寂寥雖然也須腳踏實地始得拈拄杖不向藍田射石虎何人知是李將軍卓拄杖下座浴佛日上堂舉藥山因遵布衲作殿主浴佛次乃問曰汝只浴得者箇還浴得那箇麼遵曰把將那箇來山休去師曰藥山能縱不能奪布衲能奪不能縱總未具超宗眼在黃龍南禪師曰二尊宿一出一入未見輸嬴三十年後不得錯舉早是錯下名言徑山見處也要諸人共知今日殿中普請浴佛者箇那箇不得動著杓柄到手更莫顢頇擊拂子將此深心奉塵剎是則名為報佛恩僧問如何是雲居境師曰路轉溪回空院靜曰如何是鏡中人師曰大平時代自由身曰人境已蒙師指示願聞一句接初機師曰無毛子貼天食僧問路逢達道人不將語默對時如何師曰達道者方知曰和尚何得干戈相待師曰捉賊不如嚇賊曰明眼人瞞他一點不得師曰情知你不是好心師鏟草次僧問者片田地幾時剗得乾淨師舉起鋤頭曰未審上座喚作甚麼僧無語師拋下鋤頭曰者片田地幾時剗得乾淨僧問騎虎頭收虎尾中間事作麼生師曰渠儂得自由曰只如古人道我也弄不出意旨如何師曰入水見長人示衆夫為宗師者不得已垂示一言半句無非為學者抽釘拔楔解粘去縛譬如善舞太阿自然不傷其手近代據師位訓學徒記持文字崇飾語言誇耀後來增長惡習不知有自己出身之路如衣壞絮行棘林中不能自由少林直指之宗於此墜地良可痛傷汝輩行腳各須帶眼莫教墮他網中出頭不得只如古人道入此門來莫存知解若約山僧見處直饒知解頓忘猶是門外漢到者裏須辨緇素始得珍重永樂元年十月二十三日示寂於不動軒闍維煙𦦨所至舍利如貫珠塔於凌霄之陽天童一嗣溫州江心覺初慧恩禪師久依孚中信分座説法凡見人參叩便高聲示之曰休去歇去有再問則以棒趁出天界信嗣慈溪定水見心來復禪師南昌豐城人姓王氏謁南楚於雙徑久之乃得證入命掌內記無何避兵會稽遂住慈溪定水示衆舉文殊維摩各説不二法門頌曰妙喜文中問疾過機先勘破老維摩剎塵常説虗空聽一默相酬早是多文殊令善財採藥頌曰是藥拈來會得麼神方不必問耆婆若言殺活全工巧大地羣生病轉多百丈侍馬祖遊山野鴨子飛過頌曰野鴨羣飛過去忙馬師見處只尋常直饒忸得鼻頭破也是喪車後藥囊洪武元年以高僧徵召至京賜食內庭慰勞優渥適建鍾山大會勑師升座説法復命蜀王椿從師問道師答蜀王問參禪法要曰禪宗正脈以心傳心單提徑示直接上根不涉言詮不存知解如擊石火似閃電光見即便見了即便了得即永得一聞千悟獲大總持用而無盡體不可窮若乃展轉思量取捨分別悉屬邪禪邪道非菩提智生死到來總用不著是則參須實參悟須實悟良由自證匪假他求昔閩王請羅山間禪師開堂間升座方收斂僧伽黎乃曰珍重便下座閩王近前執間手曰靈山一會何異今日看他羅山作家不假言説而閩王天鑒自出常情後來洞山聰曰羅山忍俊不能禁大展家風吼一音紙墨如山書莫盡衲僧休向義中尋此古人直捷指示處宗眼明白與衆不同貧僧恁麼忉怛早是畫蛇添足冒瀆睿聰然蒙賜問不容緘默冀國政之暇少加垂覽復答晉王問禪要曰殿下以菩薩應身乘願再來弘護佛法善世利生於統理國務之暇常切究竟佛祖一大事因緣此實不忘本願故也但於日用放捨諸緣休息萬念念起即覺常覺不昧行住坐臥飲食起居應事接物看得力不得力勿隨事物轉涉他機境蓋世間萬事萬理皆出於心心若了時無法不了所以曰心生則種種法生心滅則種種法滅故知心無自性緣起即空不用多工最為省要法華經曰治世語言資生業等皆與實相不相違背華嚴經曰不壞世間相而成出世間法先德曰一切善惡都莫思量自然得入清淨心體此乃佛祖直指示人處若日用工夫目前事物莫管他是善是惡是逆是順是淨是穢譬如寶鑑當臺洞照妍醜物來即應物去不留不要起一念分別揀擇心亦不要問他靜時閙時苦時樂時儘與盡力真實做去若到無理會處却是好消息便與一時放下忽然知解兩忘人法雙泯即是大休歇大自在大安樂時節也昔有國王問波羅提尊者曰何者是佛尊者曰見性是佛王曰師見性否尊者曰我見佛性王曰性在何所尊者曰性在作用王曰若當用時幾處出現尊者曰若出現時當有其八王曰其八出現當為我説尊者即曰在胎曰身處世名人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂此便是究明自性底榜樣殿下宿具般若種智必能照了奚俟鄙言師年七十餘因坐胡黨被逮臨刑時怡然自適所著有蒲庵集行世徑山悅嗣杭州淨慈休庵無旨可授禪師台之臨海李氏子參普覺於靈隱問答之頃疑情頓釋住中竺將辭淨慈諸勤舊爭迎屢却不聽強居二載撾鼓告退一日示疾召左右曰吾逝矣左右進觚翰師麾去曰吾宗本無言説泊然而寂火浴齒牙貫珠不壞設利光瑩色如金晶其徒斂諸不壞并遺骼歸龍華塔而藏焉靈隱明嗣杭州普明立中成禪師郡之錢塘人姓孫氏年十三投慈光若山出家首謁祖芳聯禪師一日室中舉臘月火燒山話師呈頌曰白雲迷却舊行蹤臘月燒山火正紅忽地慈風來扇發冷冰冰處暖烘烘聯器之後於北郭建普明寺以接方來正統辛未六月十三日上堂説偈曰今年八十一老病隨緣且遣日今年記著後年事後年記著今年日至癸酉如期坐化壽八十三茶毗舍利無算建塔於普明祖芳聯嗣杭州淨慈照庵宗靜禪師郡之高氏子自幼剃落本山適祖芳聯領院事師依之久乃得旨旋典藏鑰永樂中應選出主護國尋遷雪竇後淨慈虗席舉師補之朝廷頒賜大藏師詣闕謝恩止於彌陀寺示微疾謂左右曰吾緣止矣沐浴更衣危坐而寂塔於藕華之祖丘有三會語録祖芳聯嗣已上二人溫州瑞安護龍太初啓原禪師日本國人姓源氏九歲入建長寺出家十八請告南詢歷三年抵福州時吳元之丙午二月進京貢上表物受齋襯畢勑見季潭泐公指令遍參後謁烏石愚禪師一日愚上堂曰雪覆千山因甚麼孤峰不白師示衆曰雷聲隱隱雨點全無峰曰草庵上蓋琉璃瓦石室中藏瑪瑙瓶師曰大蟲騎却南山虎愚曰虎生七子阿那箇無尾巴師曰第七箇愚曰且放汝三十棒由是許師入室後結茅廬阜復移石龍出世廣度遷羅陽三峰再遷護龍嘗垂三關語舜若多神因甚麼向平地上拖泥帶水金翅鳥王劈海取龍吞因甚麼被泥鰍吞却三世諸佛説不得因甚麼狸奴白牯念摩訶一日集衆説偈曰生也鐵面皮死也鐵面皮一擊百雜碎白日繞圍擲筆坐逝烏石愚嗣金陵靈谷非幻無涯永禪師衡之西安人年十二投烏石傑峰愚和尚出家愚問何處來師應聲曰虗空無向背愚指鐘示師師信口成頌曰百鍊爐中滾出來虗空元不惹塵埃如今挂在人頭上觸著洪音遍九垓愚奇之旋為祝髮居下版服勤積久疑滯盡釋得無礙辨愚為印可永樂間擢為僧録右闡教勑住靈谷會朝廷建大齋壇禮官董事甚嚴師若不經意者左右怪問之師曰自家有一大事甚緊無暇他及沐浴更衣趺坐書偈曰生死悠悠絶世緣蒙恩永樂太平年者回撒手歸空去雪霽雲消月正圓投筆而逝上聞遣中官致祭茶毗舍利遍布烏石愚嗣已上二人曹洞宗西京萬壽雪庭福裕禪師太原文水張氏子師五齡解語日了千言九歲入學一目十行遭亂喪家道逢老僧令師出家曰汝能誦得法華經則一生事畢師曰佛法止此乎莫更有向上消息否老僧異之遂偕謁休林古佛於仙巖曰此子龍象種也得奉巾瓶他日必成大器林欣納之乃為祝髮受具遂與雙溪廣公同參者七年次參萬松秀禪師一見便許入室問子從何得箇消息便恁麼來師曰老老大大向學人納敗闕作麼秀曰老僧過在何處師曰學人且禮拜暫為和尚蓋覆却秀大喜遂為印可法音溗曰且道蓋覆箇什麼咄千年田八百主從此親炙十年值壬辰之變祖剎荒蕪朝命以師補之尋承萬松海雲重以尺牘相招遂應朝命世祖潛邸命師作資戒會憲宗詔詣帳殿奏對稱旨俾總領釋教世祖即祚因論辨偽經馳驛以聞火其書賜光宗正法之號命師故里創建精舍曰報恩給田若物以飯衆時萬壽祖席乏人衆請師主之師姿穎悟三閲藏教而成誦透掖後學無倦色通羣書善翰墨吟咏其上堂普説幾十萬言播在叢林門人請梓之師聞而叱之曰此吾一時遊戲所發安可以形迹為哉既老倦於接納歸棲嵩陽僧問如何是西來意師曰待乳峰點頭即向汝道龍唐柱云有問如何是西來意即向他道直待乳峰點頭亦不向汝道問如何是向上尊貴一路師曰漁歌驚起沙汀鷺飛出蘆花不見蹤三宜盂公一字入公門九牛不出問九年面壁時如何師曰官不容針曰一花五葉時如何曰私通車馬曰恁麼新豐一曲因師唱出也師曰誰買黃金鑄子期至元乙亥秋示微疾書偈告終塔於寺之西隅報恩秀嗣燕京報恩林泉從倫禪師參萬松見阿那律得聞天眼因緣忽有省曰設使五眼俱瞎又能開我向上眼矣因舉似萬松秀秀問如何是向上眼師曰瞎秀曰真箇瞎師復曰瞎瞎秀頷之初住萬壽上堂禪禪禪非正非偏無意路有玄淵超今返古絶後光先但能忘影迹何必守蹄筌直指人心見性須憑祖意通玄九年面壁真消息端的其中有祕傳元世祖至元九年詔入內殿從容問辨薄暮將退帝曰在先有問皆言無説今何却有説耶師曰理本無説今且約事而言帝曰何故理無言説師曰理與神會如人食蜜中邊皆甜若問蜜之色相紫白可言若論味之形容實難訴説示衆北斗似杓南斗似瓢任伊斟酌暖日涼飈冬至寒食一百五須知氣節不相饒到此莫有解吞吐者麼僧問法眼道我二十年只作境會既不作境會合作麼生會師曰猿抱子歸青嶂後鳥啼花落碧巖前示衆若論此事如丹鳳沖霄不留其迹良由性空寥廓慧日精明照五蘊之皆空使萬緣之俱泯直得星攢碧落月浸丹墀翡翠簾垂燭香人靜當此之際那容喘息寧許窺窬密室不通風玄門難措足雖然如是一點靈明通宇宙那拘西竺與曹溪示衆妙用縱橫智體不動子雖依倚父全不知撒乾蓋而本自無心踞坤輿而端然有力此亦寂而不動感而遂通之朕兆也於此半遮半露似晦似明菉竹猗猗有裴君子孰能於是了別心佛之根莖枝葉者耶雖倚蒲危坐虗室生白心月孤圓秋天獨迥猶須轉身不居一色直得雁回北塞聲噎南樓木女初聞石人遙聽祇知日午是三更那信天明方半夜何也月滿猶虧半烏沈始是圓示衆黃河九曲誰能直下承當白浪千尋孰解其間薦得透與不透儘自瀾翻將心用心休教蹉過直須知有雲外立千峰不可言無巖前分萬壑靈松帶露怪柏欺霜傲四時而莫可雕零超萬象而敢為主宰憑何道理便乃如斯天得一清地得一寧衲僧得一鼻直眼橫怕汝不信試摸索看示衆語忌十成正雖正而不應居正機貴回互偏雖偏而莫滯於偏所以道澄源湛水尚棹孤舟古佛道場猶乘車子爭肯教伊向死水裏作活計到此地面活潑潑轉轆轆方有少分相應雖則水澄月滿一念萬年正是道人可愁慮處何也有德非為德無功始是功直得妙盡無依功成不處萬類千般莫能收管有時橫身劫外有時垂手中正去偏來無非兼帶這邊那畔不滯有無祇此建化玄門便是抄直要路若也於斯灑灑落落了了明明不枉不向響山中善通音耗未萌枝上能辨春秋咦還達此意麼若解無中能唱出方知元不住宮商至元辛巳十月二十日奉旨就大都憫忠寺焚燒道藏偽經除道德經外盡行燒命師下火師升座以火炬打一圓相曰諸仁者祇如三洞靈文還能證此火光三昧也無若也於斯會得家有北斗經人口保安寧其或未然從此灰飛煙滅盡任伊到處覓天尊急著眼看報恩秀嗣吾捨從寬禪師臨終問其次兄曰佛祖父母我今一箭射殺二哥以為何如隨整襟坐脫報恩秀嗣上都華嚴全一至溫禪師邢州郝氏子幼聰慧異常兒六歲祝髮參萬松秀和尚秀命為侍者凡秀偈頌法語一聞輒了遂得法焉常以侍者代應對機鋒不可犯太保文貞公劉秉忠薦師有經世才世祖召見與語大悅留內庭三載多有贊益將授以官堅辭還山錫號曰佛國普安大禪師至元丁卯五月示疾右脅而逝異香三日茶毗舍利無數報恩秀嗣丞相耶律楚材居士遼人也別號湛然居士因金滅遼公歸金改稱移剌時京師禪伯甚多公獨重聖安澄和尚常訪以祖道屢舉古尊宿語録中所得叩之澄間有許可公自以為得及遭憂患求道愈亟遂再以前所得訪澄澄為大翻前案不然所見公甚惑焉問其故澄從容謂公曰昔公居要地又儒者多不諦信佛書惟搜摘語録以資談柄故豫不敢苦加鉗錘耳今揣公心果為本分事子豈得不為苦口然豫老矣有萬松老人者宗説精通宗門大匠公能見之自當了公大事公唯唯往謁萬松甚有契合杜絶人迹苦心力究者三年乃獲印證先是元世祖將西征有司奏五臺等處僧徒有能呪術武略及有膂力者為部兵扈從西征公言於上曰釋氏之高行者必守不殺戒奉慈忍行故有危身不證鵝珠守死不拔生草者法王法令拳拳奉行雖死不犯用之從兵豈其宜哉其不循法律者必無志行在彼既違佛旨在此豈忠王事故皆不可以從王師也帝從之報恩秀嗣屏山李純甫居士初恃文譽好排釋老偶遇萬松秀和尚於邢臺一言之下遂獲契證乃盡翻內典遍究禪宗注金剛楞嚴等經序輔教原教等論嘗著少室面壁庵記略曰達磨大師西來孤唱教外別傳之旨豈吾佛教外復有所傳乎特不泥於名相耳真傳教者非別傳也自師之至其子孫遍天下漸於義學沙門以及學士大夫潛符密契不可勝數其著而成書者清涼得之以疏華嚴圭峰得之以鈔圓覺無盡得之以解法華頴濵得之以釋老子吉甫得之以論周易伊川兄弟得之以訓詩書東萊得之以議左氏無垢得之以説語孟使聖人之道不墮於寂滅不死於虗無不縛於形器相為表裏如符券然雖狂夫愚婦可以立悟於便旋顧盼之間如分餘燈以燭冥室顧不快哉士著述甚多開發後學大有功於宗乘臨終無疾趺坐合掌面西而逝報恩秀嗣已上六人順德天寧弘明虗照禪師遼州申氏子參仙巖因默坐聞磬聲豁然有省乃振錫燕之歸義值太保劉文正公向道有契付囑畢乃沐浴更衣索筆書偈云四大無常名為幻身擺手便行入無生滅汝當善自珍重趺坐而逝茶毗得舍利百顆劉文正公入奏塔舍利於天寧嗣法門人子顏子淇等二十有八人皆堅苦特立之士洞上一宗斯為盛焉仙巖德嗣
