body:
  text: 六祖下二十一世臨濟宗袁州仰山雪巖祖欽禪師婺州人續燈存藁作閩之漳州人初參天目禮令看臨濟三頓痛棒話一日纔上蒲團忽覺有省後參無準範和尚於徑山因鑄鐘令著語師呈偈曰通身只是一張口百煉爐中輥出來斷送夕陽歸去後又催明月上樓臺準即俾居侍司每遇入室舉起衲僧巴鼻佛祖爪牙更無下口處經十年偶佛殿前行擡眸見一枝古柏觸著向來所得境界和底一時颺下方始見無準老人立地處後舉示人曰正好與三十拄杖箬庵問頌云大虫無齒爪牙危未透玄關只暗疑不是脚跟親點地此心能有幾人知上堂純清絕點正是真常流注打破鏡來未免一場狼藉不若遇飯喫飯遇茶喫茶曉來獨立空庭外閒對寒梅幾樹花上堂海水不可斗量虗空不可尺度淨地不可撒沙爛泥不可著脚這四轉語轉轉有落處且道落在什麼處東京大相國寺裏有樹芭蕉風吹雨打一似破袈裟上堂有句無句如藤倚樹白鷺下田千點雪黃鸝上樹一枝花三千里外賣卻布單不遠而來因甚放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙上堂禪樹上叫喧喧道門前風浩浩冷地思量真可笑笑什麼等閒拾得蘇州梨看來却是青州棗上堂箇事本成現覓則不可見白珪本無瑕琢磨乃成玷執之以實法空中生閃電視之似等閒脚下添紅線若是學道人好好看方便作麼生莫看仙人手中扇準老人忌日拈香曰盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一處燒僧問如何是五家宗旨師曰有口祇堪喫飯曰若不借問爭達本源師曰未敢相許曰如何是溈仰宗師曰父慈子孝曰如何是臨濟宗師曰迅雷不及掩耳曰如何是曹洞宗師曰三更不借夜明簾曰如何是雲門宗師曰體露金風曰如何是法眼宗師曰山自清水自綠曰五家宗乘蒙師指向上宗乘事若何師曰頭頂天脚踏地師住袁州仰山世稱法窟第一咸湻己巳元帝賜賚尊禮至元丁亥寄竹篦麈拂及綠水青山一同授記與高峰原妙以讚示曰上大今已無人雪巖可知禮也虗名塞破乾坤分付原妙侍者徑山範嗣臨安淨慈斷橋妙倫禪師台州黃巖徐氏子母劉夢月而孕年十八落髮見谷源道於瑞巖聞三斤麻之話疑之徧叩諸方一日於雲居見山堂閱楞伽至蚊虫螻蟻無有言說而能辦事頓然有省參無準範和尚準以狗子因何有業識令下語凡三十轉皆不契師云可無方便乎準乃舉真淨頌曰言有業識在誰云竟不深海枯終見底人死不知心示之師悚然良久忽聞板聲大悟介庵進頌云漏屋恰逢連夜雨夏多愁霧鎖柴門忽然雲靜紅輪擁疊疊青山插遠村一初元頌曰頂門一擊汗如油捉敗當年老趙州自是黃河連底濁一翻驟雨一翻愁上堂荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入不在面門驀拈拄杖橫按會麼幽州江口石人蹲上堂舉慈明室中安一盆水盆上橫一柄劍劍上安一緉草鞋凡見僧來便指擬議便打師頌曰百花叢裏躍鞭過逸逸風流有許多未第儒生偷眼覰滿懷無柰舊愁何上堂德山低頭夾山點頭俱胝豎起手指頭玄沙築破脚指頭提起拄杖云都來不出山僧拄杖頭何以見得卓拄杖云一葉落天下秋牧公謙頌云千奇與百怪只在一毫端拈却毫端看霜花六月寒上堂舉達觀頴示眾云七佛是性隷萬法是心奴且道主人翁在甚麼處自喝云七佛已下出頭又自諾云各自祇候師云喚七佛為性隷指萬法是心奴達觀自謂有出身路及乎自喝自諾又是奴隷邊事主人翁何曾夢見在大眾要見麼以拂拂一拂云曉來一陣春風動開徧園林百樣花師將示寂與眾入室罷索筆作書辭諸山及魏國公公饋藥不受又使人問曰師生天台因甚死淨慈師答曰日出東方夜落西遂書偈而化徑山範嗣台州國清靈叟源禪師上堂舉僧問趙州真如凡聖皆是夢言如何是真言州曰唵部臨𠷑師曰趙州禪只在口皮邊看他與麼也是喚鐘作甕忽有問靈叟却向他道飢時但喫飯且道與古人是同是別西天梵語此土唐言上堂炎自炎涼自涼法無二法不用商量只如人人鼻孔在面上則固是知有我更問你別沼荷香何似深村稻香徑山範嗣慶元天童別山祖智禪師姓楊氏蜀之順慶人年十四得度初聞僧誦華嚴經彌勒樓閣入已還閉恍如夢覺見無準於雪竇範知是法器待之彌峻時或棒喝交下一語不少貸師擬對輒噤不能發由是知解都喪曰吾平生伎倆皆死法也今見此翁始行活路既而範移徑山命師分座天童州帥吳公奏師道行師被旨𢹂一囊一鉢縛茆以居寧郡久不雨師禱之輒應由是人情奔湊不三年盡還舊觀一日忽示眾曰雲澹月華新木脫山露骨有天有地來幾箇眼睛活有省問者師曰不及相見各自努力越十日夜分呼侍者囑後事叉手而寂徑山範嗣福州雪峰環溪一禪師題布袋和尚讚曰逢人乞一文袋裏敵國富不是下生遲嫌佛不肯做舉即心即佛頌曰即心即佛砒霜狼毒起死回生不消一服徑山範嗣明州天童月坡明禪師得法後陞住天童舉僧問雲門久雨不晴時如何門曰劄師頌曰雲門者一劄吹毛光透匣若不是張華徒勞眼眨眨舉良遂參麻谷因緣頌曰𢹂鋤不顧便好回去誰人敢道你是座主徑山範嗣廬山東林指南直禪師送僧還成都偈曰智不到處道一句一句當機便到家宿鷺亭前風擺柳錦官城畔雨催華徑山範嗣慶元雪竇希叟紹曇禪師西蜀人上堂發得一機活出得一言當萬里無片雲青天合喫棒不待春風著意開暗香已在梅花上舉僧問南泉師居方丈將何指示南泉曰昨夜三更失却牛天明起來失却火頌曰奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵元作故人看寄天童和尚偈曰翁翁八十再生牙爛嚼虗空吐出查撒向玲瓏巖畔樹枝枝葉葉是曇華徑山範嗣臨安靈隱退耕寧禪師初住嘉興崇聖次遷杭之靈隱舉僧問趙州和尚姓甚麼州曰常州有曰甲子多少州曰蘇州有頌曰蘇州有常州有三月江南啼鷓鴣堪笑有年無德漢被人拶著強分疏徑山範嗣福州雪峰絕岸可湘禪師台州寧海葛氏子舉僧問曹山雪覆千山為甚孤峰不白山曰須知有異中異曰如何是異中異山曰不墮諸山色頌曰言中彼此帶幽玄盡向言中辨正偏孤負一條官驛路芒芒沈在月明前徑山範嗣慶元天童西巖了慧禪師蓬州羅氏子垂髫與羣兒戲必摶泥沙為佛塔像既長遂出家見無準範自陳來歷範呵曰熟睡去既而令充不釐務侍者一日範謂師曰覰不透處只在鼻尖路道不著處不離唇皮上討之則千里萬里師抗聲曰將謂有多少準遷育王師侍行從容承稟乃盡其要逮範移徑山師居第二座自是聲動叢林節齋趙觀文作牧蘇州舉師開法定慧寺佛涅槃上堂拈拄杖召大眾黃面瞿曇乃竺乾猛將以慈悲為弓矢以智慧為戈矛統百萬雄兵勇不可當布三百餘陣勢不可敵如是四十九年演出五千餘卷兵書雖流落人間而未甞有一字漏泄因與生死魔軍為冤為對遂於䟦提河邊築一巨城名為涅槃於其城中先以紫磨金軀犒賞諸兵令其瞻仰取足再三撫諭而又散以八斛四斗珍珠其謀意無他必欲打破生死牢關普與盡大地眾生共行通天活路得到大安隱大解脫之場而後已豈謂二千餘載猶未遂其志未奏其功山僧既知其力盡計窮不免拔劍相助去也以拄杖畫一畫四海浪平龍睡穩九天雲淨鶴飛高師甞題靈隱兩廊畫壁曰幸是十方無壁落誰將五彩畫虗空善財眼裏生華瞖去却一重又一重晚年退居幻智庵將終誡執事已問曰今何時對曰二鼓矣遂放身而逮徑山範嗣越州光孝石室輝禪師上堂舉城東老姥與佛同生不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面十指掌中亦總是佛師頌曰平生不願佛相逢十指尖頭現紺容夾路桃華風雨後馬蹄何處避殘紅徑山範嗣共十二人杭州淨慈愚極慧禪師參石田薰於靈隱一日室中舉雲門念七話連舉十數轉無人下語忽有一僧纔跨門薰遽曰雪峰輥毬師侍傍聳耳而聽豁然領悟衝口說偈曰雲門念七雪峰輥毬白頻紅蓼明月孤舟薰頷之送寧禪人偈曰心未寧時為汝安落花小雨釀春寒斷橋流水孤山路楊柳絲絲拂畫欄靈隱薰嗣臨安中竺雪屋珂禪師上堂枯桑知天風海水知天寒且道衲僧知箇甚麼知道飯是米做直饒恁麼閻羅老子索飯錢有日在師以宋鼎既遷即謝寺事時金山默庵雅禪師尊師道行元兵下江南默庵被總兵伯顏脇置幕中從至武林默庵言於伯顏請師住靈隱親持請疏扣門師抽關露半面問曰汝為誰默庵曰和尚故人某甲也師落關曰我不識你蓋師雖處世外而以忠節自持故不屑靈隱之命斷江恩有詩曰雪屋今亡四十年高風凜凜尚依然伯顏丞相拜牀下不肯為渠來冷泉靈隱薰嗣已上二人慶元育王橫川如珙禪師永嘉人姓林氏始孩不肉食年十五出家後祝髮受具登太白謁天目禮咨決所疑禮舉南山筀筍東海烏賊話師擬對禮便打豁然有省被旨住育王僧問如何是教外別傳底句師曰不落玄妙僧曰恁麼則一超直入如來地師曰且緩緩問如何是學人行履處師曰你適纔從甚處上來僧曰如何報得四恩去師曰你且從適纔路下去問如何是聞復瞖根除師曰一不成二不是曰如何是塵消覺圓淨師曰漏木杓破笊籬上堂地大水大火大風大若一念無疑地不能礙若一念無愛水不能溺若一念無瞋火不能燒若一念無喜風不能飄如此即是無依道人佛從無依生若悟無依佛亦無得晚參少室無門戶如何便得通夜深寧耐立聽我說西東保寧茂拈云也有權也有實也有照也有用只是不得恁麼會珍重一日謂眾曰病叟今年六十六死日將至火化好土化好西堂唯庵曰山前有片荒地師即命疊石為塔復自銘曰天生一穴藏吾枯骨骨朽成土土能生物結箇葫蘆挂趙州壁永脫輪迴超三世佛將示寂書訣眾語而化所著有三會語錄天童禮嗣臨安淨慈石林行鞏禪師初住安吉上方後住淨慈上堂三家村裏牛動尾巴搖拂子與者箇相去多少擲拂子洎合停囚長智上堂雪峰輥毬禾山打鼓祕魔擎叉道吾作舞一切賢聖皆以無為法而有差別喝一喝下座天童禮嗣嘉興天寧冰谷衍禪師上堂朔風何蕭蕭吹彼巖下衣家業久荒蕪遊子胡不歸人生百歲豈長保昨日少年今已老翻憶寒山子十年歸不得忘却來時道天童禮嗣平江虎丘雲畊靖禪師上堂山僧若真正舉揚河步亭無汝著脚分且抑下威光隨汝根器未說超宗異目若知得虎丘山高一百三十尺舍利塔是隨朝建立也許汝有箇入處甘心下劣又爭怪得老僧上堂古人道依經解義三世佛冤離經一字還同魔說依與離既不可得畢竟如何卓拄杖漁人只看絲綸上不見蘆華對蓼紅天童禮嗣已上四人平江萬壽訥堂辯禪師上堂我若與你說破將後必須罵我我若不與你說破又恐你因循蹉過忽有箇漢出來道長老話墮了也只向他道老僧罪過悼雲巢和尚偈曰人傳師死已多時我獨躊蹰未決疑既是巢空雲又散春深猶有子規啼雲巢巖嗣平江虎丘清溪義禪師送僧偈曰台山萬疊入眉青途路同行各奔程清曉雞啼茅店月是誰先起喚師兄雲巢巖嗣已上二人臨安徑山虗舟普度禪師維揚江都人姓史氏稍長無處俗意母識其志俾依郡之天寧出家奮志參方初見鐵牛印於靈隱已而江東西湖南北悉徧歷焉湻祐初制府趙信庵以金陵半山請師出世景定間太傅賈魏公奏補中天竺復請旨陞靈隱至元丁丑詔住徑山上堂邪人說正法正法悉皆邪正人說邪法邪法悉皆正卓拄杖一下邪耶正耶又卓一下說耶不說耶向者裏揀辨得出黃金為屋未為貴玉食錦衣何足榮臨終示微疾索筆大書曰八十二年駕無底船踏翻歸去明月一天擲筆而逝塔於本山華藏通嗣平江萬壽高峰嶽禪師讚初祖偈曰開旗展陣入梁未覩天顏早已降縱有神通難展欵翩翩一葦渡長江淨慈道嗣平江承天覺庵夢真禪師宣州人八歲為僧十九受具二十行脚多見尊宿不能了決慕無準道風遂登徑山叩見每到室中戰怖話頭也不記得自此不去入室晝夜只是坐禪一日廊下行聞火板鳴有省私自歡喜遂入室準問你是喫粥喫飯僧參禪學道僧師抗聲曰喫粥喫飯僧準曰更須飽喫始得師曰謝和尚供養自此只是看狗子無佛性話無入作處乃過雪竇見大歇歇問作麼生是生死底事師曰眉毛安眼上歇曰眉毛因甚安眼上師曰說著令人轉不堪歇又問汝甚處來師曰徑山來歇曰火後事作麼生師曰五峰依舊插天高歇曰那事還曾壞麼師叉手向前曰幸喜不曾動著遂挂塔歸堂師自知未穩心下常熱閧閧地一夜更深舉首見瑠璃燈豁然大悟從前所得一時冰消瓦解次日入室歇舉如何是佛三脚驢子弄蹄行聲未絕師曰一任𨁝跳歇曰甚處與楊岐相見師曰當面蹉過承天上堂將心學佛攝入魔宮擬心參禪墮在陰界直饒嫌佛不肯做被拄杖子穿過髑髏若恁麼看來直是無用心處卓拄杖攜取詩書歸舊隱野華啼鳥一般春至元間有賢首宗講主奏請江南兩浙名剎易為華嚴教寺奉旨剖析諸師論解纖微若指諸掌講主悔悟遂禮師回奏雪竇謙嗣霍山昭禪師上堂即心即佛嘉眉果閬懷裏有狀非心非佛筠袁䖍吉頭上插筆不是心不是佛不是物漳泉福建頭匾似扇只可聞名不可見面雪竇謙嗣慧巖象潭泳禪師上堂舉無著和尚至五臺師老翁喫茶次翁拈起玻瓈盞問曰南方還有者箇麼著曰無翁曰尋常將甚麼喫茶著無對師頌曰五臺凝望思遲遲白日青天被鬼迷最苦一般難理會玻瓈盞子喫茶時雪竇謙嗣一關溥禪師舉馬祖令僧問大梅曰和尚見馬大師得箇甚麼便住此山梅曰大師道即心即佛我便向者裏住頌曰只將馬祖鉛刀子裂破漫天鐵網羅碧沼夜敲荷葉雨至今貧恨一身多雪竇謙嗣台州國清溪西澤禪師普說略曰參玄上士行脚高流撥草瞻風到一處所便乃供下入門口欵謂之生死事大無常迅速眾兄弟生死若是有從古至今無有一人能免生死若是無爭奈目前生死何生死亦有亦無不有不無當恁麼時還有漏網底麼既是走透無門臘月三十日撞到面前畢竟如何支準若是踏破草鞋歲月飄忽不可把玩要須窮教去處分明與前來入門口欵相應始得雪竇謙嗣已上五人臨安徑山虗堂智愚禪師四明人室中垂語曰己眼未明底因甚將虗空作布袴著畫地為牢因甚透者箇不過入海算沙底因甚向鍼鋒頭上翹足師年八十住淨慈入院日參徒問答次忽天使傳旨問趙州因甚八十行脚虗堂因甚八十住山師乃舉趙州行脚到臨濟話頌曰趙州八十方行脚虗堂八十再住山別有一機恢佛祖九重城裏動龍顏天使以頌回奏上大悅特賜米五百石絹百疋後住育王徑山亦賜賚優渥師甞舉東寺示眾曰心不是佛智不是道劍去久矣爾方刻舟頌曰昨日因過竹院西鄰家穉子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲師示寂塔於徑山直嶺下昔高麗國甞請師供養國王聞逝遣法嗣到山掃塔道場巖嗣明州天童石帆衍禪師舉陸亘大夫問南泉師姓甚麼泉曰姓王曰還有眷屬麼泉曰四臣不昧曰王居何位泉曰玉殿苔生曰玉殿苔生時如何泉曰不居正位師頌曰金鴨香銷更漏深沈沈玉殿紫苔生高空有月千門照大道無人獨自行舉大顛擯首座因緣頌曰一串摩尼覿面當機賺殺首座疑殺昌黎弄盡許多窮伎倆春秋元自不曾知道場巖嗣已上二人臨安徑山石溪心月禪師眉州人上堂舉僧問九峰如何是學人自己峰曰更問阿誰僧曰便恁麼承當時如何峰曰須彌還更戴須彌頌曰自家冷煖自家知祖意西來更問誰全體承當全體是須彌頂上戴須彌舉晦堂與黃山谷問答木穉花香因緣頌曰渠儂家住白雲鄉南北東西路渺茫幾度欲歸歸未得忽聞巖桂送幽香舉龐居士有男不婚有女不嫁頌曰收拾山雲海月情團圞鼻直眼眉橫龜毛拂子兔角杖敲得虗空嚗嚗聲金山開嗣福州神光北山隆禪師示眾曰即心即佛有水有竹屋便好非心非佛不襪不冠身自由不是心不是佛不是物閒倚闌干立清曉紅芭蕉引碧牽牛徑山沖嗣高臺此山應禪師上堂舉大隨庵側有一龜僧問一切眾生皮裏骨者箇眾生因甚骨裏皮隨拈草履覆龜背上僧無語師頌曰休將皮骨強分張得六藏時且六藏隻履盡情都葢了者僧無事可思量徑山沖嗣慶元天童簡翁敬禪師增集續傳燈誤入二十世無準範下上堂舉大梅即心即佛話頌曰郎心葉薄妾冰清郎說黃金妾不應假使偶然通一笑半生誰信守孤燈舉文殊問庵提遮女生以何為義話頌曰問處分明答處端當機覿面不相謾死生生死元無際月上青山玉一團徑山沖嗣已上三人湖州道場龍源介清禪師福州長溪王氏子得度於義興法藏齊禪師往育王謁寂窗照和尚入室契旨俾為侍者復掌藏鑰出世四明壽國遷開壽道場上堂三春云暮綠暗紅稀動為境轉靜為法迷不以色葢不以聲騎風前閑聽杜䳌啼育王照嗣杭州靈隱性原慧朗禪師別號幻隱台州黃巖項氏子出家首參竺元道於仙居繼詣徑山謁元叟叟問東嶺來師指脚下草鞋曰者是三文錢買得叟曰未在更道師曰某甲只恁麼未審和尚作麼生叟曰念汝遠來放汝三十棒師乃悟旨久之盡其底蘊曰纔涉思惟皆為剩法佛涅槃日上堂涅槃生死等是空華佛及眾生皆為剩語諸人到者裏作麼生會良久拍禪牀但見落花隨水去不知流出洞中春室中垂語曰昨夜蓮花峰被蜉游食却半邊你因甚麼不知又曰冷泉亭吞却壑雷亭即不問南高峰與北高峰鬬頟是第幾機眾莫有契者洪武十九年夏師被誣將逮或勸師早自為計師不顧怡然詣有司未鞫即廡下說偈端坐而逝徑山端嗣嘉興天寧楚石梵琦禪師象山人姓朱氏生在襁褓有神僧見而謂其父曰此佛日也他日必當振揚佛法十六為僧趙魏公見而器之為鬻僧牒得度受具一日閱楞嚴有省入歷覽羣籍恍如宿契往參元叟端和尚端震威一喝師愕然一夕睡起聞鼓聲豁然大悟汗如雨下拊几笑曰徑山鼻孔今日吾入手矣因成偈曰崇天門外鼓騰騰驀劄虗空就地崩拾得紅爐一點雪却是黃河六月冰端迎笑曰且喜大事了畢以第二座參叩者多令就師決擇出住杭州報國一日高右丞問禪分五派教列三乘教則不問如何是禪師曰正值歲朝公讌丞曰達磨西來不立文字直指人心見性成佛佛在什麼處師曰管絃雜遝朱紫熒煌丞曰莫便是和尚見處麼師曰不敢丞曰容在別日說話師諾諾一日座主參師問講甚麼經主曰法華師曰經中道是真精進是名真法供養如來是否曰是師曰供養即不無如何是真法曰具在藥王品師曰將謂是金毛師子元來是野犴眷屬主却問如何是真法師曰汝豈不從天台來主曰是師曰天台山高一萬八千丈頂上著得幾人主無語師曰喫茶去上堂俱胝豎一箇指頭雪峰輥三箇木毬石鞏張弓架箭華亭短棹孤舟鳳山無法可說不妨坐斷杭州就中却有箇好處好在什麼處四五百條花柳巷二三千座管絃樓上堂大事未明如喪考妣大事已明如喪考妣你道有成褫無成褫常因送客處憶得別家時上堂聞聲悟道塞却你耳根見色明心換却你眼睛薄團上端坐鍼眼裏穿線西風一陣來落葉兩三片至正丁亥帝師錫號佛日普照慧辨禪師適符昔日神僧之言尋退歸天寧上堂曰一毫吞却山河大地則易山河大地吞却一毫則難也不難也不易鋪箇破席日裏睡料想上方兜率宮也無如此日炙背洪武元年秋九月詔江南大浮屠十餘人於蔣山建大法會命師陞座說法上大悅二年春復用元年故事召師說法賜齋文樓下親承顧問師行出內府白金以賜三年秋上以鬼神情狀幽微難測意遺經當有明文召僧中博通三藏者問焉於是師與夢堂噩行中仁等應詔至京館於大天界寺上命禮部勞之又命膳部頒賜薪米旋命以所問條晰入告師援據經論成書將進忽示微疾越四日趣左右具浴更衣索筆書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢謂夢堂曰我去矣堂曰何處去師曰西方去堂曰西方有佛東方無佛耶師乃震聲一喝而逝時辛亥七月二十六日也上聞嗟悼久之時禁火葬以師故特從闍維例火餘齒舌數珠不壞舍利五色紛綴遺骼弟子文晟奉骼及諸不壞者歸師所築西齋建塔文憲宋公濂為之銘徑山端嗣杭州徑山愚庵以中智及禪師蘇州吳縣之顧氏子也自幼出家於穹窿海雲院祝髮受具聽賢宗法師講華嚴法界觀未終篇輒笑曰一真法界圓同太虗但涉言詞即成賸法縱獲天雨寶華於我奚益哉遂謁笑隱於建業隱文章道德傾動一世師微露文彩一時交相延譽有同參嶼公見師訶曰子才若此不思擔荷正法乃甘作騷壇奴𨽻乎無盡燈偈所謂黃葉飄飄者不知作何見解師舌噤不能答旋歸海雲胸襟礙塞目不交睫者踰月一日忽見秋葉墜庭豁然有省謁元叟端於徑山遂得法焉江浙行省丞相達識帖穆兒請住徑山上堂冬至月頭賣被買牛冬至月尾賣牛買被一年三十六旬有六日以閏月定四時成歲移易一絲毫不得東頭買貴西頭賣賤三十年破後草鞋向甚處著上堂時維三月節屆清明不寒不暖半陰半晴落花啼鳥一聲聲驀拈拄杖穿却解空鼻孔𭣟瞎達摩眼睛踏破草鞋赤脚走好山猶在最高層善權通長老書到上堂自從胡亂後三十年不少鹽醬雪後始知松柏操任汝非心非佛我只管即心即佛事難方見丈夫心有底便道江西信息通也大梅梅子熟也善權方便固當如是只如石頭道書亦不達信亦不通諸人如何話會直下道得鈯斧子未到你在師一日入園見典座割瓜師問割得幾箇祖師頭座曰三十箇師曰那箇皮下有血座曰和尚何得重重相戲師曰好心不得好報上堂齩破鐵酸餡百味具足演出大藏教一句該通三脚驢子弄蹄行萬里無寸草上堂拈拄杖十地驚心二乘罔測卓拄杖子承父業賺殺多少人靠拄杖下座有亡賴男子瞿範者日餮盤餐執事者譏之致忿誣師以闇昧之事詣部使者不滿意文致其罪師竟不與之辯亦毫無慍色踰年省憲白師冤復劄請再住徑山師入院拈劄曰前佛性命後佛紀綱總在者裏凜然如朽索之馭六馬危乎猶一髮之引千鈞若非大丞相赤手提持全肩擔荷何處更有今日諸人還委悉麼車不橫推理無曲斷陞座酬唱畢復曰去日應須償宿債回時宿債本來空山上鯉魚打𨁝跳一國之師展笑容帝師錫號明辨正宗廣慧禪師洪武癸丑詔有道浮屠十人集大天界寺師居首以病不及召對賜還穹窿戊午九月索筆書偈而逝茶毗火𦦨五色香氣襲人齒牙數珠皆不壞遺骨紺澤如青瑠璃舍利交綴塔於所居之陰復分爪髮塔於徑山徑山端嗣杭州靈隱樸隱天鏡元瀞禪師越州會稽人姓倪氏從弘教大師立公祝髮參元叟端和尚入門端厲聲一喝聲若雷霆師黏縛盡脫遽稽首作禮遂命居侍司尋掌記室追隨久之得蒙印可師應召入京從容問道賜食而退會靈隱虗席諸山交致堅請上堂聲不是聲觀音三昧色不是色文殊法門聲色無礙普賢境界拈拄杖畫一畫大鵬展翅葢十洲籬邊燕空啾啾上堂即心即佛嘉州牛喫禾非心非佛益州馬腹腹不是心不是佛天下覓醫人灸豬左膊上良久曰啼得血流無用處不如緘口過殘春未幾被逮謫陝西途次寶應寧國寺忽合掌端坐而逝徑山端嗣蘇州萬壽行中至仁禪師族姓吳番陽人父仲華為江州廣文師生五歲俾從州之報恩寺真牧純公受業七歲得度完具後參元叟端和尚端視師軒渠一笑師罔措遂失展尼師壇端叱曰參堂去一日端見師問何處人師曰番陽端曰番陽湖闊多少師展手作量勢端曰不是不是師曰合取臭口遂命侍香尋掌記室端甞謂眾曰仁書記虎而翼者也上堂禪性無生離生禪想禪性無住離住禪寂五臺山上雲烝飯佛殿階前狗尿天剎竿頭上煎鎚子三箇猢猻夜簸錢洪武初上以鬼神之事召師師以佛旨撰書而對上大悅蒲圻魏公觀為蘇郡守見萬壽廢址戚然有意興復聞師寓虎丘遣使致書幣凡三往返而應洪武十五年三月望示疾十九日同參如愚仲訊候曰師行矣諸子在旁盍賜一言為末後訓乎師曰十方薄伽梵一路涅槃門曰與師締交五十秋矣此別直詣淨土相見師厲聲曰盡大千界是箇淨土何處不相見良久素筆書偈泊然而逝徑山端嗣象山瑞龍夢堂曇噩禪師慈溪王氏子祖父皆名宦母周氏師自幼有遠志稍長博通經史藻思濬發年二十三白母出家往從雪庭於長蘆遂薙髮受具教相諸宗靡不研究久之雪庭遷住靈隱師復往依侍踰年雪庭示寂寂照端禪師來補其處一見脗契住象山瑞龍上堂豎拂子只者箇在臨濟則大機大用卷舒擒縱殺活自由在雲門則孤危聳峻格外提持言前定奪在曹洞則家風緜密金鍼玉綫明投暗合在溈仰則父慈子孝用劒刃事施陷虎機在法眼則箭鋒相拄心空法了情盡見除五家提唱雖則金聲玉振邁古超今然而總是門庭施設直截一句不曾道著且道作麼生是直截一句高聲曰看脚下師日惟一食終夜凝坐達旦一日忽戒浴易衣出器物分遺交友集眾說偈曰吾有一物無背無面要得分明涅槃後看言畢危坐而逝有重修歷代高僧傳行世徑山端嗣杭州徑山復原福報禪師台之寧海人族姓方母張氏出家杭之梁渚崇福時石湖美公主淨慈師往見湖器之遂為祝髮受具參徑山元叟端問近離甚處師曰淨慈端曰來作什麼師曰久慕道風特來禮拜端曰趙州見南泉作麼生師曰頭頂天脚踏地端曰見後如何師曰飢來喫飯困來打眠端曰何處學得者虗頭來師曰今日親見和尚端頷之洪武初聘召道行沙門師赴京館天界寺屢入內庭應對稱旨留三年仍賜還後住徑山上堂一葉落天下秋一塵起大地收誰謂北鬱單越不是南贍部洲剛自騎牛更覓牛上堂語是謗默是誑還有二俱不涉者麼拍禪牀洎合停囚長智一日得疾甚篤侍者請偈師叱曰吾世壽尚有三年已而果然及化之日忽拍手曰阿呵呵大眾是什麼看取竟寂徑山端嗣杭州徑山古鼎祖銘禪師奉化應氏子元叟住靈隱師往參一日入室叩黃龍見慈明因緣端詰曰只如趙州道臺山婆子被我勘破慈明笑曰是罵耶你道二老漢用處是同是別師曰一對無孔鐵鎚端曰黃龍直下悟去又如何師曰也是病眼見空華端曰不是不是師擬進語端便喝師當下廓然至正七年元帝錫號慧性文敏宏覺普濟禪師至正戊戌將遷寂遺書囑丞相外護復書偈曰生死純真太虗純滿七十九年搖籃繩斷擲筆而逝茶毗舌根數珠皆不壞舍利無算於徑山隆教寶陀分建塔焉徑山端嗣杭州靈隱竹泉了幻法林禪師族姓黃台之寧海人因看睦州語有省參元叟端和尚端問何處來師曰天台叟曰曾見寒山拾得麼師叉手向前曰今日親見和尚叟曰脫空謾語漢參堂去一日看經次端曰看經那師曰是端曰將甚麼看師曰將眼看端豎起拳曰何不道將者箇看師曰放下拳頭將什麼看端微笑師居淨慈蒙堂不出戶者九年行省左丞相脫歡公請主萬壽遷中竺至佛殿曰撥塵見佛誰知佛亦是塵罕逢穿耳客多見刻舟人上堂法是常法道是常道拶破面門點即不到雪峰朝夕只輥三箇木毬趙州見人只道喫茶去中峰居常見兄弟相訪只是敘通寒溫燒香叉手若是金毛師子子三千里外定誵譌遷靈隱上堂舉僧問趙州萬法歸一話師曰趙州雖則善用太阿截斷者僧舌頭未免自揚家醜靈隱則不然忽有僧問萬法歸一一歸何處只向他道今日熱如昨日上堂古杭管內靈隱名山肇建於東晉咸和慧理法師為第一祖今日上元令節諸處放燈知事直歲各各照管風燭便下座至正十五年春感微疾二月二日集眾敘平生行脚本末且誡之曰佛法下衰無甚於今宜各努力索筆書偈曰七十二年虗空釘橛末後一句不說不說遂化葬全身於松源塔西其時塔前古桂當春吐華清香滿路見者歎異徑山端嗣明州天寧歸庵仲猷祖闡禪師族陳氏鄞人也從佛智匡禪師剃染參寂照端於徑山得旨上堂若論第一句三世諸佛道不得六代祖師道不得天下老和尚道不得山僧道不得大眾道不得拈拄杖拄杖子道得麼道得也是第二句上堂即心即佛非心非佛不是心不是佛五臺山上雲烝飯佛殿階前狗尿天剎竿頭上煎鎚子三箇猢猻夜簸錢元宵上堂十五日已前脚頭脚尾黃金蓮十五日已後白牯狸奴成隊走正當十五日樓臺上下火照火車馬往來人看人好大眾且道好在什麼處眾眼難謾徑山端嗣蘇州開元愚仲善如禪師吳江人上堂佛身充滿於法界普現一切羣生前為甚麼滬瀆居民黃老之流迎之而風濤駭吐像即沈沒吳縣朱膺東靈帛尼請之而靈相峩峩雙泛試就提捧忽爾升舟今開元寺所奉維衛迦葉二石像是也豈非隨緣赴感靡不周而恒處此菩提座然雖如是若作恁麼會大虫看水磨不作恁麼會真州望長蘆恁麼不恁麼總拈却又作麼生清平世界不用譌言師晚年甞居葑門直指庵人稱曰直指和尚將終呼諸子訣別趺坐泊然而逝徑山端嗣杭州上竺我庵本無法師黃巖人依寂照於中竺掌綱維有舅氏教庠老成挽之更宗於是參湛堂於演福研精教部寂照惜其去作偈寄之曰從教入禪今古有從禪入教古今無一心三觀門雖別水滿千江月自孤後出世既為湛堂嗣仍爇一香報寂照不以跡異而二其心寂照示寂時遺書囑其力弘教乘宗趣餘無他言師於祭筵拈香曰妙喜五傳最光𦦨寂照一代甘露門等閒觸著肝腦裂冰霜忽作陽春溫我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕臨終無疾坐脫徑山端嗣蘇州萬壽佛初智湻禪師送忠侍者偈曰鳥窠吹起布毛侍者當下悟去一對無孔鐵鎚賣弄鬼家活計若是靈利阿師別有天然氣宇恢張本地風光顯出衲僧巴鼻以大千攝入毫端將須彌納向芥子直踏毗盧頂上行千手大悲攔不住徑山端嗣共十三人報恩無方智普禪師桂陽人族姓龍上堂六月行人口吐煙區區只為利名牽爭如林下無心客一覺和衣到曉眠拍禪牀乾明不惜口業為你說破臘月三十日到來閻老子要問你索飯錢在江心萬嗣南康雲居小隱師大禪師甞有示信禪人偈曰信是道元功德母藥如有驗不消多上人直下承當得佛祖安能柰爾何江心萬嗣已上二人金陵集慶龍翔笑隱大訢禪師九江義門陳氏子參晦機機一見器重命掌記室一日問曰黃龍既得旨於泐潭領徒游方及見慈明氣索汗下過在什麼處師抗聲曰千年桃核裏覓甚舊時仁機一日舉百丈野狐話詰曰不落因果便墮野狐身不昧因果便脫野狐身且道利害在什麼處師擬答機遽震威一喝師當下渙然冰釋天歷元年文宗以潛邸為大龍翔集慶寺簡集名德開山師首膺其選賜號廣智全悟大禪師復驛召赴闕見上奎章閣賜坐咨問法要及順帝御極待遇益隆後以老病求退優詔不許勑外臺護視使安居終老上堂安養國中水鳥樹林悉皆念佛知足天上樹相撑觸演說苦空豎拂子山僧拂子穿却汝諸鼻孔諸人向甚處出氣師一日問僧甚處來僧曰遊山來師曰笠子下拶破洛浦徧參底作麼生僧曰未入門時已呈似和尚了也師曰即今為什麼不拈出僧擬議師便打至正四年甲申五月示微疾作手書別交游囑其徒以兩朝所賜金幣作萬佛閣上報國恩二十二日書偈趺坐而寂黃文憲公溍撰塔銘虞文靖公集著行道紀師著有禪林清規及四會語錄蒲室集行世徑山熙嗣嘉興祥符梅屋念常禪師俗姓黃華亭人年十二出家十四薙髮受具佛智晦機自江西百丈遷杭之淨慈師往參承值佛智上堂舉太原孚上座聞角聲悟道因緣頌曰琴生入滄海太史遊名山從此揚州城外路令嚴不許早開關師於言下豁然有省投丈室呈所解佛智頷之俾掌記室迨智遷徑山師職後版表率一眾後奉旨選召出世祥符所著有佛祖通載二十二卷徑山熙嗣明州雪竇石室祖瑛祖師吳江陳氏子年十五祝髮受具後即䇿杖遊方初從虗谷陵於仰山聞徑山晦機道望亟往投之一見契合遂留掌記謝天童平石砥問疾偈曰是身無我病根深慚愧文殊遠訪臨自有巖華談不二青燈相對笑吟吟法身徧在一切處噇飯噇空得自由太白鄮峰煙雨裏筍輿來往亦風流晚年得痿痺疾造一龕曰木裰日坐其中不涉世事至正癸未三月見一衰衣婦人扣頭請師應身為國王師曰吾不願生天王家逾十七日趺坐而化臨終偈曰五十三年弄巧成拙踏破虗空赤脚行萬象森羅笑不輟徑山熙嗣杭州中竺一關正逵禪師番陽人族方氏參晦機於淨慈機問甚處人師曰番陽機曰番陽湖水深多少師曰瞪目不見底機曰恁麼則浸爛衲僧鼻孔也師曰終不借和尚鼻孔出氣機曰畢竟借誰鼻孔出氣師曰恭惟和尚萬福機肯之命充侍者逾二年參中峰於天目復謁徑山元叟時笑隱主中竺俾師分座出世金陵崇因帝師授以佛日普照之號徑山熙嗣寧波佛巖仲方天倫禪師象山張氏子參晦機於淨慈纔入門機曰湖山靄靄湖水漾漾浸爛你鼻孔塞破你眼睛因甚不知師曰通身無影象步步絕形蹤機曰未在更道師拂袖便出機俾居侍司復掌藏鑰師憚其繁歎曰世降道衰人根浮薄宿師碩德具大知見猶不為學者信服無他蓋表裏不純故也自是必欲剷踪削跡聞吳興桃花塢僻𨗉乃往縛茆一日灌園次忽四山雲瞑驟雨疾風摧折林木霹靂一聲胸中疑礙頓釋乃頌曰大奇大奇也大奇掇轉虗空顛倒騎蟭螟吞却五須彌曩於南屏室中屢叩老和尚終不肯為我說使當時說破安有今日耶上堂舉雲門因僧問久雨不晴時如何門曰劄師曰雲門一劄猿啼巴峽熊耳峰高石頭路滑師晚年卜築於鳳臺之西曰新庵將終謂淨覺曇曰欲以後事相浼今日何日覺曰二十九日師曰月窮日不宜去明日五月一吾行矣至晨召門人付囑舉手作別端坐而逝徑山熙嗣越州天衣業海子清禪師年八十六出住天衣因同參至上堂颯颯涼風景同人訪寂寥煑茶山下水燒鼎洞中樵古人將常住物作自己人情天衣則不然供佛嬾拈華延賓不煑茶莫嫌無禮數冷淡是僧家徑山熙嗣已上六人杭州中竺一溪自如禪師閩人元兵下閩遭遊卒挾師至臨安遺之而去富民胡氏收養之令伴子讀書師隅立默識無所失胡氏因子之既長俾師隸里中無相寺為僧參雲峰高於徑山得法天歷初中竺笑隱訢奉詔開山龍翔因舉代住者三人御筆點師名宣政院具疏請師居焉徑山高嗣江州東林古智喆禪師都昌人族巢氏上堂過去諸佛已說未來諸佛當說現在諸佛今說且道畢竟說箇甚麼卓拄杖下座徑山高嗣明州天童怪石奇禪師普說其略曰參禪本無難易只要具大信根有決烈志萬機休罷千聖不攜坐斷諸緣不存一法如大虗空了無朕迹如須彌盧屹然不動無上真乘方可希冀又曰此事如人飢渴說飲說食豈能救療直須自飲水自喫飯方有實効徑山高嗣杭州徑山本源善達禪師仙居柴氏子居常不設臥榻夜則焚香燃燭端坐達旦率以為常又體所稟與人異遇嚴寒則衣絺絡大熱則衣繒絮嘗以資建大圓院於東路半山接待雲侶一日自知時至會眾敘平生行脚事畢端坐而寂徑山高嗣龍巖真首座樂閒歌曰即心是佛無心是道萬事但隨緣自覺身心好院子從來不要住便是佛也不要做律亦不曾持戒亦不曾破放行把住總由人執法修行驢拽磨要行便行要坐便坐也不精進也不懶惰一卷三字經逐日為工課有時深深海底行有時高高山頂臥幾生修得做閒人肯為虗名被羈鎖我不輕汝等從他當面唾百年能得幾光陰何必強分人與我貧也不須憂富也休裝大閻王相請無親疏盡付一堆紅燄火自家作得主宰終不隨風倒柁補破遮寒暖即休淡飯粗茶隨分過我作樂閒歌自歌還自和不是閒人不肯閒世上閒人能幾箇徑山高嗣已上五人明州恭都寺廉介自持日誦法華因聆鐵鏡上堂語遂得心要嘗夜坐有偈曰點盡山窗一盞油地爐無火冷啾啾話頭留向明朝舉道者敲鐘又上樓鐵鏡因陞堂特稱賞之臨終無疾更衣坐逝闍維舌根不壞何山明嗣雪竇竺田汝霖禪師昌國王氏子從梅㵎福公祝髮受具聞天童鑑公道化往參命為侍者一日室中舉趙州狗子無佛性話師豁然有省已而見悅堂誾於靈隱堂器之命典記室後游百丈謁晦機遂命分座出世雪竇晚主萬壽至元五年示微疾更衣書偈而逝茶毗設利五色天童鑑嗣湖州道場玉溪思珉禪師象山張氏子參靈隱誾和尚即蒙印可後出住大梅保福帝師賜佛心明妙之號至順三年廣教府聘主雙林元統二年行省選住道場示眾此事如鐵壁銀山如大火聚湊泊不得回避不得你輩合作麼生直饒脚不點地別有通霄活路也是不快漆桶上堂依經解義三世佛冤離經一字即同魔說拈拄杖卓一下六月不熱五穀不結遂下座靈隱誾嗣杭州徑山月江宗淨禪師金華倪氏子自幼聰慧絕倫年十七因誦楞嚴如人以手指月是人因指應當見月豁然開悟遂謁悅堂問黃檗打臨濟你作麼生會師曰按牛頭喫草堂奇之後出世徑山玄風遠播晚歲退居東堂示眾曰坐斷陵霄已十年匡宗論道只隨緣於今休去便休去嘯月吟風樂自然元統壬戌十月三日示微疾當午集眾說偈曰祖師門下客開口論無生老我百不會日午打三更語畢乃趺坐而逝靈隱誾嗣江州東林無外宗廓禪師南昌人魏姓久依悅堂一日室中舉溪聲盡是廣長舌因緣機契遂授記莂出世雲居晚遷東林送僧之東吳偈曰佛是西天老比丘何緣臥倒在蘇州憑君此去輕扶起問取二千年話頭臨終集眾說偈曰吾年七十一世緣今已畢挨倒五須彌夜半日頭出語畢而逝靈隱誾嗣已上三人嘉興石門真覺元翁信禪師開山日上堂向上一機末後一訣佛祖不傳千聖結舌莫有轉身吐氣者麼出來通箇消息看小參建法幢立宗旨明明佛勑曹溪是大眾建法幢則固然如何是立宗旨莫是三轉五轉豎拳下喝麼莫是默然據座拂袖便行麼莫是語言文字確古論今麼莫是灰頭土面長坐不臥麼切須仔細若是正眼不明盡墮偏邪執滯所以道醍醐上味為世所珍遇斯等人翻成毒藥據我祖師門下盡十方世界是箇無縫鐵壁達磨不識盡十方世界是箇無孔鐵鎚迦葉不知無汝擬議處無汝承當處旋天轉地換斗移星雙放雙收透頂透底還會麼龍袖拂開全體現象王行處絕狐踪中竺有嗣呂鐵船居士母夢佑禪師至舍而生弱冠時參空山一日山問曰曾見趙州麼士厲聲曰無山休去每稱於人曰再來人也士嘗任江淮都總管於蘇州嘉定建永壽寺以延雲水達磨忌日拈香曰西來不稱梁王旨西去空𢹂一隻履若言妙用與神通真正衲僧誰數你九年面壁尋出場接得一人又無臂衣盂連累到盧能從此葛藤生不已罪過有彌天源流無滴水今朝七百八十六年逢忌辰那箇兒孫不痛徹骨髓一爐香篆一甌茶報恩却是孤恩底欲把拳頭舉似伊憐渠已沒當門齒風旛中嗣蘇州陽山金芝嶺鐵𭪿念庵主頌舍利弗入城月上女出城話曰出城入廓兩相逢來去誰云路不同回首涅槃臺上望九州四海一家風華藏見嗣松江澱山德異禪師高安盧氏子謁虗舟舟問雪覆千山為甚麼孤峰不白師曰別是一乾坤舟大稱賞勸謁皖山凝和尚凝問光明寂照徧河沙豈不是張拙秀才語師擬答凝震威一喝師當下釋然一日凝舉臥雲深處不朝天因甚到者裏師曰有道則見凝深肯之出世澱山上堂昨日十四今日十五靈利衲僧吞却佛祖從教謝三郎月下自搖艣阿呵呵莫莽鹵甜瓜徹蒂甜苦瓠連根苦皖山凝嗣舒州太湖普明無用寬禪師結夏上堂諸方結制有甚巴鼻太湖梁山冷冰冰地二百箇鐵頟銅頭無用分作兩處提起放下吞聲飲氣擬議之間頂門著地卓拄杖下座中峰和尚至上堂明明百草頭明明祖師意天目山古佛輝天并鑒地虎齩大虫蛇吞鼈鼻擲拄杖曰直下來也急著眼覰大眾懷香拜請幻住大和尚慈悲開示便下座金牛真嗣無為天寧無能教禪師於門首懸一牌云謹防惡犬竺源盛參纔跨門便曰老和尚為我趕狗師便入去智首座出迎同坐須臾師從面前過智起白曰此上人得得來見和尚師曰已相見了也真翁圓嗣北京慶壽海雲印簡禪師寧遠宋氏子生而神悟七歲父授讀孝經開宗明義章師曰開者何宗明者何義父驚異於是俾從中觀沼禪師受業納具戒一日侍沼行沼曰法燈禪師道看他家事忙且道承誰力汝作麼生會師將沼手一掣沼曰者野狐精師喏喏沼曰更須別參始得年十八元兵破寧遠四眾逃散師侍沼如故沼曰吾迫桑榆汝方富有春秋何當玉石俱焚宜自遠遁師泣曰因果有差死生有命安可離師苟免乎沼察其誠囑曰子向去朔漠有大因緣吾將與子北渡經年至赤城書偈曰七十三年如掣電臨行為君通一綫泥牛飛過海東來天上人間尋不見偈畢忽無疾而逝闍維收頂骨舍利師為乞緣造塔供奉一夕聞空中呼師名師瞥然有省復聞人告曰大事將成毋滯於此黎明遂䇿杖之燕過松舖值雨宿崖下因擊火乃悟曰今日始知眉橫鼻直信道天下老和尚不寐語明日至景州見本無玄玄問從何所來師曰雲收幽谷玄曰何處去師曰月照長松玄曰孟八郎漢便恁麼去也師諾諾趨出初沼臨終師問某甲當依何人了此大事沼曰賀八十去迨入燕至大慶壽寺乃省前讖於是謁璋璋先一夕夢異僧策杖徑趨方丈踞座天明璋謂知客曰今日但有僧過當令來見老僧及晚師至璋笑曰此夜來所夢者師問不來而來作麼生相見璋曰參須實參悟須實悟莫打野榸音齋師曰某甲因擊火迸散乃知眉橫鼻直璋曰吾此處別師曰如何表信璋曰牙是一口骨耳是兩片皮師曰將謂別有璋曰錯師喝曰草賊大敗璋休去次日璋舉臨濟兩堂首座齊下喝僧問還有賓主也無濟曰賓主歷然汝作麼生會師曰打破秦時鏡磨尖上古錐龍飛霄漢外何勞更下槌璋曰途路之樂終未到家師曰精靈千載野狐魅看破如今不值錢璋曰如是如是師拂袖便出遂命掌記一日璋謂師曰汝今已到大安樂田地宜善護持吾有如來正法眼藏涅槃妙心密付於汝毋令湮沒師掩耳而出師住慶壽孔子之後元措者渡河謁師請復曲阜廟祀師微言之乃復襲封師兩主慶壽年五十六忽患風症呼侍者囑後事乃集眾說偈畢遂泊然而逝茶毗獲舍利無算諡佛日圓明大師慶壽璋嗣曹洞宗太原王山體禪師初參大明寶為侍者偶於出生臺見捨食見手飛去寶在師背上打一掌師驚顧寶曰還是子孤負你你孤負我師罔措寶曰自可憐生却乃互相孤負去師豁然有省從此執侍十年祕重深嚴不見參學一旦抽單罔不疑怪或問寶云侍者何往寶曰諸方來諸方去何介意哉又問參學何似寶曰道有參學栽他頭角道無參學減他威光一眾方知已蒙印記師久隱太原西山當道請住王山創建禪席嘗曰師子有三種第一超宗異目第二齊肩共躅第三影響不真若超宗異目者見過於師堪為種草若齊肩共躅者減師半德落在今時若影響不真者狐犴猥勢羊質虎皮師嘗發明洞上宗旨曰既有尊貴之位須明尊貴底人須知尊貴底人不處尊貴之位方明尊貴不落階級寶壽方拈云太原與麼提持要明尊貴一路尚欠在為什麼不見道方外誰敢論量愚庵孟拈云如何黑漆屏風上更寫盧仝月蝕詩五位頌曰正中偏夜深古殿鎖輕煙寂寂苔封臣不立密密光輝未兆前偏中正玉人不覩臨臺鏡子夜星河霧氣濃依舊青山不露頂正中來木人𢹂杖火中回趁起泥牛耕練色放教石馬步蒼苔兼中至轉側相逢全意氣交輝終不犯鋒鋩大用縱橫無變異兼中到明暗盡時光不照石女有智妙難窮解栽絕頂無根草上堂還有衝流度刃者麼僧從東過西從西過東師曰未得一場榮先刖兩脛足曰也知和尚慣用此機師曰罪不重科僧擬議師便打僧吐舌師曰棺材裏瞠眼僧珍重便出師曰似這等行脚有甚麼交涉乃曰同安老祖道孤峰迥秀不挂煙蘿片月行空白雲自異衲僧家到者裏劍甲未施賊身已敗豈不屈辱先宗山僧今日若不捉敗此僧則我達磨一宗幾至掃地喝一喝曰逢人不得錯舉大明寶嗣仁山恒禪師久侍大明寶和尚深入堂奧寶付以衣法師曰某甲不是恁麼人寶曰不是恁麼人自不殃及伊師以法乳情深俛仰而受寶囑曰汝既如是第一不得容易出世若躁進輕脫中間必有坎坷晚住仁山僧問洞山邈雲巖真因甚到覩影始悟師曰不是深心人不知曰如何是深心人師曰十八女兒不繫裙破山明舉示呂大器器曰全體畢露法音𣽘頌云滿江風雨夜行船鮮血淋淋濺碧天二十四莖生鐵肋和衣脫出淚潛然復示頌云柳底黃鶯送好音輕輕喚著愈傷心欄杆倚徧無聊賴夢裏如何許我尋無路尋怨殺月明花下影依稀拂斷枕頭琴大明寶嗣已上二人燕京慶壽虗明教亨禪師濟川任城王氏子先是汴京慈濟寺僧福安者山居任城有年一日於芒山村倚樹而化夢求託宿師果生焉拳右拇指同住僧往問曰安公無恙師熟視良久伸指而笑七歲出家十五游方聞鄭州普照寶禪師法席之勝遂往謁朝夕參叩未有所入他日以事往睢陽宿趙渡忽於馬上憶擊板因緣有省疑情不散將抵河津同行警曰師兄此河津也師下馬悲喜交集至於隕涕歸以語寶寶曰如僵臥人似欲轉動示以日面佛公案師笑曰兒時已見得也寶曰我只教人參諸方掉下底禪但再參去後聞板聲霍然親證呈頌曰日面月面星流電轉若更遲疑面門著箭咄寶遂印可曰吾瞞汝不得也師五坐道場復駐錫濟州之普照方丈後叢樹蓊鬱中有一株高丈餘羣鴉以次來巢上下一十二級如浮屠狀見者賀曰和尚佛法將大振矣不數日奉章廟旨主慶壽興定己卯七月十日索筆書頌其末句曰咦一二三四五六七堅坐不動而逝茶毗𦦨如蓮花開合牙齒目睛不壞舍利無算普照寶嗣
