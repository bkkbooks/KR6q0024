body:
  text: 六祖下二十三世臨濟宗杭州天目中峰明本禪師錢塘孫氏子母夢無門開老人持燈籠至家而生纔離襁褓便跏趺坐能言即歌贊梵唄凡嬉戲必為佛事九歲喪母年十五求出家閱傳燈錄至庵摩羅女問曼殊明知生是不生之理為甚麼却被生死之所流轉有疑往參高峰妙和尚妙孤峻嚴冷不假人辭色一見師懽然許為祝髮誦金剛經至荷擔如來處恍然開發後觀流泉有省詣妙求證妙為打趁出既而民間偽傳選童男女師問忽有人來要和尚討童男女時如何妙曰我但度竹篦子與他師於言下洞徹法源妙乃自題真贊付師曰我相不思議佛祖莫能識獨許不肖兒得見半邊鼻牧雲門頌云訛言日出古風沈一問當前意自深却笑作家無眼力真鍮換去好黃金或問妙諸弟子優劣妙曰如義首座固是莖老竹其如七曲八曲惟本維那却是竿上林新篁他日成材未易量也師居無定所或船或庵咸名幻住僧俗爭相瞻禮稱江南古佛仁宗聘召不至賜金襴袈裟并佛慈圓照廣慧禪師號師每斥學者但尚言說不求實悟乃曰今之參禪不靈驗者第一無古人真實志氣第二不把生死無常當做一件大事第三拌捨積劫以來積習不下又不具久遠不退轉身心畢竟病在於何其實不識生死根本故也凡見學者輒問曰汝喚甚麼作生死或者茫然無對或者謂生不知來死不知去是生死師曰直饒知得亦生死所知亦生死又或指一念忽起是生一念忽滅是死師曰離一念起滅亦生死也是說皆枝葉耳非根本也夫根本者性真圓明本無生滅去來之相良由不覺瞥起妄心迷失本源虗受輪轉以故道迷之則生死始悟之則輪迴息當知山河大地明暗色空五陰四大至於動不動法皆是生死根本若不曾向真實法中脫然超悟更於悟外別立生涯不存窠臼豈堪向生死岸畔劄脚或纖毫不盡未免復為勝妙境緣惑在那邊起諸異想雖曰曉了其實未然惟有痛以生死大事為己重任者死盡偷心方堪湊泊直下儻存毫髮許善惡取捨愛憎斷續之見則枝葉生矣可不慎乎示眾慧劍單提日用中天然元不犯磨礱神號鬼哭喪魂膽徧埜橫尸不露鋒古人與麼說話已是自傷己命了也殊不知我王庫內無如是刀佛成道日示眾玄玄絕待妙妙無依獨露真常全彰至體名不得狀不得雪老冰枯理無礙事無礙天荒地迥萬里雲收午夜四方星燦長空揭開威音那畔腦門圓陀陀光爍爍擉瞎髑髏背後眼光淨躶躶赤條條勒回三萬劫風飛雷厲之威機突出五千軸海涌雲屯之䆿語大眾釋迦老子來也即今在諸人眼睛裏仰見明星頂𩕳上成等正覺你諸人還覺眉毛動也無如其未委各請歸堂與大覺長老書曰古人於法嗣嫡傳所以深明宗系者大法原委不可誣也世漓俗薄奉金請拂以院易嗣者有之某嘗痛心於此夫大覺雖先師開山然十方叢林儘有尊宿捨彼不取而必欲某尸之何識量之不廣也某非畏住持實畏嗣法於開山也故退避力辭而舉足下以足下自師一山禪師豈可徇世俗而易其所師哉或欲徇俗易嗣則某斷然不敢與足下一日相聚也大覺泰定叟也皇慶間請師住大覺師力辭舉定叟應命叟甞印證於一山萬和尚後復參師乃拈香欲嗣師師以是書却之令嗣一山至治癸亥八月十五說偈辭眾曰我有一句分付大眾更問如何無本可據置筆安坐而逝建塔於本山之西岡天歷二年勑諡智覺塔曰法雲勑虞文靖公集為之銘元統二年賜廣錄三十卷入藏號普應國師高峯妙嗣杭州天目斷崖了義禪師德清湯氏子年十七聞禪者誦高峰妙上堂舉欲窮千里目更上一層樓語乃曰此大善知識必能為人拔釘去楔遂往參謁侍妙於死關妙令看萬法歸一話因名從一他日妙為眾舉牛過窗櫺話師聞益疑日夕體究偶過盂塘見松枝墜雪有省詣妙呈頌曰不問南北與東西大地山河一片雪聲未絕妙痛棒打出不覺隕身崖下崖懸壁立人意其必死同學捫蘿接磴以救之師若不知乃立誓七日取證未至期豁然大悟復馳至死關大呼曰老和尚今日瞞我不得也復說偈曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東妙乃上堂曰山僧二十餘年布縵天網子打鳳羅龍不曾遇得一蝦一蠏今日有箇蟭螟虫撞入網中固是不堪上眼三十年後向孤峰絕頂揚聲大叫且道叫箇甚麼舉拂子曰大地山河一片雪師謂同學曰盡大地有一人發真歸元從一皆知之妙聞歎其俊快尋回省親乃奉母入武康上柏結茅以居人見其混俗罔測其意後還山見妙妙曰大有人見你拖泥帶水師曰兩眼對兩眼遂為薙落改名了義妙既示寂師益韜晦頹然居下版四眾累請勉住師子正宗禪寺元統元年歲除日謂侍者曰有一件事天來大你還委悉麼良久曰明日是年朝正月六日詣法雲塔西指空地曰更好立箇無縫塔其夕與禪者談笑如平時至夜分乃曰老僧明日天台去也者曰某甲隨師去師曰你走馬也趁我不及翌旦跏趺而化化之日雷砰雨射白晝晦冥及葬雪華繽紛林木縞素送葬者數千人悲動山谷初中峰示寂會葬齋次師謂眾曰後十二年更為老僧一會眾未深信至是始驗勑諡佛慧圓明正覺普度禪師天目妙嗣大覺布衲祖雍禪師寧海人侍高峰妙最久躬自舂㸑貌甚黑瘠戇而少文後首眾提唱超卓迨妙遷化眾請中峰本居大覺本力辭推師主之山居偈曰就樹縛茅成屋住拾荊編戶傍溪開是他嬾瓚無靈驗惹得天書三度來後於中竺桂子堂書偈跏趺而逝天目妙嗣處州白雲空中假禪師得法高峰棲白雲山四方禪衲聞風來赴屨滿戶外至元丙子夏一日援筆書偈曰地水火風先佛記掘地深埋第一義既免檀那幾片柴又省人言無舍利書畢坐化天目妙嗣已上四人般若絕學世誠禪師示眾曰有志之士趁眾中柴乾水便僧堂溫暖發願三年不出門決定有大受用有等纔作工夫覺得胸次輕安目前清淨便一時放下作偈作頌口快舌便將謂是大了當悞了一生可惜前來許多心機中途而廢三寸氣斷將何保任眾兄弟若欲出離生死參須實參悟須實悟始得靈雲定嗣杭州徑山竺遠正源禪師毆陽文忠公之裔世居南康年二十七薙染受具參方首謁虗谷陵陵舉龍潭吹滅紙燭話師曰焦石可破層冰陵曰破後如何師曰探索乃知陵曰所知者何事師擬對陵劈脊便打師悚然喻旨住徑山賜號佛慧慈照普應禪師徑山陵嗣婺州寶林桐江紹大禪師嚴州吳氏子世居桐江因以為號參虗谷於徑山佩服心印徧遊江湖一日慨然歎曰吾今而後乃知法無異味也遂罷參手翻大藏凡三過內外學咸通其旨至順壬申出住郡之烏龍後遷雲黃寶林一時法會號稱極盛一日示疾鳴鐘集眾敘謝眾請偈師接筆擲地曰縱書到彌勒下生寧復離此翛然坐化闍維舍利如紺珠齒牙不壞徑山陵嗣已上二人汝州香巖無聞思聰禪師香山人初參獨峰次見淮西無能教示無字話一日晤同參敬上座敬問你六七年來有甚見處師曰每日只是目前無一物敬曰你者一絡索從甚處來師罔然問曰畢竟明此大事應作麼生敬曰不見道要知端的意北斗面南看說了便去師被一拶直得行不知行坐不知坐五七日間不提無字倒只看要知端的意北斗面南看偶到淨頭寮與眾同坐疑情不解有飯食頃頓覺胸次輕清情想破裂目前人物一切不見省來通身汗流遂見敬敬舉扇曰速道速道師遽曰舉起分明也妙哉清風匝匝透人懷箇中消息無多子直得通身歡喜來自此下語作頌都無滯礙及至向上一路又不得灑落乃入香巖山過夏單提無字一日不覺身心如一座屋倒却四壁一般無一法可當情值鐵山瓊和尚從高麗回至石霜師往見瓊問何處人師曰汝州山曰風穴祖師面目如何師將二十年工夫通說一徧瓊把定咽喉問如何是無字師曰近從潭州來不得湖北信瓊曰未在更道師曰和尚幾時離高麗瓊曰未在更道師喝一喝拂袖便出瓊曰者兄弟都好只一件大病我發明了師聞而感激因求決擇復入光州山中前後十七年方得穎脫示眾法無定相遇緣即宗秉金剛劍吞栗棘蓬截斷衲僧舌頭坐却毗盧頂𩕳豎一莖草作丈六金身將丈六金身作一莖草直教寸絲不挂月冷秋空寒灰發𦦨到者裏喚作佛法入地獄如箭射不喚作佛法亦入地獄如箭射諸仁者畢竟作麼生會不見船子和尚道藏身處沒蹤跡沒蹤跡處莫藏身雖然恁麼正眼觀來盡是閒家具衲僧分上料掉沒交涉鐵山瓊嗣湖州福源天湖石屋清珙禪師蘇州常熟人族姓溫首參高峰示萬法歸一話服勤三年無所發明因至建陽庵參信和尚問何來師曰天目信曰有何指示師曰參萬法歸一話信曰汝作麼生會師無語信曰此是死句什麼害熱病底教汝與麼師拜求指的信曰有佛處不得住無佛處急走過意旨如何師不契信曰者也是死句師不覺悚栗汗下一日入室信再理前話師曰上馬見路信呵曰汝在此幾多時猶作者箇見解師發憤而去中途忽舉首見風亭豁然有省遂返語信曰某甲今日會得活句也信曰汝作麼生會師曰清明時節雨初晴黃鶯枝上語分明庵頷之後辭去信門送之曰他日與汝同龕廣教府馳檄請住當湖福源師堅臥不起往返至再師勉就入院上堂把住也鋒𨦵不露放行也十字縱橫水雲深處相逢却在千峰頂上千峰頂上相逢却在水雲深處今朝福源寺裏開堂演法昨日天湖庵畔墾土耕煙所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下九萬里鵬纔展翼十千年鶴便翱翔上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臭氣佛殿裏篷塵且道從什麼處得來以手掩鼻曰又是一點也上堂所聞不可聞所見不可見昨夜五更風吹落桃華片蒼苔面上生紅霞百鳥不來春爛熳至正間朝廷降香幣皇后賜金襴法衣有聞天湖之風吟天湖之詩者莫不心爽神慕以為真得古先德遺型一日示微疾遂集眾訣眾請後事師索筆書偈曰青山不著臭屍骸死了何須掘土埋顧我也無三昧火光前絕後一堆柴書畢擲筆而逝闍維舍利五色塔於天湖之源及菴塔右麓果符同龕之讖高麗國師大古愚公甞侍師得旨王聞欽渴表達朝廷勅諡佛慈慧照禪師仍乞移文浙江請師舍利歸國供養道場信嗣杭州淨慈平山處林禪師本郡仁和王氏子十七受具辭母參方母為治裝越數日復還母誡之曰大凡學道當持不退轉心何趦趄乃爾耶師遂痛自警䇿遡濤江謁及庵信於金華信一見器之留居侍司一夕信撚紙沁膏以代燭舉示師曰龍潭吹滅汝作麼生師方擬答信遽以手掩其口從此悟入信遷道場命典藏鑰未幾秉拂陞座機如缾瀉眾咸慴伏洎信示寂往依虗谷陵於仰山居第二座臨終更衣沐浴集眾說偈而化勑諡普慧性悟禪師道場信嗣婺州羅山正覺石門至剛禪師世居山麓得法於及庵信和尚遊歷罷歸里里人即其地營建寶坊文其楣曰正覺小參踏翻生死海涓滴不留推倒涅槃城纖塵不立且是不勞餘力如壯士揮戈鋒鋩不犯如人善射毫髮無差自然處處逢源頭頭合轍不假修證本自圓成盡大地是勝妙覺場徧法界是真如實地悟取人人有分了知箇箇無虧一念不生入三摩地一塵不動轉大法輪自利利他俱登彼岸全身放下總得自由到者裏說甚涅槃生死真如佛性了無一法當情直得十方坐斷擊拂子見徹本來無隱蔽紛紛桂子散天香臨終訣眾偈曰七十六年了然寬廓拶破虗空須彌倒卓道場信嗣已上三人杭州海門天真惟則禪師吳興費氏子謁楚石千巖無見無聞諸大尊宿因緣不契後之匡廬遇無極源和尚親炙之源終日不語無所啟發一日值源如廁師急趨前問曰如何是祖師西來意源擒住曰道道師豁然頓悟洪武初詔徵天下高僧赴京天界住持西白金公首以師名薦俄以足疾請歸一日侵晨告眾瞑目而逝茶毗獲舍利無數頂骨牙齒舌根不壞匡廬源嗣台州華頂無見先覩禪師本郡仙居葉氏子因白雲度問西來密意未審如何師云待娑羅峰點頭即向汝道介庵進頌曰小姑臨嫁索根由嫂對歸時向汝詶待到歸來問端的半含笑語半含羞示眾風冷冷日杲杲薝蔔華開滿路香池塘一夜生春草堪悲堪笑老瞿曇四十九年說不到阿呵呵拍禪牀下座示眾若論此事一大藏教詮註不及天下老和尚拈提不起直饒有傾湫之辯倒嶽之機到者裏一點也用不著諸仁者飢則喫飯困則打眠熱則乘涼寒則向火一一天真一一明妙何得踏步向前論禪論道將魚目為珠認橘皮作火不見道大機須透徹大用須直截不識東家孔丘翁却向他尋禮樂卓拄杖下座元統甲戌五月望日遺書謝道侶說偈跏趺而逝闍維白乳如注舍利凝結成五色彩瘞於所居之西勑號真覺塔曰寂光瑞巖寶嗣慶元松巖秋江元湛禪師傳燈正宗悞入未詳卷久從龍象遊後參瑞巖寶和尚得旨後遊松巖愛其清勝不忍去遂趺坐石上俄有二虎踞坐其側若護衛狀師命之伏枕其背熟睡山民異之即其處剏精藍以居之將化別眾就龕說偈曰洗浴著衣生祭了跏趺晏坐入龕藏華開鐵樹泥牛吼一月長輝天地光復謂眾曰十五年後寺當火啟龕則火可止至期果然眾亟開龕師神色如生爪髮俱長瑞巖寶嗣恕中和尚禮塔偈曰活葬松巖二十年眼睛鼻孔尚依然我來欲起那伽定石火光中話別傳杭州鳳山一源靈禪師寧海人參瑞巖充堂司一日入室請益趙州勘婆話山曰維那你試下一語看師曰盡大地人無柰者婆子何山曰山僧則不然盡大地人無柰趙州何師當下如病得汗住鳳山上堂舉昔世尊陞座文殊白椎公案師曰世尊已是錯說文殊已是錯傳新鳳山已是錯舉會麼字經三寫烏焉成馬瑞巖寶嗣已上三人明州天童平石砥禪師送慍藏主省徑山元叟和尚偈曰山頭老漢八十一如此東南大法城雙𩯭又添新歲白片言能使古風清為人不用擊虎術養子寧忘䑛犢情明月堂前坐深夜餘光分得到長庚東巖日嗣日本夢窗智曤國師姓源氏本國勢州人宇多天王九世孫也九歲出家十八歲為大僧每夢遊中國乃決志參方初見一山寧備陳求法之誠山曰我宗無語句亦無一法與人師曰豈無方便乎山曰本來廓然是大方便師疑悶不輟復謁高峰日和尚日曰一山有何指示師述前語日厲聲喝曰何不道和尚漏逗不少師於言下有省益自奮勵一夕坐久忽倚壁身踣豁然大悟作偈有等閒擊破虗空骨之句呈似日日為印可乃出無學元公淵源以𢌿之後於本國大弘宗教賜號普濟國師徑山範下無學元元下高峰日嗣台州瑞巖空室恕中無慍禪師本郡臨海陳氏子從徑山寂照薙落參方首謁靈石於淨慈後參竺元道纔擬開口問無字話被道一喝師豁然大悟直得通身汗下遂呈頌曰狗子佛性無春色滿皇都趙州東院裏壁上挂葫蘆道笑曰恁麼會又爭得師拂袖便出由茲感激語同參曰此事如人飲水冷煖自知決不在言語文字上我輩若不遇者老和尚幾被知解埋沒一生他日設有把茅葢頭當不忘所自初住象山之靈巖復主黃巖之瑞巖時夢堂噩居瑞龍覬師為寂照嗣師曰素志有在不可奪也開堂日拈香曰古人出世拈香酬法乳也今人出世拈香酬世恩也慍上座總不然昔年行脚到紫籜山中參箇老布衲彼亦無法可授我亦無法可受只向無授受中拈出供養前住崑山薦嚴禪寺竺元道和尚不圖報德酬恩只要大家知委上堂心如工伎兒意如和伎者五識為伴侶妄相觀眾伎大眾還識得心也未若識得心便識得意識得意便識得諸識識得諸識便識得妄想妄想滅則諸識滅諸識滅則意滅意滅則心滅心滅則一切滅所以道心生種種法生心滅種種法滅喝一喝山河大地日月星辰有什麼過下座上堂趙州與文遠鬬劣不鬬勝老大不識羞相席還打令致使明眼人無由辯邪正邪正既不辯展轉成毛病瑞巖百不能愛用無星秤稱起太虗空錙銖無欠剩以此為瑞為祥以此為坑為穽斷衲僧之咽喉續佛祖之慧命室中垂語曰穩坐家堂主人翁因甚不識掀翻大海摑碎須彌平地上因甚擡脚不起眼光爍破四天下自家眉毛落盡因甚不見前後下語多不契其機鋒峻拔學者莫能擬議一日謝事入松巖巖為秋江湛公隱處萬山之巔人跡罕至師悉遣徒御嶄然獨處眾涕泣哀請堅拒不出洪武七年夏日本國遣使入貢嚮師道風奏請師化其國以水晶數珠峩山石硯為贄上召至闕師以老病辭上憫而不遣留處天界全室泐公延致丈室時宋景濂方在翰林詣師劇談道妙是年冬奉詔東還住鄞之翠山四方叩謁者無虗日金齒大理僧至京特入翠山五十餘人拜牀下各求偈語而去洪武丙寅七月示微疾諄諄勉眾以祖道自重索筆書偈曰七十八年無法可說末後一句露柱饒舌咄書畢端坐而逝遺命闍維煅骨散水竹間弟子居頂等不敢遵乃於唐嶴之原奉骨瘞焉著有二會語錄并山庵雜錄淨土詩行世薦巖道嗣明州天童了堂一禪師至正二年住台之紫籜次遷天童上堂最初一句末後一機直下覯得燈籠露柱動地放光其或未然竹山今日失利示眾樵歌來疊嶂帆影落汀洲猢猻戴席帽直上樹稍頭七星劍五雲樓毬打人兮人打毬萬事難把玩魚吞水面漚上堂長𭪿鳥芳樹不棲摩斯迦滄溟不入龍泉與鈯斧同鐵利鈍懸殊良驥與駑駘同途遲速有異以拂子畫一畫花須連夜發莫待曉風吹薦嚴道嗣徑山大宗興禪師台州人甞與恕中木庵三人結伴參方罷遊紫籜累歷名剎後遷徑山臨終忽歎曰夫三十婦六齡畢竟偶不成遂坐脫去薦嚴道嗣已上三人蘇州靈巖南堂了庵清欲禪師族朱氏台州臨海人得法於古林初出世中山之開福繼遷本覺三主靈巖上堂釋迦老子道一人發真歸元十方虗空悉皆消殞五祖和尚道一人發真歸元十方虗空築著磕著若向築著磕著處會得只會得祖師禪不會如來禪若向悉皆消殞處會得只會得如來禪要且未會祖師禪山僧道一人發真歸元十方虗空性相平等且道是如來禪是祖師禪喝一喝一釋迦二元和三佛陀其餘是什麼上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻脚潘閬倒騎歸攧殺黃番綽五味拈來饡秤錘別有香風滿寥廓喝保寧茂嗣蘇州定慧大方禪師住定慧日因兵占住佛屋緇徒戚戚師曰何不休去歇去語默跌宕不可測識一日忽謝院事僑居靈巖華首座寮盛稱總管周侯義卿之賢且曰我將火化須侯作證明十八年九月八日侯以郡事登靈巖師聞欣然出迎陪侯夜話曰某將此月十四日即此山火化侯其為我證明兼吾教下衰幸念佛法付囑國王大臣為法外護慎無忘此言至十三日復以偈寄侯曰昨日巖前拾得薪今朝幻質化為塵慇懃寄語賢侯道碧落雲收月一痕侯未深信師復以偈別眾是夜與華乞燥薪疊高棚仍借一龕坐去華謂薪當從命龕則無有師指其牀曰此亦足矣翌晨登殿與眾僧別乃升柴棚得火即烈𦦨熾然於大火聚中祝香曰靈苗不屬陰陽種根本元從劫外來不是休居親說破如何移向火中栽於烈熾中度數珠與華曰聊當記憶於是四眾始驚信拜禮煙𦦨所至多得舍利且聞異香薪盡火滅不壞者二舌根齒牙侯聞驚怛不已復為建塔於靈巖別眾偈曰前身元是石橋僧故向人間供愛憎憎愛盡時全體現鐵蛇火裏嚼寒冰保寧茂嗣明州瑞雲清凉實庵松隱茂禪師族鄭氏奉化人自幼喜習禪趺坐輒達旦年十八出家奮志參方謁古林茂於保寧茂問來作什麼師曰生死事大特求出離茂曰明知四大五蘊是生死根本何緣入此革囊師擬對茂便打師豁然悟入茂器之逾年回浙中月江印延師分座說法一日有僧問答未竟以手拍地而笑師曰滯貨何煩拈出僧噓一聲師厲聲便喝一住十五年後退隱東堂一日示微疾集眾訣別眾請偈師舉手自指曰此中廓然何偈之為端坐憑几握右手為拳枕頟而逝火葬有天華之祥舍利無數塔於瑞雲西岡世壽八十五保寧茂嗣溫州僊巖仲謀猷禪師謝藏主侍者上堂一默相酬雷轟電激三呼領旨玉轉珠回七十三八十四築著磕著礙塞煞人拈拄杖昨夜西風枕簟秋無數蟬聲噪高樹保寧茂嗣越州龍華會翁海禪師台之臨海人年十三棄家投徑山虎巖祝髮初詣旃檀林挂搭或見其舉止山野譏誚之師發憤即往天目參中峰求開示於是寢食皆廢久之無所入時東州居虎丘古林居開元東嶼居寒山師出入三老之門有年後住龍華法嗣古林年九十三住育王守橫川祖塔偶損左足艱於步履日牀坐每至清夜朗吟古人偈語其徒文渙曰和尚一生參學至此不能受用託吟詠自遣師笑而言曰不見大慧和尚因病呻吟左右曰生平呵佛罵祖今乃爾大慧曰癡子呻吟便不是耶渙便禮拜保寧茂嗣已上五人慶元育王大千慧照禪師永嘉麻氏子初謁晦機於淨慈一日閱真淨語頭陀石被莓苔裹擲筆峰遭薜茘纏默識懸解遂謁東嶼於薦嚴嶼問東奔西走將欲何為師曰特來參禮嶼曰天無四壁地絕八荒汝向什麼處措足師拍案而退嶼復召至返覆勘辨遂留執侍得法後出住樂清之明慶甞示眾曰佛法欲得現前莫存知解參禪看教皆為障礙何如一法不立而起居自在乎德山棒臨濟喝亦有大不得已爾洪武六年沐浴更衣索紙書偈恬然坐逝茶毗牙齒目睛不壞舍利五色塔於夢庵之後靈隱海嗣杭州徑山悅堂顏禪師出家於婺之寶林得法東嶼初住崑山之東禪次遷萬壽陞淨慈後主徑山上堂世尊不說說迦葉不聞聞今日人天眾前山僧舉揚箇事汝等聞麼若是聞山僧畢竟不曾說若是說汝等畢竟不曾聞各自參取毋勞耳目璽書錫金襴法衣靈隱海嗣明州育王雪窗悟光禪師姓楊氏蜀人也虞文靖公集甞問道至山中師曰老僧這裏無道可談若欲求道須自往參取公退而歎曰佛果一枝師其鳳毛麟角乎宋文憲公濂敘師四會語錄行世靈隱海嗣杭州徑山月林鏡禪師本郡人因參本來人有省述偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔試勘元來是白丁時有老宿睨視曰可是師與一摑由是名振叢林靈隱海嗣建寧斗峰大圭正璋禪師福州福清人參東嶼海聞海頌俱胝豎指話言下頓悟遂上方丈呈所得海曰作麼師曰古今現成事何必涉思惟海曰既不涉思惟汝來者裏作麼師曰請和尚證明海曰證明箇什麼師便喝海俾頌狗子無佛性話師遽曰狗子佛性無者眼睛枯瞥爾翻身轉唵悉哩蘇嚧海撫而印之臨終偈曰生本不生滅亦無滅幻化去來何用分別大眾珍重不在言說合掌而逝靈隱海嗣椔塘明因天淵湛禪師得法於東嶼甞依鳳山一源分座說法一日呈秉拂語曰翔鳳山前行看白雲乍舒乍捲禺泉亭畔坐聽流水或抑或揚眼處作耳處佛事耳處作眼處佛事便見非唯觀世音我亦從中證鳳山指便見兩字曰有此二字便是別人說話師不覺解顏點首禮謝而退出語人曰還丹一粒點鐵成金堂頭老漢之謂也靈隱海嗣已上六人三空道人自幼具丈夫志不為富貴所奪見竺雲曇禪師示趙州無字話閱數年一日復見曇問曰生死到來時如何曇曰生是誰耶死是誰耶空乃低頭問訊曇覺其異於常時再以前話徵之空又低頭問訊曇呵之曰切忌死在者裏空拈起槵子曰數珠一百八不數日示微疾說偈而化天寧曇嗣金陵天界孚中懷信禪師奉化人姓姜氏年十五出家參天童坦和尚一日室中舉興化打克賓因緣師曰俊哉獅子兒坦頷之俾掌維那後出世補陀詔賜廣慧妙悟智寶弘教禪師至正間住天童御史臺奉疏命主大龍翔集慶寺及明兵下金陵僧徒竄散師宴坐一室高皇帝親幸嘉之勑龍翔為大天界寺一日晨興沐浴更衣趺坐謂左右曰吾歸去矣遂瞑目侍僧撼之請說偈師瞋目叱之復哀請遂握筆書曰平生為人列挈七十八年漏洩今朝撒手便行萬里晴空片雪書畢復瞑時帝統兵江陰夢師謁見問師來作為對曰將西歸告別耳帝還聞師遷化與夢符異詔出內府帛幣助喪且命卜藏龕之地於伏牛舉龕之日帝親致奠送出都門茶毗舍利如菽貯以寶瓶光發瓶外天童坦嗣天童舜田明牧禪師台之黃巖人聞天童竺西坦公道望往見之坦問達磨不來東土二祖不往西天意旨如何師曰金不博金水不洗水坦異之謂左右曰此法門爪牙也天童坦嗣已上二人金陵蔣山曇芳忠禪師南康人寺菑翌日梁王登山謂師曰興復若何師曰賴有大檀越在王曰寺既矣佛依何住師曰古佛過去今佛再來王大喜復笑而言曰衲子所謂蔣薄粥者何也師曰將謂殿下忘却了也玉山珍嗣寧波育王月江正印禪師郡之慈水劉氏子年十三體月溪受業後參虎巖伏機緣相契蒙印可赴育王上堂拕犁拽耙幾經年鼻孔撩天不受穿業債依然逃不得又吹鐵笛過鄞川臘八上堂我觀大地眾生具有如來智慧德相但以妄想執著而不能證得釋迦老子與麼道大似蟭螟虫向蚊子眼睫上作窠向十字街頭揚聲大叫道土曠人稀相逢者少簡點將來也是噇酒糟漢結夏小參瑯琊點出五病西院商量兩錯井蛙不足以語東海夏虫不可以語冰霜若是捎空俊鶻便合乘時止濼困魚徒勞激浪是故從上若佛若祖天下老和尚莫不向刀山劍樹上鑊湯爐炭中成等正覺拔濟有情若約山僧看來也是秤錘蘸酢喝一喝下座至正間奉旨金山建水陸大會命師陞座說法特降御香綵緞晚年庵居榜曰松月自號松月翁徑山伏嗣杭州徑山南楚悅禪師隆興人上堂聞聲悟道見色明心驀拈拄杖者箇是色卓一下者箇是聲諸人總見總聞且道那箇是明底心那箇是悟底道喝一喝貪他一粒米失却半年糧師將寂上疏辭世如期坐逝勑諡佛慈法喜禪師徑山伏嗣已上二人杭州徑山月江宗淨禪師蘭谿倪氏子誦楞嚴至如標月指豁然有省參雙林正庵誾誾問黃檗打臨濟你作麼生會師曰按羊頭喫草後出住徑山臨示寂書偈曰祖師門下客開口論無生老我百不會日午打三更泊然而逝雙林誾嗣金陵保寧敏機覺慧禪師吳興人看無字話得法西白金公出世嘉禾之祥符復分座於天界尋主保寧與宋濂友善著彌勒頌曰彌勒真彌勒人人苦不識倒轉布袋來有無一時悉西白金嗣杭州淨慈佛鑑簡庵希古師頋禪師嘉禾李氏子參時庵敷和尚敷問那裏來師曰江西敷曰曾見馬大師頂相否師曰千年桃核裏覓甚舊時仁敷頷之後因狗子無佛性話有疑請益敷曰待冷泉逆流即向汝道忽一日有省詣方丈曰冷泉逆流也敷曰見什麼來師曰千峰勢倒嶽邊止萬派聲歸海上消敷喝曰脫空謾語漢三十年後落節去在師拂袖便出永樂中徵修大典師應詔事竣勑主淨慈宣德壬子忽語眾曰吾行矣命浴更衣書偈曰須彌一拳大海一口海竭山崩烏飛兔走危坐而寂時庵敷嗣金陵靈谷定巖淨戒禪師吳興人參覺原於天界原舉桶箍𪹼因緣問之師擬議原厲聲曰早遲八刻了也師言下大悟洪武初詔住靈谷示眾舉長慶道總似今日老胡有望保福道總似今日老胡絕望師頌曰平展機籌不用誇抑揚元屬當行家曹溪波浪如相似那得兒孫若稻麻有續刻聯珠頌古行於叢林天界曇嗣明州天童佛朗湛然自性禪師雲陽韓氏子出家禮慧海為師一日海問父母未生前那箇是你本來面目自此懷疑蘊襟七年時與草庵一幻生福友善切磨激發往謁天界全室泐和尚師曰某昔年曾問一師友祖意教意是同是別他道秋樹飄黃葉寒天掘地爐今日請和尚決斷室曰病翁年來腕無力拄杖牀頭且靠壁師曰有人不肯和尚與麼道泐拈拄杖打曰待他露柱眼自開鐵蒺藜槌當面擲師便禮拜後出住里之普光復被旨遷天童上堂去年今日居楞伽山彼四眾喜此處少一人今年此日居佛國山此四眾喜彼處少一人擊拂子一身為無量身無量身為一身行則普天普地行坐則一切坐說甚麼東西南北他方此界檢點將來猶在化城且道寶所一句作麼生便下座上堂貪瞋癡戒定慧戒定慧貪瞋癡無明解脫知見解脫知見無明一切眾生諸佛諸佛一切眾生月落山無影風來樹有聲大千無對待露柱鬧縱橫喝一喝下座天界泐嗣杭州靈隱無文本褧禪師四明定海人姓謝氏一日示微疾蒙室範堂洪候問值師氣喘洪曰趙州道諸人被十二時唇使老僧使得十二時辰和尚作麼生師竦身曰喚甚麼作十二時辰洪曰爭柰氣急乎師震聲一喝問左右今朝是幾曰二月二十七日乃索筆書偈曰吾年七十有五涅槃生死不墮虗空背上翻身靠倒飛來小朵擲筆泊然而化淨慈德嗣衢州烏石傑峰世愚禪師郡之西安余氏子謁古崖石門斷崖中峰諸大老佩受法訓棲止南屏三年不踰戶限時止巖成和尚倡道大慈師復往謁成舉南泉不是心不是佛不是物是甚麼師茫然於是仍返南屏一夕聞鄰僧誦證道歌至不除妄想不求真豁然如釋重負乃曰佛法元在目前人自遠之耳即述偈曰時時覿面不相逢喫盡孃生氣力窮夜半忽然忘月指虗空迸出日輪紅走謁成入方丈成纔見便喝曰何處見神見鬼來師曰今日捉了賊也成曰贓在何處師便喝成曰開口合口都不是向上道將一句來師曰徧界明明不覆藏成拈竹篦師便掀倒禪牀成曰敢來者裏捋虎鬚連打三下即命為侍者後出世里之烏石遷廣德石谿開堂日僧問遠離烏石嶺來赴石谿山開示人天路如何透祖關師曰龍生金鳳子衝破碧瑠璃曰與麼則覿面不相識千里可同風師曰重疊關山路曰達磨西來不立文字直指人心見性成佛既然不立文字何得流傳至今師曰官不容鍼私通車馬曰直指人心指那箇心師曰開口不在舌頭上曰見性成佛性在甚麼處師曰太湖三萬六千頃夜夜波心月色明曰記得傅大士道空手把鋤頭步行騎水牛人從橋上過橋流水不流此意如何師曰切忌當面蹉過曰與麼則有意氣時添意氣不風流處也風流師曰毫𨤲有差天地懸隔曰此事且止記得經中道大富長者即是如來為復是累劫中來為復是今生契證師曰㵎深華落遠山高樹影長曰今日直心居士捐貲營建石谿道場請和尚居住是同耶是別耶師曰師子吼時芳草綠象王行處百花紅曰既然如是得何果報師曰生生歸佛地世世樂人天洪武三年十二月示微疾書偈曰生本不生滅本不滅撒手便行一天明月擲筆而逝止巖成嗣杭州淨慈逆川智順禪師溫之瑞安陳氏子入閩參天寶鐵關樞和尚究參踰月因如廁覩園中匏瓜觸發頓覺大地平沈見樞求證樞曰此纔入門耳向上一著則千里萬里又踰半載一日忽勵聲告樞曰南泉敗闕今已見矣樞曰不是心不是佛不是物是甚麼師曰地上甎鋪屋上瓦覆樞曰南泉即今在甚麼處師曰子過新羅樞曰錯師亦曰錯樞曰錯錯師禮拜而退樞趨寂師繼領院事未幾棄去朝廷賜金襴袈裟號佛性圓辨禪師洪武初詔徵有道高僧十人於鍾山建會師應詔命陞座說法上幸臨慰勞備至南還陞主淨慈六年復召入京俄示微疾沐浴說偈坐逝天寶樞嗣五臺壁峰寶金禪師世稱金壁峰乾州永壽人族姓石六歲出家薙染後徧歷講肆忽歎曰三藏之學皆標月指耳遂更衣謁如海真公於縉雲晝夜精勤偶𢹂筐擷蔬忽凝坐不動歷三時方寤真曰入定耶師曰然真曰何所見師曰有所悟真曰悟處如何師舉筐示之真曰不是師置筐於地拱手而立真又曰不是師便喝真攔胸擒住曰道道師揑拳便築真曰未在此塵勞暫息耳必使心路絕祖關透然後大法可明師由是脅不霑席者三年一日聞伐木聲汗下如雨乃曰古人道大悟一十八徧小悟無數豈欺我哉未生前事今日方知亟見真求證真不諾師掀倒禪牀而出翌日復見真真於地上畫一圓相師以袖拂去真復畫一圓相師於圓相中畫一畫又拂去真再畫一圓相師於圓相中畫十字又拂去真復畫如前師於十字隅作卍字又拂去真總畫三十圓相師一一具答真大笑曰參學悟者世豈無之能明大機用寧復幾人遂授記莂命往朔方道當大行先是師於定中見一山秀麗重樓傑閣金碧絢爛諸菩薩行道其中有招師者曰此祕魔巖也爾修道其中何遽忘之後師遊臺山道逢蓬首女子身被五彩弊衣赤足徐行一黑獒隨後師問何之答曰入山師曰入山何為答曰一切不為言訖而沒叩同行者皆不見或為文殊化身云師因就山建靈鷲庵以待方來僧俗聞風千里趨赴常至萬指至正間召入內廷值大雪夜有紅光自師室中直透霄漢上驚歎賜金襴伽黎明年禱雨輒應來賜寂照圓明大禪師號詔住海印寺洪武初詔師至京住大天界寺問法稱旨御翰賜詩寵賚優渥壬子六月沐浴更衣集眾言別弟子請偈師曰三藏十二部尚為故紙吾言何為端坐而逝茶毗舍利成五色齒舌不壞縉雲真嗣曹洞宗中都順天報恩萬松行秀禪師姓蔡氏古河內之解人也年十有五懇求出家父母不能奪其志禮邢臺淨土贇公為師後受具戒挑囊抵燕歷潭柘過慶壽次謁萬壽參勝默光禪師教看長沙轉自己歸山河大地話半載全無入由光曰我願你遲會師一日有省復看玄沙未徹語請益雪巖滿於磁之大明纔廿七日不覺伎倆已盡滿曰你但行裏坐裏心念未起時猛提起覰見即便見不見且却拈放一邊恁麼做工夫休歇也不礙參學參學也不礙休歇遂留記室潭柘亨和尚過大明師夜扣其門告侍者燒香請益亨便放相見師問如何是活句如何是死句亨曰書記若會死句也是活句若不會活句也是死句師自此參究益力一日見雞飛乃大悟曰今日不惟捉敗沙老虎亦乃捉敗岑大虫也走見滿滿可之乃付衣偈自是兩河三晉皆欽師名搆萬松庵以自適耆宿敦請開法師應之次住中都萬壽金章宗皇帝詔入禁庭陞座帝躬自迎禮聞法感悟賜錦綺大僧伽衣承安丁巳詔往大都仰山棲隱寺次移錫報恩洪濟元太宗二年庚寅復奉勑主中都之萬壽晚年退居從容庵數遷巨剎大振洞上安風上堂蓮宮特作梵宮修聖鏡還須聖駕遊雨過水澄禽汎子霞明山靜錦蒙頭成湯也展恢天網呂望稀垂釣月鉤試問風光甚時節黃金世界桂花秋小參昔有跨驢人問眾僧何往僧曰道場去人曰何處不是道場僧以拳敺之曰這漢沒道理向道場裏跨驢不下其人無語師曰人人盡道這漢有頭無尾能做不能當殊不知却是這僧前言不副後語汝既知舉足下足皆是道場何不悟騎驢跨馬無非佛事萬松要斷這不平公案更與花判曰喫拳沒興漢茆廣杜禪和早是不剋己那堪錯怪他道場惟有一佛法本無多留與闍黎道戶唵薩哩嚩閏四月旦日上堂所謂道人者不知月之大小不知歲之餘閏埜僧即不然今年三百八十四日前月大盡此月小盡即今閏四月一日辰末巳初忽有箇出來道通疏伶俐知時按節要且無道人氣息埜僧以手掩鼻道退後退後為什麼聻道人氣息太殺熏人問洞山道龍吟枯木異響難聞如何是異響曰不會師曰善解龍吟瞎全真問某甲三十年來打疊妄心不下乞師方便師曰汝妄心有來多少時也未審本來有妄心否祇如妄心作麼生斷只者妄心斷即是不斷即是真聞廓然作禮而去問諸佛不出世為甚麼却向王宮生師答曰青山常舉足問亦無有涅槃為甚麼却向雙林滅師答曰白日不移輪問撒手那邊底人為甚麼不居正位師答曰大功不宰問回頭這畔底人為甚麼不墮偏方師答曰至化無為白巖符云芳花叢裏不措一足萬年牀上嬾去安眠獨許萬松箇漢盡大地人無敢論量雖然你若作正偏回互會墮舌犁耕地獄有日在問明與無明其性無二如何是無二之性師答曰天曉不露問向道莫去歸來背父如何得不背父去師答曰切忌回頭問心心放下難如何是放下底人師答曰擔取去問是處是慈氏無門無善財為甚麼道瑠璃殿上無知識師答曰折殿了相見晚住報恩退居從容庵示眾機輪轉處智眼猶迷寶鏡開時纖塵不度開拳不落地應物善知時兩刃相逢時如何回互愚庵盂云徧身綺羅者不是養蠶人示眾去即留住住即遣去不去不住渠無國土何處逢渠在在處處且道是甚麼物得恁麼奇特愚庵盂云秤錘醮醋示眾動則埋身千丈不動則當處生苗直須兩頭撒開中間放下更買草鞋行脚始得愚庵孟云曾經三峽猿啼處不是愁人也斷膓示眾踢翻滄海大地塵飛喝散白雲虗空粉碎嚴行正令猶是半提大用全彰如何施設愚庵孟云瑠璃殿上無知識示眾向上一機鶴冲霄漢當陽一路過新羅直饒眼似流星未免口如匾擔且道是何宗旨愚庵孟云閉眼食蝸牛一場酸澁苦龍唐柱云措大漢子隨人語脈裏去不識轉身一路待云祇考箇更別有便縮却指頭不惟與俱胝相見亦乃使天下人摸索不著崇先奇云報恩老人雖別音響怎柰欠一著在者僧善解龍吟只是不知時節仔細看來也是別寶遇著瞎波斯師於孔老莊周百家之學無不俱通三閱藏教恒業華嚴得法者一百二十人束髮奉拜執弟子禮者不可勝紀編祖燈錄六十二卷又撰淨土仰山洪濟萬壽從容請益等錄及文集偈頌釋氏新聞鳴道集辨宗說心經風鳴禪悅法喜集並行於世丙師於四月五日示疾七日書偈曰八十一年只此一語珍重諸人切莫錯舉侍者驚報大眾足甫及門已圓寂矣壽八十一茶毗於通玄門外舍利無數諸方門人各分建塔雪巖滿嗣竹林巨川海禪師頌風鈴曰銅唇鐵舌太尖新樓角懸來不記春言外百千三昧法因風說與箇中人陳秀玉學士甞問萬松彌勒菩薩為甚麼不修禪定不斷煩惱萬松道真心本靜故不修禪定妄想本空故不斷煩惱士復問香山大潤和尚潤曰禪心已定不須更修斷盡煩惱不須更斷復問師師曰本無禪定煩惱士曰惟此為快耳雪巖滿嗣已上二人
