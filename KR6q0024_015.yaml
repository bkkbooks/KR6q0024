body:
  text: 六祖下三十一世臨濟宗隨州龍泉無聞絕學正聰禪師邵武光澤人族姓奚母吳氏髫年出家二十受具習止觀唯識論一日有宿衲詰師曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意云何師依文答之宿譏訶而去師從此激勵疑情頓發坐臥不安經六載一日聞馬嘶大悟遂往見天琦瑞和尚纔禮拜瑞便打師曰某甲適來草草觸忤和尚瑞曰老僧今日被上座勘破師曰和尚是在世忘世在念忘念某甲豈能勘破瑞曰在世忘世是如何師曰了物非物曰在念忘念是如何師曰於心無心曰心物俱忘時如何師曰華山高突太行峩瑞頷之遂蒙印可住後上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有問山僧如何是一代時教劈脊便打曰合取狗口僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也笑巖寶拈云放去較危收來太速頌曰古雲峯頂人難覷偶被風吹映夕霞百鳥未歸天已晚夜深依舊宿蘆花石車乘拈云聰和尚雖則不負來機和盤托出柰者僧依語生解若問山僧如何是本來面目劈脊便打待者僧云恁麼去時如何復打云十萬八千且道與古人相去多少試簡點看僧問今朝四月八日天下叢林皆慶如來降誕未審如來何處降生師於几上畫圓相示之僧無語笑巖寶僧作禮云盡界普瞻師一日忽遁去不知所之門人蹤跡久而不得越二年師復歸山七月朔夕師謂眾曰因心不了又遊方吳越山川路渺汒拄杖一條擔日月龍泉寺裏話偏長偈畢以拄杖擲地趺坐而逝天琦瑞嗣沔州古巖濟禪師中年目盲僧笑巖寶參師問何處所來寶曰親從關子嶺來師曰無聞老兄好麼巖曰好師曰如何見得好巖曰老來康健師曰爭見得康健巖曰著衣喫飯坐臥經行師曰與麼則不出常情巖曰要且常情莫測師仰面大笑翌日巖入室師曰嶺頭老兄先師甞許他悟處見骨只是太朴無博學巖曰和尚博學乎師曰老僧亦非博學巖曰恁麼則一同也師曰亦有不同處巖曰如何是不同處師曰他有眼我無眼巖曰和尚若無眼爭見得無無博學師又大笑囑曰子器非凡宜深根固蔕廣作利益非汝而誰惜吾衰老不及見矣巖拜謝而去天琦瑞嗣伏牛際庵大休實禪師新鄭李氏子幼嬰疾苦甫數歲父母慮其不育命投寶珠受業年二十訪老宿古心示萬法歸一一歸何處話尋入火場打三有省述偈曰法身本無相法相本來空會得者消息處處顯家風後往謁天琦瑞和尚途中遇天真月印二禪客同至關子嶺琦問你三人一路麼師曰雖然一路來處不同琦曰如何是你本來面目師便珍重琦曰未在更道師便喝琦曰父母未生前喝箇甚麼師無語而出自後數呈伎倆琦皆不諾一日侍琦於承天琦問曰藏身處沒蹤蹟沒蹤蹟處莫藏身你作麼生會師曰當堂不正坐那赴兩頭機琦為助喜住後陞座須彌作舞海水騰波龍象交參人天共聚大地山河同宣妙句三賢十聖共證菩提眉藏寶劍起寒光袖隱金鎚行正令明殺活顯金機舉拂子還有明眼衲僧不顧危亡向前一肩擔荷得麼便下座僧笑巖寶參問如何是祖師西來意師豎起拂子寶曰此外更有指示也無師擲下拂子寶便禮拜復敘問參關子嶺話師曰怪道親見作家來寶便喝少頃師又問曰我那老兄別來四十年未知今日鼻孔如何寶曰與和尚鼻孔一般師曰上座還見老僧鼻孔麼寶曰見師曰向甚麼處見寶曰兩眼下口門上師曰有祕密句曾向上座道麼寶曰曾道師曰試舉看寶曰合取臭口師拈拂子寶便喝拂袖而出天琦瑞嗣已上三人襄陽大覺圓禪師漢川人儀貌豐碩聲如洪鐘參叩淨庵默契庵付偈曰一枝正法眼列祖遞傳來付汝待時至馨香徧九垓師受囑後隱居襄西僧笑巖寶同爽庵參謁求依侍師曰上座錯了也老拙平生溫飽自適別無所長爽曰某生死事大語未竟師約而笑曰老拙亦有生死何獨爾有寶曰某恨晚進多無恒志和尚豈拒人哉師曰出家兒本自無為無事爾等特來反無事生事少間辭不獲已方少允曰與麼則粥飯自辦始得師方便莫測最惡時機不湻誠者一日室中以數則因緣問寶皆許可乃曰老僧以一則爛熟底因緣問你昔外道問佛不問有言不問無言世尊良久外道大悟師曰問既不涉有無良久亦是閒名正恁麼時外道悟箇什麼寶擬進語師遽以手掩其口曰止止猶更挂唇齒在寶乃釋然曰可謂東土衲僧不及西天外道占偈呈曰自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管平生得未得師稱賞之曰奇哉斯人是從上果地中語也寶侍四閱月師一日無病而終預前呼寶敘平生為僧始末畢乃曰今作沙門者皆是波旬之徒如來之仇讐何止虎皮羊質而然也重囑寶曰當念從上付囑之重子切勿易為人師他日法門莫大之幸不在吾多囑也語畢正午瞑然而逝茶毗建塔畢寶乃辭行天池素嗣嘉興無趣如空禪師本郡施氏子幼慕宗乘留心體究同法舟濟參訪數載後見野翁曉和尚徹法源底嘗掩關禪定一日啟關示眾曰自結玄關自活埋自吾閉也自吾開一拳打破玄關竅放出從前者漢來元宵示眾畫角聲中薦得觀音未是作家彩燈影裏知歸室利謾誇好手恁麼告報與諸人也須笑破虗空口若也未瞥然再看鼇山顛倒走參小參眾立定師喝一喝曰禍出私門便歸方丈示眾舉脩多羅教曰以思惟心測度如來圓覺境界如將螢火燒須彌山師曰我且問你諸人如來境界既是測度不得底畢竟如何合煞喝一喝還見教意麼便下座示眾云言前薦得已天涯句下承當路轉賒一擊鐵圍如粉碎雲天空闊雁行斜除夕示眾時窮何似日窮好月若窮來歲亦然三十六旬窮過了東村王老夜燒錢老漢並無一物應箇時節因緣拈拄杖只有者箇無窮無盡歷劫經年今夜隨時送去免教涉蔓相牽擲下拄杖歷劫得來今斷送拍雙空手接新年示眾佛是眾生屋裏了事人眾生是佛屋裏不了事漢若要一樣但佛與眾生一時放却則無了無不了卓拄杖但於事上通無事見色聞聲不用聾端陽示眾佳節端陽何曾頂約五月五日年年撞著風搖蒲劍碧楞楞日照榴華紅灼灼道在時節因緣豈論正法末法向來著意馳求通身是草今日信手拈來無不是藥豎拂子大眾且道此藥治甚麼病擊拂子不但老維摩藥王藥上也喫一帖示眾豁開頂門眼照徹大千界既作法中王於法得自在師一夕湖邊步月適遇一僧師曰明月與清風水天同一色人人在箇中只是出不得僧曰打草驚蛇作麼師曰上座又作麼生僧曰看脚下師大笑曰將謂胡鬚赤更有赤鬚胡萬歷己卯仲冬師謂門人性沖曰來歲中秋五六之間吾行矣子宜知庚辰八月十六日沖以前期而至師示微疾集眾說偈曰生來死去空花死去生來一夢皮囊付與丙丁公白骨斷橋隨眾阿呵呵明月清風吟弄佛日方曰皮囊既付丙丁白骨交歸斷橋畢竟將甚麼風甚麼弄月良久云為見煙霞生背因知星月繞簷楹語畢端坐而逝世壽九十野翁曉嗣隨州七尖大休宗隆禪師青州益都賈氏子依郡之石佛薙髮寓成都北寺為典座出街挑水忽然有省作偈曰大地山河體性空那分行走與西東偶然撞著無私句萬水千山總一同就河南乾明寺無盡室中盤桓針芥相投印以偈曰道高不假修德重事理周一枝正法眼付與隆大休出住隨州七尖峰垂三關語以示學者曰吹毛寶劍被石人持去挂在萬仞峰頭四壁無路如何取得有一如意珠被木人擎來拋向大海波中不假舟航如何覓得盡大地是箇火坑燒却了也唯有一莖眉毛在未審是何人見得師在茄園茄瓜次僧問如何是西來意師指茄曰黃瓜茄子僧不契再問師曰莫勞叨黃瓜茄子僧終不契下山別參一尊宿宿曰你在何處來僧曰七尖峰來曰大休有何言句僧舉前語尊宿合掌曰真大慈悲嘉靖二十一年十一月八日集眾書偈曰三際握來一拄杖十方原是舊袈裟泥牛石虎知消息踏破虗空便到家置筆端坐而逝石門海嗣嘉興胥山雲谷法會禪師本郡嘉善懷氏子九歲芟染於大雲寺出家習瑜伽教年十七潛投天寧時法舟濟禪師方閉關屢䇿發之一日問師曰圓覺經云四大分離今者妄身當在何處師聞之猛省却立巷側至四更不動濟呼與語未契未幾被本寺追回鎖禁越二年復出至陽羨見古林教參一歸何處續入吉庵會下庵問曰汝參話頭時中絲毫無不間否師曰不能曰如此却是虗播光陰師曰雜念漸消本念漸熟或非虗度庵曰有消有長盡屬代謝非究竟法汰如何法師補讀高僧傳云師年二十受具修天台小止觀往郡之天寧問所修何時於法舟濟公公曰夫學以悟心為主止觀之要不離身心氣息何能脫然子之所修流於下乘矣因示以旨要師力究之一日受食食盡而不知碗忽墮地猛然有省恍如夢覺公與印可師遊留都止天界毗盧閣閉關時覺胸中有月照寒潭之狀越三載報恩諸老迎於三藏殿朝盂暮榻蕭然適也自謂足矣偶有道者被褐訪之師因呈所見道者訶曰脫得見盡一切皆是平常汝所得自以為極玄極妙不知皆是鬼窟中作活計師擬進語者厲聲喝曰汝道平常是甚麼玄妙是甚麼不告姓名拂衣而去師因大省二十年所得消釋都盡又三年北遊燕與徧融白雲相切磋回南都五臺陸公等送住棲霞結庵於天開巖大洲趙公至棲霞聽法師講楞嚴自謂洞悉關竅及入庵見師恍然喪其所得問曰師熟楞嚴耶師曰不會趙嘆曰真楞嚴矣念菴羅公荊川唐公慕謁羅問曰如何是祖師西來意師曰我者裏無此貲臨別語羅曰性海非遙法流常注纔有擬議便隔萬山荊川踊躍稱快師曰公勿便快活茲事取不得捨不得若謂面前皆是即執妄為真若欲向上尋求又是撥波覓水唐拜之曰不至棲霞幾虗此生復遊吳了凡袁公訪師師示以宗旨袁聞之灑然補續高僧傳云了凡袁公未第時參師於山中對坐之晝夜不瞑目師問曰公何無妄念公曰我推我命無科第子嗣分故安心委命無他妄想耳師曰我將以公為豪傑乃一凡夫耳聖人云命由自作福由己求造化豈能拘人耶乃委示以改過積德唯心立命之旨公依教奉行竟登進士有子嗣焉師復遊金臺旋歸棲霞鄉僧多潛奔之袁復訪師師問汝來作麼曰專求佛師曰丹霞云佛之一字吾不喜聞有所馳求盡屬妄想袁曰我本是佛求即無求師搖首曰未在袁曰長安無別路曰然則任汝胡行曰終不向師覓路師曰究竟如何曰棲霞嶺上草青青師休去明年了凡邀師歸嘉善之大雲建立禪廡禪道為之中興憨山清禪師為沙彌時侍師彌謹一日請曰說者為某甲壽不長柰何師曰壽夭乃生死法參禪乃了生死法若一念不生則思神覰不破造化何能拘之耶第患不明道眼耳清將北行師言誡之曰古人行脚單為提明己躬下事爾當思他日何以見父母師友即慎毋虗費草鞋錢也達觀可禪師參方時同平泉陸公思菴徐公謁師叩華嚴宗旨師發揮法界圓融之妙皆嘆未曾有禪道草昧於時復有起色僧問如何是祖師意師曰有水皆含月無山不起雲曰莫更有奇特否師曰不得將龜作鼈萬歷戊辰冬主三陳菴禪會乙亥正月三日起行香徧閱僧房告眾曰此地清淨吾可觀化明日遂端坐而逝世壽七十五塔於大雲之右天寧濟嗣嘉興精嚴東谿方澤禪師郡之嘉善人族姓任首謁法舟濟禪師於天寧一日室中舉龍潭見天皇公案至何處不指示心要言下有省行蒙印可解制秉拂佛法雖徧一切世間而未嘗有絲毫透漏作麼生結雖未嘗有絲毫透漏亦未嘗有絲毫囊藏又作麼生解故知百丈大師曲引初機為此方便誑諕之辭其實莫能結莫能解也設使有箇孟八郎漢出來道我能向百丈大師結不得處一結結斷直使天下衲僧忘前失後求出無門亦能向百丈大師解不得處一解解開直使天下衲僧七狼八藉竄身無地却甚奇特諸上座彼既丈夫我能不爾良久擊拂子一下曰吽天寧濟嗣已上二人浮峰普恩上座山陰金氏子十歲出家至年十九忽念生死事大奮志尋師初至大悲叩無際首座示以心生則種種法生之語師當下有所契入有偈曰返本還源便到家亦無玄妙可稱誇湛然一片真如性迷失皆因一念差復見法舟濟於天寧呈所見舟可之又謁萬松休於烏石峰松問何來師曰天寧松曰有何言句師舉前話松曰不是不是師曰天寧道是和尚如何道不是松曰天寧則是我則不是師疑不決後參玉芝聚禪師復舉前話聚曰是與不是未出常情二俱喫棒有分師曰如何是出常情句聚與一掌師當下豁然平昔礙膺一時融釋聚曰汝既如是當善護持復以偈囑曰莫學支流辨濁清是非盡處出常情鐵鞭擊碎珊瑚月會看東山水上行天池聚嗣建寧斗峰天真道覺禪師本郡建安張氏子看萬法歸一一歸何處話久而有省占偈曰一手拍兮一手鼓無位真人出格舞口中唱出無腔歌三千諸佛同一母往見古音求證音稱賞之雙峯琴嗣曹洞宗西京定國無方可從禪師雒陽許氏子禮福先芘峰剃落初參龍潭順超化宗入室請益稍有契入後參俱空斌禪師斌問子參何人來師曰少室山前風悄然斌曰因甚一花開五葉師曰沒孔鐵錘百雜碎斌曰掠虗頭作麼師曰某甲祇見盡天下祇解掠實無一人能掠虗者斌曰不打自招也師曰老和尚慣用底不妨勘破杖人盛云龍潭未見龍超化卻將化空裏打箇筋斗來詐明道士鐵錘墮天下掠實無掠盧不打自招笑殺渠慣用老人今勘破何妨收拾者蠻驢末後關還透過百丈甘為野狐九峯不肯首座果能平地生波許你家中穩坐斌以綿密閫奧重加煅煉偶撿傳燈見天衣以行者五人俱召實上座因緣師當下密契五位奧旨遂承印記隱於郟鄏定國寺示眾佛祖宗乘本無言說但此段家風非從外得須七處徵心八還辨見方得到家穩當不涉程途汝知九峰不肯首座百丈墮在狐窩足見得人為難而得理為尤難如上多方切須珍重成化十九年壬寅六月示寂塔於少室萬壽斌嗣
