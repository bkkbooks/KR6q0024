body:
  text: 六祖下十九世臨濟宗夔州臥龍破庵祖先禪師蜀之廣安王氏子從羅漢院德祥出家聞緣老宿住昭覺往參扣語契令奉圓悟香火一日從方丈前過緣問庵頭有人麼師云無人語未竟緣劈胸與一拳云你聻師忽有省出峽依澧州德山涓公祝髮受具遍叩諸方抵蘇之萬壽值雪夜坐自念行腳數年未得悟徹正悶悶間忽見鐘動趨後架舉首見照堂二字疑情頓釋既而見水庵一於雙林水曰師子尊者被罽賓斬却頭且置你道西天胡子為什麼無鬚師曰非雙林不舉此話水曰作家禪客師曰心不負人面無慚色水遂以手拓開師曰勘破了也逮水庵謝事往參密庵傑和尚傑即命師典客一日傑對旁僧舉不是風動不是幡動語師聞豁然大悟次日傑遇師於寮前謂師曰總不得作伎倆試露箇消息來師應聲曰方丈裏有客傑呵呵大笑傑遷蔣山師侍行親炙凡五載盡得旨要辭還蜀傑送以偈曰萬里南來川䖃苴奔流度刃叩玄關頂門𭣟瞎金剛眼去住還同珠走盤師至夔州尚書楊公輔以臥龍請未幾辭去復遊吳中首衆於徑山靈隱後住常州薦福真州靈巖蘇州秀峰穹窿楊和王請住湖州資福最後約齊張公鎡請師於慧雲開山凡六坐道場師首衆靈隱時有道者請益胡孫子捉不住願垂開示師曰用捉他作什麼如風吹水自然成文時無準侍傍大悟木陳忞頌云至仁天子調玉燭宇宙風清八百州寸刃不施王化遍一人端拱坐龍樓箬庵問頌云人居大國方知貴水到潚湘一樣清驀地江湖風浩蕩一時吹徹渙春冰上堂舉楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居師曰楊歧鬭勝不鬭劣秀峰鬭劣不鬭勝秀峰乍住沒親疏箇箇盡懷滄海珠滿眼湖山看不足釋迦彌勒是他奴上堂舉東山和尚道如何是禪閻浮樹在海南邊近則不離方寸遠則十萬八千畢竟如何禪禪師云穹窿也有箇道處如何是禪閻浮樹在海南邊撑天拄地拄地撑天巧說不得只要心傳畢竟如何禪禪堯峰潛曰吹火長尖嘴上堂十五日已前明似鏡十五日已後黑似漆正當十五日又且如何鶯遷喬木頻頻語蝶戀芳叢對對飛嘉定四年六月九日師將示寂作手書別交游復書偈曰末後一句已成忉怛寫出人前千錯萬錯書訖端坐而逝時客寓徑山遺命散骨林間住持石橋建塔於別峰塔之右壽七十六臘四十九天童傑嗣臨安靈隱松源崇嶽禪師處州之龍泉吳氏子自幼卓犖不凡早歲慕出世法年二十三棄家參學繼見大慧杲於徑山杲升堂稱蔣山應庵華為人徑捷師聞之不待旦而行既至入室朝夕咨請一日華問世尊有密語迦葉不覆藏汝作麼生師曰鈍置和尚華厲聲一喝師有省華大喜以為法器說偈勸使祝髮隆興初得度於臨安白蓮精舍自是遍參諸大老罕當其意者乃入閩見木庵永一日辭永永舉有句無句如藤倚樹師曰裂破永曰琅琊道好一堆爛柴聻師曰矢上加尖永曰永兄下語老僧不能過其如未在他日拂柄在手為人不得驗人不得師曰為人者使博地凡夫一超入聖固難矣驗人者打向面前過不待開口已知渠骨髓何難之有永舉手曰明明向道開口不在舌頭上後當自知逾年見密庵於衢州之西山隨問即答傑微笑而已師切於究竟至忘寢食傑移蔣山華藏徑山師皆從之一日傑挂牌為衆入室次問僧不是心不是佛不是物師侍側豁然大悟乃曰今日方會木庵和尚道開口不在舌頭上也自是機辨縱橫傑遷靈隱師遂分座旋出世於平江澄照徙江陰之光孝無為之冶父饒之薦福明之香山平江之虎丘慶元三年靈隱虗席被旨補處上堂大凡扶豎宗乘須具頂門正眼懸肘後靈符只如保壽開堂三聖推出一僧保壽擲下拄杖便歸方丈二尊宿等閒一挨一拶便乃發明臨濟心髓殊不知性命總在者僧手裏還有檢點得出者麼昔年覓火和煙得今日擔泉帶月歸居靈隱六年法道益盛得法者衆忽退居東庵示微疾作手書別諸公卿且垂二語以驗來學曰有力量人因甚擡腳不起開口不在舌頭上辭世日示衆久聚正路行者有只不能用黑豆法難以荷負正宗臨濟佛法到此平沈痛哉痛哉雲居莊拈云松源老祖壓良為賤若是黑豆法用得有甚奇特直須將斷貫索穿過從上佛祖鼻孔方有自由分時有僧問斷貫索莫在和尚手中麼莊云者瞎漢拈拄杖便打遺書嗣法香山睦雲居開囑以珍重大法復書偈曰來無所來去無所去瞥轉玄關佛祖罔措跏趺而逝放翁陸游銘其塔天童傑嗣饒州薦福曹源道生禪師南劒人分座雲居出世妙果徙龜峰上堂雨雪落紛紛簷頭水滴滴良哉觀世音草裏跳不出也大屈水底烏龜鑽鐵壁咄上堂平旦清晨三月朝南山蒼翠插雲霄不須更覓西來意門外數聲婆餅焦拍膝一下曰好大哥詠靈巖石偈曰雲去雲來非有意雲來雲去亦無心有無截斷靈何在突兀一峰青到今後住薦福逾月示疾天童傑嗣慶元天童枯禪自鏡禪師福州高氏子謁密庵傑於靈隱針芥相契遂荷印記寶慶元年被旨於靈隱上堂有句無句如藤倚樹樹倒藤枯句歸何處良久曰長憶江南三月裏鷓鴣啼處百花香上堂一拽石二搬土夜半日輪正卓午老安曾牧溈山牛南泉不打鹽官鼓報君知莫莽鹵火裏蝍蟟吞却虎上堂舉鶴林因僧叩門林曰阿誰僧曰行腳僧林曰非但行腳僧我這裏佛來也不著僧曰因甚佛來也不著林曰無他棲泊處師曰天童則不然若有人扣門即大開了待他入來便攔胸搊住曰道道若擬開口便與劈胸一拳若向者裏轉得身吐得氣便請明窗下安排向上天童傑嗣臨安淨慈潛庵慧光禪師化鹽偈曰合水和泥一處烹水乾泥淨雪花生乘時索起撩天價公驗分明孰敢爭天童傑嗣太平隱靜萬庵致柔禪師潮州陳氏子母黃妙喜杲和尚南遷道經於潮師祖父暹延禮甚謹其母夢僧入室遂懷妊及誕父母誓不以俗纍羈之芟染完具參密庵傑於蔣山一日入室次傑舉釋迦彌勒猶是他奴且道他是阿誰師曰無地頭漢傑曰千聞不如一見師便毆一拳傑擒住厲聲曰者小鬼子見箇什麼胡打亂打師曰更要喫一拳在傑連揮兩拳曰打者無地頭漢師豁然大悟遂辭去法音𣽘頌云虗空處處著拳頭這漢何曾沒地頭四五百條花柳巷二三千座菅絃樓出住太平隱靜上堂起道樹詣鹿苑不是向上機傳少室續曹溪未為性燥漢直得無依無欲無一法當情猶落第二見放過一著卷舒在我縱奪臨時於把住處放行露柱燈籠活潑潑於放行處把住釋迦彌勒是他奴卓拄杖且道是放行耶是把住耶一氣不言含有象萬靈何處謝無私上堂東山和尚道空門有路人皆到到者方知旨趣長心地不生閒草木自然身放白毫光師曰東山只解無中覓有不解有裏尋無隱靜則不然空門有路人皆到到者方知礙處通石上栽華還結果到頭元不假春風師臨終集衆囑曰老僧生平無長物只依海衆常例安寢堂兩日足矣復書偈端坐而化越三日寺衆悟遺言若有旨也天童傑嗣臨安靈隱笑庵了悟禪師姑蘇人上堂舉睦州因僧問以一重去一重即不問不以一重去一重時如何州曰昨日栽茄子今日種東瓜頌曰昨日栽茄子今日種東瓜一聲河滿子和月落誰家天童傑嗣金陵蔣山一翁慶如禪師姓范氏福州長樂人上堂春雨如膏春雲似鶴春鳥關關春泉濯濯揭開觀音腦蓋踢倒慈氏樓閣切莫將錯就錯拍禪牀曰參上堂過去諸如來斯門已成就一盲引衆盲現在諸菩薩今各入圓明蝦跳不出斗未來修學人當依如是法賺殺一船人天童傑嗣平江承天鐵鞭允韶禪師參密庵傑記莂後住承天佛涅槃日上堂老漢當年臘月八三更半夜顛狂發剛把長釘釘眼睛直至如今未能山僧今日下毒手為他一拔看便下座天童傑嗣學士張鎡居士字功甫別號約齊聞鐘聲悟道述偈曰鐘一擊耳根塞赤肉團邊去箇賊有人問我解何宗舜若多神面目黑後捨宅建寺曰慧雲請破庵先禪師開山疏曰捨林居為阿蘭若夫豈小緣請宗師據曲彔牀只因大事幾度遍參遭密庵打失鼻孔一朝拈出向冷泉捋下面皮不謂馨香奚煩鄭重辭青松於北㵎穿幾重出岫之雲對緑水於南湖祝萬歲如山之壽嘉定五年公復清滅翁文禮禪師相繼闡法今有專祠於慧雲天童傑嗣已上十人吉州青原淨居正庵宗廣禪師上堂不用愛聖聖是假名不用厭凡凡是妾立但得聖凡情盡自然物我雙忘正恁麼時憑誰委悉石女穿針山色秀木人牽線海雲生青原禋嗣臨安淨慈晦翁悟明禪師福州人上堂舉夾山會下一僧到高亭才禮拜亭便打僧曰特來禮拜師何打又拜亭又打趁出僧回舉似夾山山曰會麼曰不會山曰賴汝不會汝若會即夾山口啞去應庵華拈曰高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是箇漢莫道高亭夾山便是達磨大師出來也斬為三段何故家肥生孝子國霸有謀臣師曰高亭夾山門庭施設各得其宜但中間一人較些子應庵和尚與麼道也是鞏縣茶瓶師嘗纂修聯燈會要傳於叢林鼓山永嗣蜀中佛道無價刊載明之嗣為苦口益益嗣筏渡慈慈嗣一言顯顯嗣小庵密密嗣二仰欽欽嗣無念有有嗣荊山寶寶嗣鐵牛遠遠嗣朝陽以迄聚雲諸法嗣為大慧杲繼絶大盛錦江俟求機語補入因嘉興續藏止有中興諸師語録並無苦口諸師事實耳繼燈功德最大諸方幸勿吝教臨安徑山藏叟善珍禪師泉州南安呂氏子也示衆云古者道知之一字衆妙之門又有道知之一字衆禍之門只者二門入得更須出得三世諸佛出不得六代祖師出不得天下老和尚出不得何故變鐵成金易變金成鐵難據室者裏是問訊燒香了來老僧身邊立地底所在麼呆子你自鈍置猶可莫來鈍置老僧自題其像曰參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷酢一著高出諸方敢道飯是米做靈隱善嗣臨安淨慈東叟仲穎禪師上堂曰切忌隨他覓無勞向己求縱橫活鱍鱍有放還有收是甚麼一葉落天下秋上堂上不在天下不在地中不在人喝一喝且道者一喝落在甚麼處若也知得也有賓也有主也有照也有用若也不知參退巡堂喫飯上堂行者行坐者坐左之右之無可不可甘露園中蒺藜黃檗樹頭蜜果才與麼不與麼不與麼却與麼善賈之家不停滯貨靈隱善嗣吉安龍濟友雲宗鍪禪師廬陵王氏子幼喜趺坐年十二出家十九剃髮受具二十二參方首謁妙峰值佛涅槃日峰上堂拈拄杖曰釋迦老子來也諸人還見麼微妙淨法身具相三十二放下拄杖曰見你諸人不會入涅槃去也師於言下豁然契悟尋登吉水之東山佛頂得修山主故址木食㵎飲影不出山嘗自咏曰山僧有分住煙蘿無米無錢莫管他水似琉璃山似玉眼前儘有許來多後峰以法衣竹篦并自題肖像寄師曰妙峰孤頂草離離橫按竹篦三尺鐵只許佛頂龍濟知父子不傳真祕訣至元丁亥忽示疾集衆囑後事彈指一聲曰只此是別衆語也衆請偈師不答將二鼓復索筆書曰一燈在望更無言說大地平沈虗空迸裂書畢泊然而寂靈隱善嗣已上三人慶元育王物初大觀禪師鄞縣橫溪陸氏子參北澗於淨慈悟旨命典文翰後住育王上堂一冬二冬你儂我儂暗中偷笑當面脫空雖是尋常茶飯誰知米裏有蟲夜來好風吹折門前一株松北澗簡嗣臨安淨慈偃溪廣聞禪師侯官林氏子十八得度受具歷見鐵牛印少室睦無際派諸老後參浙翁𤥎於天童針芥雖投自知未穩及再參於雙徑𤥎笑而問曰汝來耶一夕坐簷間聞更三轉入堂曳履而蹶如夢忽醒翌朝造室𤥎舉趙州洗鉢盂話師將啓吻𤥎遽以拳止之疑情當下冰釋紹定戊子四明制閫胡公以小淨慈致之歷住香山萬壽雪竇育王淨慈靈隱徑塢等山開爐上堂舉趙州示衆曰老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著師曰森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速上堂楊岐眼裏睛臨濟頂中髓一不成二不是點著不來白雲萬里徑山𤥎嗣臨安靈隱大川普濟禪師明州奉化人上堂舉睦州和尚因僧問如何是祖師西來意州曰一隊衲僧來一隊衲僧去頌曰一隊衲僧來一隊衲僧去打破睦州關大地無寸土題世尊出山相龍章鳳質出王宮肘露衣穿下雪峰智願必空諸有界不知諸有幾時空師嘗纂修五燈會元行世徑山𤥎嗣臨安徑山淮海原肇禪師通州靜海潘氏子年十九剃染受具參浙翁𤥎於徑山𤥎問汝何處人師曰淮東𤥎曰泗州大聖為什麼在揚州出現師曰今日又在杭州撞著𤥎曰且喜沒交涉師曰自遠趨風𤥎以師警敏欲大激發未許參堂才見便曰下一轉話來擬開口即喝出師以書上又以頌呈末句曰空教回首望長安𤥎曰者裏是什麼所在師曰謝和尚挂搭於是密就入室之列命掌記室𤥎既示寂四明育王虗席廟堂奏師補處復遷杭之淨慈露隱徑山其住徑山值歉餘逋券山積僧殘屋老未幾樓閣矗霄雲衲踵至不減浙翁全盛氣象俄示疾囑其徒曰為吾祔一穴於東㵎見生死不忘奉師之意六月初十日浴訖書偈而逝徑山𤥎嗣婺州雙林介石朋禪師上堂舉明招謙禪師一日天寒上堂衆才集招曰風頭稍硬且歸暖處商量便歸方丈衆隨至立定招曰才到暖室便見瞌睡以拄杖一時趁下頌曰稍硬風頭早已乖更將暖處自沈埋反令千古成踪跡枉喫羅山白飯來徑山𤥎嗣慶元天童辨山阡禪師舉李翱參藥山因緣頌曰貴耳而賤目背手抽金鏃仰面看青天箭過新羅國僧歸鄉偈曰奮志南方問正因正因一字不曾聞七零八落袈裟角惹得凌霄幾片雲觀音大士偈曰螺髻屈蟠春島碧緑衣零亂曉雲寒尋聲只麼隨流去說甚真觀清淨觀徑山𤥎嗣平江虎丘枯椿曇禪師上堂舉大梅常禪師問馬祖如何是佛祖曰即心是佛師曰要知馬祖落處麼水向石邊流出冷風從花裏過來香徑山𤥎嗣龍溪文禪師示衆無相無形本寂寥擬擡眸處轉迢遙蒲團靜倚無餘事窗外一聲婆餅焦徑山𤥎嗣平江虎丘東山道源禪師福建連江黃氏子肄業郡之白雲游歷兩浙末後到蔣山見浙翁𤥎禪師室中舉即心即佛話有省出世奉化清涼遷蘇州虎丘上堂拈拄杖曰德山棒臨濟喝總是用過了底閒家潑具且道虎丘將什麼為人卓拄杖不假鉗鎚烹佛祖慣將筯折攪滄溟擲拄杖下座建安徐直翁帥三山以雪峰起師至建寧光孝寺遺偈而化徑山𤥎嗣慶元大慈芝嵒慧洪禪師越州新昌人姓朱誕時母夢前石佛高禪師入臥內寤而生師年十六從石佛淨因剃染謁徑山浙翁𤥎𤥎問曰汝何處人師曰越州𤥎曰近離甚處師曰淨慈𤥎曰如何是行腳事師擬議𤥎色莊曰汝前來答我一一分曉問著行腳事則茫然為何所礙師曰今日來見和尚𤥎曰念汝新到參堂去𤥎遷天童師再參室中舉不是心不是佛不是物師曰毒龍行處草不生𤥎曰且喜沒交涉師曰入水見長人𤥎便喝忠獻越王請住崇報上堂住山懶慢百事無成教為剩語禪亦強名擊拂子曰夜來春睡重一覺到天明住石佛上堂紅塵堆裏四經秋驗盡諸方碗脫丘忽地船頭輕撥轉却來屋裏販揚州襴衫翻著曲唱還鄉坐斷千差壁立萬仞直得韶光溢目故園桃李爭研瑞氣騰空本地風光顯現若也頓開千眼何妨把手同歸其或未然善財一去無消息樓閣門開竟日閒臨終書偈曰六十三年前六十三年後臘月火燒山虗空俱出醜跏趺而逝徑山𤥎嗣慶元壽國夢窗嗣清禪師山陰于氏子佛涅槃上堂佛真法身猶若虗空因甚二月十五日却向雙林樹下做盡死模樣良久曰竹影掃階塵不動月輪穿海水無痕上堂歸宗斬蛇祕魔擎叉禾山打鼓趙州喫茶十字街頭開鋪席見錢買賣且無賒徑山𤥎嗣共十人湖州道場別浦法舟禪師嘗有魚籃觀音讚曰月眉斜印海門孤逐浪隨波不丈夫雙手向人提掇處却將魚目換明珠育王印嗣無極觀禪師得法於育王印禪師題世尊出山像曰王宮不住箇癡呆半夜逾城真怪哉苦行六年誰采你計窮只得出山來育王印嗣已上二人慶元瑞巖無量崇壽禪師上堂舉鳥窠和尚因白侍郎問佛法大意鳥窠曰諸惡莫作衆善奉行侍郎曰三歲孩兒也解道鳥窠曰三歲孩兒雖道得八十老人行不得頌曰惡無相貌善無形皆自心田長養成不露鋒鋩輕點破菩提煩惱等空平育王瑞嗣慶元天寧無鏡徹禪師上堂舉巖頭和尚因僧問浩浩塵中如何辦主頭曰銅沙鑼裏滿盛油頌曰百萬雄兵入漢關威如猛虎陳如山單刀直取顏良首不是關公也大難天童派嗣鼇峰定禪師讚玄沙和尚偈曰青蓑不肯換金章千古風流屬謝郎釣得錦鱗人不薦夜寒沙上聽鳴榔天童派嗣已上二人饒州薦福無文燦禪師從育王堪得法增集續燈誤入無準範嗣寶慶三年六月受請住薦福次遷開先五年復還薦福據室山僧今日開地獄門普請盡大地人造地獄業證地獄果若有一人成佛作祖我誓不成正覺上堂天高地厚日盈月昃全提半提天地懸隔燦上座平生只會著衣喫飯聞人說佛法二字如風過樹頭如水澆頑石今日裂破面門喚作長老也欲與諸人論說一上無端冒五六月大熱行二千里修途一時打失了也雖然賴有拄杖子在拈拄杖曰拄杖子試說看卓一下清平世界切忌訛言結夏上堂百不知百不會飽喫飯熟打睡要得剋期取證須證如是三昧師嘗與其友知無聞書曰住院何足道哉近年勑差堂除者何眼可挂齒牙者能幾人使吾有口可以吞三世諸佛則曲彔牀終身不坐又何慊無聞以為何如某昔者入衆見識字人多不修細行遂決意不作書記諸老據位稱師者又多看不上眼遂無意出世今皆不遂其初矣住院十年名為長老只是舊時燦上座飲食起居與堂僧無異相從衲子歲不下百數十人遇五日捶鼓升堂以平時在諸老間所得細大法門隨分東語西話斷不敢以脫空話籠學者亦不敢以過頭語欺謾學者說到無巴鼻無滋味處欣然自笑聽者不必解笑也士大夫多相知然所知者不過謂其讀書也能文也解起廢也硬脊梁也蓋膽毛幾莖則知者鮮矣育王堪嗣福州雪峰北山信禪師頌佛成道曰六年凍得眼無光一見明星雪後霜擔水出山頻喚賣不知江海白茫茫何山清嗣平江虎丘㑃堂善濟禪師題魚籃觀音像讚曰雲鬚濃粧苦強顏為他閒事入塵寰攜來活底無人買只作尋常死貨看天童觀嗣越州天衣嘯嵒文蔚禪師上堂舉雲門和尚示衆曰人人盡有光明在看時不見暗昏昏踢倒山門無厨庫此時明暗自然分天童觀嗣柏嵒凝禪師作破衲頌曰零零落落幾經年信手拈來搭半肩午夜定回和束倒箇中消息許誰傳天童觀嗣華藏純庵善淨禪師上堂舉六祖風幡話頌曰不是風兮不是幡白雲盡處見青山可憐無限英雄漢開眼堂堂入死關天童觀嗣已上四人臨安徑山荊叟如珏禪師婺州人依侍癡鈍穎和尚一日室中垂語如何是佛師遽曰爛東瓜侍呈頌曰如何是佛爛東瓜咬著冰霜透齒牙根蒂雖然無窖子一年一度一開花嘗作偈寄呈穎曰鍾山白刃赤身挨幾度曾經被活埋一自人亡家破後了知無位可安排歲旦上堂新歲擊新鼓普施新法雨萬物盡從新一一就規矩普賢大士欣歡乘時打開門戶放出白象王遍地無尋處拈拄杖惟有者個不屬故新等閒開口吞却法身擲下拄杖是什麼千年桃核裏元是舊時仁天童頴嗣福州雪峰大夢德因禪師作布袋和尚贊曰杖挑布袋走紅塵底事何曾見得親業識茫茫無本據不知開口笑何人天童頴嗣已上二人臨安靈隱高原祖泉禪師舉鏡清在雪峰一日普請次峰曰溈山道見色便是心還有過也無清曰古人為什麼事峰曰雖然如是我要共你商量清曰若與麼不如某甲钁地去師拈曰雪峰探竿在手影草隨身若不是鏡清普請幾乎狼藉又舉伏䭾密多尊者問佛䭾難提尊者父母非我親誰是最親者諸佛非我道誰是最道者頌曰父母分明非我親祖師肝膽向人傾直下若能親薦得優曇花發火中春金山奇嗣隆興黃龍無門慧開禪師杭州梁渚人族姓梁參月林觀禪師觀令看無字話經六年迥無入處乃奮志自誓曰若去睡眠爛却我身每至困時廊下行道以頭向露柱磕一日在法座邊忽聞齊鼓聲有省述偈曰青天白日一聲雷大地羣生眼豁開萬象森羅齊稽首須彌𨁝跳舞三臺次日入室欲通所得觀遽曰何處見神見鬼了也師便喝觀亦喝師又喝自此機用吻合淳祐六年奉旨開山護國仁皇寺上堂若人識得心大地無寸土古人恁麼道黃龍即不然若人識得心大地盡是土上堂是非長短耳邊風切莫於中覓異同要得八風吹不動放教心地等閒空慈受老人只解順水張帆不能逆風把舵黃龍又且不然是非都去了是非裏薦取何故聻幾度黑風翻大浪未曾聞道釣舟傾師晚年倦於槌拂庵居西湖之上參學者猶衆理宗召入選德殿說法祈雨感應勑賜金襴法衣佛眼之號萬壽觀嗣興化囊山孤峰德秀禪師福州連江陳氏子於蘇之寒山祝髮上堂舉僧問雪峰如何是第一句峰良久僧舉似長生生曰此是第二句雪峰令僧問生如何是第一句生曰蒼天蒼天師曰二大老與麼淚出痛腸若是第一句要且未夢見在忽有人問怡山如何是第一句只向他道劍去久矣上堂舉真淨和尚曰頭陀石被莓苔褁擲筆峰遭薜荔纏羅漢寺裏一年度三箇行者歸宗寺裏參退喫茶大衆要會麼聽取一頌天晴日頭出雨落地下濕盡情都說了只恐信不及萬壽觀嗣潭州石霜竹巖妙印禪師進賢人族萬氏謁月林觀禪師一日入室次觀問如何是祖師西來意師曰老鼠咬破燈盞觀頷之歷住數剎後移石霜作對月看經偈曰未動舌頭文彩露五千餘卷一時周若言待月重開卷敢保驢年未徹頭師晚年築庵曰紫霞丞相趙公葵燕居里第嘗延師問道寶祐三年示寂書偈曰六十九年一場大夢歸去來兮珍重珍重書畢泊然而逝塔於紫霞萬壽觀嗣已上三人鼓山檜堂祖鑒續傳燈誤作宗鑒禪師徐氏子也禮鍾山真剃度往依瞎堂遠服勤五載及歸閩參乾元穎禪師始得大事了畢出世滁之琅琊無何徙真之北山復主資福泉守程公延至承天遷光孝帥府葉公請住鼓山凡七載開禧乙丑謝事明年五月師將順世乃說偈曰平生患語多臨終更何說盡力舉似人紅爐一片雪乾元頴嗣徽州黃山正因禪師仁和俞氏子參育王一夕聞霹靂聲通身汗下拊掌大笑曰如是如是元世祖請說法稱旨授圓明通應之號一日謂弟子曰吾二十七日去矣至期而逝育王廓嗣曹洞宗青州普照一辨禪師精究內典貫通宗乘及參鹿門覺問如何是盡乾坤是學人一隻眼覺曰汝被一卷經遮却也師擬對覺搖手曰不快漆桶去師言下有省出住青州普照遷東都萬壽當是時燕秦齊晉之間參宗之士皆其後學師於青州室中嘗設百問勘驗學者一問聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己愚庵孟拈云道即不難恐落今時旁僧云請和尚道看孟打一摑云羞也不識要稱禪客龍唐柱拈云青州老人秉洞上宗綱為天下歸仰大開東閣迎賓不忘重闈禁殿要識空劫已前自己麼良久云從來無位次誰敢強安排又問二邊純莫立中道不須安且道甚麼處相見得箇端的百丈源拈云和尚口乾叫侍者過茶來又問回途轉位直須戴角披毛喚作畜生得麼愚庵孟拈云媧女不知亡國恨隔江猶唱後庭花又問念念釋迦出世步步彌勒下生為甚麼擬心即錯動念即乖愚庵孟拈云富嫌千口少貧恨一身多又問有口讚不盡無言心自明是則裂破虗空不是則鬼家活計上人端的處道將一句來百丈源拈云莫裝聾好頌浮山示投子十六題一識自宗問答休將句偈酬到頭佛祖一齊收九年面壁已多事立雪神光亦強求二死中活今時及盡更何親雲鎖幽巖凍瑣津堪羡嶺頭增意氣雪中獨綻一枝香三活中死合頭相似喜人情水月空花鏡象榮荒徑客迷芳草渡擬將石火當天明四不落死活到頭採汲不虗施運水搬柴自合時燕語未歸簾幕靜晚鶯啼處緑楊垂五背捨三峰華嶽總平治雪壓寒林折凍枝一念不生全體現纖毫才動落階墀六不背捨路闊巖高碧㵎流山花開遍接雲樓雨餘何處金鶯囀不顧春殘語未休七活人劍耳聽無妨眼見聞南山下雨北山雲動容舉止方圓異大賞將軍不語勳八殺人刀凜凜霜風刮地生千山冰雪路難行未萌已落威音際才擬玄微墮穽坑九平嘗春來幽谷水泠泠䇿杖優遊傍釣汀好是太平無事客汨羅未必獨醒醒十利道拔生少室靈山事宛然不曾談說不安禪回光一句超今古大丈夫兒誰後先十一言無過失默時似說說時無迷悟剛令與道疏莫謂人根有利鈍粗言細語不關渠十二透脫雪後風和曉霽天鶯吟花笑柳含煙鳳樓不宿桃源客半夜穿靴入市廛十三透脫不透脫劈箭機鋒著眼看當陽趁妙哂傍觀雲橫谷口迷巢鳥雪擁柴門去路寒十四稱揚寒潭不與月為期萬古松聲韻不移眼聽耳觀如會得方知佛祖密傳持十五降句當臺明鏡影難藏露柱燈籠自舉揚千聖不曾留半偈少林已是不相當十六方入圓攜琴玉女夜歸時鳳轉丹霄入紫薇香霧噴花煙靄重汀洲漁棹月依稀五位頌曰正中偏斗柄初橫半夜前密室不然龍鳳燭廣寒宮殿月當天偏中正木女手攜無字印失曉崑崙暗皺眉自然羞看秦時鏡正中來劍樹刀山也自摧玉馬嘶聲離月殿九重依舊鎖蒼苔兼中至大用縱橫無巧智漁歌樵唱謁金門太平不是將軍致兼中到頭角完全無異號脫珍著弊入來縱橫踏破今時道賓主頌其賓中賓曰天涯奔走幾經春負學論功日轉貧行海淵深須遍涉義天空闊不容塵賓中主曰衣穿瘦骨露無餘獨鎮寰區暉大初三尺匣中誅劍百囊篋裏薦賢書主中賓曰丹墀鞭靜九宮開萬里江山絶點埃脫却襴衫戴席帽聲聲只道那邊來主中主曰重巖幽邃鎖煙岑古洞龍吟霧氣深石女唱歸紅𦦨裏木人運步覓知音鹿門覺嗣慶元天童雲外岫禪師昌國衛人身材眇小精悍有餘師事直翁舉公剃落究明洞宗盡其源底出世慈溪石門歷象山智門升住天童寺上堂閙市紅塵裏有閙市紅塵裏佛法深山巖崖中有深山巖崖中佛法山僧昨日出城門鬧市紅塵裏佛法一時忘却了也行到二十里便見深山巖崖中佛法大衆且道如何是深山巖崖中佛法良久曰白雲淡濘出沒太虗之中青蘿夤緣直上寒松之頂龍唐柱拈云深山佛法雲外一一發泄了也且道如何是閙市紅塵裏佛法樓連湖野梅花弄霽雪之天樂作行營鼓吹雜胡笳之曲謝首座書記藏主上堂以拂子打圓相曰摩訶衍法離四句絶百非又打一圓相曰禮之用和為貴先王之道斯為美又打一圓相曰摩尼珠人不識如來藏裏親收得諸人還見麼所見不同互有得失天童這裏毋固毋必師不倨傲不貪積不私食得施利隨與人見後生益敬之二時粥飯必同衆赴堂一日問無印證曰天童今日大死去也汝作麼生救證曰請和尚喫飯師曰天童今日大死去也汝不要相救證曰救他作麼師又曰天童今日大死去也阿誰與我同行證曰和尚先行某甲隨後師呵呵大笑遂示寂龍唐柱拈云可惜放過天童者漢我若在待云今日大死去也阿誰與我同行即與挑起鉢囊橫擔楖𣗖看者漢去得去不得若去不得便與推倒方丈才見真獅子兒豈不俊哉塔全身於本山之麓東谷光下直翁舉嗣
