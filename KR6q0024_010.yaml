body:
  text: 六祖下二十六世臨濟宗蘇州鄧尉寶藏普持禪師參萬峰蔚和尚徹證大法蔚付以偈曰大愚肋下痛還拳三要三玄絕正偏臨濟窟中師子子燈燈續𦦨古今傳僧慧旵參具述悟由師斥之曰佛法如大海相似轉入轉深那裏泊在者裏石車乘拈曰寶藏禪師雖用惡辣鉗錘祇是臭氣深重若是金粟待他眉毛動定劈脊便棒直使赤灑灑地快活平生一日室中慧旵侍立師問心不是佛智不是道汝云何會旵向前問訊叉手而立師呵曰汝在此許多時猶作者般見解旵遂發憤力參至第二夜驀然徹證詣呈方丈師視而笑曰然雖如是也須善自護持時節若至其理自影旵既受囑師以偈送之住山偈曰見得分明不是禪竿頭進步絕言詮發揚祖道吾宗旨更入山中二十年萬峰蔚嗣武昌九峰無念勝學禪師隨州應山人族姓陳年九歲從本郡寶林無極緣公出家剃染後一字不識執苦經年又自覺大事未明義學無益往謁無聞示萬法歸一一歸何處話遂入嵩山住靜苦心研究一日有省述偈曰數載東山昏霧濛凭欄終日待晴空夜來忽起霜天月萬象全彰一鏡中由是奮志徧參後抵姑蘇見萬峰於鄧尉頓於喝下領旨蔚即付以偈曰五派傳來臨濟宗入門一喝露全鋒老婆心切能容易試看泥蛇化作龍一日蔚舉牛過窗櫺公案令頌看師曰頭角崢嶸四足蹄通身過隙月沈西當機若解翻身去哮吼一聲更不疑蔚亦以偈證之後回寶林道風遐著繼住九峰洪武十五年孝慈皇后賓天楚王延聘諸山名衲集於洪山見師道容驚異特留邸館深談法奧請叩彌篤遂建剎延師居之上堂師問眾如何是達磨西來直指一句眾無語師代曰五乳峰前談少室洪武十七年高皇帝欽師道範召見便殿賜坐應對稱旨禮遇優渥欲留主京剎師立辭命中官送還九峰二十九年高皇帝親製懷僧無念詩文一軸并緘松實松花復命中官齎送山中踰慰諄切勑曰前者僧無念戒行精於皎月定慧穩若巍山暫來一見此去常懷懷之不已茲特遣人就見齎有松實松花之供兼以詩文勞之師亦以偈進曰萬機之下究真玄百草頭邊佛祖禪毛孔徧含塵剎土毫端現出性中天定回坐看雲橫谷行樂閒觀石涌泉林下衲僧何以報祝延聖壽萬斯年中官回奏上大悅永樂三年三月二十九日集眾說偈曰世尊七十九無念八十年踏翻華藏海依舊水連天泊然而逝奉全身塔於師子巖諡清福廣慧禪師遣官致帛命詞臣撰塔銘萬峰蔚嗣果林首座僧參次師擲下蒲團汝試道看僧曰只此消息本無言說破蒲團上地迸天裂師曰且道裂箇甚麼僧擬議師便打萬峰蔚嗣已上三人建昌黃龍壽昌西竺本來禪師撫州崇仁裴氏子七歲出家十三參一峰寧切究己躬大事一日頓覺身若虗空心絕邊表行住坐臥不知是誰忽聞人誦清淨經云內觀其心心無其心豁然有省作偈曰幾年外走喪真魂今日相逢迥不倫身伴金毛石獅子回頭吞却鐵崑崙乃再參寧寧垂語曰僧堂有箇首座也無道却說有道師曰如何說寧曰空手把鋤頭云云師曰某甲却曉得寧曰如何是佛師曰空手把鋤頭寧喝曰此了事人話你敢胡說乃扭住曰你祇今還悟得麼師曰天然之道豈有悟乎寧曰且去晚下普集為汝決斷及晚眾集寧厲聲曰今老僧舉話如何師曰舉起甚分明不與和尚道寧喝曰既分明因甚不道師曰與和尚道了寧乃痛打師推倒寧拂袖而去次日復見寧曰老僧棒下有一步工夫你若分曉佛祖也不柰你何你好生諦當去用心若不得此從生至死也祇恁麼復示偈曰青山疊疊雨濛濛獅子金毛撥不通我也自知時未至十回放箭九回空師遂往貴溪江東卓庵以居七年方得發明時寧已示寂乃往金山見慈舟濟濟曰聞你當初法嗣一峰師曰是喫他三十痛棒文書久已到手今日特來和尚處討箇印子舟指瓶花俾作頌曰當機拶破乾坤骨撒髓漫空瑩絕瑕驚得淨瓶開口笑常敷劫外四時花濟曰諸佛不說諸祖不傳除却搖唇鼓舌瞬目揚眉舉手動足還我到家語來師乃默然濟曰去聖時遙賢聖隱伏尚有此子龍天為我大作證明從此向去真實操持還他末後得大受用若是輕自暴殄孤我付囑龍天為我翦除師拜起曰謹遵嚴命濟又曰古人到這般田地深入巖谷保養聖胎三十年不許開口直得嘴邊生白醭人天推出不得已說一言半句扶持末運師乃珍重而去歸隱劍江壽聖後寧王聞師道邁遣使三請師不赴又呈偈問道師答以進修之要永樂四年住新城壽昌上堂天日高明暑漸隆榴花噴火耀庭中衲僧眼裏真機露無位真人覿面逢直下知端的擬議隔千重要達己躬事黃龍最上峰上堂花燦爛日輪紅心法昭彰觸處通衲僧鼻孔尖頭下浩氣騰騰宇宙中眼空四海無家計祇這拄杖子在手裏要西便西要東便東卓拄杖下座小參了了了一片長空光皎皎休休休雲自高飛水自流豁眼通身無向背十方沙界任遨遊後杉關福田寺廢請師重興工將畢一日焚香趺坐索筆書偈曰這箇老乞兒教化何時了顛顛倒倒任隨流是聖是凡人不曉咄來來來去去去海湛澄空風清月皎擲筆而逝門人奉全身於法堂仍塔爪髮於壽昌西北之禪基嶺金山濟嗣東普無際明悟禪師蜀之安岳通賢鎮莫氏子年二十棄家初未遇人習坐禪入定工夫後住樓山訪清菩薩清舉趙州無字話師於當下有省自此靠箇無字如一座須彌山相似行住坐臥常在定中一日坐次忽然光明洞照無一毫可得占偈有虗空包不住大地載不起之句參古拙俊和尚禮拜次俊謂侍者曰者僧有福德相拈拄杖靠椅坐命師供說行脚師為直敘俊曰你且去我不知你者樣工夫一日復上方丈俊震聲一喝拈拄杖作打勢師呈身就棒俊曰我棒頭有眼不打者般死漢拽拄杖便出師拱立不動俊復還坐驀劄問曰大地平沈你在甚麼處師曰全露法王身俊曰萬法歸一一歸何處速道速道師曰不道俊曰因甚不道師曰亘古亘今俊曰亘古亘今即且置你在西川什麼物恁麼來師不語良久俊曰啞子得夢向誰說一日俊為更號無際師曰恁麼則無際亦未在天下老和尚盡向者裏成道歷代祖師盡向者裏成佛即今有說佛說祖底出來盡教遣出門去不如某甲者裏齁齁打睡俊笑曰者漢此後不受人瞞去也師甞有走馬燈偈曰團團馳走不停留無箇明人指路頭滅却心中些子火刀鎗人馬一齊休僧善堅參自陳行脚工夫做到理窮情盡十方坐斷凡聖不容心同太玄了無一法即如來清淨覺地是則和尚證明不是求和尚開示師云那箇是如來清淨覺地僧近前叉手云某甲自性師云我難與你證明僧云我是和尚道未是和尚悞我我未是和尚道是亦為和尚悞我師云何不別處去僧云天下有過我者我不踏老和尚門戶師云子實我到家徒弟僧正目不顧師云許你許你僧亦不顧師云我道許你更疑什麼子亦如是吾亦如是僧近前大展三拜師云子將從前做工夫處舉似一徧供養大眾僧乃供說如上做工夫至見諦處叉手默然師云子見諦如何與我不同僧以兩手大展云者箇非別師云者箇還著言句也無僧云實無一字師云只此無一字處吾為汝證明已竟子可深山茆蓬下飢餐渴飲任意消遙為子安號古庭庭乃禮別師云子別到恁處去庭云佛祖行不到處師云還許人來否庭云坦然無礙師云從上古人阿誰有超祖之智庭云黃檗師云子見黃檗麼庭云縱是黃檗也須擯出師云敢在我這裏說大話庭云正眼無私師云觀子之見智過於師今付汝袈裟拂子珍重珍重庭掩耳而出天界俊嗣杭州虎跑性天如皎禪師四明周氏子七歲患腸癰醫剝生蟾蜍以治師見愓然曰物我皆命柰何害之奪而縱去父母奇之曰必佛種也乃命出家後謁古拙俊和尚因推簾見月有省乃曰元來恁麼翌旦趨見俊便震聲一喝俊曰如貧得寶耶師曰寶既不得得即非寶俊曰憑何如是師趨前問訊叉手而立俊曰還我向上一句來師便掩耳而出復呈偈曰午夜推簾月一灣輕輕踏破上頭關不須向外從他覓只麼怡怡展笑顏俊為助喜後住武林虎跑臨終示眾曰文章佛法空中色名相身心柳上煙惟有死生真大事殷勤了辦莫遷延大眾且道如何了辦良久曰吾今無暇為君說聽取松風㵎水聲語畢怡然而逝天界俊嗣已上二人揚州素庵田居士世為江都名族以弟子員屢試不第遂一意空宗猛力參究時何密庵太守唱道東南士為入室高弟鉗錘久之頓付心印士乃手握竹篦勘驗僧徒四方來學無不仰素庵為現在古佛通國稱田大士而不名示眾近來篤志參禪者少纔提箇話頭便被昏散二魔纏縛殊不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散自無示眾大海不宿死屍虗空不著五色火聚不藏蚊蚋無住法中不立迷悟如今參禪的將光影門頭自相覆却入地獄如箭射示眾舉張九成居士謁善權清禪師問曰此事人人本具箇箇圓成是否清曰然士曰因甚某甲無箇入處清出袖中素珠示之士俯仰無對清復袖之曰是汝底拈取去纔涉思惟即不是汝底士悚然一夕如側究柏樹子話忽聞蛙聲即有契入今日舉揚箇事汝諸參學人切莫作談玄說妙會亦莫作思維卜度會到那及時及節去處是然㘞地去也且道時節一句又作麼道僧參問補陀路向什麼門出士曰上座即今從什麼門入僧曰抑勒人作麼士曰看脚下僧擡頭進前三步士曰錯僧便退後三步士曰且道是你錯是我錯僧曰未舉已前早知錯了也士曰正好喫棒在僧無語士曰若到諸方分明舉似僧誦經次士問誦什麼經僧云法華士云法華經六萬字那箇字有眼僧罔措士便打僧入門便拜士喝快走僧再拜士云你討甚麼碗僧喝士便掌士居城之田家巷以宅為庵四方參扣之士日擁座下一日與眾禪人茶話忽然擲盞合掌別眾而逝何太守嗣法嗣和庵忠四明堪頥庵真共三人皆各演化一方而真公法裔最盛燈傳五世代出偉人嘉隆以前臨濟有揚州田大士一宗盛行大江南北云曹洞宗西京少室寶應還源福遇禪師霍州靈石王氏子依邑之兜率薙落徧遊講肆雄辨如流聞少室泰禪師道眼圓明投依參究泰曰我舉拂子你便向拂子上會我纔良久你便向良久處會如何透得本分事師面熱汗下一日聞泰上堂舉切忌從他覓迢迢與我疏語師穎悟即承印可密付衣頌僧問如何是祖師西來的的大意師曰風送泉聲來枕畔月移花影到窗前曰此猶是聲色門頭事師咄曰賣私鹽漢問如何是誕生王子師曰雖有尊貴分不是尊貴人曰如何是朝生王子師曰不同金榜貴終是老朝臣曰如何是末生王子師曰歷盡艱辛苦方得覲堯天曰如何是化生王子師曰與父無異體權操閫外機曰如何是內生王子師曰長在深宮內咫尺面龍顏曰向上一路又且如何師曰沒弦琴有韻人天那得聞仁宗皇慶癸丑十月師無疾而化門人奉全身塔於少室祖塋少室泰嗣濟南靈巖秋江潔禪師僧雪軒成參師問何處來成曰青州來師曰帶得青州布衫來麼成曰呈似和尚了也師曰三十棒且待來時成拂袖出師曰此子得證悟矣俾參堂去一日成遽造丈室師望而喜曰金鎖玄關打開了也成曰千年桃核裏覓甚舊時仁師囑曰是汝本有之事善自護持他日能弘吾道者必汝也少室泰嗣已上二人西京寶應月巖永達禪師汾州劉氏子祝髮於州之天寧每以出生死為䇿勵南詢參扣聞靈巖肅和尚法雷遠震乃往依侍肅一見器重親炙積久遂入閫奧乃曰發語由師行之在己遂之泰安閉關道俗堅請不得已而起住寶應上堂鹿門老人道盡大地是學人一卷經盡乾坤是學人一隻眼以如是眼看如是經千萬億劫無有間斷後萬松老直得計窮力盡道箇看不易諸人還看讀得麼須知這一卷經阿誰不具這一隻眼誰人不圓要長則十萬億劫難盡要短則一剎那頃便周寶應今日不惜眉毛為諸人拈出乃彈指一下曰看讀了也諸人切莫錯過良久擊拂子曰自是不歸歸便得五湖煙景有誰爭乃擲拂子下座足庵肅嗣封龍古巖普就禪師滹陽劉氏子參靈巖肅和尚肅以本分鉗錘重加煅煉付以大法封龍堅請出世師勉受焉僧問如何是類墮師曰不是披毛帶角底曰如何是隨墮師曰不是聞聲見色底曰如何是尊貴墮師曰不是斷聲色底曰恁麼則如何名墮師曰鴈過長空影沈寒水曰古人道三墮是了事人病既是了事人如何有病師曰祇為了事曰此病何時得愈師曰直待無身此病即除因示頌曰重重金鎖早敲開三處悠然獨往來鴈過長空無繫著影沈寒水任渠猜後歸隱靈棲未幾示寂大德六年賜妙嚴弘法大禪師之號塔於封龍之陽足庵肅嗣已上二人
