body:
  text: 六祖下三十四世臨濟宗寧波天童密雲圜悟禪師字覺初宜興蔣氏子甫離襁褓便喜兀坐儼然若有所思者八歲無師訓知念佛長事耕穫偶得六祖壇經釋鋤觀之始知有宗門向上事遂快志參究一日負薪入市忽見柴堆突露面前有省二十九歲棄妻拏三十從龍池幻有傳和尚脫白二六時中一心究參除傭作雜務之外時時以己事參詢莫喻傳旨日遭詬詈至病而汗不蘇者浹旬殷勤四載始納僧服閱九載究心未證偶過銅棺山豁然大悟時傳和尚移錫燕都普照師往省覲傳曰老僧離汝三載還有新會處麼師曰一人有慶萬民樂業傳曰汝又作麼生師曰特來省覲和尚傳曰念子遠來放汝三十棒師珍重便出晦山顯頌云迸破銅棺險出頭煥然等現萬機休劈空獨握掀天棒塗毒聲騰四百州師訪汝登周海門居士士以道學門庭高峻望隆一世師與之本色相見脫略窠臼士為手舞足蹈館師別業晨夕諮證因晤無念有禪師於陶宗伯望齡府第大為賞識天台有無擇者嚮師名欲以機辯相見適師路次栽松遽爾問曰山有獅子特來一弄師舉起钁頭便打擇擬議師直打趁傳和尚再住龍池師復往省傳問汝到諸方曾見甚麼人師以脚打地以手拍膝傳曰汝許多時一些氣息也無師曰和尚疑則別參一日傳上堂舉拂問曰諸方還有這箇麼師震威一喝傳曰好一喝師連喝兩喝歸位傳顧師曰更喝一喝看師即出法堂傳便下座牧雲門頌曰一番風雪一番寒寒盡春來暖氣寬只者何勞重舉出驛亭西去是長安師隨入方丈作禮云適來某甲觸忤和尚便出傳即命師居西堂寮一日撾鼓集眾上堂付師衣拂師辭再三傳復命入室囑累扶持佛法師即畫圓相五位呈傳曰若據某甲扶佛法任他五位圓相都來聰與三十棒莫道分明為賞罰傳笑而頷之遂得法時師年四十八歲萬歷三十九年辛亥二月三日傳既寂師守龕三載畢始應眾請繼席龍池上堂一葉落天下秋一塵起大地收今朝七月六日無論一葉落不落而天下秋眾兄弟已備知矣舉拂子一塵起也作麼生是大地收底道理擲下拂子若知撲落非他物始信縱橫不是塵下座普請上堂據眾兄弟擔了飯米來伴悟上座各各冀明己躬下事不合動靜眾兄弟然而諺有之曰有例不可滅無例不可興百丈和尚創叢林立規矩有普請例及諸尊宿亦有普請說所謂作則均其勞飯則同其食自今觀之似乎不然作者應當作閒者應當閒致令古風彫喪法門澹泊無他蓋主法者不舉之過也要且者般事無處得藏竄所以謂之大道謂之公案擔荷者般事須是者般漢若是畏刀避箭躲嬾偷安不足為伴雖然却有箇驗處且道以何為驗良久曰打鼓普請看上堂我覺洪師弟募萬人緣要往臺山齋僧今日先從家裏齋起悟上座無以報答驀拈拄杖曰不但洪師弟設使釋迦老子文殊普賢諸大菩薩乃至獅象狐狼泥豬疥狗法界有情總到者裏悟上座別無供養總與他一頓從教怨入骨髓永劫不忘擲下拄杖將此深心奉塵剎是則名為報佛恩下座上堂六月日頭真箇熱赤肉團邊如火逼試問現前諸兄弟無位真人徹未徹若也徹向無陰陽地上豎去橫來若也未徹未免明日熱如今日下座上堂開方便門示真實相拈拄杖擊香几一下方便門開也豎起拄杖真實相示也諸人還委悉麼若也見得徹去便可以拈拄杖作丈六金身用將丈六金身作拄杖子用然後拄杖子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾汝等諸人切莫向古廟裏去躲一棒打折你驢腰莫言不道下座通玄解制上堂八月一結制畢腰間包頭上笠通玄寺裏放門開行脚衲僧攙先出被人拶著要翻身切莫隨人穿却鼻復舉洞山曰秋初夏末將謂忘却東去西去亂走作麼直須向萬里無寸草處去坐斷路頭石霜曰出門便是草奴見婢殷勤大陽曰直饒不出門亦是草漫漫地同坑無異土者隊老漢總被山僧折倒了也諸人還知出身處也無若也知得日銷萬兩黃金不為分外其或未然萬古碧潭空界月再三撈摝始應知喝一喝下座上堂今朝五月五日知事頭首要老僧陞座應箇時節老僧再三思量無可計較何也雄黃燒酒固是不宜要且無箇銅錢買糯穀思量到計窮力極忽然得箇富不有餘貧無不足底平等法門正好與世移風易俗乃擎起兩拳曰只將者兩箇大糉子供養大眾一任橫齩豎齩忽然齩著自家底管取人人飽足免得窮廝煎餓廝炒上堂僧問如何是過去佛師曰釋迦老子曰如何是現在佛師曰大地眾生曰如何是未來佛師曰莫妄想乃曰諸人盡道解制殊不知天童之制結解不結解總不必論只如老僧終日趁著大眾不挑甎便搬瓦不運土便擡石見你們稍遲縮不是喊便是罵汝諸人作麼生會還知老漢為人處麼良久曰三生六十劫因雪上堂昨日青山今朝白雪眾兄弟好消息野鹿行人步步成跡唯有挂角羚羊絕氣息從來獵犬難尋覓高著眼始得上堂師不陞座竚於座前曰老僧氣喘不能說話遂咳𠻳吐痰於地曰眾兄弟試道看良久無有出者師以脚抹却歸方丈上堂當頭一著坐斷要津纔然側耳喪却家珍從來佛法不順人情所以道出羣須是英靈漢敵勝還他師子兒上堂默時說說時默大施門開無壅塞怎如臨濟小廝兒赤手全提白拈賊喝一喝上堂舉拄杖曰舉一不得舉二放過一著落在第二擲下拄杖曰老僧落二去也且一又如何舉便下座上堂三世諸佛不知有從空放下狸奴白牯却知有平地昇高從空放下無眾生可度從地昇高超佛越祖超佛越祖眾生度盡恒沙佛無眾生可度諸佛何曾度一人雖然如是忽若兩頭坐斷中間撒開突出難辨一句又作麼生道披蓑側笠千峰外引水澆蔬五老前上堂未到天童不妨疑著已到天童冰消瓦解何故聻不見道聞名不如見面面既見矣諸人分上成得甚麼邊事一翳在眼空花亂墜上堂禪不在參道不在悟直下了然超佛越祖驀拈拄杖曰即今莫有超佛越祖者麼卓拄杖曰正好朝打三千暮打八百擲拄杖曰為甚麼如此撫掌曰這裏放過則不可上堂樹彫葉落明明脫體全彰雲散天空杲杲日輪當午正恁麼時霜風劈面來諸人還覺寒毛卓豎也無若也覺得如龍得水似虎靠山日用頭頭全體露折旋俯仰沒遮攔喝一喝上堂六月初一正炎熱人人通體汗流出忽然一陣凉風來箇箇仍前乾暴暴且道乾暴暴底是汗流出底是汗流出底是則不應有乾暴暴底時節乾暴暴底是則不應有汗流出底時節恐悞賺諸人老僧不敢道破也須各各自悟討箇分曉始得上堂子規啼血滿花枝口口聲聲祇叫歸不耐時人猶不省年年三月又來啼大眾還委麼自是不歸歸便得五湖煙景有誰爭卓拄杖一下上堂太白山中儘有柴一株不許眾人搬老僧不是多護惜為要諸人徹骨寒雖然如是祇如道三界無安猶如火宅諸人又向甚麼處廻避若也迴避得可以高超三界獨步大方其或未然各各照顧眉鬚始得一日眾請上堂師至法堂前以手揖眾云已為大眾上堂了也轉身便歸方丈二隱謐頌云八十婆婆不識羞涌身畫閣賣風流深深揖下無人采只得懡㦬歸去休一日挂牌入室有僧纔跨門即曰不用拈提請師便棒悟曰為什麼聻僧無語悟便打弘覺忞云者僧將成九仞之山尚虧一簣之土若是山僧待道為什麼聻但向道橫趨金殿過定惹御爐香敢保先師拄杖子兩手分付僧問狹路相逢髑髏粉碎當恁麼時無位真人在何處安身立命師曰天上天下唯吾獨尊曰恁麼則萬里無雲一輪迥照去也師曰脚跟下好與三十棒僧問曹溪一滴直透龍池如何是直透龍池底事師曰脚穿過髑髏曰源遠流長一句作麼生道師曰但與麼去僧問如何是三寶師曰一頓胡餅兩頓粥曰不問這三飽師曰老僧日日奉持法音𣽘頌云一頓胡餅兩頓粥衲僧千足與萬足慇懃說向參玄者六六原來三十六僧問虗空破了將何補師云將你補法音𣽘頌云虗空破了將你補明眼衲僧休莽鹵剎剎觀音妙智力塵塵能救世間苦師於龍池通玄金粟黃檗育王天童凡六座道場三十餘年宗風大振座下踰三萬指海內宿衲久已領徒匡眾者嚮師之風無不皈依座下崇禎辛巳國戚田公為皇貴妃賷紫衣入山請師陞座復得俞旨請住金陵報恩師以衰老固辭壬午春拽杖歸通玄七月三日示微疾五日手書復護法祁侍御六日有僧自都中來問喝作喝會棒作棒會入地獄如箭射畢竟作麼生會師便打僧禮拜師曰千句萬句皆從自了自己不了喫棒不了七日晨興巡閱匠工如平日及午歸丈室語侍僧倦甚登寢榻少頃方起坐跏趺泊然而逝世壽七十有七全身龕迎還天童塔於幻智菴右隴語錄題請入大藏流通龍池傳嗣常州磬山天隱圓修禪師荊谿閔氏子自幼失怙鬻蔬奉母恒持觀世音菩薩名號弱冠聽講楞嚴一切眾生皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉惕然知有生死大事遂往投龍池幻有傳和尚出家二十四得度參父母未生前話久未有入一日隨傳出窑運磚次同事說四大名山菩薩出現神通廣大傳曰者裏也不少師進曰如何是者裏神通傳曰快度磚來師於言下有得一日偶展楞嚴至佛咄阿難此非汝心處驀然打失本參會傳北行師掩關龍池閱古人公案復於雲門扇子話去不得力究兩載忽聞驢鳴大悟乃曰忽聞驢子叫驚起當人笑萬別與千差非聲非色鬧遂破關與同參密雲悟禪師趨京都覲傳於普照寺傳曰別來三載各呈似看師進曰人說北地寒我說南方暖寒暖不知人窮人知寒暖傳頷之次日入室問歷歷孤明時如何傳曰待汝到這田地與你道師便喝傳曰汝還起緣心麼師拂袖便出一日傳因事穿褊衫舉椅子作女人拜向師云汝上坐待我拜汝為師師笑呈偈曰木人提唱笑呵呵更著衣衫誰識他昨日覸來是男子今朝還作老婆婆傳覧畢笑曰此偈甚愜老僧意即日命掌記室久而印可出住磬山次遷法濟後住報恩上堂禪非解會道絕功勳妙體湛然真機獨露不可以心思不可以意想不可以言宣不可以默照不可以色見不可以聲求一念回光便同本有恁麼則釋迦老子睹明星時見箇甚麼來者裏透得頓越三祇坐斷報化佛頭隨時著衣喫飯還有向上一路在驀豎拄杖曰釋迦老子在諸人眼睫毛上放光動地祇是不得動著動著則三十拄杖何故不見道丈夫自有沖天志不向如來行處行上堂一塵不立猶在半途截斷眾流尚居門外且道誰是到家者顧左右云觀音菩薩將錢買餬餅放下手時原來是饅頭到者裏直得如天普葢似地普擎耳內藏得須彌山眼內著得四大海方有語話分且道此人渾身在恁麼處委悉麼數聲清磬是非外一箇閒人天地間上堂拈拄杖曰老僧有時拈拄杖子不作拄杖子用有時拈拄杖子作拄杖子用有時以拄杖子行遍四天下擲向壁角落裏有時拋下拄杖子獨自打頓去諸人者裏見得便會得我臨濟大師的賓中主主中賓賓中賓主中主雖然切不得動著動著則打你頭破腦裂莫言不道卓拄杖示眾今朝正是臘月半大事分明須了辦莫待臨時有屈伸解脫門開成大患堂中箇箇老成人著著拈來要方便言言見諦剔祖燈自古傳持吹毛劍吹毛劍有何驗當陽拈出與人薦驀擲拄杖曰怕令停囚長智示眾靈源湛寂智體自如觸處洞然隨方應用目前無法拈來物物全彰箇裏無私舉起頭頭成現須是恁麼人行得恁麼事且道那箇是恁麼人禾山打鼓雪峰輥毬趙州喫茶雲門餬餅到者裏總用不著且道有甚長處卓拄杖曰偶然獨立千峰頂閑看湖帆自往來示眾今時禪門大變總是箇弄虗頭漢教壞人家男女不肯指點人做實地工夫剛剛學些魔嘴說話不顧本分中黑漆漆地老僧者裏不比諸方容人打口令謂之參禪若要在此住須將從前學來的盡情吐却淨淨地本分參究一回討箇分曉始得若不如斯唐喪光陰有何利益玉林琇書記擕二猫上方丈問師那箇好師指曰者箇好琇便擲下而去復入見猫在地幾死更與一踏師拈拄杖打趁琇轉身曰和尚也掙命師打曰你不知鼠之害只欲行祖師門下事琇高聲曰說甚祖師不祖師師曰與麼為甚踏殺猫琇曰和尚作者箇說話入地獄如箭射師乃低頭歸方丈至晚小參舉前話曰老僧到者裏性命幾合不存眾中有人代得一轉語相救老僧麼箬菴問出眾云大眾和尚今日普請拂袖便出師曰過去了也琇云箭去西天十萬里猶在自己國裏擬議亦出師卓拄杖曰雖然如是不因漁父引爭得見波濤問如何是法身邊事師曰黑漆桶如何是法身師曰爛東瓜如何是法身向上事師曰三家村裏酒帘子師風儀磊落賦性恬退親炙龍池一十八載累命分座說法皆辭遜初入磬谷值雪深五十餘日炊烟幾絕師於飢禽野獸中安之晏如獨念法門衰晚師道陵夷力恢濟上綱宗大闡別傳旨趣痛呵穿鑿嚴辯正邪四方嚮道之士承風踵接競喧宇內崇禎乙亥九月二十三日示寂塔全身於磬山之右龍池傳嗣杭州徑山語風雪嶠圓信禪師寧波朱氏子九歲聞誦彌陀經水鳥樹林悉皆念佛念法自此發心至二十九歲出家熱病幾死夢神告言明日愈也飲冷水汗出果瘥即便行脚嘗自恨云既出家當作何事每日癡呆衣食多廢隆冬骨露遇無袴者即解敝袴與之赤體七日夜冷氣攻腹痛不可忍如此兩載苦無入處或強師還俗飲酒啗螺一月後忽空中垂金色大臂掐斷鼻梁猶不悛數日後復垂大臂取喉內筋扯去數寸痛欲絕捫頸上筋結成塊即捲衣渡江其塊始消其痕不滅上秦望訪妙禎山主主舉昔有他心通僧住山遇少林僧欲勘之其僧早知預過溪候頃之少林僧至他心通僧問何來答云天竺他心通僧即負過溪至急流問曰我聞有三天竺汝那一竺來速道速道少林僧無語還負擲溪邊謂之曰饒汝家裏死果如所言禎令坐中各轉一語為少林出氣各轉語竟禎叱師曰宗門中語何得亂話師惶愧不已誓欲明此公案至五更聞報鐘即揑拄杖躍大石上高提那一竺來自此通身是箇疑情手指日輪曰午時決要明白石頭間跨上跨下狠提從前妄想俱掃只此話頭不捨猛跨上石忽前後際斷如空中迸出日光又若山崩海裂內中所有之物一一洞見無身相可得復喝一喝張三殺人李四償命明日返天台求人印證擡頭見古雲門三字乃大悟爾時發願弘雲門宗途中說句云一上天台雲更深脚跟踏斷草鞋繩比丘五百無踪影見得他時打斷筋乃走西天目禮佛至活埋菴僧請偈有香爐一箇折隻脚之句遂念蓮池宏大師決為我印證直走雲棲到時天晚次早大眾喧嚷云法堂上香爐冷地𪹼碎堂頭要這僧出來懺悔封鍋不煑粥飯師自念此讖天目題香爐峰因緣乃印證我也入大禪堂跪曰香爐是某甲打碎特為懺悔大眾即執方丈宏曰不是他你去說與他他是客不是你打碎師曰打碎香爐不分賓主又遣問曰打得幾塊生師曰賍物現在旁一僧曰何不去方丈前禮拜求許開鍋師往跪叩首數百侍者傳語云去開鍋也少頃僧又云尚未開汝再往禮拜師復進跪叩數百頭欲破侍者曰開也師謝而出宏命維那云新到是菩薩行人好生留住師飯畢堂中禮九拜唱曰某甲不學好累及大眾雨淋淋地竟去後師再上雲棲問如何得成佛作祖去宏曰問道於盲師曰道豈盲耶宏曰我盲師打圓相曰總在這裏宏指圓相曰盲師曰見婦不須重下淚還他原是箇中人宏曰不是箇中人師曰却好宏曰好好師禮拜次日呈偈宏為逐句著語偈曰不解西方不學禪雲棲宏著云低聲低聲偶來塵世祇隨緣宏著云解也學也三間茅屋傍溪住宏著云溪深路滑兩扇竹窗關月眠宏著云春色滿園關不住醉盡衲衣那有結宏著云怎似寸絲不挂養長頭髮欲成顛宏著云成顛亦不惡自從會得吾師意宏著語云胡餅裏討汁白雪飄飄六月天宏云夏行冬令寒暑不正復囑以頭陀行住雙髻山續佛慧命師初住時念高峰妙六年於此我亦六年及期滿石板自鳴師方腰包戴笠其房火起自燃後住徑山千指庵時年已六十矣遂往參龍池傳和尚室中機契即獲心印出住徑山上堂師云咄咄咄千年常住一朝僧今日祖令當行十方坐斷且道還有祥瑞也無鐘樓生耳朵佛殿又懷胎司理黃海岸居士出問曰如何是鐘樓生耳朵師拈生香示之曰會取這箇進云如何是佛殿又懷胎師曰產下也士禮拜師乃曰承命老人至此理荒殘之祖席這箇喚做狗尾續貂那管家家門前火把子釣魚船上謝三郎即不問新婦騎驢阿家牽道將一句來還有人道得麼一拂擊開金殿月萬家無箇不光明復舉疏山問溈山樹倒藤枯公案至明招處舉前話招云更使溈山笑轉新山云原來溈山笑裏有刀師召大眾曰要見溈山笑裏刀麼呵呵大笑下座黃海岸居士請上堂師舉臨濟云有一人論劫在途不離家舍有一人離家舍不在途中那箇合受人天供養師曰這箇語話大似掩耳盜鈴瞞人自瞞諸人要識這兩箇人麼餘杭紙貴一狀領過黃介子居士請小參師舉古佛偈云見身無實是佛身了心如幻是佛幻了得身心本性空斯人於佛何殊別徑山則不然鱣魚水底聚子貼天飛會得此中意成佛更無疑小參師陞座曰有一人超出佛祖千聖莫能窺諸祖不敢正視良久曰諸人要識此人麼只在汝等動用中還會麼會則不妨出眾道看舉洞山掇菓桌話師曰當時首座恁麼下語至今還有下語者麼如無徑山為伊下箇註脚過在動用中不得果子喫洞山太無端咄咄咄咄咄黃海岸居士問云入泥入水時如何師曰滑殺人士云久聞雪嶠及至到來不見一點師曰日頭大士云雪鎔後如何師曰春水滿溪流士云大師曾見甚麼人來師點胸云雪老士禮拜師舉三日前夢室中火起老僧喝兩喝火𦦨漸微自占曰般若如大火聚日來老僧舉揚家醜莫非正應此夢余集生居士云早是大地火發了也師曰老僧甚麼處安身一僧進云請師再不註脚師曰向居士鼻孔裏士云打失鼻孔救取眉毛師頷之嘉禾三塔僧慈雨自負有得師以婆子燒菴話扣之曰正恁麼時如何下一語看僧云感恩不盡師曰太煞露筋骨僧乞師代語師曰大似商人落夜僧禮拜劉覺岸居士云今諸方訛傳感恩不盡是師語殊謬僧問高峰云人人有箇影子因甚踏不著師曰踏著即禍生僧問路逢獅子時如何師即震威一喝僧無語師打出僧問如何是休糧方師曰兩粥一飯進云此理如何師曰不曾嚼著一粒米進云若然一切人皆相似也師曰不墮諸數僧禮拜云望師慈悲佛法布施師曰窮進云大師用不盡的師曰慳乃舉鳥窠拈布毛公案師亦拈布毛吹之問僧曰會麼僧云這是鳥窠的師曰鈍根奴明明示汝又道是鳥窠的即喝出師真率不羈詆呵諸方無當意者寡耦少徒一笻孤往後歸老徑山一夕呼茶飲畢唱自所書小兒曹生死路上好逍遙皎月清霜曉一杯茶坐脫去了遂示寂順治丁亥八月二十六日也覺浪杖人為建塔雙徑後弘覺忞公復遷全身塔於雲門右麓龍池傳嗣湖州淨名抱朴大蓮禪師杭之臨安駱氏子年十五投妙嚴祝髮二十二往雲棲受具初遊講席一日自念數年以來於教相旨趣雖有理會處生死岸頭全用不著遂更衣入徑山禪期三七日中廓然洞徹述偈曰自幼失親娘徧覓於他鄉驀然一相見更不再思量解制即往荊溪參叩龍池傳和尚傳曰汝是何方人師曰古杭雲棲弟子傳曰雲棲說何法師曰雲棲不說法傳曰老僧這裏也不說法師曰某甲自遠瞻風而來云何不說法傳曰老僧牙齒疏缺師曰道不在牙齒上傳曰不是這箇時節了師云道無古今傳曰上座明白了師云不知還許明白否傳曰已道過了至夜師曰親切處更乞一言傳據座而已師喚侍者點茶來傳曰上座不妨伶俐師曰某甲耳聾傳休去師一日禮辭傳曰老僧猶有語言未盡在師曰和尚言雖未盡其意某甲巳知傳曰且道老僧意作麼生師便喝傳曰再喝一喝看師轉身便出傳付以源流拂子住後僧問佛是何義師曰覺義僧曰佛還迷否師曰迷僧曰既覺云何復迷師曰不迷又問作麼僧曰也須問過師拈棒打出問如何是奪人不奪境師曰蛺蝶穿花影曰如何是奪境不奪人師曰掀眉掃白雲曰如何是人境兩俱奪師曰彼此無消息曰如何是人境俱不奪師曰推窗看月明魚山熊居士問萬法歸一一歸何處師舉茶盃曰請茶士曰我在青州作一領布衫重七斤作麼生師曰脫殻烏龜飛上天問如何是麻三斤師曰斤兩分明示眾曰冷地裏聞人說著修行二字不覺失笑何以故心本無念將箇什麼來修亦復無形又修箇什麼且本是絕待纔涉修行便成兩橛若有箇伶俐漢一識破便放下何等妥貼何等自在雖然也須透過一番始得不是說了便休珍重師於崇禎二年八月示寂龍池傳嗣已上四人曹洞宗西京萬壽幻休常潤禪師別字大千南昌進賢王氏子幼背二親從從父遊常目攝羣優灑然若有所創知諸幻皆戲局也無常謂何乃入伏牛山禮坦然平公祝髮居三載知攝心如按浮瓜起滅相乘茫無所措質疑未決南謁萬松於徑山通所疑松詰之曰疑是何人措者何物師未決退而至九華一夕覺身同虗空疑甚乃聽講楞嚴至圓明了知不因心念處忽爾有省廓然如鏡中象不落空有乃知前境虗空直塵勞一息耳後參大方蓮公問現鏡中象時如何蓮曰直須打破師曰打破後如何蓮曰亦未離心境師未決參小山書禪師始至舉前話書曰何必打破師曰其柰鏡象何書曰鏡象安在師有省一日書問師曰疇昔之疑決否師舉掌書曰將毋以罔象問景耶師曰此外更無何有書曰試披衣撿之力行二年愈益精進書舉洞山我今不是渠詰之曰既不是渠畢竟是何人師領悟以偈答曰若要識此人有箇真消息無相滿虗空有形沒踪跡曾為佛祖師嘗作乾坤則龜毛拂子清風生兔角杖頭明月出書曰子無勦說更須自入悟門師曰尚不借緣從何門入書曰既不借緣何為至此師曰因不借緣所以至此書曰就不借緣一語於意云何師曰彩鳳飜風身自在鐵牛奔吼意常閑書曰善哉明日辭行書付偈曰定作人天主當思少室秋師曰常潤是甚麼人安敢當此書囑曰吾道不振久矣豈宜袖手耶師唯唯逮書示寂僉議繼席非師不可師執意謙退再請再却眾乃舉書付囑之偈師遽墮淚不復言辭乃住少室師體貌豐碩聲若鴻鐘與諸學人甘澹泊而襟度夷曠一力負荷大法朝夕乾乾無少倦色告香入室者二百七十人萬歷乙酉四月念七日書偈告寂宗鏡書嗣建昌廩山蘊空常忠禪師本郡人為居士時嘗講姚江良知之學一日客遊鎮江鶴林過一老宿號古溪者謂譚曾參月舟和尚乃從剃落老宿病又謂之曰子既出家可徧參知識去師遂往中州聞小山書和尚道風即謁之書問來為何事師云為生死求出離法書曰生死在何處要你出離師無語書曰且去務下著一日師又問如何得見性成佛書曰你喫飯也未師云已喫了書曰舌在你口裏還見麼師云畢竟如何得成佛書曰佛是乾屎橛汝咬得破麼師擬再問書搖手曰不是不是師益心疑之乃辭書徧訪諸方名宿久之有省乃徹見書作用因復返嵩山適值書他出師迎而問云達摩面壁在甚麼處書指曰阿那青黯黯處師云東指西話作麼書曰南方杜撰禪和如麻似粟師云切忌魔魅人家男女書拈拄杖便打師禮拜書便偕歸會書謝少林事往住北京宗鏡師隨行服勤三載深得玄旨書每勘驗之機鋒不讓一日辭歸書付以偈曰宗鏡門下萬株松長年占斷白雲封人間未許閒相識一枝迸出笑春風師歸建昌於從姑僻處每危坐人或問之師搖手曰汝不會去或曰師且為我說看師云這豈不是不會人咸笑之因到覆船山見紹隆大師故蹟乃題詩於簫曲峰靜室壁間云覆却船兮賺雪峰渠無生死太空空玉簫聲斷千山冷誰聽猿啼夜月中蓋深有感也盱江之新城有廩山去郭二十里八面秀拔師遊喜之因結茅棲止者二十年不與人接諸士紳故人多來相訪唯默坐而已羅近溪鄧潛谷二公與論性命之學皆超出情見及舉宗門向上事人多未能領略無明經公嚮師道行高峻特求出家授戒師云出家須出五蘊家且待此事明著尚不為遲皈戒須皈自心法豈必三壇為能圓你知十六沙彌繼燈成佛麼出家如此是真丈夫經又問如何是入道法要師云汝但能精進不欺便可徹頭徹尾經一日與諸兄弟論金剛義甚快師聞之笑云宗眼不明非為究竟經大驚便問如何是宗眼師振衣而起經益疑之一日舉前話問師師云我不如你你自看去經後隱峩峰因如大好山語下大悟走廩山以偈呈師師云悟則不無更要受用得著若受用不著祇用箇汞銀禪也因舉南泉王老師賣身話勘驗之云子試道南泉是何心行經曰這老漢沒葢載待你頭出角著又問甘贄行者請念誦南泉打破鍋子意旨如何經曰拂袖便行鉤有餌鍋兒打破玉無瑕師奇之乃云他日子弘揚祖道吾不如也師生平言行縝密如美玉在璞非有真為法人拒而不見見人譚某於何處有省悟何處有證入輒勃然呵之云汝何所見敢以此證據人耶打破大明國尋不出幾人能真參實究在你敢作大妄語以未悟謂悟未證謂證耶有拈頌若干超絕卓異祕不示人鄧徵君與師交最久甞有詩寄師云入海泥牛不見踪龍山太煞露家風誰知別有深深意韻出新豐調不同師見之笑云公可謂知得山僧一半也一日師無疾忽告眾曰我有一箇未了底事汝等須知眾無語乃命澡浴整衣遂端坐而瞑茶毗頂骨不壞塔於本山後司理黃端伯居士同壽昌謐公復遷塔於廩山之麓宗鏡書嗣魏博大伾隱庵如進禪師廣平永年人族姓陳得法於小山書公養道於大伾之興國寺影不出山足不蹈閫者數載凡尼姑婦女不許入門無容面謁久之開堂說法機如走珠口似懸河衲子肩摩接踵趨謁如狂一日應請北遊途宿三教堂主僧進曰此中向有憨布袋像供西壁後為羽士居此於頂上安雙髻改呼為鍾離仙遷供東壁每每緇衣黃冠爭衡代位至今葷酒淫祀妖孽一方殊為怪事求和尚除之師以拄杖指其像曰者塊泥團變怪多端不守本分惱亂人間髠頭佛祖丫髻神仙出乖現醜魔魅閭閻彼此搬弄東那西遷妄生喜怒暮四朝三不遇老僧行正令多年冷地受牽纏四大各復返本還源從此一方齊物論即刻送汝上長安咄咄連棒粉碎而邪孽從茲肅清宗鏡書嗣龍岡大方如遷禪師陝西鳳翔岐山縣之李氏子年十七禮本郡無踪本公為師首參悅菴喜和尚授具指示向上一路尋入青峰山弔影單棲有所開悟謁大章書和尚於立雪庭遂留依止朝夕入室陶鎔從上機緣乃蒙印可有針頭玉線海底鐵牛日夜辛勤記伊保守之囑師至懷慶鄭世子讓國潛修白業聞師至乃建精舍於龍岡延師晏寂慈聖皇太后賜大藏經護勅御書大法寶藏四字至龍岡創寺安供後師無疾端坐而化塔於寺右宗鏡書嗣鄴下古風通玄禪師本郡王氏子齠年禮大妙師祝髮甫壯南詢與伾山進往謁小山書禪師一見直以龍象期許久之乃付衣法後聞帝闕奉旨開堂於真定舍利寺代王聘請開法於山西大同僧問如何是道師曰何不問己僧曰自己云何是道師曰處處綠楊堪繫馬家家有路透長安僧曰向上更有事也無師曰有僧曰如何是向上事師曰青山低處見天闊紅藕開時聞水香未幾辭歸效陳蒲鞋養親建願王菴以休老後無疾端坐而逝塔於菴側宗鏡書嗣順德鵲山天然圓佐禪師邑之范氏子偕大方遷公參小山書和尚於少室機契竟付衣鉢歸里隱蓬鵲山石河菴有請說法者師辭甚堅柱史吳公率四眾再三迎請乃上堂以拂子打圓相曰會麼向上一路千聖不傳學者勞形如猿捉影苟非忘形去智喪偶息機親到虗靈不昧了了常知底田地過來要見他拈花之旨面壁之宗大似數他桃李宮牆外終非己有諸人還要知佛祖直指底消息麼乃以拂擊案云適來山僧已自告報了也便下座僧問拈椎豎拂舉古明今皆是止啼黃葉如何是金錢師曰只見雷霆施號令那知星斗煥文章曰和尚自把火行其如學人何師曰閉目中秋坐却怨月無光蓬巖吳柱史問如何是般若體師曰寂然不動曰如何是般若用師曰感而遂通曰如何是下手得力處師曰罔象到時光燦爛曰如何是不得力處師曰離婁行處浪滔天曰恁麼則儒釋未始有異師指空曰此儒耶釋耶同耶異耶公作禮曰謝指示萬歷乙酉十月師預知時至浴畢坐逝宗鏡書嗣已上六人
