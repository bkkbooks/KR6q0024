  text: 序天下有可以言傳者有不可以言傳者有可以言傳而究不可以言傳者其可以言傳者理之顯焉者也人得而指焉者也其不可以言傳者理之微焉者也人莫得而指焉者也其可以言傳而究不可以言傳者其理至顯至微若近而遠若淺而深將指以為有不知於何而見以為有將指以為無不知於何而見以為無嗟乎難言之矣余少涉獵經史竊慨夫聖賢之言洋洋灑灑炳炳麟麟若日月之麗天江河之行地何人不可見亦何人不可指也至其微言妙義心解神會則多在語言文字之外嗟乎是又烏可得而指耶至於竺氏之言余固未嘗涉其津涘顧安所識其隻言片句遂足以照耀今古哉苟舍吾儒精實之理而浸淫於彼虗無寂滅之宗是猶舍康莊而騁足於羊腸九折之坂也不已僻乎吳門聶子樂讀者研窮經史復沈酣於宗門家言繼瞿公幻寄指月録緝宋南渡後上下五百餘年宗乘微言鉤索源流詳核世派彚為一書名續指月噫嘻聶子之志可為勤矣七八年前聶子郵是編示豫曰佛祖慧命不絶如線二派五宗法輪所寄願吾子為我了此弘願余初不暇省然竊笑所好之僻而志之勤也去春來邗吳薗次先生介而造余曰吾得夢徵此書必待子而成得毋非夙因乎余矍然起曰有是哉子之好誠僻矣余何敢辭復有鍾山劉覺岸先生秦郵孫孝則先生參互考訂於是廣募檀施鳩工庀梓亟為刊布第吾聞竺氏之學以一絲不掛為上乘萬慮皆空為絶德不立文字不下注腳如指月之後話月聽月皆以月為喻嗟乎其可以言傳耶其不可以言傳耶其可以言傳而究不可以言傳耶余皆不可得而指也後之覽者倘即以余之所以笑聶子者還以笑余也抑又何辭康熙十九年正月上元日古歙弟江湘拜題於廣陵之文選樓續指月録序魏公子無忌矯竊兵符椎殺晉鄙奪其兵救趙李光弼為大將御史崔衆犯軍法勒兵欲斬之適中丞之命至光弼曰為御史則斬御史為中丞則斬中丞竟斬之而後以聞有如此膽力方可以辨綱宗之絶續也韓信在漢為治粟都尉道亡蕭何追之言之漢王拜為大將一軍皆驚韓琦駐延安有刺客入帳行刺琦起坐問曰誰遣汝來𢹂吾首去有如此識度方可定綱宗之品位也苻堅率兵百萬次於淮肥謝玄入請謝安了無懼容曰已別有旨及玄破堅安亦無喜色曰小兒輩遂已破賊澶淵之役寇準勸真宗渡河真宗使人覘準何為方閉門縱僮僕飲博歌呼契丹懼而請盟有如此襟器方可分綱宗之語句也嗚呼豈不難哉近世魔外盛行宗風衰落盲棒瞎喝豫聖自雄究其所學下者目不識丁高者不過𢹂指月録一部而已以此誑人實以自誑以此欺人實以自欺惟誑與欺不可以為人而可以學道乎不可以學道而可以踞法王座秉金剛劍稱西來之嫡子提如來之正印乎故吾嘗以謂習儒者不讀四庫七略之書不覩經史典籍之大全止以通鑑集要史斷史鈔為博古遂自命曰通儒猶之習禪者不讀一大藏契經不覩經論撰述之大全止以指月録一部為談柄遂自命曰善知識皆自誑自欺者也故使從上綱宗源遠流長如水歸壑者固瞿子之功使盲棒瞎喝一知半解如螢竊火者亦瞿子之過也或者曰然則聶子之續是録也功乎過乎余應之曰若聶子則有功而無過者也何以言之前録迄南宋隆興而止隆興以後三十八世之宗派上下五百年之慧燈茫然無所知也若無續録以續佛慧命則絶續不辨品位不定語句不分習禪之人如瞽無相安能如猓國狼㬻暗中嗅金哉故曰聶子有功而無過且聶子竭三十年血力手胼足胝而為此書篳路藍縷以啓山林范金鑄鼎而禦魑魅如鵝王擇乳無有遺餘如波斯識寶無有漏失本隱以之顯事半而功倍吾故曰聶子有功而無過也或又曰聶子儒者也而強與宗門之事豈得為無過歟余應之曰是則聶子之過也夫聶子固儒者也乃不辭呵斥不顧詬厲犯衆怒嬰大難手胼足胝而為此書譬程嬰公孫杵臼之立孤南霽雲雷萬春之捍賊但欲使隆興以後三十八世之宗派上下五百年之慧燈瞭然明白即遭明眼之呵斥諸方之詬厲亦怡然受之矣況瞿子亦以為叔夜之鍛遙集之屐婆娑跌宕於罏鞴火蠟之間而自𠷣其僻聶子亦猶是耳使是録也廣布叢林流行法界不識有如盤山所云心月孤懸光吞萬象者乎古今人同不同未可知也嗚呼豈不難哉廣霞居士莆陽余懷撰於吳門之研山草堂募刻續指月録辨語松陽老人東吳哲斑毫譜出禪家牒一花五葉自分明如月得指指見月近今復有三耳生賦詩銘物多能聲續成此録在患難猿檻雞籠渾不驚我於禪宗兩不曉展讀是書嘗了了百川同自岷江來泰華還借兒孫繞側聞曹濟分兩宗東西聚議還相攻那知今人有頓漸總在拈花一笑中爰以此編告同志大法流傳卅音靸八世蜜分衆口不殊甘穗結千畦均有利願君同發歡喜心琬𤥎成益共深不然請從暗中視光生筆畫皆黃金如是居士吳綺園次氏拜書世間無上法以佛為總持四十九年中所在建道場垂衍祕密諦不獨顯文字逮於東土祖一葦渡海水燈花燦五葉分照諸方所心心妙相印歷劫無遺漏公案千八百彈指悉真義有不見月者虞山揭其旨繼席正遍知瀰淪四天下迄今卅七世孰為輯其成吳門聶居士親承大法寶以我性慧根應現光明藏證明藉尊宿遍參具眼人考究不厭詳鏤刻不厭工功用詎易集廣及衆信善善哉轉輪王匪伊異人任六種成就益允資大檀越布在須黃金雨花徵妙相我實聞此語天龍應聲諾普願諸大德同發歡喜心靈巖學人范國祿汝受拜撰緣起古人著一書動關千古事雖復歷艱虞願力依然摯所以成不朽述作垂千今人能法古乃可云無愧禪源列五宗綿亘歷年紀宗宗傳不窮紛紛各樹幟譬之曾玄孫競言祖禰是誰為溯源流俾勿相爭惎吾鄉瞿先生指月標世次以彼居士心作為平等視傳紀如列眉衣拂明次第西來祖庭燈庶幾勿墜地宋元以後禪續本罔與繼懸阻痛中斷聶子發長噫慨然續茲録旁搜奮勞勩敘述闡微言提唱宏宗旨丁巳王正旦纂集伊維始揮毫龍象臨振筆獅猊萃閲夏復經秋刪輯罔知瘁前追隆杲禪三十八代止窮流并溯源參訂靡有遺靈巖昔曾言茲書有緣起前編雙目生謂瞿幻寄後編三耳子謂聶樂讀耳目詮禪源人天共歡喜豈期書未成罡風生怖悸聶子謂無傷夙殃罔與致能以智慧力含忍且謹毖倉惶力疾書亟求遂初志囓雪復呵冰裒稽忘寢食圜中放光明花雨繽紛墜事釋寧廣陵觀濤恣遊戲流通賴明公散金闡祕義如以薪傳火如以燈傳燧火窮薪不窮燈傳燧傳矣如以指見月見月不見指於指能得月見月即見指我本塵鞅人望道猶未至大哉聶子書研精復覃思千秋有定評茲因庶無昧虞山海印學人陳見龍拜題孫孝則先生書問昨於西關佇覓仙舟竟不可得悵然久之正擬來朝發廣陵棹奉晤台從於旌忠乃接翰教欣然信未我遠也即戒輿人造請大教盛使又謂舄鳧他適不獲相見不得不却讀示編知老道翁為佛祖慧命不惜眉毛良可讚歎敢以管見上佐高明者近日衲子家頗多褊見牙齒又復尖利吾輩必應使之帖然俯首乃圖天下太平如洞山近裔掀翻世派其持論未嘗不堅而濟上家各抱不平多有向弟嘵嘵者惟以蒼天蒼天一語答之竊見大編詳於世裔政可上接傳燈而編名指月顧名思義指月重在法要不在源流倘以世裔為主則須鑿然闢之方塞其口否則資之談柄道我輩於指月二字顢頇了也若據法要其間詳略異同首正尾正止須竿頭商酌矣及此棗梨初試或仍傳燈之名可乎惟高明喝正之弟雖同諸方草草往來初無所見若謂腳根隨人久無此心或以點綴行墨斷不敢落在誰家蔣虎老不知於諸方亦有所向否惟與弟晨夕間語略見梗概容書出另請法誨可也文選樓良晤不遠不盡欲言弟宗彝頓首近閲浙中諸刻掀翻世次自相互異識者悲之孝則先生乃當代法門尊宿來書諄諄以傳燈世次為重甚合樂讀著録苦心文字禪永為法護諒佛祖龍天必同聲讚助云濟陽江湘識續指月録總目那羅延窟學人聶先樂讀編集濟陽橙仙居士江湘郢上參訂鍾山劉思敬覺岸授稿珠湖孫宗彝孝則論定序辨語總目凡例倫敘考卷之首六祖下十六世瞿録補遺集臨濟宗平江虎丘元淨禪師潭州福嚴文演禪師衢州天寧梵思禪師福州玄沙僧昭禪師紹興東山覺禪師嶽州佛照覺禪師平江寶華顯禪師台州天封覺禪師成都正法建禪師台州鴻福子文禪師南康雲居宗振首座祖氏覺庵道人令人明室道人已上十三人昭覺勤嗣台州瑞巖佛燈禪師淨因成嗣韶州南華知昺禪師慶元蓬萊卿禪師隆興泐潭擇明禪師台州寶藏本禪師吉州大中清海禪師漳州淨衆了燦禪師隆興谷山海禪師已上七人太平勤嗣撫州白楊法順禪師溫州淨居尼溫禪師已上二人龍門遠嗣潭州大溈善果禪師開福寧嗣潼川護聖居靜禪師簡州南巖勝禪師嘉州能仁紹悟禪師彭州土溪言庵主劍門南修道者已上五人大隨靜嗣蘄州龍華高禪師五祖自嗣饒州薦福擇崇禪師黃龍逢嗣文定公胡草庵居士上封秀嗣福州普賢元素禪師福州鼓山僧洵禪師福州鼓山祖珍禪師已上三人上封才嗣慶元育王介諶禪師安吉道場慧琳禪師安吉道場居慧禪師臨安顯寧圓智禪師安吉烏回良範禪師溫州本寂文觀禪師已上六人天寧卓嗣常德德山慧初禪師黃龍震嗣廬山延慶叔禪師祖庵主嗣漣水萬壽普信禪師平江慧日興道禪師廣德光孝慜禪師已上三人勝因靜嗣福州雪峰慧忠禪師雪峰需嗣慶元蓬萊圓禪師天童交嗣江州圓通守慧禪師洪州黃龍觀禪師已上二人圓通旻嗣揚州石塔禮禪師明招慧嗣峨嵋靈巖徽禪師浮山真嗣湖南報慈淳禪師祥符立嗣成都金繩文禪師信相顯嗣曹洞宗常州華藏慧祚禪師淨慈暉嗣明州雪竇智鑒禪師天童玨嗣泰州廣福道勤禪師雪竇宗嗣越州超化藻禪師善權智嗣雲門宗密州𡺸山寧禪師雪竇明嗣臨安五雲悟禪師淨慈昌嗣臨安中竺元妙禪師靈隱光嗣撫州靈巖圓日禪師圓覺曇嗣荊門玉泉思達禪師嶽麓海嗣卷之一六祖下十七世臨濟宗慶元天童曇華禪師虎丘隆嗣泉州教忠彌光禪師福州西禪鼎需禪師福州東禪思嶽禪師福州西禪守淨禪師江州東林道顏禪師慶元育王德光禪師常州華藏宗演禪師慶元天童淨全禪師建寧開善道謙禪師溫州枯木祖元禪師臨安徑山了明禪師潭州大溈法寶禪師福州玉泉曇懿禪師饒州薦福悟本禪師慶元育王遵璞禪師真州靈巖了性禪師劍州萬壽自護禪師潭州大溈景暈禪師臨安靈隱了演禪師泰州光孝致遠禪師建康蔣山善直禪師福州雪峰蘊聞禪師處州連雲道能禪師臨安靈隱道印禪師建寧竹原宗元庵主近禮侍者溫州淨居尼道禪師平江資壽尼總禪師侍郎張九成居士參政李邴居士寶學劉彥修居士提刑吳偉明居士門司黃彥節居士秦國夫人計氏已上三十四人大慧杲嗣福州清涼坦禪師臨安淨慈師一禪師安吉道場法全禪師泉州延福慧升禪師福州支提升禪師已上五人育王裕祠鎮江焦山師體禪師台州國清行機禪師常州華藏智深禪師參政錢端禮居士已上四人護國元嗣慶元全庵齊己禪師臨安靈隱道濟禪師撫州疏山如本禪師日本覺阿上人內翰曾開居士知府葛郯居士已上六人靈隱遠嗣臨安徑山寶印禪師華藏民嗣浩州鳳棲慧觀禪師昭覺元嗣潭州楚安慧方禪師常德文殊業禪師已上二入文殊道嗣婺州雙林德用禪師台州萬年道間禪師福州中際善能禪師南康雲居圓禪師已上四人雲居悟嗣成都信相戒修禪師袁州普庵肅禪師已上二人黃