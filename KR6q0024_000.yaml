十四世以前凡有未經箬庵費隱覺浪白巖遠門所曾輯録者一字不敢纂入其三十五世以下因諸老未有成書逐一商酌凡有未經刊行語録傳記塔銘無可憑據者一字不敢纂入足稱考核精詳源流有自誠禪林之拱璧法門之至寶也是録起於丁巳春王成於戊午長夏鳩工始於嘉興楞嚴寺之藏經坊終於維揚建隆寺之印經寮繕稿於張劍園居士之般若閣聶先樂讀識虎丘徑山二祖長少倫敘考五燈會元載昭覺勤祖法嗣徑山杲居首而虎丘隆次之蓋會元輯於大川濟公係妙喜四世孫推尊其祖宜乎列徑山於虎丘之前也但嚴統諸書亦仍會元之舊文先徑山而次虎丘則不得不引虎丘塔及大慧年譜祥考二祖之年臘著為說以辨正其倫敘焉按塔隆祖遷化於高宗紹興六年丙辰五月八日住世六十年坐四十五夏則隆祖之示生在神宗熙寧十年丁巳也九歲去家則元豐八年乙丑也又六歲受具則哲宗元祐六年辛未也又五歲而行腳四方首參長蘆淨照次參湛堂次參死心最後從圓悟於夾山當機契悟參隨二十年歸和州省親四衆請開堂於城西開聖寺以建炎之亂南渡宣城郡守李尚書光延居彰教四年而遷虎丘又三年而示寂則住虎丘當在紹興四年甲寅住彰教當在建炎四年庚戌而出世開聖則在建炎二三年間也會元諸書皆載圓悟於建炎初遷金山二年正月奉詔入對揚州賜號圓悟禪師今隆祖語録第一會住開聖開堂日拈香酬法乳稱現住金山佛果圓悟禪師是則正在佛果住金山入對賜號之時也其參隨圓悟二十年則當始於徽宗政和之初年也會元載圓悟崇寧中還里省親開法六祖更昭覺政和間復出峽南遊張無盡留居碧巖復徙道林而隆祖塔謂趨夾山見圓悟會圓悟移道林師從焉他書載僧問圓悟如何是夾山境悟答曰猿抱子歸青嶂裏鳥銜花落碧巖前然則夾山者即碧巖也參考羣籍定其年甲則隆祖之常隨圓悟自政和而宣和而靖康而建炎前後蓋二十年也此則隆祖之始末合會元諸書所紀以證徐林所撰之塔並無纖毫可疑者也按年譜大慧生於哲宗元祐四年己巳則齒少於隆祖一十二年也出家於徽宗崇寧三年甲申則後於隆祖之脫白一十九年也請具足戒於崇寧四年乙酉則後於隆祖之得戒一十四年也政和年間依湛堂於寶峰至宣和七年乙巳始參圓悟於天寧則契機圓悟亦在隆祖之後十餘年也高宗建炎四年庚戌始住海昏雲門庵則正當隆祖住彰教之年爾時隆祖先已出世於開聖也此則悉依大慧門人祖詠宗演所修之年譜其載筆諒無差謬者也考諸塔年譜以定二祖之倫敘豈非虎丘為兄而徑山為弟乎年譜載大慧於建炎元年丁未省侍圓悟於金山偕隆藏主之吳門少憩寶華次虎丘遂館於前資據塔隆祖是時已住開聖未住虎丘意者二老皆以省侍圓悟相遇於金山遂同遊吳門館於虎丘耳他書又載應庵華祖先於彰教親依隆祖及隆祖遷住虎丘則華祖為先馳意者隆祖於建炎中先已受虎丘之請至紹興中始來闡法故華祖為前驅耳不然以著草鞋住院之華祖豈其居學地時曾為子夏之先耶會元載應庵住歸宗日大慧在梅陽有僧傳師垂示語句慧見之極口稱歎後以偈寄曰坐斷金輪第一峰千妖百怪盡潛踪年來又得真消息報道楊歧正脈通其歸重如此年譜載大慧於紹興二十四年甲戌以頌代書答歸宗華侄長老此之謂也會元又載應庵於室中能鍛鍊耆艾故世稱大慧與師居處為二甘露門又載應庵於虎丘忌日拈香有二十年來坐曲彔木之句又載應庵於孝宗隆興改元六月十三日奄然而化年譜載大慧亦於是年八月十日示寂於徑山明月堂則知應庵弘法二十餘年實與大慧同時行道也諸書列徑山於虎丘之前實為傳誤久欲正其說以遍告諸方具眼適樂讀居士從邗上歸出其向日圜中所編指月續録見示開卷便見虎丘法嗣列在徑山法嗣之前觀其伯仲昭然頓使雁行成序且載筆精妙確有卓見高識為功於傳燈無盡矣敢抒管見以附不朽名之曰少長倫敘考云康熙己未佛成道日虎丘二十一世法孫虞山檗巖本黃槃談拜書豫閲圓悟佛果禪師語録係宋平江府虎丘山門人紹隆等編則知虎丘為圓悟首座也又閲紫柏老人集其序應庵和尚語録云臨濟正宗大於楊岐會盛於五祖演至於圓悟嫡嗣曰虎丘而虎丘嫡嗣為應庵則知虎丘為圓悟嫡嗣也及閲五燈會元昭覺禪師法嗣三十餘人首徑山而次虎丘則不能無疑今閲檗公辨正一書其考諸塔銘按諸年譜二祖之得法行化年月次序可謂詳矣其有一事徑山在虎丘之先者乎虎丘為兄徑山為弟斷然無疑也夫兄弟之倫儒釋一理古人雖重嫡而輕庶然庶為兄嫡為弟長幼之序猶不可紊況嫡本兄乎庶本弟也而可以顛倒其倫次耶五燈會元編於大慧之門人而推崇其祖是誠有之如楚石為大慧五世孫無相錢居士序其語録云圓悟之後分為二宗一為妙喜一為虎丘是亦先徑山而後虎丘者訛傳日久幾莫能辨檗公得法於木陳老人為虎丘二十一世孫辨正二祖倫次非為推崇其祖實所以較正臨濟之正傳訂定圓悟之宗派公也非私也彤學識淺劣於禪宗未窺一二但宋文憲公為文苑巨公所作禪林版之文甚多若育王約之裕公生塔之龍池佛心寧公舍利塔銘詳載原委未有不先虎丘而後徑山者是可信也敬書以辨於指月續録之首俾僧史之信從有本云長洲念齊繆彤題
