body:
  text: 六祖下三十二世臨濟宗北京柳巷月心笑巖德寶禪師金臺之世族也父吳門母丁氏早失恃怙弱冠偶之講席聽華嚴大疏至十地品云世尊因中曾作金轉輪王時有乞者來化國城妻子頭目手足內外布施王作念言我今若不施與向後百年一旦空廢全無少益反招慳吝過失不若施與空我所有益我功德師聞之不覺身心廓然嘆曰古今同一幻夢中遂決志出家纏絆歲餘就於本境廣惠禪林禮大寂能公披緇祝髮明年受具朝參夕叩雖深信知有不肯自休務期親證遍謁大川月舟古春古拙諸老宿後至關子嶺參無聞聰和尚問十聖三賢已全聖智如何道不明斯旨聰乃厲聲曰十聖三賢汝已知如何是斯旨速道速道師連下十數轉語皆不契遂發憤寢食俱廢一日𢹂籃到㵎邊洗菜一莖菜葉墮水旋轉捉不住忽有省提籃喜躍而歸聰立簷下問是甚麼師曰一籃菜聰曰何不別道師曰請和尚別問來至晚入室聰舉玄沙敢保老兄未徹話師曰賊入空室聰曰者則公案不得草草師喝一喝拂袖便出復往見濟菴古巖大覺諸尊宿皆器重之後上關子嶺再參聰和尚一日雨寒聰命烘爐乃問人人有箇本來父母子之父母今在何處師曰一火焚之曰恁麼則子無父母耶曰有則有只是佛眼覷不見曰子還見麼曰某亦不見曰子何亦不見曰若見則非真父母聰曰善哉師遂呈一偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師聰閲之甚喜曰如是如是只此一偈堪紹吾宗即說偈曰汝心即我心我心本無心無心同佛心佛心非我心木陳忞頌云水裏拾來火裏燒出頭天外自消遙翻思未會機前著有一豪兮是一豪牧雲門頌云千山歷盡草鞋穿任運騰騰度好年平實商量田地穩靈山慧命一絲懸箬菴問頌云一莖菜葉忽隨流喜躍歸來盡底酬父母遍身紅爛地瞎驢端許振宗猷復曰佛如轉輪王佛法如王命佛子豎法幢能令邪作正囑曰汝諦受持遇緣熟者智愚皆度續佛慧命須待其人師蒙記莂復侍聰年餘乃禮辭去後底金陵寓靜海牛首高座等處數載復還金臺初居圓通次遷南寺鹿苑慈光善果諸剎端陽上堂舉大慧和尚上堂曰今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神兩手捶胸叫冤苦師曰大慧老漢大似少箇禁方向青天白日見神見鬼笑巖則不然今朝正是五月五雲從龍兮風從虎山僧要與現前諸大聖凡賭箇賭信手拈來百草頭甜者甜兮苦者苦拈拄杖驀然突出者一條穿過從上諸佛祖是你現前諸人百樣具有為甚麼只少者一箇忽有箇見義勇為底憤憤地向前道和尚且莫壓良為賤若論者一箇敢道人人不缺分毫放下拄杖曰汝宛不知何妨矢上更加尖堆上重添土上堂男兒固奮沖天志莫若從頭放下來直把髑髏枯死盡仍教死眼豁然開上堂舉南嶽讓和尚一日問衆曰道一為人說法也未曰已為衆說法了也尚曰總未見人通箇消息來乃密遣一僧去探囑曰待渠上堂時便出問作麼生看渠有何言句可記將來僧往一如所教馬祖曰自從何亂後三十年不少鹽醬僧回舉似尚深肯之師曰山僧者裏三十年不曾見箇鹽醬汝等在者裏討什麼碗以拄杖一時趁散上堂當門一隻箭來者看方便擬進問如何穿過髑髏面上堂拈拄杖曰有麼有麼時有僧出作禮師劈脊便打曰多口作麼曰某甲一言也未何為多口師復打曰再犯不容漢月藏拈云俊則太煞俊未免著忙在頌曰不須賓主會來親占得神機絶法人雪夜梅花頷春早滿園香草未知新僧問一言道盡更不容其言時如何師云武陵溪畔杜䳌語十里桃花血滿紅遠菴僼頌云武陵溪畔杜鵑鳴萬語千言無別聲回首若知歸去好天涯遊子盡回程旅菴月頌云誰家桃李鬪芳妍杜宇聲聲喚客還曾踏武陵溪畔路洞中春色異人間天岸升頌云辭窮理盡舌頭乾海底珊瑚撑著月杜鵑聲裏落花紅多少阿師全漏泄上堂趣庭露溼階苔滑行道藤牽山徑迷禪者多詢真祖意夜來𢹂履獨歸西拈杖指云看看看祖師又越山門而來也喚行童與我即便逐出良久云是你諸人分上著這等閒家具不得僧問如何是和尚昔年獲益事師以拂子倒懸視僧云會麼僧云某甲巳識和尚做處也師曰你道荊州黃四娘禮佛求箇什麼僧無對師乃打出石車乘拈云僧問獲益師拂倒懸彼此分明誰知末後一拶如墮萬仞深坑至今起不得召大衆云還救得麼莫道賊過張弓好雲巔持云黃四娘禮佛畢竟求箇甚麼乃吁一聲曰空中鳥跡原無見葉上風聲若有聞僧參問從上千七百老凍儂某甲今日一串穿來獻與和尚伏請判斷時門外忽聞犬吠師遽顧侍者看是什麼客來侍者出問話僧罔措師曰上座適才問什麼僧擬重舉師與連棒打出僧問如何是文殊普見三昧師曰死人眼曰如何是觀音普聞三昧師曰死人耳曰如何是一言道盡底句師曰死人口一僧請益金剛經為人輕賤話師曰汝有疑否僧曰有疑師曰有疑則為人輕賤無疑則應墮惡道僧沈吟師曰會麼僧曰不會師曰把出你不會底來看僧曰不會教某甲把出箇什麼師曰汝之罪業劃然消矣僧歡喜禮謝而去問玄沙不出嶺保壽不渡河落第幾機師曰總落第二機曰如何是第一機師曰玄沙不出嶺保壽不渡河曰畢竟得箇什麼師曰灼然畢竟得箇什麼問如何是奪人不奪境師曰一文錢一箇大燒餅曰如何是奪境不奪人師曰喫在肚裏了當下欣欣曰如何是人境兩俱奪師曰你無一文錢也只甘受餓曰如何是人境俱不奪師曰雲門胡餅金牛飯空腹而來滿腹歸僧問祖意教意是同是別師曰柳影橫塘魚上樹槐陰地馬登枝僧曰與麼則形影兩分曲直自顯去也師曰未曾飽食廬陵米徒把蒲團認作天僧參問承聞諸佛出世為一大事因緣請問和尚如何是大事因緣師曰著衣喫飯屙屎放尿僧不肯不禮拜而出師喚回示以偈曰諸佛出於世唯為大因緣屙屎並放尿飢餐困打眠目前緊急事人只欲上天談玄共說妙遭罪復輸錢僧慚惶作禮而去一日有兩官人遊山入門哦曰茂松修竹回顧見師便問如何是道人家風師曰茂松修竹曰有何旨趣師曰自家觀不足留與客來看有士人閲師淨土偈乃問佛說是經則有六方諸佛出廣長舌相作證今吾師說偈有何殊證師曰居士舌頭亦不短又問何為不思議功德師曰前街人喚犬後巷罵貓兒又問老師今年高壽了師曰論年不見箇葷腥作麼不槁瘦了僧問處處入法界念念見遮那如何是遮那師曰淨地不須屙舉趙州和尚問投子大死底人却活時如何投子曰不許夜行投明須到師頌曰三十六物都灰燼只遺一雙枯眼睛置向九衢深夜後無光明處作光明舉世尊拈華公案頌曰師資妙契芥投針似海如山無處尋石火光中曾著眼始知佛祖不傳心舉經題字頌曰黑白未分已墮遍那堪擬議費鑽研西乾此土諸賢聖鼻孔撩天總被穿示座主偈曰荷鉏到處賣工夫三兩文錢足可圖鉏得他家田地淨自家田地盡荒蕪示僧法中幽趣眼中醫向上玄機境上塵黑漆桶邊箍子斷太平國內自由人靜坐寒巖此病難男兒爭肯自相瞞轉身一步無多子始信塵含法界寬師嘗室中垂語曰佛未出世祖未西來元無佛法世法之名迥出黑山鬼窟一句作麼生道又曰佛既出世祖已西來佛法世法相為建立不犯化門道將一句來又曰佛生凡聖對待之門世法佛法名言強立總拈過一邊衲僧本分一句試道將來又曰尋常間語言問答甚平易甚不思議剛被人問箇如何是汝本有底佛性為甚麼却反眼豎口啞又曰既為佛子志階佛地因甚一箇佛字最不喜聞師晚年退居京城柳巷於萬歷辛巳正月十六日示寂奉全身塔於小西門外無聞聰嗣臺山龍樹寶應禪師一日晨興覩明星有省述偈曰日出東山月沈西嶂昨日今朝曾無兩樣天琦瑞下大川洪嗣臺山楚峰和尚獨居祕魔崖十餘載木食㵎飲人不堪其憂師恬如也一日聞火𪹼聲豁然大悟占偈曰眼睛突出死柴頭赫赫神光照四洲觸處現成人不委幾回春去又逢秋大川洪嗣玉堂和尚僧問如何是道師曰看腳下曰如何行履師曰驀直去大川洪嗣已上三人蘇州車溪無幻古湛性沖禪師秀水張氏子初以俗相謁無趣遂有所契尋棄家從趣芟染趣一日問師曰徑山頌三玄三要曰徹骨徹髓道一句三玄三要絶遮護此二句中山僧欲取一句為法你道取那一句好師曰和尚適才問那一句趣瞋目叱曰得恁無記性師曰祇為和尚徹骨徹髓趣曰不然為汝一人即得爭奈大衆何師曰取即不辭孤負先聖喪我後人趣曰如是如是師往徑山結茅集無趣語録一日歸覲趣曰一向作得些什麼事師曰某甲買得段田收得原本契書請和尚僉押即將集本呈上趣接得展看曰者是我底你底聻師曰和尚不得攙行奪市趣便將集本擲下師便趨出少頃呈偈趣曰者是你作底麼師曰某甲鼓粥飯氣若謂有所作孤負和尚不少趣點首金明進云我若作敬畏待云請和尚僉押便乃埀下一足他更如何但云念子遠來且坐喫茶不特不負來機要且主賓有禮若作徑山待云者箇是我底你底聻遽好與一掌何故大丈夫捋虎鬚未為分外古林如云我若作徑山待道者箇是我底你底聻便與作禮云今日念和尚老大天峯性頌云相逢各自展家風祖業兒孫用不窮大海無涯恣躍鯉長空萬里縱飛鴻住後示衆三界唯心萬法唯識卓拄杖昨宵時雨滴空階一片緑苔俱打溼示衆大道體寬長空絶跡按下雲頭別通消息同生同死風行草偃且道把住為人好放行為人好乾坤一合地胡餅日月兩輪天氣毬示衆明明百草頭明明祖師意笑殺老龐公至今猶瞌睡魯祖見人便面壁不解寒溫祕魔走到便擎叉全無禮義南山鱉鼻不若死鰌西院鑷刀渾如鈍鋸且道大悲如何為人輪王總未拋三寸遍界先聞刀斧聲浴佛上堂毗籃園裏曾呈醜古佛堂前又露形不是日光三昧力如何洗得你身清大衆釋迦老子今日誕生未審此時還曾落地也未一僧出曰落地了也師曰你見甚麼人說僧無語師曰杓卜聽虗聲僧問清虗之理畢竟無身時如何師曰道者合如是曰向上更有事也無師曰雪隱鷺鷥飛始見柳藏鸚鵡語方知問和尚百年後向甚麼處去師曰千株松下百草頭邊師燒火次僧問如何是自在天真佛師曰與我般一束柴來僧肩柴至又問師曰者奴子好惡也不識便打介菴進頌云大富須還長者家天然隨處有生涯可憐不識寰中寶錯過真金在赤沙牧公謙頌云腳下魚行總不知因憐𮭗𮭗亦何癡幾多負義忘恩者徒有雙雙兩道眉僧問如何是最上一乘師曰藤穿篾縛曰意旨如何師曰三十年後僧參師問何處來曰廬山師曰古人道不向廬山尋落處象王鼻孔漫撩天如何是廬山落處曰請和尚尊重師便低頭休去示念佛偈發心念佛循公道念念無私佛即靈念到公私俱不現唯心唯佛更何論念佛休論閒與忙時時無間始相當一聲喚醒慈悲主剎剎塵塵是淨真心念佛錦添華功德難量等海沙大處顯然全體現同名同號更無差火𪹼偈團圞無縫罅綿密不通風一點無明發分身剎土中示人動口全拋一片心擬思量處不知音百千年外看家話倒腹傾腸說與君起念求心心既念頓然無念念無心九重之內常為主徹古該今不動尊盡心竭力作工夫內外推尋實總無正恁麼時無計可忽聞村內一聲歌即心即佛隔皮言非佛非心亦是權端的要知真實處直須吐盡野狐涎師菴居二十餘載萬歷庚戌受徑山請不數月疾作仍返車溪辛亥冬示寂茶毗塔於徑山無趣空嗣嘉興祇園古卓性虗禪師繫籍儒門潛心釋典屢困場屋遂禮無趣祝髮力參數載見紅日觸身有省四方來者多就師咨決許司馬以名剎相延師力辭之萬歷乙卯九月晦日謂衆曰我將行矣乃說偈曰好去了好去了無生路上人知少他年再有相逢日大衆修行須及早呵呵寂然而逝無趣空嗣已上二人曹洞宗嵩山萬壽月舟文載禪師別號虗白北畿通州人世系蔚州廣寧王氏祖才從太宗靖內難官至武德將軍父清早無子嘗禮廣濟白菴空禪師受戒發願曰若生子必命出家一夜清夢老僧入室而師生童時或結草為菴或聚沙為塔或塑泥為像撮土為香採花為供戲作種種佛事人皆異之九歲入鄉較讀書輒了了年十三父以夙願語之師欣然遂禮白菴落髮年二十詣杭納具北遊掩關因閲萬松拈提古宿機緣若面牆者久之忽省乃曰曹洞宗風大播天下有織錦回文之妙非針線細密盤旋回互不觸當頭者不能與伊作主也遂幡然出關參無方從問曰某閲評唱有言前露刃句裏藏鋒之妙而大慧要劈碧巖之板其過安在方曰祇這一片嵩山影石老僧久欲推倒爭奈病久無力子試為推師擬議方曰推不倒在及親炙一年許每呈語方曰驢年去忽一日曰山花開似錦㵎水湛如藍此豈不是大龍底轉身句方乃笑曰這漢桶底脫也百愚斯頌云春雨山花燦錦秋風落葉飛金夜靜幽人得意猿啼旅客傷心咦等閒若不登高望爭見東流海漾深位中符頌云跳出葛藤窠窟裏玉線金針定文理門外剎竿拈轉時三十六峯齊立起正德改元主少林示衆達摩西來以一乘法直指單傳令人見性成佛至我少室如九鼎繫於單絲汝等諸人趁色力康健打辦箇事直須努力莫間過日師住祖席一十六載後退老於三十六峰之雲山深處嘉靖甲申師示寂塔於少室祖塋送葬之日伊鄭徽三府積香如薪四衆雲擁霞光萬丈觀者歎未曾有無方從嗣
